attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-pathfinding-starting-user-prod"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has permission to assume pl-bucket-access-role, a role that appears
        to have very limited S3 permissions in its IAM identity policy but is explicitly
        named as a principal in the sensitive S3 bucket's resource policy.

    - id: bucket-access-role
      label: "Bucket Access Role"
      type: principal
      subType: iam-role
      arn: "arn:aws:iam::{account_id}:role/pl-bucket-access-role"
      description: >
        This IAM role has only s3:ListAllMyBuckets in its IAM identity policy, which
        appears innocuous. However, the sensitive S3 bucket's resource policy explicitly
        names this role and grants it s3:ListBucket, s3:GetObject, s3:PutObject, and
        s3:DeleteObject on the bucket. Resource policies are evaluated independently of
        IAM identity policies, so this role can fully access the sensitive bucket despite
        its minimal IAM policy.

    - id: target-bucket
      label: "Sensitive S3 Bucket"
      type: resource
      subType: s3-bucket
      isTarget: true
      arn: "arn:aws:s3:::pl-sensitive-data-bucket-{account_id}"
      description: >
        This S3 bucket contains sensitive data. Its resource policy grants the
        pl-bucket-access-role full object access (ListBucket, GetObject, PutObject,
        DeleteObject), bypassing any IAM identity policy restrictions. Any principal
        that can assume pl-bucket-access-role can reach this data.

  edges:
    - from: starting-principal
      to: bucket-access-role
      label: "sts:AssumeRole"
      description: >
        The starting user assumes pl-bucket-access-role. The role's trust policy
        allows the pathfinding starting user to assume it.
      hints:
        - "Use sts:AssumeRole to assume the bucket access role. The role's identity policy appears minimal -- the access comes from the S3 bucket resource policy, not the identity policy."
      commands:
        - description: "Assume the bucket access role"
          command: "aws sts assume-role --role-arn arn:aws:iam::{account_id}:role/pl-bucket-access-role --role-session-name resource-policy-bypass"

    - from: bucket-access-role
      to: target-bucket
      label: "S3 resource policy"
      description: >
        Although the role's IAM identity policy only has s3:ListAllMyBuckets, the
        bucket's resource policy explicitly grants this role full object access.
        AWS evaluates identity policies and resource policies independently -- if
        either grants access (and neither explicitly denies it), access is permitted.
      hints:
        - "The S3 bucket resource policy grants access directly to your principal, bypassing the IAM identity policy restriction -- call s3:GetObject directly without assuming any other role."
      commands:
        - description: "List all S3 buckets to discover the sensitive bucket"
          command: "aws s3api list-buckets"
        - description: "Read sensitive data from the bucket via resource policy"
          command: "aws s3 cp s3://pl-sensitive-data-bucket-{account_id}/sensitive-data.txt -"
        - description: "Write data to the bucket via resource policy"
          command: "aws s3 cp /tmp/test.txt s3://pl-sensitive-data-bucket-{account_id}/attacker-file.txt"
