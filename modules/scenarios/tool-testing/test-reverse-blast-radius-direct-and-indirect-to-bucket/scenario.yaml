# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "test-reverse-blast-radius-direct-and-indirect-to-bucket"
description: "Tool testing scenario validating reverse blast radius detection - tests whether security tools identify both direct S3 access (user1) and indirect access via role assumption (user2 -> role3 -> bucket)"
cost_estimate: "$0/mo"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Tool Testing"
sub_category: "reverse-blast-radius"
path_type: "one-hop"
target: "to-bucket"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    # Direct access user
    - "arn:aws:iam::{account_id}:user/pl-prod-rbr-di-user1"
    
    # Indirect access user (via role assumption)
    - "arn:aws:iam::{account_id}:user/pl-prod-rbr-di-user2"
    
    # Role with S3 access (assumable by user2)
    - "arn:aws:iam::{account_id}:role/pl-prod-rbr-di-role3"
    
    # Target S3 bucket
    - "arn:aws:s3:::pl-sensitive-data-rbr-di-{account_id}-{suffix}"

  summary: "Two paths to S3 bucket: user1 has direct S3 permissions; user2 can assume role3 which has S3 permissions granting indirect access to bucket"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    # User1 - Direct S3 access
    - permission: "s3:GetObject"
      resource: "arn:aws:s3:::pl-sensitive-data-rbr-di-*/*"
      notes: "User1 has explicit permission to read objects from target bucket"
    
    - permission: "s3:ListBucket"
      resource: "arn:aws:s3:::pl-sensitive-data-rbr-di-*"
      notes: "User1 has explicit permission to list target bucket"
    
    # User2 - Indirect access via role assumption
    - permission: "sts:AssumeRole"
      resource: "arn:aws:iam::{account_id}:role/pl-prod-rbr-di-role3"
      notes: "User2 can assume role3"
    
    # Role3 - S3 access
    - permission: "s3:GetObject"
      resource: "arn:aws:s3:::pl-sensitive-data-rbr-di-*/*"
      notes: "Role3 has permission to read objects from target bucket"
    
    - permission: "s3:ListBucket"
      resource: "arn:aws:s3:::pl-sensitive-data-rbr-di-*"
      notes: "Role3 has permission to list target bucket"

  helpful:
    - permission: "sts:GetCallerIdentity"
      purpose: "Verify current identity"
    
    - permission: "s3:ListAllMyBuckets"
      purpose: "Discover available buckets"

# =============================================================================
# TEST GROUPS
# =============================================================================
test_groups:
  direct_access:
    total: 1
    users: 1
    roles: 0
    description: "user1 with explicit S3 permissions to target bucket"

  indirect_access:
    total: 1
    users: 1
    roles: 1
    description: "user2 can assume role3 which has S3 permissions for indirect bucket access"

# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0009 - Collection"
  techniques:
    - "T1530 - Data from Cloud Storage Object"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_tool_testing_test_reverse_blast_radius_direct_and_indirect_to_bucket"
  module_path: "modules/scenarios/tool-testing/test-reverse-blast-radius-direct-and-indirect-to-bucket"
