attackMap:
  nodes:
    - id: public-internet
      label: "Public Internet"
      type: principal
      subType: iam-user
      arn: "arn:aws:sts::{account_id}:assumed-role/unauthenticated/attacker"
      description: >
        You have gained access to this principal's AWS IAM credentials. These could have been
        obtained through many real-world vectors: phishing a developer and gaining access to
        their workstation, compromising a browser session, exploiting a vulnerable workload
        running in this AWS account, discovering credentials in a public S3 bucket, or finding
        them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        In this scenario, no AWS credentials are needed at all — the Lambda function URL is
        publicly accessible without authentication. You are an unauthenticated attacker on
        the public internet who has discovered the function URL.

    - id: lambda-function
      label: "Public Lambda Function"
      type: resource
      subType: lambda-function
      arn: "arn:aws:lambda:{region}:{account_id}:function:pl-public-admin-lambda"
      description: >
        This Lambda function has a public function URL configured with AuthorizationType: NONE,
        meaning anyone on the internet can invoke it without providing AWS credentials. The
        function's execution role is pl-public-lambda-admin-role, which has AdministratorAccess
        attached. When invoked, the Lambda runtime injects the execution role's temporary
        credentials into the function's environment variables.

    - id: admin-role
      label: "Admin Execution Role"
      type: principal
      subType: iam-role
      isTarget: true
      arn: "arn:aws:iam::{account_id}:role/pl-public-lambda-admin-role"
      description: >
        This IAM role is the Lambda execution role with AdministratorAccess attached. By
        extracting the temporary credentials from the Lambda function's environment, you can
        operate as this role and perform any action in the AWS account.

  edges:
    - from: public-internet
      to: lambda-function
      label: "lambda:InvokeFunctionUrl (no auth)"
      description: >
        Send an unauthenticated HTTP request to the Lambda function URL. No AWS credentials
        or signatures are required because AuthorizationType is set to NONE.
      hints:
        - "Start by searching for Lambda function URLs in the account — these are separate HTTPS endpoints distinct from regular Lambda invocation."
        - "If you have any low-privilege AWS credentials, use lambda:ListFunctions to enumerate functions, then check each one for a function URL."
        - "Use lambda:GetFunctionUrlConfig on any function you find to check the AuthorizationType field — the value NONE means no credentials are required."
        - "Check the execution role attached to any publicly invocable function — use iam:ListAttachedRolePolicies to see what permissions it carries."
        - "A Lambda function URL with AuthorizationType: NONE can be invoked with a plain HTTP client like curl — no AWS Signature Version 4 required."
        - "Once you have the function URL, invoke it directly with an HTTP GET or POST request and observe the response body for any sensitive data."
      commands:
        - description: "Invoke the Lambda function URL (replace URL with actual function URL from terraform output)"
          command: "curl -s https://<function-url-id>.lambda-url.<region>.on.aws/"

    - from: lambda-function
      to: admin-role
      label: "credential extraction"
      description: >
        The Lambda execution role credentials are available as environment variables inside
        the function. Extract AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, and AWS_SESSION_TOKEN
        from the response to assume the admin role's identity.
      hints:
        - "When a Lambda function executes, the AWS runtime automatically injects the execution role's temporary credentials as environment variables."
        - "Look at the function's response body — if the function exposes its environment variables, you will find AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, and AWS_SESSION_TOKEN."
        - "The three credential values in the response are short-lived but fully functional — they represent the execution role's identity, not the invoking caller."
        - "Export the extracted credentials as environment variables in your local shell and call aws sts get-caller-identity to confirm which role you now control."
        - "Use the credentials to verify the effective permissions of the execution role — if AdministratorAccess is attached, you have full account access."
      commands:
        - description: "Verify the extracted credentials grant admin access"
          command: "AWS_ACCESS_KEY_ID=<extracted> AWS_SECRET_ACCESS_KEY=<extracted> AWS_SESSION_TOKEN=<extracted> aws sts get-caller-identity"
