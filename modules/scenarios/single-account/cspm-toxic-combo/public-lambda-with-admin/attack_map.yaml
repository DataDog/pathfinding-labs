attackMap:
  nodes:
    - id: public-lambda
      label: "Public Lambda Function"
      type: resource
      subType: lambda-function
      arn: "arn:aws:lambda:{region}:{account_id}:function/pl-public-admin-lambda"
      access:
        type: public-network
        url: "https://{function_url_id}.lambda-url.{region}.on.aws/"
      description: >
        This resource is publicly accessible without AWS credentials. Any attacker on the
        internet can reach it directly -- no IAM credentials, no AWS signature, no prior
        access required. This is your entry point.

        The pl-public-admin-lambda function exposes a public Function URL configured with
        AuthorizationType: NONE, meaning any HTTP client (browser, curl, script) can invoke
        it without providing AWS authentication. Its execution role is pl-public-lambda-admin-role,
        which has AdministratorAccess attached. The Lambda runtime automatically injects the
        execution role's temporary credentials into the function's environment as
        AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, and AWS_SESSION_TOKEN.

        If you have any low-privilege AWS credentials available, lambda:ListFunctions and
        lambda:GetFunctionUrlConfig can help you discover the function and its public URL --
        but they are not required to proceed once the URL is known.

    - id: admin-role
      label: "Admin Execution Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-public-lambda-admin-role"
      description: >
        This IAM role is the Lambda execution role with AdministratorAccess attached. By
        invoking the public Lambda function URL and extracting the temporary credentials
        from the response, you can operate as this role and perform any action in the AWS
        account. AdministratorAccess grants ssm:GetParameter on all parameters, so the
        extracted credentials can be used directly to capture the scenario's CTF flag.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/public-lambda-with-admin-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the account.
        Retrieving it requires the Lambda execution role's temporary credentials extracted
        in the previous step. AdministratorAccess on the role grants ssm:GetParameter
        implicitly — use the extracted credentials to read the parameter value.

  edges:
    - from: public-lambda
      to: admin-role
      label: "HTTP invoke (no auth) → credential extraction"
      description: >
        Send an unauthenticated HTTP request to the Lambda function URL. No AWS credentials
        or signatures are required because AuthorizationType is set to NONE. The function
        exposes the execution role's temporary credentials in its response -- extract
        AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, and AWS_SESSION_TOKEN and use them
        to operate as the admin execution role.
      hints:
        - "Invoke the public function URL with a plain curl request (no AWS credentials required -- AuthorizationType is NONE). The function returns the execution role's temporary credentials from its environment variables in the response body."
        - "Export the returned AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, and AWS_SESSION_TOKEN to operate as the admin execution role."
      commands:
        - description: "Invoke the public Lambda function URL (no credentials required)"
          command: "curl -s https://<function-url-id>.lambda-url.<region>.on.aws/"
        - description: "Verify the extracted credentials grant admin access"
          command: "AWS_ACCESS_KEY_ID=<extracted> AWS_SECRET_ACCESS_KEY=<extracted> AWS_SESSION_TOKEN=<extracted> aws sts get-caller-identity"

    - from: admin-role
      to: ctf-flag
      label: "ssm:GetParameter"
      description: >
        With the admin execution role's temporary credentials in hand, retrieve the
        scenario flag from SSM Parameter Store. The credentials were injected into the
        Lambda environment by the AWS runtime and returned in the function's HTTP response.
        AdministratorAccess grants ssm:GetParameter on all parameters in the account, so
        no additional permissions are needed beyond the credentials already extracted.
      hints:
        - "Export the extracted credentials and call ssm:GetParameter with the full parameter name to retrieve the flag."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store using the extracted Lambda role credentials"
          command: "AWS_ACCESS_KEY_ID=<extracted> AWS_SECRET_ACCESS_KEY=<extracted> AWS_SESSION_TOKEN=<extracted> aws ssm get-parameter --name /pathfinding-labs/flags/public-lambda-with-admin-to-admin --query 'Parameter.Value' --output text"
