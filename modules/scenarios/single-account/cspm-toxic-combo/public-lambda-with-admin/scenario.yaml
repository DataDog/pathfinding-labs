# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.0.0"
name: "public-lambda-with-admin"
description: "Publicly accessible Lambda function with administrative IAM role"
cost_estimate: "$0/mo"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "CSPM: Toxic Combination"
sub_category: "Publicly-accessible"
path_type: "toxic-combination"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:lambda:{region}:{account_id}:function:pl-public-admin-lambda"
    - "arn:aws:iam::{account_id}:role/pl-public-lambda-admin-role"

  summary: "public internet → (lambda:InvokeFunctionUrl) → Lambda with admin role → extract credentials → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - permission: "lambda:InvokeFunctionUrl"
      resource: "*"

  helpful:
    - permission: "lambda:ListFunctions"
      purpose: "Discover publicly accessible Lambda functions"

    - permission: "lambda:GetFunctionUrlConfig"
      purpose: "Identify Lambda functions with public URLs"

# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0001 - Initial Access"
    - "TA0004 - Privilege Escalation"
    - "TA0006 - Credential Access"
  techniques:
    - "T1190 - Exploit Public-Facing Application"
    - "T1552.005 - Cloud Instance Metadata API"
    - "T1648 - Serverless Execution"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_cspm_toxic_combo_public_lambda_with_admin"
  module_path: "modules/scenarios/single-account/cspm-toxic-combo/public-lambda-with-admin"
