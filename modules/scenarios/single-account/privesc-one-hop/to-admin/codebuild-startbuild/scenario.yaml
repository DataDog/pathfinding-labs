# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "codebuild-startbuild"
description: "User with codebuild:StartBuild can exploit existing CodeBuild project with admin role by using buildspec-override to execute malicious commands"
cost_estimate: "free"
pathfinding-cloud-id: "codebuild-002"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "access-resource"
path_type: "one-hop"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-cbsb-to-admin-starting-user"
    - "arn:aws:codebuild:{region}:{account_id}:project/pl-prod-cbsb-to-admin-existing-project"
    - "arn:aws:iam::{account_id}:role/pl-prod-cbsb-to-admin-project-role"

  summary: "starting_user → (codebuild:StartBuild with buildspec-override) → existing_project with project_role → buildspec grants admin to starting_user → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - permission: "codebuild:StartBuild"
      resource: "*"

  helpful:
    - permission: "codebuild:ListProjects"
      purpose: "Discover existing CodeBuild projects with privileged roles"

    - permission: "codebuild:BatchGetProjects"
      purpose: "View project details including service role ARN"

    - permission: "codebuild:BatchGetBuilds"
      purpose: "Monitor build execution status and verify success"

    - permission: "iam:ListUsers"
      purpose: "Verify admin access after escalation"

# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0002 - Execution"
  techniques:
    - "T1078.004 - Valid Accounts: Cloud Accounts"
    - "T1651 - Cloud Administration Command"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_admin_codebuild_startbuild"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-admin/codebuild-startbuild"
