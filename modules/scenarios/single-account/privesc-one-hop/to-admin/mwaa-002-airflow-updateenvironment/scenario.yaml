# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.1"
name: "airflow-updateenvironment"
description: "User with airflow:UpdateEnvironment can escalate to admin by updating an existing MWAA environment's DAG source to an attacker-controlled bucket containing a malicious DAG that executes with admin credentials"
cost_estimate: "$37/mo"
pathfinding-cloud-id: "mwaa-002"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "existing-passrole"
path_type: "one-hop"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-mwaa-002-to-admin-starting-user"
    - "arn:aws:iam::{account_id}:role/pl-prod-mwaa-002-to-admin-admin-role"

  summary: "starting_user → (airflow:UpdateEnvironment) → changes DAG source to attacker's bucket → (airflow:CreateCliToken) → triggers malicious DAG → DAG executes with admin execution role credentials → attaches AdministratorAccess to starting_user → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - principal: "pl-prod-mwaa-002-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "airflow:UpdateEnvironment"
          resource: "arn:aws:airflow:*:*:environment/pl-prod-mwaa-002-to-admin-env"
        - permission: "airflow:CreateCliToken"
          resource: "arn:aws:airflow:*:*:environment/pl-prod-mwaa-002-to-admin-env"
        - permission: "ec2:DescribeSubnets"
          resource: "*"
        - permission: "ec2:DescribeVpcs"
          resource: "*"
        - permission: "ec2:DescribeSecurityGroups"
          resource: "*"
        - permission: "s3:GetEncryptionConfiguration"
          resource: "*"

  helpful:
    - principal: "pl-prod-mwaa-002-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "airflow:GetEnvironment"
          purpose: "Check environment status and wait for update to complete"
        - permission: "iam:ListAttachedUserPolicies"
          purpose: "Verify that AdministratorAccess was attached after the attack"
# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0002 - Execution"
  techniques:
    - "T1098 - Account Manipulation"
    - "T1059 - Command and Scripting Interpreter"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_admin_mwaa_002_airflow_updateenvironment"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-admin/mwaa-002-airflow-updateenvironment"

# =============================================================================
# DEMO CONFIGURATION
# =============================================================================
interactive_demo: true  # Demo requires user confirmation due to high cost and long wait times

# =============================================================================
# PREREQUISITES
# =============================================================================
# The following are created by Terraform as part of this scenario:
# - Working MWAA environment with benign startup script
# - Admin execution role attached to the MWAA environment
# - VPC with private subnets and NAT Gateway
# - Attacker's S3 bucket with malicious startup script (resource policy allows execution role)
# - MWAA Service-Linked Role (AWSServiceRoleForAmazonMWAA)
