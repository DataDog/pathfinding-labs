# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "iam-passrole+lambda-createfunction+lambda-addpermission"
description: "User with iam:PassRole, lambda:CreateFunction, and lambda:AddPermission can create a new Lambda function with an admin role, add permission to invoke it, and execute malicious code to gain admin access"
cost_estimate: "free"
pathfinding-cloud-id: "lambda-006"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "service-passrole"
path_type: "one-hop"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-lambda-006-to-admin-starting-user"
    - "arn:aws:iam::{account_id}:role/pl-prod-lambda-006-to-admin-target-role"

  summary: "starting_user → (lambda:CreateFunction with admin role) → malicious Lambda → (lambda:AddPermission) → allow self invoke → (lambda:InvokeFunction) → execute as admin role → attach AdministratorAccess → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - permission: "iam:PassRole"
      resource: "arn:aws:iam::*:role/pl-prod-lambda-006-to-admin-target-role"

    - permission: "lambda:CreateFunction"
      resource: "*"

    - permission: "lambda:AddPermission"
      resource: "*"

    - permission: "lambda:InvokeFunction"
      resource: "*"

  helpful:
    - permission: "iam:ListRoles"
      purpose: "Discover available privileged roles"

    - permission: "lambda:GetFunction"
      purpose: "Verify function creation and retrieve details"

    - permission: "lambda:GetPolicy"
      purpose: "Verify resource-based policy was added"

    - permission: "lambda:DeleteFunction"
      purpose: "Clean up attack artifacts"

# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0002 - Execution"
  techniques:
    - "T1078.004 - Valid Accounts: Cloud Accounts"
    - "T1648 - Serverless Execution"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_admin_lambda_006_iam_passrole_lambda_createfunction_lambda_addpermission"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-admin/lambda-006-iam-passrole+lambda-createfunction+lambda-addpermission"
