attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-004-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user can assume the starting role, which has iam:CreateLoginProfile
        permission on the target admin user.

    - id: starting-role
      label: "Starting Role"
      type: principal
      subType: iam-role
      arn: "arn:aws:iam::{account_id}:role/pl-prod-iam-004-to-admin-starting-role"
      description: >
        This IAM role has iam:CreateLoginProfile permission on the target admin user.
        An admin user without a login profile is a silent target -- by setting a console
        password, you gain interactive AWS Management Console access with their permissions.

    - id: target-user
      label: "Admin User"
      type: principal
      subType: iam-user
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-004-to-admin-target-user"
      description: >
        This IAM user has AdministratorAccess and no initial login profile. By creating
        a console password for this user, you gain full administrative access to the AWS
        account via the AWS Management Console.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/iam-004-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess). Your goal is to read this parameter
        using the admin access gained by logging in as the target user.

  edges:
    - from: starting-user
      to: starting-role
      label: "sts:AssumeRole"
      description: >
        Assume the starting role to obtain credentials that include iam:CreateLoginProfile
        permission on the target admin user.
      hints:
        - "Start by confirming your identity and examining what permissions your starting user has."
        - "This user cannot do much directly -- look for roles it is trusted to assume."
        - "Use iam:ListRoles or inspect the trust policies of roles in the account to find assumable roles."
        - "Once you identify a role this user can assume, look at what permissions that role grants."
        - "Browse to https://pathfinding.cloud/paths/iam-004 for technique details."
      commands:
        - description: "Assume the starting role"
          command: "aws sts assume-role --role-arn arn:aws:iam::{account_id}:role/pl-prod-iam-004-to-admin-starting-role --role-session-name attack-session"

    - from: starting-role
      to: target-user
      label: "iam:CreateLoginProfile"
      description: >
        Create a login profile (console password) for the admin user. The user has no
        existing login profile, so this action succeeds and grants console access with
        AdministratorAccess privileges.
      hints:
        - "Now that you hold the role, review its attached policies to understand what IAM actions it can perform."
        - "Use iam:ListUsers to enumerate all users in the account and identify those with elevated permissions."
        - "Use iam:GetLoginProfile on each admin-looking user to check whether they already have a console password set."
        - "A user with AdministratorAccess but no login profile is a silent target -- any role that can call iam:CreateLoginProfile on that user can grant console access."
        - "Create a login profile with a password you control and the --no-password-reset-required flag to avoid being prompted to change it on first login."
        - "Browse to https://pathfinding.cloud/paths/iam-004 for technique details."
      commands:
        - description: "Create a console login profile for the admin user"
          command: "aws iam create-login-profile --user-name pl-prod-iam-004-to-admin-target-user --password 'AttackP@ssw0rd!' --no-password-reset-required"
        - description: "Verify the login profile was created"
          command: "aws iam get-login-profile --user-name pl-prod-iam-004-to-admin-target-user"

    - from: target-user
      to: ctf-flag
      label: "Read CTF flag"
      description: >
        With the admin user's credentials (or using any principal that now holds
        AdministratorAccess), retrieve the scenario flag from SSM Parameter Store.
        AdministratorAccess grants ssm:GetParameter on all parameters in the account,
        so no additional permissions are needed beyond the admin access you just gained.
      hints:
        - "You now hold admin-equivalent credentials. The scenario flag is stored in an AWS service commonly used to hold configuration values and small secrets."
        - "Scenario flags live under a shared prefix in SSM Parameter Store — consider what a reasonable naming convention for this lab might look like."
        - "Use ssm:GetParameter with the full parameter name to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/iam-004-to-admin --query 'Parameter.Value' --output text"
