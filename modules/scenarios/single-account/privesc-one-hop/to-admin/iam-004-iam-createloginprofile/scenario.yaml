# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "iam-createloginprofile"
description: "User with iam:CreateLoginProfile can set password for admin user to gain console access"
cost_estimate: "$0/mo"
pathfinding-cloud-id: "iam-004"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "credential-access"
path_type: "one-hop"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-iam-004-to-admin-starting-user"
    - "arn:aws:iam::{account_id}:role/pl-prod-iam-004-to-admin-starting-role"
    - "arn:aws:iam::{account_id}:user/pl-prod-iam-004-to-admin-target-user"

  summary: "starting_user → (AssumeRole) → starting_role → (iam:CreateLoginProfile) → set password for admin_user → console login with admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - principal: "pl-prod-iam-004-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "iam:CreateLoginProfile"
          resource: "arn:aws:iam::*:user/pl-prod-iam-004-to-admin-target-user"

  helpful:
    - principal: "pl-prod-iam-004-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "iam:ListUsers"
          purpose: "Discover users without login profiles"
        - permission: "iam:GetUser"
          purpose: "View user details"
        - permission: "iam:GetLoginProfile"
          purpose: "Check if user already has login profile"
# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0003 - Persistence"
  techniques:
    - "T1098.001 - Account Manipulation: Additional Cloud Credentials"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_admin_iam_004_iam_createloginprofile"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-admin/iam-004-iam-createloginprofile"
