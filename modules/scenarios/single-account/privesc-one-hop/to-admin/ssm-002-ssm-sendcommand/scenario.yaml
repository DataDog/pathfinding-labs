# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "ssm-sendcommand"
description: "User with ssm:SendCommand can execute commands on EC2 instances with privileged roles to extract credentials and gain admin access"
cost_estimate: "$5.00/month"
pathfinding-cloud-id: "ssm-002"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "access-resource"
path_type: "one-hop"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-ssm-002-to-admin-starting-user"
    - "arn:aws:ec2:{region}:{account_id}:instance/i-xxxxxxxxx"
    - "arn:aws:iam::{account_id}:role/pl-prod-ssm-002-to-admin-ec2-admin-role"

  summary: "starting_user → (ssm:SendCommand) → EC2 instance → extract instance role credentials → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - permission: "ssm:SendCommand"
      resource: "*"

  helpful:
    - permission: "ssm:ListCommands"
      purpose: "Track command execution status during demo"

    - permission: "ssm:ListCommandInvocations"
      purpose: "Retrieve command output containing extracted credentials"

    - permission: "ec2:DescribeInstances"
      purpose: "Discover target EC2 instances with privileged roles"

# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0008 - Lateral Movement"
  techniques:
    - "T1651 - Cloud Administration Command"
    - "T1552.005 - Unsecured Credentials: Cloud Instance Metadata API"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_admin_ssm_002_ssm_sendcommand"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-admin/ssm-002-ssm-sendcommand"
