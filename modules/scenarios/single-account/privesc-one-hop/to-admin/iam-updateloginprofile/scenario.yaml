# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "iam-updateloginprofile"
description: "User with iam:UpdateLoginProfile can reset password for admin user to gain console access"
cost_estimate: "free"
pathfinding-cloud-id: "iam-006"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "credential-access"
path_type: "one-hop"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-ulp-starting-user"
    - "arn:aws:iam::{account_id}:user/pl-ulp-admin"

  summary: "starting_user → (iam:UpdateLoginProfile) → reset admin password → console login with admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - permission: "iam:UpdateLoginProfile"
      resource: "arn:aws:iam::*:user/pl-ulp-admin"

  helpful:
    - permission: "iam:ListUsers"
      purpose: "Discover users with login profiles"

    - permission: "iam:GetUser"
      purpose: "View user details"

    - permission: "iam:GetLoginProfile"
      purpose: "Verify user has login profile"

# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0003 - Persistence"
  techniques:
    - "T1098.001 - Account Manipulation: Additional Cloud Credentials"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_admin_iam_updateloginprofile"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-admin/iam-updateloginprofile"
