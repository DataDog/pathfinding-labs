attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-cloudformation-004-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:PassRole and cloudformation:UpdateStackSet permissions,
        allowing it to modify a StackSet whose execution role holds AdministratorAccess.

    - id: stackset
      label: "CloudFormation StackSet"
      type: resource
      subType: cloudformation-stack
      arn: "arn:aws:cloudformation:{region}:{account_id}:stackset/pl-prod-cloudformation-004-to-admin-stackset:*"
      description: >
        This CloudFormation StackSet is configured with an execution role that holds
        AdministratorAccess. By updating the StackSet template to include a new IAM role,
        the execution role will create that role on your behalf — bypassing your own
        permission boundaries.

    - id: escalated-role
      label: "Escalated Admin Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-cloudformation-004-to-admin-escalated-role"
      description: >
        This IAM role is created by the StackSet execution role when the modified template
        is deployed. It has AdministratorAccess and a trust policy allowing the starting user
        to assume it, granting full administrative access to the AWS account.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/cloudformation-004-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess). Your goal is to read this parameter
        using the admin access gained by assuming the escalated role.

  edges:
    - from: starting-principal
      to: stackset
      label: "iam:PassRole + cloudformation:UpdateStackSet"
      description: >
        The starting user passes the StackSet admin role and updates the StackSet with
        a modified template that includes a new IAM role definition. The StackSet execution
        role performs the actual IAM role creation.
      hints:
        - "You have permissions related to CloudFormation StackSets and IAM role passing. Start by looking at what StackSets exist in the account."
        - "Use cloudformation:DescribeStackSet to inspect the StackSet's configuration — pay attention to the execution role attached to it."
        - "Retrieve the current StackSet template using the describe API — understand what resources it currently manages before modifying it."
        - "Look at the execution role's permissions. If it has AdministratorAccess, it can create any resource — including IAM roles — on your behalf when it applies a template update."
        - "Craft a modified template that preserves the existing resources and adds a new IAM role whose trust policy allows your starting user to assume it."
        - "When calling UpdateStackSet, you must pass the administration role ARN (iam:PassRole) along with the execution role name. The CAPABILITY_NAMED_IAM flag is required for IAM resource creation."
        - "Browse to https://pathfinding.cloud/paths/cloudformation-004 for technique details."
      commands:
        - description: "Inspect the existing StackSet configuration"
          command: "aws cloudformation describe-stack-set --stack-set-name pl-prod-cloudformation-004-to-admin-stackset --query 'StackSet.[StackSetName,Status,AdministrationRoleARN,ExecutionRoleName]' --output table"
        - description: "Retrieve the current StackSet template"
          command: "aws cloudformation describe-stack-set --stack-set-name pl-prod-cloudformation-004-to-admin-stackset --query 'StackSet.TemplateBody' --output text"
        - description: "Update the StackSet with a modified template containing a new admin IAM role"
          command: "aws cloudformation update-stack-set --stack-set-name pl-prod-cloudformation-004-to-admin-stackset --template-body file:///tmp/malicious-stackset-template.json --administration-role-arn arn:aws:iam::{account_id}:role/pl-prod-cloudformation-004-to-admin-stackset-admin-role --execution-role-name pl-prod-cloudformation-004-to-admin-stackset-execution-role --capabilities CAPABILITY_NAMED_IAM --query 'OperationId' --output text"
        - description: "Monitor the StackSet update operation until it completes"
          command: "aws cloudformation describe-stack-set-operation --stack-set-name pl-prod-cloudformation-004-to-admin-stackset --operation-id <operation-id> --query 'StackSetOperation.Status' --output text"

    - from: stackset
      to: escalated-role
      label: "iam:CreateRole (via execution role)"
      description: >
        The StackSet execution role (which has AdministratorAccess) creates the new IAM
        role defined in the modified template, including an AdministratorAccess policy
        attachment and a trust policy allowing the starting user to assume it.
      hints:
        - "After the UpdateStackSet operation completes, the execution role will have created the IAM role defined in your template."
        - "Poll the operation status using cloudformation:DescribeStackSetOperation until it reaches SUCCEEDED before proceeding."
        - "Use iam:GetRole to verify the escalated role was actually created and inspect its trust policy before attempting to assume it."
      commands: []

    - from: starting-principal
      to: escalated-role
      label: "sts:AssumeRole"
      description: >
        The starting user assumes the newly created escalated role, gaining full
        administrative access to the AWS account.
      hints:
        - "The new role's trust policy explicitly allows your starting user to assume it — you can call sts:AssumeRole directly with your current credentials."
        - "Wait for IAM propagation (around 15 seconds) after the StackSet operation succeeds before assuming the role."
        - "After assuming the role, export the returned temporary credentials and verify admin access by calling iam:ListUsers."
      commands:
        - description: "Assume the escalated admin role"
          command: "aws sts assume-role --role-arn arn:aws:iam::{account_id}:role/pl-prod-cloudformation-004-to-admin-escalated-role --role-session-name escalated-session --query 'Credentials' --output json"
        - description: "Verify administrator access"
          command: "aws iam list-users --max-items 3 --output table"

    - from: escalated-role
      to: ctf-flag
      label: "ssm:GetParameter"
      description: >
        With the escalated role's AdministratorAccess credentials, read the scenario flag
        from SSM Parameter Store. AdministratorAccess grants ssm:GetParameter on all
        parameters, so no additional permissions are needed beyond the admin access
        obtained in the previous step.
      hints:
        - "You now hold admin credentials via the assumed escalated role. The scenario flag is stored in a well-known AWS service used for configuration and small secrets."
        - "Scenario flags live under a shared prefix in SSM Parameter Store — the path follows the pattern /pathfinding-labs/flags/{scenario-id}."
        - "Use ssm:GetParameter with the full parameter name to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/cloudformation-004-to-admin --query 'Parameter.Value' --output text"
