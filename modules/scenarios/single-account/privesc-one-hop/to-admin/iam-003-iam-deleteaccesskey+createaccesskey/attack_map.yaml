attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-003-to-admin-starting-user"
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:ListAccessKeys, iam:DeleteAccessKey, and iam:CreateAccessKey
        permissions on the target admin user. Because the admin user already has two
        active access keys, you must first delete one before creating a new one.

    - id: target-user
      label: "Admin User"
      type: principal
      subType: iam-user
      isTarget: true
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-003-to-admin-target-user"
      description: >
        This IAM user has AdministratorAccess. It was pre-configured with two active
        access keys, preventing a direct iam:CreateAccessKey call. By first deleting
        one of those keys and then creating a new one, you now have credentials that
        grant full administrative access to the AWS account.

  edges:
    - from: starting-principal
      to: target-user
      label: "iam:ListAccessKeys + iam:DeleteAccessKey + iam:CreateAccessKey"
      description: >
        Enumerate the target user's existing access keys, delete one to free up a
        slot, then create a new access key under attacker control to gain
        administrative credentials.
      hints:
        - "The target user already has the maximum number of access keys. Think about what that means for your approach."
        - "You have permissions to manage access keys on another user — including deleting existing ones."
        - "Browse to https://pathfinding.cloud/paths/iam-003 for technique details."
      commands:
        - description: "List existing access keys for the admin user"
          command: "aws iam list-access-keys --user-name pl-prod-iam-003-to-admin-target-user"
        - description: "Delete one of the existing access keys to free up a slot"
          command: "aws iam delete-access-key --user-name pl-prod-iam-003-to-admin-target-user --access-key-id <ACCESS_KEY_ID_TO_DELETE>"
        - description: "Create a new access key for the admin user"
          command: "aws iam create-access-key --user-name pl-prod-iam-003-to-admin-target-user"
        - description: "Verify admin access with the new credentials"
          command: "aws iam list-users --max-items 1"
