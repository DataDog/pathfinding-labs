# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "iam-updateassumerolepolicy"
description: "User with iam:UpdateAssumeRolePolicy can modify admin role trust policy to assume it"
cost_estimate: "free"
pathfinding-cloud-id: "iam-012"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "principal-lateral-movement"
path_type: "one-hop"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-uarp-to-admin-starting-user"
    - "arn:aws:iam::{account_id}:role/pl-prod-uarp-to-admin-target-role"

  summary: "starting_user → (iam:UpdateAssumeRolePolicy) → modify admin role trust → (sts:AssumeRole) → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - permission: "iam:UpdateAssumeRolePolicy"
      resource: "arn:aws:iam::*:role/pl-prod-uarp-to-admin-target-role"

    - permission: "sts:AssumeRole"
      resource: "arn:aws:iam::*:role/pl-prod-uarp-to-admin-target-role"

  helpful:
    - permission: "iam:ListRoles"
      purpose: "Discover privileged roles to target"

    - permission: "iam:GetRole"
      purpose: "View current trust policy before modification"

# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0003 - Persistence"
  techniques:
    - "T1098 - Account Manipulation"
    - "T1078.004 - Valid Accounts: Cloud Accounts"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_admin_iam_updateassumerolepolicy"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-admin/iam-updateassumerolepolicy"
