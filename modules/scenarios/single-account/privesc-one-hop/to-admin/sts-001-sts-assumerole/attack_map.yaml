attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-sts-001-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has sts:AssumeRole permission on the target admin role, allowing
        direct assumption of a role with AdministratorAccess.

    - id: target-role
      label: "Admin Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-sts-001-to-admin-target-role"
      description: >
        This IAM role has the AWS-managed AdministratorAccess policy attached. Its
        trust policy allows the starting user to assume it directly, granting full
        administrative access to the AWS account.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/sts-001-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess). Your goal is to read this parameter
        using the admin access gained by assuming the target role.

  edges:
    - from: starting-principal
      to: target-role
      label: "sts:AssumeRole"
      description: >
        Assume the admin role directly. The role's trust policy permits the starting
        user to perform this action, yielding temporary session credentials with
        AdministratorAccess.
      hints:
        - "Your starting user has a permission that lets it temporarily become another principal."
        - "Use iam:ListRoles to enumerate all IAM roles in the account and look for any with administrative policies attached."
        - "Use iam:GetRole on interesting roles to inspect their trust policies -- specifically look for the AssumeRolePolicyDocument that names your user as a trusted principal."
        - "A role's trust policy is what controls who can assume it. If your user's ARN (or its account) appears in the Principal block, you can attempt to assume it."
        - "Once you have identified the target role, use the STS service to obtain temporary credentials by assuming the role. You'll need the full role ARN."
        - "Browse to https://pathfinding.cloud/paths/sts-001 for technique details."
      commands:
        - description: "Assume the admin role to obtain elevated credentials"
          command: "aws sts assume-role --role-arn \"arn:aws:iam::{account_id}:role/pl-prod-sts-001-to-admin-target-role\" --role-session-name \"sts-001-demo-session\""
        - description: "Verify the new identity and confirm admin access"
          command: "aws iam list-users --max-items 3 --output table"

    - from: target-role
      to: ctf-flag
      label: "Read CTF flag"
      description: >
        With AdministratorAccess credentials obtained by assuming the target role,
        retrieve the scenario flag from SSM Parameter Store. AdministratorAccess grants
        ssm:GetParameter on all parameters in the account, so no additional permissions
        are needed beyond the admin access you just gained.
      hints:
        - "You now hold admin-equivalent credentials. The scenario flag is stored in an AWS service commonly used to hold configuration values and small secrets."
        - "Scenario flags live under a shared prefix in SSM Parameter Store — consider what a reasonable naming convention for this lab might look like."
        - "Use ssm:GetParameter with the full parameter name to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/sts-001-to-admin --query 'Parameter.Value' --output text"
