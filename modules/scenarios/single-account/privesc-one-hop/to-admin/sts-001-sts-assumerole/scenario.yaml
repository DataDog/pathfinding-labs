# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "sts-assumerole"
description: "User with sts:AssumeRole can directly assume admin role"
cost_estimate: "$0/mo"
pathfinding-cloud-id: "sts-001"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "existing-passrole"
path_type: "one-hop"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-sts-001-to-admin-starting-user"
    - "arn:aws:iam::{account_id}:role/pl-prod-sts-001-to-admin-target-role"

  summary: "starting_user → (sts:AssumeRole) → admin_role → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - principal: "pl-prod-sts-001-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "sts:AssumeRole"
          resource: "arn:aws:iam::*:role/pl-prod-sts-001-to-admin-target-role"

  helpful:
    - principal: "pl-prod-sts-001-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "iam:ListRoles"
          purpose: "Discover available roles to assume"
        - permission: "iam:GetRole"
          purpose: "View role permissions and trust policy"
# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
  techniques:
    - "T1078.004 - Valid Accounts: Cloud Accounts"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_admin_sts_001_sts_assumerole"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-admin/sts-001-sts-assumerole"
