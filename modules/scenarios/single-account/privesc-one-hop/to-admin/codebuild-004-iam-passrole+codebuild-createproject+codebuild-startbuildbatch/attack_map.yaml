attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-codebuild-004-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has codebuild:CreateProject, codebuild:StartBuildBatch, and
        iam:PassRole permissions — enough to create a CodeBuild project with a
        privileged service role and execute a malicious buildspec.

    - id: codebuild-project
      label: "CodeBuild Project"
      type: resource
      subType: codebuild-project
      arn: "arn:aws:codebuild:{region}:{account_id}:project/pl-privesc-codebuild-batch-demo"
      description: >
        A CodeBuild project created by the attacker and configured to use the privileged
        target role as its service role. The project runs with that role's permissions,
        allowing the buildspec to execute AWS CLI commands as the privileged role.

    - id: target-role
      label: "Target Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-codebuild-004-to-admin-target-role"
      description: >
        A privileged IAM role trusted by the CodeBuild service. This role has
        iam:AttachUserPolicy permission, allowing it to attach managed policies
        to IAM users. The attacker passes this role to the CodeBuild project they create.
        When the build batch executes, the buildspec runs with this role's permissions
        and calls iam:AttachUserPolicy to attach AdministratorAccess to the starting user,
        completing the privilege escalation. The starting user's newly gained admin
        access is then used to read the scenario's CTF flag from SSM Parameter Store.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/codebuild-004-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess). Your goal is to read this parameter
        using the admin access gained from the previous step.

  edges:
    - from: starting-principal
      to: codebuild-project
      label: "codebuild:CreateProject + iam:PassRole"
      description: >
        The attacker creates a new CodeBuild project and passes the privileged target role
        as the project's service role using iam:PassRole. The project is configured with
        a malicious inline buildspec.
      hints:
        - "Create a CodeBuild project using codebuild:CreateProject, passing the target role to --service-role via iam:PassRole. Embed a malicious inline buildspec in --source that uses the batch format (top-level 'batch:' key with a 'build-list'). Both --service-role and --build-batch-config serviceRole must point to the target role ARN for batch builds."
        - "Start the build batch with codebuild:StartBuildBatch. Batch builds take 2-4 minutes — poll codebuild:BatchGetBuildBatches until status reaches SUCCEEDED, then wait 15 seconds for IAM changes to propagate before verifying."
        - "Browse to https://pathfinding.cloud/paths/codebuild-004 for full technique details."
      commands:
        - description: "Create a CodeBuild project with the privileged role as its service role"
          command: "aws codebuild create-project --name \"pl-privesc-codebuild-batch-demo\" --source '{\"type\":\"NO_SOURCE\",\"buildspec\":\"...\"}' --artifacts type=NO_ARTIFACTS --environment type=LINUX_CONTAINER,image=aws/codebuild/standard:7.0,computeType=BUILD_GENERAL1_SMALL --service-role \"arn:aws:iam::{account_id}:role/pl-prod-codebuild-004-to-admin-target-role\" --build-batch-config '{\"serviceRole\":\"arn:aws:iam::{account_id}:role/pl-prod-codebuild-004-to-admin-target-role\"}'"

    - from: codebuild-project
      to: target-role
      label: "codebuild:StartBuildBatch → iam:AttachUserPolicy"
      description: >
        The attacker starts a build batch execution. CodeBuild automatically assumes the
        configured service role and runs the buildspec with that role's permissions.
        The buildspec calls iam:AttachUserPolicy to attach AdministratorAccess to the
        starting user, completing the privilege escalation.
      hints: []
      commands:
        - description: "Start the build batch to trigger the malicious buildspec"
          command: "aws codebuild start-build-batch --project-name \"pl-privesc-codebuild-batch-demo\""
        - description: "Verify administrator access after escalation"
          command: "aws iam list-users --max-items 1"

    - from: target-role
      to: ctf-flag
      label: "Read CTF flag"
      description: >
        With administrator-equivalent permissions now attached to the starting user,
        retrieve the scenario flag from SSM Parameter Store. AdministratorAccess grants
        ssm:GetParameter on all parameters in the account, so no additional permissions
        are needed beyond the admin access just gained.
      hints:
        - "Use ssm:GetParameter with the full parameter name to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/codebuild-004-to-admin --query 'Parameter.Value' --output text"
