# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "iam-passrole+codebuild-createproject+codebuild-startbuildbatch"
title: "CodeBuild Project Creation + Batch Build to Admin"
description: "User with codebuild:CreateProject, codebuild:StartBuildBatch, and iam:PassRole can create a CodeBuild project with a privileged role, execute buildspec to grant themselves admin access"
cost_estimate: "$0/mo"
pathfinding-cloud-id: "codebuild-004"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "new-passrole"
path_type: "one-hop"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-codebuild-004-to-admin-starting-user"
    - "arn:aws:iam::{account_id}:role/pl-prod-codebuild-004-to-admin-target-role"

  summary: "starting_user → (codebuild:CreateProject + iam:PassRole) → CodeBuild project with target_role → (codebuild:StartBuildBatch) → buildspec grants admin to starting_user → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - principal: "pl-prod-codebuild-004-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "codebuild:CreateProject"
          resource: "*"
        - permission: "codebuild:StartBuildBatch"
          resource: "*"
        - permission: "iam:PassRole"
          resource: "arn:aws:iam::*:role/pl-prod-codebuild-004-to-admin-target-role"

  helpful:
    - principal: "pl-prod-codebuild-004-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "iam:ListRoles"
          purpose: "Discover available privileged roles to pass to CodeBuild"
        - permission: "codebuild:ListProjects"
          purpose: "List existing CodeBuild projects"
        - permission: "codebuild:BatchGetBuildBatches"
          purpose: "Monitor build batch execution status"
        - permission: "iam:ListUsers"
          purpose: "Verify admin access after escalation"
# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0002 - Execution"
  techniques:
    - "T1078.004 - Valid Accounts: Cloud Accounts"
    - "T1651 - Cloud Administration Command"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_admin_codebuild_004_iam_passrole_codebuild_createproject_codebuild_startbuildbatch"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-admin/codebuild-004-iam-passrole+codebuild-createproject+codebuild-startbuildbatch"
