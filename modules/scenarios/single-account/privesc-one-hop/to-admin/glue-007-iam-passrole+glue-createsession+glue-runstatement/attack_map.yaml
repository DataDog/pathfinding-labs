attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-glue-007-to-admin-starting-user"
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:PassRole on the admin role and glue:CreateSession and
        glue:RunStatement permissions, enabling creation of a Glue Interactive Session
        that assumes the admin role and executes arbitrary Python code.

    - id: glue-session
      label: "Glue Interactive Session"
      type: resource
      subType: glue-job
      arn: "arn:aws:glue:{region}:{account_id}:session/pl-prod-glue-007-attack-session"
      description: >
        An AWS Glue Interactive Session created with the admin role attached. The session
        provides a serverless Python environment where arbitrary code can be executed with
        the permissions of the passed role. Using boto3, IAM API calls can be made directly
        from within the session to escalate the starting user's privileges.

    - id: admin-role
      label: "Admin Role"
      type: principal
      subType: iam-role
      isTarget: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-glue-007-to-admin-admin-role"
      description: >
        This IAM role has AdministratorAccess and is assumed by the Glue Interactive Session.
        When the session executes Python code using boto3, those API calls are made with
        this role's permissions, allowing IAM modifications such as attaching managed
        policies to other principals.

  edges:
    - from: starting-user
      to: glue-session
      label: "iam:PassRole + glue:CreateSession"
      description: >
        The starting user passes the admin role to a new Glue Interactive Session.
        The session assumes the admin role during initialization, giving the session
        full administrative permissions via boto3.
      hints:
        - "You can pass IAM roles to AWS compute services."
        - "AWS Glue Interactive Sessions allow on-demand Python code execution with an assigned IAM role."
        - "Try creating a Glue Interactive Session with an admin role, then use glue:RunStatement to call IAM APIs via boto3."
        - "Browse to https://pathfinding.cloud/paths/glue-007 for technique details."
      commands:
        - description: "Create a Glue Interactive Session with the admin role"
          command: >
            aws glue create-session
            --id pl-prod-glue-007-attack-session
            --role arn:aws:iam::{account_id}:role/pl-prod-glue-007-to-admin-admin-role
            --command '{"Name": "glueetl", "PythonVersion": "3"}'
            --glue-version "3.0"
        - description: "Wait for the session to reach READY state"
          command: "aws glue get-session --id pl-prod-glue-007-attack-session"

    - from: glue-session
      to: admin-role
      label: "glue:RunStatement + boto3 iam:AttachUserPolicy"
      description: >
        The Glue service assumes the passed admin role automatically when the session
        is initialized. The attacker then executes a Python statement within the Glue
        session that calls iam:AttachUserPolicy using boto3, attaching AdministratorAccess
        to the starting user using the admin role's permissions.
      hints:
        - "This Glue session runs with the permissions of the admin role."
        - "boto3 is available by default in Glue sessions and can call any AWS API."
        - "Use glue:RunStatement to execute Python code that calls iam:AttachUserPolicy."
      commands:
        - description: "Run a Python statement to attach AdministratorAccess to the starting user"
          command: >
            aws glue run-statement
            --session-id pl-prod-glue-007-attack-session
            --code "import boto3; iam = boto3.client('iam'); iam.attach_user_policy(UserName='pl-prod-glue-007-to-admin-starting-user', PolicyArn='arn:aws:iam::aws:policy/AdministratorAccess')"
        - description: "Verify the policy was attached"
          command: "aws iam list-attached-user-policies --user-name pl-prod-glue-007-to-admin-starting-user"
        - description: "Verify admin access with starting user credentials"
          command: "aws iam list-users"
