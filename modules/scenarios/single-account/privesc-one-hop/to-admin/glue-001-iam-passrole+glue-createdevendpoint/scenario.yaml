# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "iam-passrole+glue-createdevendpoint"
description: "User with iam:PassRole and glue:CreateDevEndpoint can create a Glue dev endpoint with an admin role and execute commands via SSH"
cost_estimate: "$2.20/hour"
pathfinding-cloud-id: "glue-001"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "service-passrole"
path_type: "one-hop"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-glue-001-to-admin-starting-user"
    - "arn:aws:iam::{account_id}:role/pl-prod-glue-001-to-admin-target-role"

  summary: "starting_user → (iam:PassRole + glue:CreateDevEndpoint) → Glue dev endpoint with admin role → SSH access → (aws iam list-users) → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - permission: "iam:PassRole"
      resource: "arn:aws:iam::*:role/pl-prod-glue-001-to-admin-target-role"

    - permission: "glue:CreateDevEndpoint"
      resource: "*"

  helpful:
    - permission: "glue:GetDevEndpoint"
      purpose: "Check endpoint status and retrieve SSH connection details"

    - permission: "iam:ListRoles"
      purpose: "Discover available privileged roles to pass to Glue"

    - permission: "glue:DeleteDevEndpoint"
      purpose: "Clean up created endpoints after demonstration"

# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
  techniques:
    - "T1098.001 - Account Manipulation: Additional Cloud Credentials"
    - "T1578 - Modify Cloud Compute Infrastructure"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_admin_glue_001_iam_passrole_glue_createdevendpoint"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-admin/glue-001-iam-passrole+glue-createdevendpoint"
