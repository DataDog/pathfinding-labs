# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "iam-passrole+apprunner-createservice"
title: "App Runner Service Creation to Admin"
description: "User with apprunner:CreateService and iam:PassRole can create an App Runner service with a privileged role, using StartCommand override to grant themselves admin access"
cost_estimate: "$0/mo"
cost_estimate_when_demo_executed: "$0/mo"
pathfinding-cloud-id: "apprunner-001"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "new-passrole"
path_type: "one-hop"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-apprunner-001-to-admin-starting-user"
    - "arn:aws:iam::{account_id}:role/pl-prod-apprunner-001-to-admin-target-role"

  summary: "starting_user → (apprunner:CreateService + iam:PassRole) → App Runner service with target_role → StartCommand override executes with admin role → grants admin to starting_user → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - principal: "pl-prod-apprunner-001-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "apprunner:CreateService"
          resource: "*"
        - permission: "iam:PassRole"
          resource: "arn:aws:iam::*:role/pl-prod-apprunner-001-to-admin-target-role"
        - permission: "iam:CreateServiceLinkedRole"
          resource: "arn:aws:iam::*:role/aws-service-role/apprunner.amazonaws.com/AWSServiceRoleForAppRunner"

  helpful:
    - principal: "pl-prod-apprunner-001-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "apprunner:ListServices"
          purpose: "List App Runner services to verify service creation"
        - permission: "apprunner:DescribeService"
          purpose: "Check service status and configuration"
# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0002 - Execution"
  techniques:
    - "T1078.004 - Valid Accounts: Cloud Accounts"
    - "T1651 - Cloud Administration Command"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_admin_apprunner_001_iam_passrole_apprunner_createservice"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-admin/apprunner-001-iam-passrole+apprunner-createservice"
