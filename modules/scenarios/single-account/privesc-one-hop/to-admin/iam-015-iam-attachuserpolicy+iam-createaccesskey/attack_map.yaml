attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-015-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:AttachUserPolicy and iam:CreateAccessKey permissions on
        the target user, allowing you to first grant the target user admin access and
        then create credentials to authenticate as them.

    - id: target-user
      label: "Target User"
      type: principal
      subType: iam-user
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-015-to-admin-target-user"
      description: >
        This IAM user starts with no elevated permissions. By attaching the AWS-managed
        AdministratorAccess policy to this user and then creating access keys for them,
        you gain full administrative access to the AWS account. Admin-equivalent
        permissions are then used to retrieve the scenario's CTF flag from SSM
        Parameter Store.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/iam-015-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess). Your goal is to read this parameter
        using the admin access gained from the previous step.

  edges:
    - from: starting-user
      to: target-user
      label: "iam:AttachUserPolicy + iam:CreateAccessKey"
      description: >
        Attach the AdministratorAccess managed policy to the target user, then create
        new access keys for that user. Authenticate with those keys to gain full
        administrative access to the AWS account.
      hints:
        - "Attach AdministratorAccess to the target user using iam:AttachUserPolicy, then create new access keys for that user with iam:CreateAccessKey to authenticate as them."
        - "New IAM access keys take a short time to propagate — wait at least 15 seconds before using them."
        - "Browse to https://pathfinding.cloud/paths/iam-015 for technique details on this attack path."
      commands:
        - description: "Attach AdministratorAccess to the target user"
          command: "aws iam attach-user-policy --user-name pl-prod-iam-015-to-admin-target-user --policy-arn arn:aws:iam::aws:policy/AdministratorAccess"
        - description: "Create access keys for the target user"
          command: "aws iam create-access-key --user-name pl-prod-iam-015-to-admin-target-user"
        - description: "Verify administrative access using the new credentials"
          command: "aws iam list-users --max-items 1"

    - from: target-user
      to: ctf-flag
      label: "Read CTF flag"
      description: >
        With administrator-equivalent permissions now held by the target user (whose
        credentials the attacker controls), retrieve the scenario flag from SSM Parameter
        Store. AdministratorAccess grants ssm:GetParameter on all parameters in the
        account, so no additional permissions are needed beyond the admin access just
        gained.
      hints:
        - "Use ssm:GetParameter with the parameter name /pathfinding-labs/flags/iam-015-to-admin to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/iam-015-to-admin --query 'Parameter.Value' --output text"
