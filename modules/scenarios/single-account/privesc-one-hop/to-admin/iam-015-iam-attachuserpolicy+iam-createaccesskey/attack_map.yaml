attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-015-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:AttachUserPolicy and iam:CreateAccessKey permissions on
        the target user, allowing you to first grant the target user admin access and
        then create credentials to authenticate as them.

    - id: target-user
      label: "Target User"
      type: principal
      subType: iam-user
      isTarget: true
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-015-to-admin-target-user"
      description: >
        This IAM user starts with no elevated permissions. By attaching the AWS-managed
        AdministratorAccess policy to this user and then creating access keys for them,
        you gain full administrative access to the AWS account.

  edges:
    - from: starting-user
      to: target-user
      label: "iam:AttachUserPolicy + iam:CreateAccessKey"
      description: >
        Attach the AdministratorAccess managed policy to the target user, then create
        new access keys for that user. Authenticate with those keys to gain full
        administrative access to the AWS account.
      hints:
        - "You have two permissions on a specific target user. Start by discovering who that user is and what they currently look like."
        - "Use iam:GetUser and iam:ListAttachedUserPolicies to inspect the target user's current state — what policies are attached?"
        - "You can attach managed policies to the target user. Think about which AWS-managed policy would grant full administrative access."
        - "Use iam:ListPolicies with --scope AWS to browse available managed policies. Look for one with 'Administrator' in the name."
        - "The policy attachment alone isn't enough — you'll also need a way to authenticate as that user. What's the other permission you have?"
        - "Use iam:ListAccessKeys to check whether the target user already has active access keys before creating new ones."
        - "Browse to https://pathfinding.cloud/paths/iam-015 for technique details on this attack path."
      commands:
        - description: "Attach AdministratorAccess to the target user"
          command: "aws iam attach-user-policy --user-name pl-prod-iam-015-to-admin-target-user --policy-arn arn:aws:iam::aws:policy/AdministratorAccess"
        - description: "Create access keys for the target user"
          command: "aws iam create-access-key --user-name pl-prod-iam-015-to-admin-target-user"
        - description: "Verify administrative access using the new credentials"
          command: "aws iam list-users --max-items 1"
