# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "ec2-modifyinstanceattribute+stopinstances+startinstances"
description: "Principal with ec2:ModifyInstanceAttribute, ec2:StopInstances, and ec2:StartInstances can inject malicious code into an EC2 instance's userData to extract credentials from the attached IAM role via IMDS"
cost_estimate: "$8/month"
pathfinding-cloud-id: "ec2-002"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "access-resource"
path_type: "one-hop"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-ec2-002-to-admin-starting-user"
    - "arn:aws:ec2:{region}:{account_id}:instance/i-xxxxxxxxx"
    - "arn:aws:iam::{account_id}:role/pl-prod-ec2-002-to-admin-target-role"

  summary: "starting_user → (ec2:StopInstances) → (ec2:ModifyInstanceAttribute with malicious cloud-init payload) → (ec2:StartInstances) → malicious script executes on boot → extract credentials from IMDS at 169.254.169.254 → admin access via attached role"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - permission: "ec2:ModifyInstanceAttribute"
      resource: "arn:aws:ec2:*:*:instance/*"

    - permission: "ec2:StopInstances"
      resource: "arn:aws:ec2:*:*:instance/*"

    - permission: "ec2:StartInstances"
      resource: "arn:aws:ec2:*:*:instance/*"

  helpful:
    - permission: "ec2:DescribeInstances"
      purpose: "Discover target EC2 instances and verify instance state"

    - permission: "ec2:DescribeInstanceAttribute"
      purpose: "View current user data and instance configuration"

    - permission: "sts:GetCallerIdentity"
      purpose: "Verify identity during attack execution"

# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0006 - Credential Access"
  techniques:
    - "T1552.005 - Unsecured Credentials: Cloud Instance Metadata API"
    - "T1578 - Modify Cloud Compute Infrastructure"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_admin_ec2_002_ec2_modifyinstanceattribute_stopinstances_startinstances"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-admin/ec2-002-ec2-modifyinstanceattribute+stopinstances+startinstances"
