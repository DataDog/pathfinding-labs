attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-glue-006-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:PassRole on the target admin role, plus glue:UpdateJob
        and glue:CreateTrigger permissions, enabling stealthy privilege escalation by
        modifying an existing Glue job rather than creating a new one.

    - id: glue-job
      label: "Existing Glue Job"
      type: resource
      subType: glue-job
      arn: "arn:aws:glue:{region}:{account_id}:job/pl-glue-006-to-admin-job"
      description: >
        A pre-existing Glue ETL job deployed by Terraform with a benign initial
        configuration. The attacker updates this job to replace the execution role
        with the admin target role and points the script location to a malicious
        Python script in S3 that attaches AdministratorAccess to the starting user.

    - id: target-role
      label: "Admin Target Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-glue-006-to-admin-target-role"
      description: >
        An IAM role with AdministratorAccess that is passed to the Glue job during
        the update. When the Glue job executes under this role it attaches
        AdministratorAccess to the starting user, granting full administrative access
        to the AWS account. The attacker then uses those admin-equivalent permissions
        to read the scenario's CTF flag from SSM Parameter Store.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/glue-006-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess). Your goal is to read this parameter
        using the admin access gained from the previous step.

  edges:
    - from: starting-principal
      to: glue-job
      label: "iam:PassRole + glue:UpdateJob"
      description: >
        Update the existing Glue job to use the admin target role as its execution
        role and replace the script location with a malicious Python script stored
        in S3. iam:PassRole authorises handing the privileged role to the Glue service.
      hints:
        - "Start by understanding what Glue jobs exist in the account and what role they currently run under."
        - "Use glue:GetJob to inspect the existing job configuration -- pay attention to the Role and ScriptLocation fields."
        - "You have iam:PassRole on a privileged role -- consider what would happen if you passed that role to a Glue job."
        - "glue:UpdateJob lets you change both the execution role and script location of an existing job in a single API call."
        - "The malicious script is already staged in the scenario's S3 bucket -- check the Terraform output for the script path."
        - "Browse to https://pathfinding.cloud/paths/glue-006 for technique details."
      commands:
        - description: "Retrieve current job configuration to confirm baseline state"
          command: "aws glue get-job --job-name pl-glue-006-to-admin-job --query 'Job.{Role:Role,Command:Command}'"
        - description: "Update the Glue job to use the admin role and malicious script"
          command: "aws glue update-job --job-name pl-glue-006-to-admin-job --job-update '{\"Role\":\"arn:aws:iam::{account_id}:role/pl-prod-glue-006-to-admin-target-role\",\"Command\":{\"Name\":\"pythonshell\",\"ScriptLocation\":\"s3://pl-glue-scripts-glue-006-{account_id}-{suffix}/malicious_script.py\",\"PythonVersion\":\"3.9\"}}'"

    - from: glue-job
      to: target-role
      label: "glue:CreateTrigger (--start-on-creation)"
      description: >
        Create a SCHEDULED trigger with StartOnCreation=true so the job executes
        automatically (every minute via cron) without requiring glue:StartJobRun.
        The job runs under the admin role and attaches AdministratorAccess to the
        starting user, completing the privilege escalation.
      hints:
        - "Now that the job is updated with the admin role, you need to execute it -- but you don't have glue:StartJobRun."
        - "Look at what other Glue permissions you have. A trigger can run a job without StartJobRun."
        - "A SCHEDULED trigger with --start-on-creation fires the job immediately upon trigger creation, then continues on the cron schedule."
        - "Use glue:GetTrigger to verify the trigger reaches ACTIVATED state, then glue:GetJobRuns to watch for the job run to appear and complete."
        - "Once the job run shows SUCCEEDED, wait ~15 seconds for IAM policy propagation before verifying the escalation with iam:ListUsers."
      commands:
        - description: "Create a scheduled trigger that starts the job immediately on creation"
          command: "aws glue create-trigger --name pl-glue-006-to-admin-trigger --type SCHEDULED --schedule 'cron(* * * * ? *)' --actions '[{\"JobName\":\"pl-glue-006-to-admin-job\"}]' --start-on-creation"
        - description: "Monitor the trigger state until it becomes ACTIVATED"
          command: "aws glue get-trigger --name pl-glue-006-to-admin-trigger --query 'Trigger.State'"
        - description: "Verify privilege escalation succeeded"
          command: "aws iam list-attached-user-policies --user-name pl-prod-glue-006-to-admin-starting-user"

    - from: target-role
      to: ctf-flag
      label: "Read CTF flag"
      description: >
        With administrator-equivalent permissions now attached to the starting user,
        retrieve the scenario flag from SSM Parameter Store. AdministratorAccess grants
        ssm:GetParameter on all parameters in the account, so no additional permissions
        are needed beyond the admin access you just gained.
      hints:
        - "You now hold admin-equivalent credentials. The scenario flag is stored in an AWS service commonly used to hold configuration values and small secrets."
        - "Scenario flags live under a shared prefix in SSM Parameter Store — consider what a reasonable naming convention for this lab might look like."
        - "Use ssm:GetParameter with the full parameter name to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/glue-006-to-admin --query 'Parameter.Value' --output text"
