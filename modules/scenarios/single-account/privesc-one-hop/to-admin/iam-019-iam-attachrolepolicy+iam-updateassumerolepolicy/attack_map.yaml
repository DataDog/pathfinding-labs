attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-019-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:AttachRolePolicy and iam:UpdateAssumeRolePolicy permissions
        scoped to the target role, enabling a two-step privilege escalation: first attach
        AdministratorAccess to the target role, then update its trust policy to allow this
        user to assume it.

    - id: target-role
      label: "Target Role"
      type: principal
      subType: iam-role
      isTarget: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-iam-019-to-admin-target-role"
      description: >
        This IAM role starts with minimal permissions. After attaching AdministratorAccess
        and updating its trust policy to allow the starting user, it becomes a fully
        privileged, assumable admin role. By assuming it, you gain full administrative
        control over the AWS account.

  edges:
    - from: starting-principal
      to: target-role
      label: "iam:AttachRolePolicy"
      description: >
        Attach the AdministratorAccess managed policy to the target role, granting it
        full administrative permissions.
      hints:
        - "Start by understanding what roles exist in this account — use your helpful permissions to enumerate them."
        - "Use iam:ListRoles to find roles you can interact with, then iam:ListAttachedRolePolicies to see what each one already has."
        - "Look for a role with minimal permissions that you have iam:AttachRolePolicy rights on — that's your escalation target."
        - "Attach a highly privileged AWS managed policy (like AdministratorAccess) to that role using its name, not its ARN."
        - "Remember: attaching a policy grants the role those permissions, but you still need a way to assume the role — that comes next."
        - "Browse to https://pathfinding.cloud/paths/iam-019 for full technique details."
      commands:
        - description: "Attach AdministratorAccess to the target role"
          command: "aws iam attach-role-policy --role-name pl-prod-iam-019-to-admin-target-role --policy-arn arn:aws:iam::aws:policy/AdministratorAccess"

    - from: starting-principal
      to: target-role
      label: "iam:UpdateAssumeRolePolicy + sts:AssumeRole"
      description: >
        Modify the target role's trust policy to add the starting user as a trusted
        principal, then assume the now-privileged role to gain full administrative access.
        Because the starting user is explicitly named in the trust policy, no
        sts:AssumeRole permission is required in the user's own IAM policy.
      hints:
        - "Now that the role has admin permissions, you need a way to assume it — check whether you can modify who the role trusts."
        - "Use iam:GetRole to read the role's current trust policy (the AssumeRolePolicyDocument field)."
        - "You have iam:UpdateAssumeRolePolicy — use it to replace the trust policy with one that names your current user ARN as a trusted principal."
        - "A principal explicitly named in a trust policy can call sts:AssumeRole even without sts:AssumeRole in their own IAM policy — trust is granted from the role's side."
        - "After updating the trust policy, wait a few seconds for IAM changes to propagate before attempting to assume the role."
        - "Use iam:GetUserPolicy to verify your starting user does not already have sts:AssumeRole — this confirms the trust policy change is the enabler."
      commands:
        - description: "Update the role trust policy to trust the starting user"
          command: "aws iam update-assume-role-policy --role-name pl-prod-iam-019-to-admin-target-role --policy-document '{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Principal\":{\"AWS\":\"arn:aws:iam::{account_id}:user/pl-prod-iam-019-to-admin-starting-user\"},\"Action\":\"sts:AssumeRole\"}]}'"
        - description: "Assume the escalated target role"
          command: "aws sts assume-role --role-arn arn:aws:iam::{account_id}:role/pl-prod-iam-019-to-admin-target-role --role-session-name escalation-session"
        - description: "Verify admin access with the new session"
          command: "aws iam list-users --max-items 1"
