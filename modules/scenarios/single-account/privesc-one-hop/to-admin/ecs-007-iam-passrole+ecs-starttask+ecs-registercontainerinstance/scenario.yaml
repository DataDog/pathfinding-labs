# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "iam-passrole+ecs-starttask+ecs-registercontainerinstance"
description: "Attacker with RCE on an EC2 instance can register it to an ECS cluster and override task commands to escalate to admin, using only ecs:RegisterContainerInstance, ecs:StartTask, iam:PassRole, and ecs:DeregisterContainerInstance on the instance role"
cost_estimate: "$8/mo"
pathfinding-cloud-id: "ecs-007"
reference: "https://labs.reversec.com/posts/2025/08/another-ecs-privilege-escalation-path"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "new-passrole"
path_type: "one-hop"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:role/pl-prod-ecs-007-to-admin-instance-role"
    - "arn:aws:iam::{account_id}:role/pl-prod-ecs-007-to-admin-target-role"

  starting_principal: "arn:aws:iam::{account_id}:role/pl-prod-ecs-007-to-admin-instance-role"
  starting_principal_type: "ec2-instance-role"

  summary: "instance_role (RCE on EC2) -> ecs:RegisterContainerInstance (direct API call with IMDS identity docs) -> reconfigure ECS agent -> ecs:StartTask with --overrides (iam:PassRole admin role + command override) -> ECS task attaches admin policy to instance role -> admin access"

  prerequisite: "Attacker has Remote Code Execution (RCE) on the EC2 instance"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - permission: "ecs:RegisterContainerInstance"
      resource: "*"
      principal: "EC2 instance role"
      purpose: "Register the EC2 instance to the target ECS cluster via direct API call (using IMDS identity documents)"

    - permission: "ecs:StartTask"
      resource: "*"
      principal: "EC2 instance role"
      purpose: "Start a task on the registered container instance with --overrides to override taskRoleArn and container command"

    - permission: "iam:PassRole"
      resource: "arn:aws:iam::*:role/pl-prod-ecs-007-to-admin-target-role, arn:aws:iam::*:role/pl-prod-ecs-007-to-admin-execution-role"
      principal: "EC2 instance role"
      purpose: "Pass the admin target role as the task role override in ecs:StartTask"

    - permission: "ecs:DeregisterContainerInstance"
      resource: "*"
      principal: "EC2 instance role"
      purpose: "Deregister the container instance from the cluster (cleanup)"

  agent_operational:
    - permission: "ecs:DiscoverPollEndpoint"
      principal: "EC2 instance role"
      purpose: "Standard ECS agent permission - discover the polling endpoint to receive task assignments"

    - permission: "ecs:Poll"
      principal: "EC2 instance role"
      purpose: "Standard ECS agent permission - poll for and receive task assignments from ECS control plane"

    - permission: "ecs:SubmitTaskStateChange"
      principal: "EC2 instance role"
      purpose: "Standard ECS agent permission - report task execution status"

    - permission: "ecs:SubmitContainerStateChange"
      principal: "EC2 instance role"
      purpose: "Standard ECS agent permission - report container execution status"

    - permission: "ecs:StartTelemetrySession"
      principal: "EC2 instance role"
      purpose: "Standard ECS agent permission - telemetry reporting"

    - permission: "ecs:SubmitAttachment"
      principal: "EC2 instance role"
      purpose: "Standard ECS agent permission - submit attachment state changes"

  helpful:
    - permission: "ecs:ListContainerInstances"
      purpose: "Verify container instance registered and retrieve its ARN"

    - permission: "ecs:ListTaskDefinitions"
      purpose: "Discover existing task definitions to exploit"

    - permission: "ecs:DescribeTasks"
      purpose: "Monitor task execution status and verify task completion"

  lab_simulation:
    - permission: "ssm:SendCommand"
      purpose: "Used in the demo to simulate RCE (initial access to the EC2 instance). In the real world, the attacker would have shell access via an application vulnerability."

    - permission: "ssm:GetCommandInvocation"
      purpose: "Used in the demo to retrieve command output from the simulated RCE."

# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0002 - Execution"
  techniques:
    - "T1078.004 - Valid Accounts: Cloud Accounts"
    - "T1610 - Deploy Container"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_admin_ecs_007_iam_passrole_ecs_starttask_ecs_registercontainerinstance"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-admin/ecs-007-iam-passrole+ecs-starttask+ecs-registercontainerinstance"
