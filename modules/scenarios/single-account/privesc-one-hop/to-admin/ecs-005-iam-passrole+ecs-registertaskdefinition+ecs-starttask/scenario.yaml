# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "iam-passrole+ecs-registertaskdefinition+ecs-starttask"
description: "User with iam:PassRole, ecs:RegisterTaskDefinition, and ecs:StartTask can escalate privileges by starting ECS task with admin role that grants starting user admin access"
cost_estimate: "$8/mo"
pathfinding-cloud-id: "ecs-005"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "new-passrole"
path_type: "one-hop"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-ecs-005-to-admin-starting-user"
    - "arn:aws:iam::{account_id}:role/pl-prod-ecs-005-to-admin-target-role"

  summary: "starting_user → (ecs:RegisterTaskDefinition with admin role) → (ecs:StartTask) → ECS task attaches admin policy to starting user → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - principal: "pl-prod-ecs-005-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "iam:PassRole"
          resource: "arn:aws:iam::*:role/pl-prod-ecs-005-to-admin-target-role"
        - permission: "ecs:RegisterTaskDefinition"
          resource: "*"
        - permission: "ecs:StartTask"
          resource: "*"

  helpful:
    - principal: "pl-prod-ecs-005-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "ecs:ListContainerInstances"
          purpose: "Retrieve container instance ARN for StartTask command"
        - permission: "ecs:DescribeTasks"
          purpose: "Monitor task execution status and verify task completion"
        - permission: "ecs:DeregisterTaskDefinition"
          purpose: "Clean up task definition after demonstration"
        - permission: "ecs:StopTask"
          purpose: "Stop running tasks during cleanup"
        - permission: "ec2:DescribeVpcs"
          purpose: "Find default VPC for ECS task network configuration"
        - permission: "ec2:DescribeSubnets"
          purpose: "Find subnet in default VPC for ECS task network configuration"
        - permission: "iam:DetachUserPolicy"
          purpose: "Remove admin policy from starting user during cleanup"
        - permission: "iam:ListAttachedUserPolicies"
          purpose: "Verify privilege escalation success by listing attached policies"
# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0002 - Execution"
  techniques:
    - "T1078.004 - Valid Accounts: Cloud Accounts"
    - "T1610 - Deploy Container"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_admin_ecs_005_iam_passrole_ecs_registertaskdefinition_ecs_starttask"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-admin/ecs-005-iam-passrole+ecs-registertaskdefinition+ecs-starttask"
