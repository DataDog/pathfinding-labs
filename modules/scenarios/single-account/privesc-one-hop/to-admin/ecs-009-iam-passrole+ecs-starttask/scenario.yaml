# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "iam-passrole+ecs-starttask"
title: "ECS Start Task to Admin"
description: "User with iam:PassRole and ecs:StartTask can override existing task definition commands to escalate to admin via EC2 container instance"
cost_estimate: "$8/mo"
cost_estimate_when_demo_executed: "$8/mo"
pathfinding-cloud-id: "ecs-009"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "new-passrole"
path_type: "one-hop"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-ecs-009-to-admin-starting-user"
    - "arn:aws:iam::{account_id}:role/pl-prod-ecs-009-to-admin-target-role"

  summary: "starting_user → (ecs:StartTask with command override on existing task definition, passing admin role) → ECS task attaches admin policy to starting user → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - principal: "pl-prod-ecs-009-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "iam:PassRole"
          resource: "arn:aws:iam::*:role/pl-prod-ecs-009-to-admin-target-role, arn:aws:iam::*:role/pl-prod-ecs-009-to-admin-execution-role"
        - permission: "ecs:StartTask"
          resource: "*"

  helpful:
    - principal: "pl-prod-ecs-009-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "ecs:ListContainerInstances"
          purpose: "Retrieve container instance ARN for StartTask command"
        - permission: "ecs:ListTaskDefinitions"
          purpose: "Discover existing task definitions to exploit"
        - permission: "ecs:DescribeTasks"
          purpose: "Monitor task execution status and verify task completion"
        - permission: "ecs:ListClusters"
          purpose: "Discover available ECS clusters"
        - permission: "ecs:StopTask"
          purpose: "Stop running tasks during cleanup"
        - permission: "ec2:DescribeVpcs"
          purpose: "Find default VPC for network configuration"
        - permission: "ec2:DescribeSubnets"
          purpose: "Find subnet in default VPC for network configuration"
        - permission: "ec2:DescribeSecurityGroups"
          purpose: "Discover security groups for network configuration"
        - permission: "iam:DetachUserPolicy"
          purpose: "Remove admin policy from starting user during cleanup"
        - permission: "iam:ListAttachedUserPolicies"
          purpose: "Verify privilege escalation success by listing attached policies"
# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0002 - Execution"
  techniques:
    - "T1078.004 - Valid Accounts: Cloud Accounts"
    - "T1610 - Deploy Container"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_admin_ecs_009_iam_passrole_ecs_starttask"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-admin/ecs-009-iam-passrole+ecs-starttask"
