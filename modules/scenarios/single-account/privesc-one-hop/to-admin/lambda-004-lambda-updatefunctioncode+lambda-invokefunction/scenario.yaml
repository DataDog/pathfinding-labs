# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "lambda-updatefunctioncode+lambda-invokefunction"
title: "Lambda Code Update + Invocation to Admin"
description: "User with lambda:UpdateFunctionCode and lambda:InvokeFunction can modify existing Lambda function code and manually invoke it to execute malicious logic under the function's privileged role and gain admin access"
cost_estimate: "$0/mo"
cost_estimate_when_demo_executed: "$0/mo"
pathfinding-cloud-id: "lambda-004"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "existing-passrole"
path_type: "one-hop"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-lambda-004-to-admin-starting-user"
    - "arn:aws:lambda:{region}:{account_id}:function/pl-prod-lambda-004-to-admin-target-lambda"
    - "arn:aws:iam::{account_id}:role/pl-prod-lambda-004-to-admin-target-role"

  summary: "starting_user → (lambda:UpdateFunctionCode) → existing Lambda function → (lambda:InvokeFunction) → Lambda executes with admin role → (iam:AttachUserPolicy) → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - principal: "pl-prod-lambda-004-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "lambda:UpdateFunctionCode"
          resource: "arn:aws:lambda:*:*:function/pl-prod-lambda-004-to-admin-target-lambda"
        - permission: "lambda:InvokeFunction"
          resource: "arn:aws:lambda:*:*:function/pl-prod-lambda-004-to-admin-target-lambda"

  helpful:
    - principal: "pl-prod-lambda-004-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "lambda:GetFunction"
          purpose: "Discover Lambda function details including handler name and execution role"
        - permission: "lambda:ListFunctions"
          purpose: "Discover available Lambda functions to target"
        - permission: "iam:GetRole"
          purpose: "View Lambda execution role permissions to identify high-value targets"
# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0003 - Persistence"
  techniques:
    - "T1078.004 - Valid Accounts: Cloud Accounts"
    - "T1525 - Implant Internal Image"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_admin_lambda_004_lambda_updatefunctioncode_lambda_invokefunction"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-admin/lambda-004-lambda-updatefunctioncode+lambda-invokefunction"
