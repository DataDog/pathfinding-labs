attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-014-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:AttachRolePolicy permission on the target role and
        sts:AssumeRole permission to assume it, creating a complete privilege escalation
        path to administrator access.

    - id: target-role
      label: "Target Role"
      type: principal
      subType: iam-role
      isTarget: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-iam-014-to-admin-target-role"
      description: >
        This IAM role starts with minimal permissions but can be assumed by the
        starting user. Because the starting user also has iam:AttachRolePolicy on
        this role, the attacker can attach AdministratorAccess to it before assuming
        it, gaining full administrative control. After assumption, the attacker holds
        temporary credentials with full administrative access to the AWS account.

  edges:
    - from: starting-user
      to: target-role
      label: "iam:AttachRolePolicy + sts:AssumeRole"
      description: >
        Attach the AWS-managed AdministratorAccess policy to the target role to
        elevate its permissions from minimal to full administrator, then assume
        the newly-privileged role to obtain temporary administrative credentials.
      hints:
        - "Start by understanding what roles exist in the account and what permissions they currently have."
        - "Use iam:ListRoles and iam:ListAttachedRolePolicies to discover roles and their current policy attachments."
        - "Look for roles you have write access to -- specifically, roles where you can attach managed policies."
        - "Once you identify a role with no admin policies attached, consider which well-known AWS-managed policies grant broad permissions."
        - "After modifying the role's policies, you still need a way to use those permissions -- check whether you can assume the role."
        - "IAM policy changes take a moment to propagate; wait at least 15 seconds after attaching the policy before attempting to assume the role."
        - "Browse to https://pathfinding.cloud/paths/iam-014 for technique details."
      commands:
        - description: "Check current policies attached to the target role"
          command: "aws iam list-attached-role-policies --role-name pl-prod-iam-014-to-admin-target-role --query 'AttachedPolicies[*].[PolicyName,PolicyArn]' --output table"
        - description: "Attach AdministratorAccess to the target role"
          command: "aws iam attach-role-policy --role-name pl-prod-iam-014-to-admin-target-role --policy-arn arn:aws:iam::aws:policy/AdministratorAccess"
        - description: "Assume the target role to obtain temporary admin credentials"
          command: "aws sts assume-role --role-arn arn:aws:iam::{account_id}:role/pl-prod-iam-014-to-admin-target-role --role-session-name escalation-session"
        - description: "Verify admin access with the assumed role credentials"
          command: "aws iam list-users --max-items 3 --output table"
