# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.1.0"
name: "iam-attachrolepolicy+sts-assumerole"
title: "IAM Policy Attachment + Role Assumption to Admin"
description: "User with iam:AttachRolePolicy and sts:AssumeRole can attach admin policy to a role they can assume, then assume that role to gain admin access"
cost_estimate: "$0/mo"
cost_estimate_when_demo_executed: "$0/mo"
pathfinding-cloud-id: "iam-014"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "principal-access"
path_type: "one-hop"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-iam-014-to-admin-starting-user"
    - "arn:aws:iam::{account_id}:role/pl-prod-iam-014-to-admin-target-role"

  summary: "starting_user → (iam:AttachRolePolicy) → target_role (attach AdministratorAccess) → (sts:AssumeRole) → target_role credentials → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - principal: "pl-prod-iam-014-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "iam:AttachRolePolicy"
          resource: "arn:aws:iam::*:role/pl-prod-iam-014-to-admin-target-role"
        - permission: "sts:AssumeRole"
          resource: "arn:aws:iam::*:role/pl-prod-iam-014-to-admin-target-role"

  helpful:
    - principal: "pl-prod-iam-014-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "iam:ListRoles"
          purpose: "Discover available roles that can be modified"
        - permission: "iam:GetRole"
          purpose: "View role trust policies to identify assumable roles"
        - permission: "iam:ListAttachedRolePolicies"
          purpose: "View current role permissions before and after modification"
# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
  techniques:
    - "T1098 - Account Manipulation"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_admin_iam_014_iam_attachrolepolicy_sts_assumerole"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-admin/iam-014-iam-attachrolepolicy+sts-assumerole"
