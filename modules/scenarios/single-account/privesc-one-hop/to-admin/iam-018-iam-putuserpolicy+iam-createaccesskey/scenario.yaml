# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.1.0"
name: "iam-putuserpolicy+iam-createaccesskey"
title: "IAM Inline User Policy + Access Key Creation to Admin"
description: "User with PutUserPolicy and CreateAccessKey on a target user can add admin inline policy to that user, create access keys for them, and gain admin access"
cost_estimate: "$0/mo"
cost_estimate_when_demo_executed: "$0/mo"
pathfinding-cloud-id: "iam-018"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "principal-access"
path_type: "one-hop"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-iam-018-to-admin-starting-user"
    - "arn:aws:iam::{account_id}:user/pl-prod-iam-018-to-admin-target-user"

  summary: "starting_user → (PutUserPolicy on target_user) → (CreateAccessKey for target_user) → authenticate as target_user → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - principal: "pl-prod-iam-018-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "iam:PutUserPolicy"
          resource: "arn:aws:iam::*:user/pl-prod-iam-018-to-admin-target-user"
        - permission: "iam:CreateAccessKey"
          resource: "arn:aws:iam::*:user/pl-prod-iam-018-to-admin-target-user"

  helpful:
    - principal: "pl-prod-iam-018-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "iam:ListUsers"
          purpose: "Discover target users to escalate through"
        - permission: "iam:GetUser"
          purpose: "Get target user details and current permissions"
        - permission: "iam:ListUserPolicies"
          purpose: "List inline policies on target user"
        - permission: "iam:GetUserPolicy"
          purpose: "View target user's inline policies"
        - permission: "iam:ListAccessKeys"
          purpose: "List existing access keys for target user"
# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0003 - Persistence"
  techniques:
    - "T1098.001 - Account Manipulation: Additional Cloud Credentials"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_admin_iam_018_iam_putuserpolicy_iam_createaccesskey"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-admin/iam-018-iam-putuserpolicy+iam-createaccesskey"
