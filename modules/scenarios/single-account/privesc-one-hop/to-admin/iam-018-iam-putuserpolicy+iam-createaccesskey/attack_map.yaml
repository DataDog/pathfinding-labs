attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-018-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:PutUserPolicy and iam:CreateAccessKey permissions targeting
        the target user, enabling a two-step lateral movement and privilege escalation attack.

    - id: target-user
      label: "Target User"
      type: principal
      subType: iam-user
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-018-to-admin-target-user"
      description: >
        This IAM user initially has minimal permissions. By attaching an inline policy
        granting AdministratorAccess and then creating new access keys for this user,
        you can authenticate as this user and gain full administrative control of the
        AWS account. Admin-equivalent permissions are then used to read the scenario's
        CTF flag from SSM Parameter Store.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/iam-018-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by the AdministratorAccess inline policy you attached to the
        target user). Your goal is to read this parameter using the target user credentials
        you just obtained.

  edges:
    - from: starting-user
      to: target-user
      label: "iam:PutUserPolicy + iam:CreateAccessKey"
      description: >
        First, add an inline policy granting AdministratorAccess to the target user via
        iam:PutUserPolicy. Then create new access keys for that user via iam:CreateAccessKey.
        Authenticate with the new credentials to operate as the target user with admin access.
      hints:
        - "Use iam:ListUsers to discover which other users exist in the account -- look for users that might have elevated permissions or be worth targeting."
        - "Check your own policy with iam:GetUserPolicy or review the inline policy attached to the starting user to see exactly which user you can modify and create credentials for."
        - "Use iam:ListUserPolicies and iam:GetUserPolicy on the target user to confirm they currently have minimal permissions -- this is your opportunity to change that."
        - "You can write an inline policy to any IAM user you have iam:PutUserPolicy permission on. A policy with Action '*' and Resource '*' grants full administrative access."
        - "After modifying the target user's policy, use iam:CreateAccessKey on that same user to generate fresh credentials -- then authenticate as them to exercise the permissions you just granted."
        - "IAM policy changes can take 10-15 seconds to propagate. Wait before testing the new credentials."
        - "Browse to https://pathfinding.cloud/paths/iam-018 for technique details."
      commands:
        - description: "Add an inline policy granting AdministratorAccess to the target user"
          command: "aws iam put-user-policy --user-name pl-prod-iam-018-to-admin-target-user --policy-name AdminEscalation --policy-document '{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Action\":\"*\",\"Resource\":\"*\"}]}'"
        - description: "Create new access keys for the target user"
          command: "aws iam create-access-key --user-name pl-prod-iam-018-to-admin-target-user"
        - description: "Verify admin access using the new credentials"
          command: "aws iam list-users"

    - from: target-user
      to: ctf-flag
      label: "Read CTF flag"
      description: >
        With administrator-equivalent permissions now available via the target user's
        inline policy, retrieve the scenario flag from SSM Parameter Store. The
        AdministratorAccess inline policy you attached grants ssm:GetParameter on all
        parameters in the account, so no additional permissions are needed beyond the
        admin access you just gained.
      hints:
        - "You now hold admin-equivalent credentials as the target user. The scenario flag is stored in an AWS service commonly used to hold configuration values and small secrets."
        - "Scenario flags live under a shared prefix in SSM Parameter Store — consider what a reasonable naming convention for this lab might look like."
        - "Use ssm:GetParameter with the full parameter name to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/iam-018-to-admin --query 'Parameter.Value' --output text"
