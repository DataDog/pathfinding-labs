attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-glue-004-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:PassRole, glue:CreateJob, and glue:CreateTrigger permissions,
        allowing it to create a Glue ETL job with a privileged execution role and establish
        a scheduled trigger that automatically runs the job.

    - id: glue-job
      label: "Glue Job (Admin Role)"
      type: resource
      subType: glue-job
      arn: "arn:aws:glue:{region}:{account_id}:job/pl-prod-glue-004-privesc-job"
      description: >
        An AWS Glue Python shell job created by the attacker with the administrative
        target role as its execution role. The job contains an inline script that
        attaches the AdministratorAccess managed policy to the starting user. Because
        the job runs as the admin role, it has permission to modify IAM policies.

    - id: target-role
      label: "Admin Target Role"
      type: principal
      subType: iam-role
      isTarget: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-glue-004-to-admin-target-role"
      description: >
        This IAM role has AdministratorAccess. It is passed to the Glue job as its
        execution role. When the Glue trigger fires and the job runs, all code executes
        under this role's permissions — including attaching AdministratorAccess to the
        starting user, completing the privilege escalation.

  edges:
    - from: starting-principal
      to: glue-job
      label: "iam:PassRole + glue:CreateJob + glue:CreateTrigger"
      description: >
        Create a Glue Python shell job that passes the admin role as its execution role,
        then create a SCHEDULED trigger with --start-on-creation so the job fires
        automatically every minute without requiring glue:StartJobRun.
      commands:
        - description: "Create the Glue job with the admin role and inline escalation script"
          command: |
            aws glue create-job \
              --name "pl-prod-glue-004-privesc-job" \
              --role "arn:aws:iam::{account_id}:role/pl-prod-glue-004-to-admin-target-role" \
              --command '{"Name": "pythonshell", "PythonVersion": "3", "ScriptLocation": ""}' \
              --default-arguments '{"--extra-py-files": "", "library-set": "analytics", "script": "import boto3; iam=boto3.client(\"iam\"); iam.attach_user_policy(UserName=\"pl-prod-glue-004-to-admin-starting-user\", PolicyArn=\"arn:aws:iam::aws:policy/AdministratorAccess\")"}'
        - description: "Create a scheduled trigger with --start-on-creation to auto-execute the job"
          command: |
            aws glue create-trigger \
              --name "pl-prod-glue-004-privesc-trigger" \
              --type SCHEDULED \
              --schedule "cron(0/1 * * * ? *)" \
              --actions '[{"JobName": "pl-prod-glue-004-privesc-job"}]' \
              --start-on-creation
        - description: "Verify admin access after the trigger fires and the job runs"
          command: "aws iam list-users --max-items 5"
      hints:
        - "You can create AWS Glue jobs and assign IAM roles to them."
        - "Look for roles with administrative permissions that can be passed to Glue."
        - "The Glue job runs as the admin role — any code it executes has admin privileges."
        - "A trigger with --start-on-creation will execute the job automatically without needing glue:StartJobRun."
        - "Inline Python scripts in Glue jobs can call boto3 to make arbitrary AWS API calls."
        - "Browse to https://pathfinding.cloud/paths/glue-004 for technique details."

    - from: glue-job
      to: target-role
      label: "(execution role)"
      description: >
        The Glue job executes as the admin target role. The job's inline script
        calls iam:AttachUserPolicy to grant AdministratorAccess to the starting
        user, completing the privilege escalation path.
      commands: []
      hints:
        - "The Glue job runs as the role you passed to it — all code inside executes with that role's permissions."
        - "Use glue:GetJobRuns to check whether the trigger has fired and the job has started."
        - "Once the job state shows SUCCEEDED, check whether IAM policies on the starting user have changed."
        - "IAM policy changes can take a short time to propagate — wait ~15 seconds before verifying access."
