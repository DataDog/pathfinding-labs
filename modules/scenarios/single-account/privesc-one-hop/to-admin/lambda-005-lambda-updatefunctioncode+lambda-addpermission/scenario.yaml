# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "lambda-updatefunctioncode+lambda-addpermission"
description: "User with lambda:UpdateFunctionCode and lambda:AddPermission can modify existing Lambda function code, add permission to invoke it, and execute malicious code under the function's privileged role to gain admin access"
cost_estimate: "$0/mo"
pathfinding-cloud-id: "lambda-005"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "existing-passrole"
path_type: "one-hop"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-lambda-005-to-admin-starting-user"
    - "arn:aws:iam::{account_id}:role/pl-prod-lambda-005-to-admin-lambda-exec-role"

  summary: "starting_user → (lambda:UpdateFunctionCode) → target Lambda → (lambda:AddPermission) → allow self invoke → (lambda:InvokeFunction) → execute as lambda-exec-role → attach AdministratorAccess → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - principal: "pl-prod-lambda-005-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "lambda:UpdateFunctionCode"
          resource: "arn:aws:lambda:*:*:function/pl-prod-lambda-005-to-admin-target-lambda"
        - permission: "lambda:AddPermission"
          resource: "arn:aws:lambda:*:*:function/pl-prod-lambda-005-to-admin-target-lambda"
        - permission: "lambda:InvokeFunction"
          resource: "arn:aws:lambda:*:*:function/pl-prod-lambda-005-to-admin-target-lambda"

  helpful:
    - principal: "pl-prod-lambda-005-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "lambda:GetFunction"
          purpose: "Discover target Lambda function and its execution role"
        - permission: "lambda:GetPolicy"
          purpose: "Verify resource-based policy was added"
        - permission: "lambda:ListFunctions"
          purpose: "Discover available Lambda functions"
# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0002 - Execution"
  techniques:
    - "T1078.004 - Valid Accounts: Cloud Accounts"
    - "T1648 - Serverless Execution"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_admin_lambda_005_lambda_updatefunctioncode_lambda_addpermission"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-admin/lambda-005-lambda-updatefunctioncode+lambda-addpermission"
