attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-002-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:CreateAccessKey permission scoped to the target admin user,
        allowing you to generate new programmatic credentials for that user.

    - id: target-user
      label: "Admin User"
      type: principal
      subType: iam-user
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-002-to-admin-target-user"
      description: >
        This IAM user has AdministratorAccess. By creating access keys for this user,
        you now have the ability to operate as an administrator in this AWS account.
        Admin-equivalent permissions allow you to read the scenario's CTF flag from
        SSM Parameter Store.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/iam-002-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess). Your goal is to read this parameter
        using the admin user credentials you just created.

  edges:
    - from: starting-principal
      to: target-user
      label: "iam:CreateAccessKey"
      description: >
        Create a new set of access keys for the admin user, gaining full
        administrative access to the AWS account.
      hints:
        - "Create a new access key for the target user using iam:CreateAccessKey, then export the returned credentials to operate as that user."
        - "New IAM access keys take a short time to propagate before they work — wait at least 15 seconds after creation."
        - "Browse to https://pathfinding.cloud/paths/iam-002 for full technique details."
      commands:
        - description: "Create access keys for the admin user"
          command: "aws iam create-access-key --user-name pl-prod-iam-002-to-admin-target-user"
        - description: "Configure the new credentials and verify admin access"
          command: "AWS_ACCESS_KEY_ID=<new_key_id> AWS_SECRET_ACCESS_KEY=<new_secret> aws iam list-users"

    - from: target-user
      to: ctf-flag
      label: "Read CTF flag"
      description: >
        With the admin user's credentials, retrieve the scenario flag from SSM Parameter
        Store. AdministratorAccess grants ssm:GetParameter on all parameters in the
        account, so no additional permissions are needed beyond the admin credentials
        you just created.
      hints:
        - "Use ssm:GetParameter with the parameter name /pathfinding-labs/flags/iam-002-to-admin to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/iam-002-to-admin --query 'Parameter.Value' --output text"
