attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-ec2-004-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:PassRole permission targeting the admin instance profile
        role, and ec2:RequestSpotInstances permission to launch EC2 Spot Instances.

    - id: spot-instance
      label: "EC2 Spot Instance"
      type: resource
      subType: ec2-instance
      arn: "arn:aws:ec2:{region}:{account_id}:instance/*"
      description: >
        An EC2 Spot Instance launched with the admin role attached via an instance profile.
        The user-data script runs with the admin role's credentials at boot time, enabling
        it to make privileged IAM API calls such as attaching managed policies to IAM principals.

    - id: target-role
      label: "Admin Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-ec2-004-to-admin-target-role"
      description: >
        This IAM role has administrative permissions and trusts ec2.amazonaws.com, allowing
        it to be attached to EC2 instances via an instance profile. When the Spot Instance
        boots with this role, its user-data script runs with the role's credentials and
        calls iam:AttachUserPolicy to attach AdministratorAccess to the starting user,
        completing the privilege escalation. The attacker gains effective admin access
        which is then used to read the scenario's CTF flag from SSM Parameter Store.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/ec2-004-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess). Your goal is to read this parameter
        using the admin access gained from the previous step.

  edges:
    - from: starting-principal
      to: spot-instance
      label: "iam:PassRole + ec2:RequestSpotInstances"
      description: >
        The starting user passes the admin role to a new EC2 Spot Instance request,
        attaching the instance profile so the instance boots with administrative credentials
        available via the instance metadata service.
      hints:
        - "Start by understanding what roles and instance profiles exist in this account. Use iam:ListRoles and iam:ListInstanceProfiles to discover what's available."
        - "Look for an instance profile that wraps the admin role -- instance profiles are the wrapper that lets IAM roles be attached to EC2 instances."
        - "You can pass an IAM role to a new EC2 instance at launch time. Check which roles this user can pass with iam:PassRole."
        - "Think about what happens when code runs inside an EC2 instance with an admin role attached: it can make any IAM API call. What would you put in a user-data script to turn that into persistent access?"
        - "You need a valid AMI ID and subnet for your region. Use ec2:DescribeImages to find an Amazon Linux AMI and ec2:DescribeSubnets to find a valid subnet."
        - "ec2:RequestSpotInstances works almost identically to ec2:RunInstances for this purpose -- you provide a launch specification that includes the IamInstanceProfile and UserData fields."
        - "Browse to https://pathfinding.cloud/paths/ec2-004 for technique details."
      commands:
        - description: "List instance profiles to find the admin profile"
          command: "aws iam list-instance-profiles --query 'InstanceProfiles[?contains(InstanceProfileName, `ec2-004`)].{Name:InstanceProfileName,Arn:Arn}'"
        - description: "Find the latest Amazon Linux 2023 AMI in your region"
          command: "aws ec2 describe-images --owners amazon --filters 'Name=name,Values=al2023-ami-2023.*-x86_64' 'Name=state,Values=available' --query 'Images | sort_by(@, &CreationDate) | [-1].ImageId' --output text"
        - description: "Get a subnet ID from the default VPC"
          command: "aws ec2 describe-subnets --filters 'Name=defaultForAz,Values=true' --query 'Subnets[0].SubnetId' --output text"
        - description: "Request a Spot Instance with the admin instance profile and user-data backdoor"
          command: |
            aws ec2 request-spot-instances \
              --spot-price "0.05" \
              --instance-count 1 \
              --type one-time \
              --launch-specification '{
                "ImageId": "<ami-id>",
                "InstanceType": "t3.micro",
                "IamInstanceProfile": {"Name": "pl-prod-ec2-004-to-admin-instance-profile"},
                "UserData": "<base64-encoded-backdoor-script>",
                "NetworkInterfaces": [{"DeviceIndex": 0, "SubnetId": "<subnet-id>", "AssociatePublicIpAddress": true}]
              }'

    - from: spot-instance
      to: target-role
      label: "iam:AttachUserPolicy"
      description: >
        The Spot Instance's user-data script executes with the admin role's credentials
        and attaches the AdministratorAccess managed policy directly to the starting user,
        granting them full administrative access to the AWS account.
      hints:
        - "Once the Spot Instance is running, wait for the user-data script to execute -- this typically takes 2-3 minutes after the instance reaches the 'running' state."
        - "Poll ec2:DescribeSpotInstanceRequests to track when the request is fulfilled and you have an instance ID."
        - "You can confirm the escalation worked by calling iam:ListAttachedUserPolicies on your starting user and checking for AdministratorAccess."
        - "After the policy is attached, your original starting user credentials will now have full admin access -- no role assumption needed."
      commands:
        - description: "Poll for the spot request to be fulfilled"
          command: "aws ec2 describe-spot-instance-requests --spot-instance-request-ids <request-id> --query 'SpotInstanceRequests[0].[State,Status.Code,InstanceId]' --output text"
        - description: "Verify the AdministratorAccess policy was attached to the starting user"
          command: "aws iam list-attached-user-policies --user-name pl-prod-ec2-004-to-admin-starting-user"
        - description: "Verify administrator access with the starting user credentials"
          command: "aws iam list-users --max-items 3 --output table"

    - from: target-role
      to: ctf-flag
      label: "Read CTF flag"
      description: >
        With administrator-equivalent permissions now attached to the starting user,
        retrieve the scenario flag from SSM Parameter Store. AdministratorAccess grants
        ssm:GetParameter on all parameters in the account, so no additional permissions
        are needed beyond the admin access you just gained.
      hints:
        - "You now hold admin-equivalent credentials. The scenario flag is stored in an AWS service commonly used to hold configuration values and small secrets."
        - "Scenario flags live under a shared prefix in SSM Parameter Store — consider what a reasonable naming convention for this lab might look like."
        - "Use ssm:GetParameter with the full parameter name to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/ec2-004-to-admin --query 'Parameter.Value' --output text"
