attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-ec2-004-to-admin-starting-user"
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:PassRole permission targeting the admin instance profile
        role, and ec2:RequestSpotInstances permission to launch EC2 Spot Instances.

    - id: spot-instance
      label: "EC2 Spot Instance"
      type: resource
      subType: ec2-instance
      arn: "arn:aws:ec2:{region}:{account_id}:instance/*"
      description: >
        An EC2 Spot Instance launched with the admin role attached via an instance profile.
        The user-data script runs with the admin role's credentials at boot time, enabling
        it to make privileged IAM API calls such as attaching managed policies to IAM principals.

    - id: target-role
      label: "Admin Role"
      type: principal
      subType: iam-role
      isTarget: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-ec2-004-to-admin-target-role"
      description: >
        This IAM role has administrative permissions and trusts ec2.amazonaws.com, allowing
        it to be attached to EC2 instances via an instance profile. When the Spot Instance
        boots with this role, its user-data script runs with the role's credentials and
        calls iam:AttachUserPolicy to attach AdministratorAccess to the starting user,
        completing the privilege escalation.

  edges:
    - from: starting-principal
      to: spot-instance
      label: "iam:PassRole + ec2:RequestSpotInstances"
      description: >
        The starting user passes the admin role to a new EC2 Spot Instance request,
        attaching the instance profile so the instance boots with administrative credentials
        available via the instance metadata service.
      hints:
        - "You can pass IAM roles to EC2 instances and request Spot Instances."
        - "Consider launching a Spot Instance with an administrative instance profile and a user-data script."
        - "Browse to https://pathfinding.cloud/paths/ec2-004 for technique details."
      commands:
        - description: "Find the instance profile ARN"
          command: "aws iam list-instance-profiles --query 'InstanceProfiles[?contains(InstanceProfileName, `ec2-004`)].Arn'"
        - description: "Request a Spot Instance with the admin instance profile and user-data backdoor"
          command: |
            aws ec2 request-spot-instances \
              --instance-count 1 \
              --type one-time \
              --launch-specification '{
                "ImageId": "ami-0c02fb55956c7d316",
                "InstanceType": "t2.micro",
                "IamInstanceProfile": {"Arn": "<instance-profile-arn>"},
                "UserData": "<base64-encoded-backdoor-script>"
              }'

    - from: spot-instance
      to: target-role
      label: "iam:AttachUserPolicy"
      description: >
        The Spot Instance's user-data script executes with the admin role's credentials
        and attaches the AdministratorAccess managed policy directly to the starting user,
        granting them full administrative access to the AWS account.
      hints:
        - "The instance's user-data script runs as the instance profile role."
        - "The admin role attached to this instance has iam:AttachUserPolicy on all resources."
      commands:
        - description: "Verify the policy was attached (run as starting user after instance completes)"
          command: "aws iam list-attached-user-policies --user-name pl-prod-ec2-004-to-admin-starting-user"
        - description: "Verify administrator access"
          command: "aws iam list-users --max-items 1"
