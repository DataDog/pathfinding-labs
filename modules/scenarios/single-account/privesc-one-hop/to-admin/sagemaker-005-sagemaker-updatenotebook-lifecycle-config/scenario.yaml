# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.7.0"
name: "sagemaker-updatenotebook-lifecycle-config"
title: "SageMaker Notebook Lifecycle Config Update to Admin"
description: "User with SageMaker update permissions can inject malicious lifecycle config into existing notebook to execute code with notebook's admin role"
cost_estimate: "$37/mo"
cost_estimate_when_demo_executed: "$37/mo"
pathfinding-cloud-id: "sagemaker-005"

# Demo performs three sequential long-running operations on a Terraform-managed notebook:
# stop (up to 5 min) → update lifecycle config → start (up to 10 min). Override the default
# run_demos.py timeouts so the harness does not SIGKILL the demo mid-operation, leaving the
# malicious lifecycle config attached and possibly executing on the next notebook start.
demo_timeout_seconds: 1800
cleanup_timeout_seconds: 180

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "existing-passrole"
path_type: "one-hop"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-sagemaker-005-to-admin-starting-user"
    - "arn:aws:sagemaker:{region}:{account_id}:notebook-instance/pl-prod-sagemaker-005-to-admin-notebook"
    - "arn:aws:iam::{account_id}:role/pl-prod-sagemaker-005-to-admin-notebook-role"

  summary: "starting_user → (StopNotebookInstance) → notebook → (CreateLifecycleConfig + UpdateNotebookInstance + StartNotebookInstance) → lifecycle script executes with notebook's admin role → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - principal: "pl-prod-sagemaker-005-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "sagemaker:CreateNotebookInstanceLifecycleConfig"
          resource: "*"
        - permission: "sagemaker:StopNotebookInstance"
          resource: "arn:aws:sagemaker:*:*:notebook-instance/pl-prod-sagemaker-005-to-admin-notebook"
        - permission: "sagemaker:UpdateNotebookInstance"
          resource: "arn:aws:sagemaker:*:*:notebook-instance/pl-prod-sagemaker-005-to-admin-notebook"
        - permission: "sagemaker:StartNotebookInstance"
          resource: "arn:aws:sagemaker:*:*:notebook-instance/pl-prod-sagemaker-005-to-admin-notebook"

  helpful:
    - principal: "pl-prod-sagemaker-005-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "sagemaker:DescribeNotebookInstance"
          purpose: "View notebook details, status, and attached execution role"
        - permission: "sagemaker:ListNotebookInstances"
          purpose: "Discover available notebook instances to target"
        - permission: "iam:GetRole"
          purpose: "Verify the notebook's execution role has admin permissions"
# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0002 - Execution"
  techniques:
    - "T1078.004 - Valid Accounts: Cloud Accounts"
    - "T1525 - Implant Internal Image"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_admin_sagemaker_005_sagemaker_updatenotebook_lifecycle_config"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-admin/sagemaker-005-sagemaker-updatenotebook-lifecycle-config"
