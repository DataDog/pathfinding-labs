attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-006-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:UpdateLoginProfile permission scoped to the target admin
        user, allowing you to reset that user's AWS Console password.

    - id: target-user
      label: "Admin User"
      type: principal
      subType: iam-user
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-006-to-admin-target-user"
      description: >
        This IAM user has AdministratorAccess and an existing console login profile.
        By resetting this user's console password, you can log into the AWS Console
        with full administrative privileges. Console login as this user grants
        AdministratorAccess to the account — equivalent to any other admin principal.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/iam-006-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess). Your goal is to read this parameter
        using the admin access gained by logging into the console — or, in the automated
        demo, by using the admin user's programmatic credentials.

  edges:
    - from: starting-principal
      to: target-user
      label: "iam:UpdateLoginProfile"
      description: >
        Reset the console password for the admin user, enabling console login
        as that user with full administrative access to the AWS account.
      hints:
        - "Your starting principal has a permission that lets it modify authentication credentials for other IAM users -- specifically their console login passwords."
        - "Use iam:ListUsers to discover which users exist in the account. Look for names that suggest elevated privileges."
        - "Use iam:GetLoginProfile on a candidate user to confirm they already have a console password configured -- UpdateLoginProfile only works if a login profile already exists."
        - "Use iam:GetUser or iam:ListAttachedUserPolicies to confirm the target user has administrative permissions before you reset their password."
        - "Once you know which admin user has an existing login profile, update their password using the UpdateLoginProfile API -- use --no-password-reset-required so the change doesn't force a prompt that reveals the intrusion."
        - "Browse to https://pathfinding.cloud/paths/iam-006 for technique details and full walkthrough."
      commands:
        - description: "Reset the console password for the admin user"
          command: "aws iam update-login-profile --user-name pl-prod-iam-006-to-admin-target-user --password 'NewP@ssw0rd123!' --no-password-reset-required"
        - description: "Verify the login profile was updated"
          command: "aws iam get-login-profile --user-name pl-prod-iam-006-to-admin-target-user"

    - from: target-user
      to: ctf-flag
      label: "ssm:GetParameter"
      description: >
        With AdministratorAccess available through the target admin user, retrieve the
        scenario flag from SSM Parameter Store. AdministratorAccess grants ssm:GetParameter
        on all parameters in the account, so no additional permissions are needed beyond
        the admin access gained in the previous step.
      hints:
        - "You now have access to an admin-equivalent account. The scenario flag is stored in an AWS service commonly used to hold configuration values and small secrets."
        - "Scenario flags live under a shared prefix in SSM Parameter Store — consider what a reasonable naming convention for this lab might look like."
        - "Use ssm:GetParameter with the full parameter name to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store using admin credentials"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/iam-006-to-admin --query 'Parameter.Value' --output text"
