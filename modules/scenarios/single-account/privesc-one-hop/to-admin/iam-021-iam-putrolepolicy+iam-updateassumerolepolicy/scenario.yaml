# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "iam-putrolepolicy+iam-updateassumerolepolicy"
title: "IAM Inline Role Policy + Trust Policy Update to Admin"
description: "User with iam:PutRolePolicy and iam:UpdateAssumeRolePolicy can add inline admin policy to a role, update that role's trust policy to allow assumption, then assume the role to gain admin access"
cost_estimate: "$0/mo"
cost_estimate_when_demo_executed: "$0/mo"
pathfinding-cloud-id: "iam-021"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "principal-access"
path_type: "one-hop"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-iam-021-to-admin-starting-user"
    - "arn:aws:iam::{account_id}:role/pl-prod-iam-021-to-admin-target-role"

  summary: "starting_user → (iam:PutRolePolicy) → target_role (add inline admin policy) → (iam:UpdateAssumeRolePolicy) → target_role trust policy (allow starting_user) → (sts:AssumeRole) → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - principal: "pl-prod-iam-021-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "iam:PutRolePolicy"
          resource: "arn:aws:iam::*:role/pl-prod-iam-021-to-admin-target-role"
        - permission: "iam:UpdateAssumeRolePolicy"
          resource: "arn:aws:iam::*:role/pl-prod-iam-021-to-admin-target-role"

  helpful:
    - principal: "pl-prod-iam-021-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "iam:ListRoles"
          purpose: "Discover available roles that can be modified"
        - permission: "iam:GetRole"
          purpose: "View role trust policies and current policies"
        - permission: "iam:ListRolePolicies"
          purpose: "View current inline role policies"
        - permission: "iam:GetRolePolicy"
          purpose: "View inline policy details before and after modification"
# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
  techniques:
    - "T1098 - Account Manipulation"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_admin_iam_021_iam_putrolepolicy_iam_updateassumerolepolicy"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-admin/iam-021-iam-putrolepolicy+iam-updateassumerolepolicy"
