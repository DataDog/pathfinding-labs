attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-021-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:PutRolePolicy and iam:UpdateAssumeRolePolicy permissions
        scoped to the target role, allowing it to both escalate the role's permissions
        and modify its trust policy to permit assumption.

    - id: target-role
      label: "Target Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-iam-021-to-admin-target-role"
      description: >
        This IAM role initially has minimal permissions, but both its inline policy
        and trust policy can be modified by the starting user. By adding an admin
        inline policy and updating the trust policy to allow the starting user to
        assume it, the attacker gains full administrative access to the AWS account.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/iam-021-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted by the AdministratorAccess-equivalent inline policy now applied to the
        target role). Your goal is to read this parameter using the admin access gained
        by assuming the modified role.

  edges:
    - from: starting-principal
      to: target-role
      label: "iam:PutRolePolicy + iam:UpdateAssumeRolePolicy + sts:AssumeRole"
      description: >
        First, add an inline policy granting AdministratorAccess to the target role
        using iam:PutRolePolicy. Then update the role's trust policy using
        iam:UpdateAssumeRolePolicy to add the starting user as a trusted principal.
        Finally, assume the now-administrative role — no sts:AssumeRole permission
        is required in the starting user's own policies because the trust policy
        explicitly names the starting user's ARN.
      hints:
        - "You have two distinct IAM permissions on the target role -- think about what each one lets you control."
        - "Use iam:ListRoles and iam:GetRole to find the target role and inspect its current trust policy and inline policies."
        - "Use iam:ListRolePolicies and iam:GetRolePolicy to see what permissions the target role currently has -- it likely starts with minimal access."
        - "Your first move is to escalate the role's permissions: use iam:PutRolePolicy to attach an inline policy granting broad administrative access."
        - "Your second move is to make the role assumable by you: use iam:UpdateAssumeRolePolicy to add your own ARN as a trusted principal in the role's trust policy."
        - "When your ARN is explicitly listed in a role's trust policy, you can assume it without needing sts:AssumeRole in your own identity policies."
        - "Browse to https://pathfinding.cloud/paths/iam-021 for technique details."
      commands:
        - description: "Add an admin inline policy to the target role"
          command: "aws iam put-role-policy --role-name pl-prod-iam-021-to-admin-target-role --policy-name admin-escalation --policy-document '{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Action\":\"*\",\"Resource\":\"*\"}]}'"
        - description: "Update the trust policy to allow the starting user to assume the role"
          command: "aws iam update-assume-role-policy --role-name pl-prod-iam-021-to-admin-target-role --policy-document '{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Principal\":{\"AWS\":\"arn:aws:iam::{account_id}:user/pl-prod-iam-021-to-admin-starting-user\"},\"Action\":\"sts:AssumeRole\"}]}'"
        - description: "Assume the now-administrative role"
          command: "aws sts assume-role --role-arn arn:aws:iam::{account_id}:role/pl-prod-iam-021-to-admin-target-role --role-session-name escalation-session"
        - description: "Verify administrator access"
          command: "aws iam list-users --max-items 1"

    - from: target-role
      to: ctf-flag
      label: "Read CTF flag"
      description: >
        With the target role now holding an admin inline policy and operating as the
        assumed session, retrieve the scenario flag from SSM Parameter Store. The
        wildcard Allow policy on the role grants ssm:GetParameter on all resources,
        so no additional permissions are needed beyond the admin access just gained.
      hints:
        - "You are now operating as the target role with full administrative permissions. The scenario flag is stored in an AWS service commonly used to hold configuration values and small secrets."
        - "Scenario flags live under a shared prefix in SSM Parameter Store — consider what a reasonable naming convention for this lab might look like."
        - "Use ssm:GetParameter with the full parameter name to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/iam-021-to-admin --query 'Parameter.Value' --output text"
