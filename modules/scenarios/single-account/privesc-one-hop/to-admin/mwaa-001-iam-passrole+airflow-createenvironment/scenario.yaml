# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.1"
name: "iam-passrole+airflow-createenvironment"
description: "User with iam:PassRole and airflow:CreateEnvironment can escalate to admin by creating an MWAA environment with an admin execution role and a malicious startup script"
cost_estimate: "$37/mo"
pathfinding-cloud-id: "mwaa-001"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "new-passrole"
path_type: "one-hop"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-mwaa-001-to-admin-starting-user"
    - "arn:aws:iam::{account_id}:role/pl-prod-mwaa-001-to-admin-admin-role"

  summary: "starting_user → (iam:PassRole + airflow:CreateEnvironment) → MWAA environment with admin execution role → startup script executes with admin credentials → attaches AdministratorAccess to starting_user → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - principal: "pl-prod-mwaa-001-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "iam:PassRole"
          resource: "arn:aws:iam::*:role/pl-prod-mwaa-001-to-admin-admin-role"
        - permission: "airflow:CreateEnvironment"
          resource: "*"
        - permission: "ec2:CreateNetworkInterface"
          resource: "*"
        - permission: "ec2:CreateNetworkInterfacePermission"
          resource: "*"
        - permission: "ec2:DescribeNetworkInterfaces"
          resource: "*"
        - permission: "ec2:DescribeSubnets"
          resource: "*"
        - permission: "ec2:DescribeSecurityGroups"
          resource: "*"
        - permission: "ec2:DescribeVpcs"
          resource: "*"
        - permission: "ec2:CreateVpcEndpoint"
          resource: "*"
        - permission: "ec2:DeleteVpcEndpoints"
          resource: "*"
        - permission: "ec2:DescribeVpcEndpoints"
          resource: "*"
        - permission: "ec2:DescribeVpcEndpointServices"
          resource: "*"
        - permission: "s3:GetEncryptionConfiguration"
          resource: "*"

  helpful:
    - principal: "pl-prod-mwaa-001-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "airflow:GetEnvironment"
          purpose: "Check environment status and wait for it to be ready"
        - permission: "airflow:DeleteEnvironment"
          purpose: "Clean up the MWAA environment after the attack"
        - permission: "ec2:DescribeRouteTables"
          purpose: "Verify subnets have routes to NAT Gateway"
# =============================================================================
# PREREQUISITES
# =============================================================================
# The following must exist in the account (not part of attacker's permissions):
# - VPC with at least 2 private subnets in different AZs
# - NAT Gateway with routes from private subnets
# - Security group allowing self-referencing traffic and outbound internet
# - MWAA Service-Linked Role (AWSServiceRoleForAmazonMWAA)
# - S3 bucket accessible by the execution role (for DAGs and startup script)

# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0002 - Execution"
  techniques:
    - "T1098 - Account Manipulation"
    - "T1059 - Command and Scripting Interpreter"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_admin_mwaa_001_iam_passrole_airflow_createenvironment"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-admin/mwaa-001-iam-passrole+airflow-createenvironment"

# =============================================================================
# DEMO CONFIGURATION
# =============================================================================
interactive_demo: true  # Demo requires user confirmation due to high cost
