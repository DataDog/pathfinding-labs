# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.0.0"
name: "iam-passrole-cloudformation"
description: "User with iam:PassRole and cloudformation:CreateStack can escalate by passing admin role to CloudFormation"
cost_estimate: "free"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "service-passrole"
path_type: "one-hop"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-pcf-starting-user"
    - "arn:aws:iam::{account_id}:role/pl-prod-pcf-admin-role"
    - "arn:aws:iam::{account_id}:role/pl-prod-pcf-escalated-role"

  summary: "starting_user → (PassRole + cloudformation:CreateStack) → CloudFormation creates role with admin → assume escalated role → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - permission: "iam:PassRole"
      resource: "arn:aws:iam::*:role/pl-prod-pcf-admin-role"

    - permission: "cloudformation:CreateStack"
      resource: "*"

  helpful:
    - permission: "cloudformation:DescribeStacks"
      purpose: "Monitor stack creation progress"

    - permission: "iam:ListRoles"
      purpose: "Discover available privileged roles to pass"

    - permission: "cloudformation:DeleteStack"
      purpose: "Clean up attack artifacts"

# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0003 - Persistence"
  techniques:
    - "T1098.001 - Account Manipulation: Additional Cloud Credentials"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_admin_iam_passrole_cloudformation"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-admin/iam-passrole-cloudformation"
