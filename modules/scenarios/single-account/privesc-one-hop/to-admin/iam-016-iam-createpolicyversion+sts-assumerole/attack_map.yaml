attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-016-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:CreatePolicyVersion permission on a customer-managed policy
        that is attached to a target role, and sts:AssumeRole permission to assume that
        target role, creating a complete two-step privilege escalation path to administrator access.

    - id: target-role
      label: "Target Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-iam-016-to-admin-target-role"
      description: >
        This IAM role has a customer-managed policy attached that currently grants only
        minimal permissions. By creating a new policy version with administrative permissions,
        that policy — and therefore this role — gains full administrator access. With the
        trust policy already allowing the starting user to assume it, you can then assume
        the role and obtain temporary credentials with full administrative control over the
        AWS account.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/iam-016-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess via the assumed target role session).
        Your goal is to read this parameter using the admin credentials obtained in the
        previous step.

  edges:
    - from: starting-user
      to: target-role
      label: "iam:CreatePolicyVersion + sts:AssumeRole"
      description: >
        Create a new version of the customer-managed policy attached to the target role,
        granting it AdministratorAccess (Action: "*", Resource: "*"). The new version is
        set as the default immediately, elevating the role's permissions. Then assume the
        now-privileged target role to obtain temporary credentials with full administrative
        control over the AWS account.
      hints:
        - "Start by understanding what policy you have write access to. Use iam:GetPolicy to retrieve its metadata and see which version is currently the default."
        - "Use iam:GetPolicyVersion to read the actual document of the current default version and confirm it has no admin permissions yet."
        - "Use iam:ListRoles and iam:GetRole to discover which roles have this policy attached -- that tells you what you'll be able to do once you modify it."
        - "AWS customer-managed policies support versioning. You can create a new version with any content you choose, and the --set-as-default flag makes it active immediately."
        - "A policy granting Action:* on Resource:* is the simplest path to AdministratorAccess. Write that document and create it as a new version."
        - "IAM policy changes take a moment to propagate; wait at least 15 seconds after creating the new policy version before attempting to assume the role."
        - "The trust policy on the target role already allows your starting user to assume it -- no trust policy modification is needed."
        - "Use sts:AssumeRole to obtain temporary credentials for the target role and export the returned AccessKeyId, SecretAccessKey, and SessionToken as environment variables."
        - "Verify success by attempting a privileged action such as listing IAM users, which would have been denied before the escalation."
        - "Browse to https://pathfinding.cloud/paths/iam-016 for full technique details."
      commands:
        - description: "Create a new policy version with admin permissions"
          command: >
            aws iam create-policy-version
            --policy-arn arn:aws:iam::{account_id}:policy/pl-prod-iam-016-to-admin-target-policy
            --policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":"*","Resource":"*"}]}'
            --set-as-default
        - description: "Assume the now-privileged target role"
          command: >
            aws sts assume-role
            --role-arn arn:aws:iam::{account_id}:role/pl-prod-iam-016-to-admin-target-role
            --role-session-name privesc-session
        - description: "Verify administrator access"
          command: "aws iam list-users"

    - from: target-role
      to: ctf-flag
      label: "ssm:GetParameter"
      description: >
        With temporary admin credentials from the assumed target role, retrieve the
        scenario flag from SSM Parameter Store. AdministratorAccess grants ssm:GetParameter
        on all parameters in the account, so no additional permissions are needed beyond
        the admin session you already have.
      hints:
        - "You now hold temporary admin credentials from the assumed role. The scenario flag is stored in an AWS service commonly used for configuration values and small secrets."
        - "Scenario flags live under a shared prefix in SSM Parameter Store — consider what a reasonable naming convention for this lab might look like."
        - "Use ssm:GetParameter with the full parameter name to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/iam-016-to-admin --query 'Parameter.Value' --output text"
