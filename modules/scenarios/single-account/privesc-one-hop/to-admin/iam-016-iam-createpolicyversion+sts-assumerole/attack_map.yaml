attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-016-to-admin-starting-user"
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:CreatePolicyVersion permission on a customer-managed policy
        that is attached to a privileged target role, and sts:AssumeRole permission to
        assume that target role.

    - id: target-policy
      label: "Target Policy"
      type: resource
      subType: iam-policy
      arn: "arn:aws:iam::{account_id}:policy/pl-prod-iam-016-to-admin-target-policy"
      description: >
        This customer-managed IAM policy is attached to the target role. By creating a
        new policy version with administrative permissions, the policy — and therefore
        the role it is attached to — gains full administrator access. AWS automatically
        sets the newly created version as the default active version.

    - id: target-role
      label: "Target Role"
      type: principal
      subType: iam-role
      isTarget: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-iam-016-to-admin-target-role"
      description: >
        This IAM role has the customer-managed target policy attached. After the policy
        version is updated to grant AdministratorAccess, assuming this role yields full
        administrative control over the AWS account.

  edges:
    - from: starting-user
      to: target-policy
      label: "iam:CreatePolicyVersion"
      description: >
        Create a new version of the customer-managed policy that grants AdministratorAccess
        (Action: "*", Resource: "*"). The new version is set as the default, immediately
        elevating the permissions of any principal that has the policy attached.
      hints:
        - "You can modify managed policies attached to privileged roles."
        - "Look for customer-managed policies attached to roles with elevated permissions."
        - "Creating a new policy version automatically sets it as the default."
        - "Browse to https://pathfinding.cloud/paths/iam-016 for technique details."
      commands:
        - description: "Create a new policy version with admin permissions"
          command: >
            aws iam create-policy-version
            --policy-arn arn:aws:iam::{account_id}:policy/pl-prod-iam-016-to-admin-target-policy
            --policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":"*","Resource":"*"}]}'
            --set-as-default

    - from: target-policy
      to: target-role
      label: "policy attached"
      description: >
        The modified policy is already attached to the target role. Once the new default
        version grants AdministratorAccess, the role inherits those permissions automatically.
      commands: []

    - from: starting-user
      to: target-role
      label: "sts:AssumeRole"
      description: >
        Assume the target role, which now has AdministratorAccess via the modified policy.
        This yields a temporary set of credentials with full administrative control over
        the AWS account.
      commands:
        - description: "Assume the now-privileged target role"
          command: >
            aws sts assume-role
            --role-arn arn:aws:iam::{account_id}:role/pl-prod-iam-016-to-admin-target-role
            --role-session-name privesc-session
        - description: "Verify administrator access"
          command: "aws iam list-users"
