# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.1.0"
name: "iam-createpolicyversion+sts-assumerole"
description: "User with CreatePolicyVersion on a customer-managed policy attached to a role can create a new policy version with admin permissions, then assume that role to gain admin access"
cost_estimate: "$0/mo"
pathfinding-cloud-id: "iam-016"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "principal-access"
path_type: "one-hop"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-iam-016-to-admin-starting-user"
    - "arn:aws:iam::{account_id}:role/pl-prod-iam-016-to-admin-target-role"
    - "arn:aws:iam::{account_id}:policy/pl-prod-iam-016-to-admin-target-policy"

  summary: "starting_user → (CreatePolicyVersion on target_policy) → (AssumeRole) → target_role → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - principal: "pl-prod-iam-016-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "iam:CreatePolicyVersion"
          resource: "arn:aws:iam::*:policy/pl-prod-iam-016-to-admin-target-policy"
        - permission: "sts:AssumeRole"
          resource: "arn:aws:iam::*:role/pl-prod-iam-016-to-admin-target-role"

  helpful:
    - principal: "pl-prod-iam-016-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "iam:GetPolicy"
          purpose: "Get policy ARN and current version information"
        - permission: "iam:GetPolicyVersion"
          purpose: "View current policy document and version details"
        - permission: "iam:ListPolicyVersions"
          purpose: "List all policy versions to verify new version creation"
        - permission: "iam:ListRoles"
          purpose: "Discover roles that have the target policy attached"
        - permission: "iam:GetRole"
          purpose: "View role details and attached policies"
# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0003 - Persistence"
  techniques:
    - "T1098.001 - Account Manipulation: Additional Cloud Credentials"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_admin_iam_016_iam_createpolicyversion_sts_assumerole"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-admin/iam-016-iam-createpolicyversion+sts-assumerole"
