# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "sagemaker-createpresignednotebookinstanceurl"
description: "User with CreatePresignedNotebookInstanceUrl can generate presigned URL to access existing notebook with admin role and execute commands with elevated privileges"
cost_estimate: "$37/mo"
pathfinding-cloud-id: "sagemaker-004"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "existing-passrole"
path_type: "one-hop"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-sagemaker-004-to-admin-starting-user"
    - "arn:aws:sagemaker:{region}:{account_id}:notebook-instance/pl-prod-sagemaker-004-to-admin-notebook"
    - "arn:aws:iam::{account_id}:role/pl-prod-sagemaker-004-to-admin-notebook-role"

  summary: "starting_user → (CreatePresignedNotebookInstanceUrl) → existing notebook with admin role → access Jupyter terminal via presigned URL → execute commands with admin role → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - permission: "sagemaker:CreatePresignedNotebookInstanceUrl"
      resource: "arn:aws:sagemaker:*:*:notebook-instance/pl-prod-sagemaker-004-to-admin-notebook"

  helpful:
    - permission: "sagemaker:ListNotebookInstances"
      purpose: "Discover available notebook instances to target"

    - permission: "sagemaker:DescribeNotebookInstance"
      purpose: "View notebook details and verify admin execution role"

    - permission: "iam:GetRole"
      purpose: "Verify the notebook's execution role has admin permissions"

# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0002 - Execution"
  techniques:
    - "T1078.004 - Valid Accounts: Cloud Accounts"
    - "T1552 - Unsecured Credentials"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_admin_sagemaker_004_sagemaker_createpresignednotebookinstanceurl"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-admin/sagemaker-004-sagemaker-createpresignednotebookinstanceurl"
