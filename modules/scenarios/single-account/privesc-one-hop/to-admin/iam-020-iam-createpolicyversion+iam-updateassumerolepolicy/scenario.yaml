# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "iam-createpolicyversion+iam-updateassumerolepolicy"
description: "User with CreatePolicyVersion on a customer-managed policy attached to a role can create a new policy version with admin permissions, update that role's trust policy to allow assumption, then assume the role to gain admin access"
cost_estimate: "free"
pathfinding-cloud-id: "iam-020"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "principal-lateral-movement"
path_type: "one-hop"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-iam-020-to-admin-starting-user"
    - "arn:aws:iam::{account_id}:role/pl-prod-iam-020-to-admin-target-role"
    - "arn:aws:iam::{account_id}:policy/pl-prod-iam-020-to-admin-target-policy"

  summary: "starting_user → (iam:CreatePolicyVersion on target_policy) → target_policy (admin permissions) → (iam:UpdateAssumeRolePolicy) → target_role trust policy (allow starting_user) → (sts:AssumeRole) → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - permission: "iam:CreatePolicyVersion"
      resource: "arn:aws:iam::*:policy/pl-prod-iam-020-to-admin-target-policy"

    - permission: "iam:UpdateAssumeRolePolicy"
      resource: "arn:aws:iam::*:role/pl-prod-iam-020-to-admin-target-role"

  helpful:
    - permission: "iam:GetPolicy"
      purpose: "Get policy ARN and current version information"

    - permission: "iam:GetPolicyVersion"
      purpose: "View current policy document and version details"

    - permission: "iam:ListPolicyVersions"
      purpose: "List all policy versions to verify new version creation"

    - permission: "iam:ListRoles"
      purpose: "Discover roles that have the target policy attached"

    - permission: "iam:GetRole"
      purpose: "View role details, trust policy, and attached policies"

# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0003 - Persistence"
  techniques:
    - "T1098.001 - Account Manipulation: Additional Cloud Credentials"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_admin_iam_020_iam_createpolicyversion_iam_updateassumerolepolicy"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-admin/iam-020-iam-createpolicyversion+iam-updateassumerolepolicy"
