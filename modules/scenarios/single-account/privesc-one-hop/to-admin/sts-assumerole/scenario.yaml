# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "sts-assumerole"
description: "User with sts:AssumeRole can directly assume admin role"
cost_estimate: "free"
pathfinding-cloud-id: "sts-001"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "access-resource"
path_type: "one-hop"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-sar-starting-user"
    - "arn:aws:iam::{account_id}:role/pl-sar-admin-role"

  summary: "starting_user → (sts:AssumeRole) → admin_role → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - permission: "sts:AssumeRole"
      resource: "arn:aws:iam::*:role/pl-sar-admin-role"

  helpful:
    - permission: "iam:ListRoles"
      purpose: "Discover available roles to assume"

    - permission: "iam:GetRole"
      purpose: "View role permissions and trust policy"

# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
  techniques:
    - "T1078.004 - Valid Accounts: Cloud Accounts"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_admin_sts_assumerole"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-admin/sts-assumerole"
