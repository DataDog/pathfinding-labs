attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-ecs-003-to-admin-starting-user"
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:PassRole permission on the admin target role, as well as
        ecs:RegisterTaskDefinition and ecs:CreateService permissions. These three
        permissions together enable privilege escalation through ECS service deployment.

    - id: ecs-task-definition
      label: "ECS Task Definition"
      type: resource
      subType: ecs-task
      arn: "arn:aws:ecs:{region}:{account_id}:task-definition/pl-ecs-003-admin-escalation:1"
      description: >
        A malicious ECS task definition registered by the attacker. The task definition
        specifies the admin target role as both the task role and execution role, and
        defines a container command that attaches the AdministratorAccess managed policy
        to the starting user. Because the attacker has iam:PassRole on the admin role,
        they are permitted to specify it in the task definition.

    - id: ecs-service
      label: "ECS Service"
      type: resource
      subType: ecs-task
      arn: "arn:aws:ecs:{region}:{account_id}:service/pl-prod-ecs-cluster/pl-prod-ecs-003-attack-service"
      description: >
        An ECS Fargate service created by the attacker to execute the malicious task
        definition as a persistent, long-running workload. The service launches a task
        that runs with the admin role credentials and executes the privilege escalation
        command. Unlike a one-time RunTask, a service automatically restarts failed tasks,
        providing persistence.

    - id: target-role
      label: "Admin Target Role"
      type: principal
      subType: iam-role
      isTarget: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-ecs-003-to-admin-target-role"
      description: >
        This IAM role has AdministratorAccess and trusts ecs-tasks.amazonaws.com. When
        the ECS task runs with this role, it executes the containerized AWS CLI command
        to attach AdministratorAccess to the starting user. After task completion, the
        starting user has full administrative privileges in the account.

  edges:
    - from: starting-user
      to: ecs-task-definition
      label: "iam:PassRole + ecs:RegisterTaskDefinition"
      description: >
        The attacker uses iam:PassRole to authorize passing the admin role to an ECS
        task, and ecs:RegisterTaskDefinition to register a new task definition that
        specifies the admin role and a malicious container command.
      hints:
        - "Review the policy attached to this starting user -- what IAM roles can you pass, and to which AWS services?"
        - "You can pass an IAM role to an ECS task definition. Think about what happens when a container runs with an admin role."
        - "Use ecs:DescribeServices or check the AWS console to find existing ECS clusters you could target for service creation."
        - "A task definition specifies which container image to run and what command to execute. Consider using the aws-cli image to run an IAM command as the admin role."
        - "The container command in the task definition runs with the task role's permissions -- craft a command that modifies IAM policy on your starting user."
        - "Browse to https://pathfinding.cloud/paths/ecs-003 for technique details."
      commands:
        - description: "Register the malicious ECS task definition with the admin role"
          command: "aws ecs register-task-definition --region $AWS_REGION --cli-input-json '{\"family\":\"pl-ecs-003-admin-escalation\",\"networkMode\":\"awsvpc\",\"requiresCompatibilities\":[\"FARGATE\"],\"cpu\":\"256\",\"memory\":\"512\",\"taskRoleArn\":\"arn:aws:iam::{account_id}:role/pl-prod-ecs-003-to-admin-target-role\",\"executionRoleArn\":\"arn:aws:iam::{account_id}:role/pl-prod-ecs-003-to-admin-target-role\",\"containerDefinitions\":[{\"name\":\"escalation-container\",\"image\":\"amazon/aws-cli:latest\",\"essential\":true,\"command\":[\"iam\",\"attach-user-policy\",\"--user-name\",\"pl-prod-ecs-003-to-admin-starting-user\",\"--policy-arn\",\"arn:aws:iam::aws:policy/AdministratorAccess\"]}]}'"

    - from: ecs-task-definition
      to: ecs-service
      label: "ecs:CreateService"
      description: >
        The attacker deploys the malicious task definition as an ECS Fargate service,
        causing AWS to launch a task that runs with the admin role's credentials.
      hints:
        - "A task definition alone doesn't run anything -- you need to deploy it. What ECS construct launches and manages running tasks?"
        - "Fargate services require a VPC subnet. Use ec2:DescribeVpcs and ec2:DescribeSubnets to find one in the default VPC."
        - "Create the service with desired-count 1 and launch-type FARGATE, referencing the task definition family and revision you just registered."
        - "Once the service is running, monitor it with ecs:DescribeServices and ecs:DescribeTasks to watch for the task to reach STOPPED status, which means the container command completed."
      commands:
        - description: "Find a subnet in the default VPC for the Fargate service"
          command: "aws ec2 describe-subnets --filters 'Name=vpc-id,Values=$(aws ec2 describe-vpcs --filters Name=is-default,Values=true --query Vpcs[0].VpcId --output text)' --query 'Subnets[0].SubnetId' --output text"
        - description: "Create the ECS service to execute the privilege escalation task"
          command: "aws ecs create-service --region $AWS_REGION --cluster pl-prod-ecs-003-cluster --service-name pl-prod-ecs-003-attack-service --task-definition pl-ecs-003-admin-escalation:1 --desired-count 1 --launch-type FARGATE --network-configuration 'awsvpcConfiguration={subnets=[$DEFAULT_SUBNET],assignPublicIp=ENABLED}'"

    - from: ecs-service
      to: target-role
      label: "Assumes role at runtime"
      description: >
        When the ECS service launches the Fargate task, the task automatically assumes
        the specified task role (the admin target role) and receives temporary credentials
        with administrative permissions. The container then runs the IAM attach-user-policy
        command as the admin role, granting AdministratorAccess to the starting user.
      hints:
        - "After the task stops, wait about 15 seconds for IAM policy changes to propagate before testing your new permissions."
        - "Use iam:ListAttachedUserPolicies on your starting user to confirm AdministratorAccess was successfully attached."
        - "Verify the escalation worked by attempting an admin-only action such as iam:ListUsers -- it should now succeed."
      commands: []
