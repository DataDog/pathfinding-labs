attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-017-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:PutRolePolicy permission on the target role and sts:AssumeRole
        permission to assume it. By combining these two permissions, you can add an inline
        admin policy to the role and then assume it to gain full administrative access.

    - id: target-role
      label: "Target Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-iam-017-to-admin-target-role"
      description: >
        This IAM role trusts the starting user and can have its inline policies modified
        by that user. Initially it may have minimal permissions, but once an inline admin
        policy is attached and the role is assumed, the attacker gains full AdministratorAccess
        to the AWS account — admin-equivalent permissions that are then used to read the
        scenario's CTF flag from SSM Parameter Store.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/iam-017-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by the wildcard inline policy added to the target role).
        Your goal is to read this parameter using the admin access gained from the previous step.

  edges:
    - from: starting-user
      to: target-role
      label: "iam:PutRolePolicy + sts:AssumeRole"
      description: >
        First, add an inline policy granting AdministratorAccess to the target role using
        iam:PutRolePolicy. After waiting for IAM propagation, assume the now-privileged role
        using sts:AssumeRole to obtain admin credentials.
      hints:
        - "Use iam:ListRoles to discover what roles exist in this account and look for ones your user has permissions on."
        - "Use iam:GetRole to inspect each role's trust policy -- identify which roles already trust your starting principal as an allowed principal."
        - "Use iam:ListRolePolicies and iam:GetRolePolicy to see what permissions the target role currently has before you make any changes."
        - "You have the ability to write inline policies directly onto a role -- this lets you grant that role any permissions you choose before assuming it."
        - "After modifying the role's policy, IAM changes take a moment to propagate. Wait 15 seconds before attempting to assume the role."
        - "Use sts:AssumeRole with the target role's ARN to obtain temporary credentials, then export them as environment variables."
        - "Browse to https://pathfinding.cloud/paths/iam-017 for technique details."
      commands:
        - description: "Add an inline admin policy to the target role"
          command: "aws iam put-role-policy --role-name pl-prod-iam-017-to-admin-target-role --policy-name AdminPolicy --policy-document '{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Action\":\"*\",\"Resource\":\"*\"}]}'"
        - description: "Wait for IAM policy propagation"
          command: "sleep 15"
        - description: "Assume the now-privileged target role"
          command: "aws sts assume-role --role-arn arn:aws:iam::{account_id}:role/pl-prod-iam-017-to-admin-target-role --role-session-name privesc-session"
        - description: "Verify administrator access"
          command: "aws iam list-users"

    - from: target-role
      to: ctf-flag
      label: "ssm:GetParameter"
      description: >
        With the target role's temporary credentials (which now carry full AdministratorAccess
        via the inline policy you attached), retrieve the scenario flag from SSM Parameter Store.
        AdministratorAccess grants ssm:GetParameter on all parameters implicitly, so no additional
        permissions are needed beyond the admin access you just gained.
      hints:
        - "You now hold admin-equivalent credentials via the assumed role. The scenario flag is stored in an AWS service commonly used to hold configuration values and small secrets."
        - "Scenario flags live under a shared prefix in SSM Parameter Store — consider what a reasonable naming convention for this lab might look like."
        - "Use ssm:GetParameter with the full parameter name to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/iam-017-to-admin --query 'Parameter.Value' --output text"
