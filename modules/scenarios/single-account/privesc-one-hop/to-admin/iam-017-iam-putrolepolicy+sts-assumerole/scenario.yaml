# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.1.0"
name: "iam-putrolepolicy+sts-assumerole"
description: "User with iam:PutRolePolicy and sts:AssumeRole can add inline admin policy to a role they can assume, then assume that role to gain admin access"
cost_estimate: "$0/mo"
pathfinding-cloud-id: "iam-017"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "principal-access"
path_type: "one-hop"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-iam-017-to-admin-starting-user"
    - "arn:aws:iam::{account_id}:role/pl-prod-iam-017-to-admin-target-role"

  summary: "starting_user → (iam:PutRolePolicy) → target_role (add inline admin policy) → (sts:AssumeRole) → target_role credentials → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - permission: "iam:PutRolePolicy"
      resource: "arn:aws:iam::*:role/pl-prod-iam-017-to-admin-target-role"

    - permission: "sts:AssumeRole"
      resource: "arn:aws:iam::*:role/pl-prod-iam-017-to-admin-target-role"

  helpful:
    - permission: "iam:ListRoles"
      purpose: "Discover available roles that can be modified"

    - permission: "iam:GetRole"
      purpose: "View role trust policies to identify assumable roles"

    - permission: "iam:ListRolePolicies"
      purpose: "View current inline role policies"

    - permission: "iam:GetRolePolicy"
      purpose: "View inline policy details before and after modification"

# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
  techniques:
    - "T1098 - Account Manipulation"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_admin_iam_017_iam_putrolepolicy_sts_assumerole"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-admin/iam-017-iam-putrolepolicy+sts-assumerole"
