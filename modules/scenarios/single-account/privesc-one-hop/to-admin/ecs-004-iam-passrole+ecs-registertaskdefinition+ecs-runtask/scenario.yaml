# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "iam-passrole+ecs-registertaskdefinition+ecs-runtask"
description: "User with iam:PassRole, ecs:RegisterTaskDefinition, and ecs:RunTask can escalate privileges by launching ECS task with admin role that grants starting user admin access"
cost_estimate: "$0.01/hour"
pathfinding-cloud-id: "ecs-004"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "service-passrole"
path_type: "one-hop"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-ecs-004-to-admin-starting-user"
    - "arn:aws:iam::{account_id}:role/pl-prod-ecs-004-to-admin-target-role"

  summary: "starting_user → (ecs:RegisterTaskDefinition with admin role) → (ecs:RunTask) → ECS task attaches admin policy to starting user → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - permission: "iam:PassRole"
      resource: "arn:aws:iam::*:role/pl-prod-ecs-004-to-admin-target-role"

    - permission: "ecs:RegisterTaskDefinition"
      resource: "*"

    - permission: "ecs:RunTask"
      resource: "*"

  helpful:
    - permission: "ecs:DescribeTasks"
      purpose: "Monitor task execution status and verify task completion"

    - permission: "ecs:DeregisterTaskDefinition"
      purpose: "Clean up task definition after demonstration"

    - permission: "ecs:StopTask"
      purpose: "Stop running tasks during cleanup"

    - permission: "ec2:DescribeVpcs"
      purpose: "Find default VPC for ECS task network configuration"

    - permission: "ec2:DescribeSubnets"
      purpose: "Find subnet in default VPC for ECS task network configuration"

    - permission: "iam:DetachUserPolicy"
      purpose: "Remove admin policy from starting user during cleanup"

    - permission: "iam:ListAttachedUserPolicies"
      purpose: "Verify privilege escalation success by listing attached policies"

# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0002 - Execution"
  techniques:
    - "T1078.004 - Valid Accounts: Cloud Accounts"
    - "T1610 - Deploy Container"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_admin_ecs_004_iam_passrole_ecs_registertaskdefinition_ecs_runtask"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-admin/ecs-004-iam-passrole+ecs-registertaskdefinition+ecs-runtask"
