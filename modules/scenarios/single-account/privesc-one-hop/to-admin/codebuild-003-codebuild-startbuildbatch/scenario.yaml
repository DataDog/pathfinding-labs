# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "codebuild-startbuildbatch"
description: "User with codebuild:StartBuildBatch can exploit existing CodeBuild project with privileged role by using buildspec-override to grant themselves admin access"
cost_estimate: "$0/mo"
pathfinding-cloud-id: "codebuild-003"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "existing-passrole"
path_type: "one-hop"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-codebuild-003-to-admin-starting-user"
    - "arn:aws:codebuild:{region}:{account_id}:project/pl-prod-codebuild-003-to-admin-target-project"
    - "arn:aws:iam::{account_id}:role/pl-prod-codebuild-003-to-admin-target-role"

  summary: "starting_user → (codebuild:StartBuildBatch with buildspec-override) → existing CodeBuild project → buildspec executes with admin role → grants admin to starting_user → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - principal: "pl-prod-codebuild-003-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "codebuild:StartBuildBatch"
          resource: "*"

  helpful:
    - principal: "pl-prod-codebuild-003-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "codebuild:ListProjects"
          purpose: "Discover existing CodeBuild projects to exploit"
        - permission: "codebuild:BatchGetProjects"
          purpose: "View project details including attached service role"
        - permission: "codebuild:BatchGetBuildBatches"
          purpose: "Monitor build batch execution status"
        - permission: "iam:ListUsers"
          purpose: "Verify admin access after escalation"
# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0002 - Execution"
  techniques:
    - "T1078.004 - Valid Accounts: Cloud Accounts"
    - "T1651 - Cloud Administration Command"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_admin_codebuild_003_codebuild_startbuildbatch"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-admin/codebuild-003-codebuild-startbuildbatch"
