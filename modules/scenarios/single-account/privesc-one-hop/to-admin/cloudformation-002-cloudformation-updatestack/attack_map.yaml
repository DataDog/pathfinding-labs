attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-cloudformation-002-to-admin-starting-user"
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has cloudformation:UpdateStack permission on a CloudFormation stack
        that uses an administrative service role, enabling indirect privilege escalation
        via stack template modification.

    - id: cfn-stack
      label: "CloudFormation Stack"
      type: resource
      subType: cloudformation-stack
      arn: "arn:aws:cloudformation:{region}:{account_id}:stack/pl-prod-cloudformation-002-to-admin-stack/*"
      description: >
        This CloudFormation stack has an administrative service role attached
        (pl-prod-cloudformation-002-to-admin-stack-role). When this stack is updated,
        all IAM operations in the updated template are executed using the stack's service
        role, which has AdministratorAccess. This means any IAM resources added to the
        template — such as a new role with elevated permissions — will be created with
        full administrative authority, even though the initiating user has no direct
        IAM permissions.

    - id: escalated-role
      label: "Escalated Admin Role"
      type: principal
      subType: iam-role
      isTarget: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-cloudformation-002-to-admin-escalated-role"
      description: >
        This IAM role is created by the CloudFormation stack update. Because the stack's
        service role has AdministratorAccess, it can create this role with an
        AdministratorAccess policy attached. The trust policy on this role allows the
        starting user to assume it, granting full administrative access to the AWS account.

  edges:
    - from: starting-principal
      to: cfn-stack
      label: "cloudformation:UpdateStack"
      description: >
        The starting user updates the CloudFormation stack template to add a new IAM role
        resource with AdministratorAccess and a trust policy allowing the starting user
        to assume it. The stack executes the update using its administrative service role.
      hints:
        - "You can update infrastructure stacks. Look for stacks with elevated service roles."
        - "Inspect the stack's service role to understand what permissions CloudFormation has. Retrieve the current stack template and examine what resource types it already manages."
        - "Add a new IAM role resource to the template that trusts your starting principal, then submit the stack update."
        - "Browse to https://pathfinding.cloud/paths/cloudformation-002 for technique details."
      commands:
        - description: "Retrieve the current stack template"
          command: "aws cloudformation get-template --stack-name pl-prod-cloudformation-002-to-admin-stack --query TemplateBody --output text > /tmp/stack-template.json"
        - description: "Add an escalated IAM role to the template and update the stack"
          command: "aws cloudformation update-stack --stack-name pl-prod-cloudformation-002-to-admin-stack --template-body file:///tmp/modified-template.json --capabilities CAPABILITY_NAMED_IAM"
        - description: "Wait for the stack update to complete"
          command: "aws cloudformation wait stack-update-complete --stack-name pl-prod-cloudformation-002-to-admin-stack"

    - from: cfn-stack
      to: escalated-role
      label: "iam:CreateRole + iam:AttachRolePolicy"
      description: >
        The CloudFormation stack, executing with its administrative service role, creates
        the new IAM role and attaches the AdministratorAccess managed policy to it.
      commands: []

    - from: starting-principal
      to: escalated-role
      label: "sts:AssumeRole"
      description: >
        With the escalated role now created by the stack update, the starting user assumes
        it to gain full administrative access to the AWS account.
      commands:
        - description: "Assume the escalated admin role"
          command: "aws sts assume-role --role-arn arn:aws:iam::{account_id}:role/pl-prod-cloudformation-002-to-admin-escalated-role --role-session-name escalation-session"
        - description: "Verify administrator access"
          command: "aws iam list-users"
