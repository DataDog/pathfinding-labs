attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-sagemaker-001-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:PassRole permission on the admin passable role and
        sagemaker:CreateNotebookInstance permission, enabling creation of a SageMaker
        notebook instance with an administrative execution role.

    - id: notebook-instance
      label: "SageMaker Notebook"
      type: resource
      subType: sagemaker-notebook
      arn: "arn:aws:sagemaker:{region}:{account_id}:notebook-instance/pl-prod-sagemaker-001-to-admin-notebook"
      description: >
        This SageMaker notebook instance was created by the attacker with the admin
        passable role as its execution role. The instance provides a full Jupyter
        environment with terminal access and pre-installed AWS CLI tools. All AWS CLI
        commands run inside this environment execute with the permissions of the
        notebook's execution role.

    - id: target-role
      label: "Admin Passable Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-sagemaker-001-to-admin-passable-role"
      description: >
        This IAM role has AdministratorAccess and is trusted by sagemaker.amazonaws.com
        as its execution role. By creating a notebook instance with this role attached
        and accessing the Jupyter terminal, the attacker can execute arbitrary AWS CLI
        commands with full administrative permissions in the account. The admin access
        obtained here is then used to read the scenario's CTF flag from SSM Parameter Store.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/sagemaker-001-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess). Your goal is to read this parameter
        using the admin access gained by executing commands in the SageMaker Jupyter terminal.

  edges:
    - from: starting-principal
      to: notebook-instance
      label: "iam:PassRole + sagemaker:CreateNotebookInstance"
      description: >
        Create a SageMaker notebook instance, passing the admin role as the execution
        role. The notebook inherits all permissions of that role once it reaches
        InService state.
      hints:
        - "Start by understanding what permissions this user has -- look at the policies attached to the starting user."
        - "You can pass IAM roles to AWS services. Look for roles in the account that trust sagemaker.amazonaws.com as a service principal."
        - "Use iam:ListRoles to enumerate available roles, then iam:GetRole to inspect their trust policies and attached policies."
        - "SageMaker notebook instances run with the permissions of their execution role -- what happens if that role has AdministratorAccess?"
        - "To create a notebook instance you need the role ARN, an instance type (ml.t3.medium is sufficient), and a name for the instance."
        - "After creating the instance, poll sagemaker:DescribeNotebookInstance until the status reaches InService -- this typically takes 5-8 minutes."
        - "Browse to https://pathfinding.cloud/paths/sagemaker-001 for technique details."
      commands:
        - description: "List roles that trust SageMaker to find passable admin roles"
          command: "aws iam list-roles --query 'Roles[?contains(AssumeRolePolicyDocument.Statement[].Principal.Service, `sagemaker.amazonaws.com`)].RoleName'"
        - description: "Confirm the target role has AdministratorAccess"
          command: "aws iam list-attached-role-policies --role-name pl-prod-sagemaker-001-to-admin-passable-role"
        - description: "Create SageMaker notebook instance with admin execution role"
          command: "aws sagemaker create-notebook-instance --notebook-instance-name pl-prod-sagemaker-001-to-admin-notebook --instance-type ml.t3.medium --role-arn arn:aws:iam::{account_id}:role/pl-prod-sagemaker-001-to-admin-passable-role"
        - description: "Poll for InService status"
          command: "aws sagemaker describe-notebook-instance --notebook-instance-name pl-prod-sagemaker-001-to-admin-notebook --query 'NotebookInstanceStatus' --output text"

    - from: notebook-instance
      to: target-role
      label: "sagemaker:CreatePresignedNotebookInstanceUrl"
      description: >
        Generate a presigned URL to access the Jupyter environment, then open a terminal
        in the notebook to execute AWS CLI commands as the admin execution role.
      hints:
        - "The notebook terminal runs AWS CLI commands as the execution role -- you need a way to get inside the Jupyter environment."
        - "You can access the notebook directly through the AWS Console if you have console access, or generate a presigned URL that works without console login."
        - "Use sagemaker:CreatePresignedNotebookInstanceUrl to generate a time-limited URL that logs you directly into the Jupyter interface."
        - "Once inside Jupyter, open a terminal via New -> Terminal and run AWS CLI commands -- they execute as the admin execution role."
      commands:
        - description: "Generate presigned URL for notebook access"
          command: "aws sagemaker create-presigned-notebook-instance-url --notebook-instance-name pl-prod-sagemaker-001-to-admin-notebook --query 'AuthorizedUrl' --output text"
        - description: "In the Jupyter terminal: grant admin policy to starting user"
          command: "aws iam attach-user-policy --user-name pl-prod-sagemaker-001-to-admin-starting-user --policy-arn arn:aws:iam::aws:policy/AdministratorAccess"

    - from: target-role
      to: ctf-flag
      label: "ssm:GetParameter"
      description: >
        With administrator-equivalent permissions now attached to the starting user,
        retrieve the scenario flag from SSM Parameter Store. AdministratorAccess grants
        ssm:GetParameter on all parameters in the account, so no additional permissions
        are needed beyond the admin access gained through the Jupyter terminal.
      hints:
        - "You now hold admin-equivalent credentials. The scenario flag is stored in an AWS service commonly used to hold configuration values and small secrets."
        - "Scenario flags live under a shared prefix in SSM Parameter Store — consider what a reasonable naming convention for this lab might look like."
        - "Use ssm:GetParameter with the full parameter name to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/sagemaker-001-to-admin --query 'Parameter.Value' --output text"
