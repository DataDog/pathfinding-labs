attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-sagemaker-001-to-admin-starting-user"
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:PassRole permission on the admin passable role and
        sagemaker:CreateNotebookInstance permission, enabling creation of a SageMaker
        notebook instance with an administrative execution role.

    - id: notebook-instance
      label: "SageMaker Notebook"
      type: resource
      subType: sagemaker-notebook
      arn: "arn:aws:sagemaker:{region}:{account_id}:notebook-instance/pl-prod-sagemaker-001-to-admin-notebook"
      description: >
        This SageMaker notebook instance was created by the attacker with the admin
        passable role as its execution role. The instance provides a full Jupyter
        environment with terminal access and pre-installed AWS CLI tools. All AWS CLI
        commands run inside this environment execute with the permissions of the
        notebook's execution role.

    - id: target-role
      label: "Admin Passable Role"
      type: principal
      subType: iam-role
      isTarget: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-sagemaker-001-to-admin-passable-role"
      description: >
        This IAM role has AdministratorAccess and is trusted by sagemaker.amazonaws.com
        as its execution role. By creating a notebook instance with this role attached
        and accessing the Jupyter terminal, the attacker can execute arbitrary AWS CLI
        commands with full administrative permissions in the account.

  edges:
    - from: starting-principal
      to: notebook-instance
      label: "iam:PassRole + sagemaker:CreateNotebookInstance"
      description: >
        Create a SageMaker notebook instance, passing the admin role as the execution
        role. The notebook inherits all permissions of that role once it reaches
        InService state.
      hints:
        - "You can pass IAM roles to AWS services. Which ML services accept execution roles?"
        - "SageMaker notebook instances run with the permissions of their execution role. What if that role is an admin?"
        - "Browse to https://pathfinding.cloud/paths/sagemaker-001 for technique details."
      commands:
        - description: "Create SageMaker notebook instance with admin execution role"
          command: "aws sagemaker create-notebook-instance --notebook-instance-name pl-prod-sagemaker-001-to-admin-notebook --instance-type ml.t3.medium --role-arn arn:aws:iam::{account_id}:role/pl-prod-sagemaker-001-to-admin-passable-role"
        - description: "Generate presigned URL for notebook access"
          command: "aws sagemaker create-presigned-notebook-instance-url --notebook-instance-name pl-prod-sagemaker-001-to-admin-notebook --query 'AuthorizedUrl' --output text"

    - from: notebook-instance
      to: target-role
      label: "Executes as execution role"
      description: >
        The notebook instance automatically assumes the execution role. Any AWS CLI
        commands run in the Jupyter terminal execute with the full permissions of the
        admin role, completing the privilege escalation.
      hints:
        - "The notebook terminal runs AWS CLI commands as the execution role."
        - "Generate a presigned URL to access the Jupyter environment without console login."
      commands: []
