attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-002-to-bucket-privesc-user"
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:CreateAccessKey permission on pl-prod-iam-002-to-bucket-access-user,
        which has read and write access to a sensitive S3 bucket.

    - id: bucket-access-user
      label: "Bucket Access User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-002-to-bucket-access-user"
      description: >
        This IAM user has s3:GetObject and s3:PutObject permissions on the target
        S3 bucket. By creating new access keys for this user, you can operate as
        this principal and access the sensitive bucket contents.

    - id: target-bucket
      label: "Sensitive S3 Bucket"
      type: resource
      subType: s3-bucket
      isTarget: true
      arn: "arn:aws:s3:::pl-prod-iam-002-to-bucket-{account_id}"
      description: >
        This S3 bucket contains sensitive data. The bucket access user has s3:GetObject
        and s3:PutObject permissions, allowing full read and write access to its contents.

  edges:
    - from: starting-principal
      to: bucket-access-user
      label: "iam:CreateAccessKey"
      description: >
        Create a new set of access keys for the bucket access user, gaining the ability
        to authenticate as that user and access the sensitive S3 bucket.
      hints:
        - "You can create credentials for other IAM users."
        - "Look for users that have access to S3 buckets containing sensitive data."
        - "Browse to https://pathfinding.cloud/paths/iam-002 for technique details."
      commands:
        - description: "Create access keys for the bucket access user"
          command: "aws iam create-access-key --user-name pl-prod-iam-002-to-bucket-access-user"

    - from: bucket-access-user
      to: target-bucket
      label: "s3:GetObject, s3:PutObject"
      description: >
        Use the newly created credentials to access the sensitive S3 bucket and
        retrieve its contents.
      hints:
        - "This user has direct S3 bucket access. Use the credentials you created to authenticate as this user."
        - "List the bucket contents and retrieve the sensitive data file."
      commands:
        - description: "List objects in the sensitive bucket"
          command: "aws s3 ls s3://pl-prod-iam-002-to-bucket-{account_id}"
        - description: "Download the sensitive data file"
          command: "aws s3 cp s3://pl-prod-iam-002-to-bucket-{account_id}/sensitive-data.txt ."
