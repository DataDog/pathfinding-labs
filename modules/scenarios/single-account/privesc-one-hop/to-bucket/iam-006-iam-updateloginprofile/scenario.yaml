# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "iam-updateloginprofile"
description: "User with iam:UpdateLoginProfile can reset password for user with S3 bucket access"
cost_estimate: "$0/mo"
pathfinding-cloud-id: "iam-006"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "credential-access"
path_type: "one-hop"
target: "to-bucket"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-iam-006-to-bucket-starting-user"
    - "arn:aws:iam::{account_id}:user/pl-prod-iam-006-to-bucket-user"
    - "arn:aws:s3:::pl-prod-iam-006-to-bucket-sensitive-data-{account_id}"

  summary: "starting_user → (iam:UpdateLoginProfile) → reset bucket_user password → console login → S3 bucket access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - permission: "iam:UpdateLoginProfile"
      resource: "arn:aws:iam::*:user/pl-prod-iam-006-to-bucket-user"

  helpful:
    - permission: "iam:ListUsers"
      purpose: "Discover users with login profiles"

    - permission: "iam:GetUser"
      purpose: "View user details"

    - permission: "iam:GetLoginProfile"
      purpose: "Verify user has login profile"

# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0009 - Collection"
  techniques:
    - "T1098.001 - Account Manipulation: Additional Cloud Credentials"
    - "T1530 - Data from Cloud Storage Object"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_bucket_iam_006_iam_updateloginprofile"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-bucket/iam-006-iam-updateloginprofile"
