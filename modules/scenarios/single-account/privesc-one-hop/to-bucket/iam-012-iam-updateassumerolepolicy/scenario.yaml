# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "iam-updateassumerolepolicy"
description: "User with iam:UpdateAssumeRolePolicy can modify role trust policy to assume role with S3 access"
cost_estimate: "free"
pathfinding-cloud-id: "iam-012"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "principal-access"
path_type: "one-hop"
target: "to-bucket"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-iam-012-to-bucket-starting-user"
    - "arn:aws:iam::{account_id}:role/pl-prod-iam-012-to-bucket-starting-role"
    - "arn:aws:iam::{account_id}:role/pl-prod-iam-012-to-bucket-target-role"
    - "arn:aws:s3:::pl-prod-iam-012-to-bucket-{account_id}-{resource_suffix}"

  summary: "starting_user → (iam:UpdateAssumeRolePolicy) → modify role trust → (sts:AssumeRole) → S3 bucket access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - permission: "iam:UpdateAssumeRolePolicy"
      resource: "arn:aws:iam::*:role/pl-prod-iam-012-to-bucket-target-role"

    - permission: "sts:AssumeRole"
      resource: "arn:aws:iam::*:role/pl-prod-iam-012-to-bucket-target-role"

  helpful:
    - permission: "iam:ListRoles"
      purpose: "Discover roles with S3 access"

    - permission: "iam:GetRole"
      purpose: "View current trust policy before modification"

# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0009 - Collection"
  techniques:
    - "T1098 - Account Manipulation"
    - "T1530 - Data from Cloud Storage Object"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_bucket_iam_012_iam_updateassumerolepolicy"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-bucket/iam-012-iam-updateassumerolepolicy"
