# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "iam-deleteaccesskey+createaccesskey"
title: "IAM Access Key Rotation to Bucket"
description: "User with iam:DeleteAccessKey and iam:CreateAccessKey can delete an existing access key and create a new one for a user with S3 access (bypassing the 2-key limit) to gain bucket access"
cost_estimate: "$0/mo"
pathfinding-cloud-id: "iam-003"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "credential-access"
path_type: "one-hop"
target: "to-bucket"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-iam-003-to-bucket-starting-user"
    - "arn:aws:iam::{account_id}:user/pl-prod-iam-003-to-bucket-target-user"

  summary: "starting_user → (iam:ListAccessKeys) → list existing keys → (iam:DeleteAccessKey) → delete one key → (iam:CreateAccessKey) → create new key for target_user → S3 bucket access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - principal: "pl-prod-iam-003-to-bucket-starting-user"
      principal_type: "user"
      permissions:
        - permission: "iam:DeleteAccessKey"
          resource: "arn:aws:iam::*:user/pl-prod-iam-003-to-bucket-target-user"
        - permission: "iam:CreateAccessKey"
          resource: "arn:aws:iam::*:user/pl-prod-iam-003-to-bucket-target-user"

  helpful:
    - principal: "pl-prod-iam-003-to-bucket-starting-user"
      principal_type: "user"
      permissions:
        - permission: "iam:ListAccessKeys"
          purpose: "List existing access keys to identify which one to delete"
        - permission: "iam:ListUsers"
          purpose: "Discover users with S3 bucket access to target"
        - permission: "iam:GetUser"
          purpose: "View user details and attached policies"
        - permission: "iam:ListAttachedUserPolicies"
          purpose: "Identify users with S3 permissions"
# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0003 - Persistence"
  techniques:
    - "T1098.001 - Account Manipulation: Additional Cloud Credentials"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_bucket_iam_003_iam_deleteaccesskey_createaccesskey"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-bucket/iam-003-iam-deleteaccesskey+createaccesskey"
