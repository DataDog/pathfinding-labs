attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-004-bucket-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:CreateLoginProfile permission scoped to the target user
        pl-prod-iam-004-bucket-hop1, who has read access to a sensitive S3 bucket.

    - id: hop1-user
      label: "Bucket User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-004-bucket-hop1"
      description: >
        This IAM user has S3 read access to the sensitive data bucket but initially
        has no console login profile (no password). By creating a login profile for
        this user, you can log into the AWS Management Console as this user and
        access the sensitive data directly via the S3 console.

    - id: target-bucket
      label: "Sensitive Bucket"
      type: resource
      subType: s3-bucket
      isTarget: true
      arn: "arn:aws:s3:::pl-sensitive-data-iam-004-{account_id}"
      description: >
        This S3 bucket contains sensitive data. The hop1 user has s3:GetObject and
        s3:ListBucket permissions on this bucket. After creating a login profile for
        the hop1 user and logging into the console, you can read and download all
        objects in this bucket.

  edges:
    - from: starting-principal
      to: hop1-user
      label: "iam:CreateLoginProfile"
      description: >
        Create a console login profile (password) for the target user, enabling
        console access for a user that previously only had programmatic access.
      hints:
        - "Start by confirming your identity and understanding what permissions your starting user actually has."
        - "You can create console login credentials (passwords) for other IAM users — check which users that permission is scoped to."
        - "Use iam:ListUsers to enumerate users in the account, then use iam:GetLoginProfile on each one to see which lack a console password."
        - "A user without a login profile cannot log into the AWS Console — but you might be able to change that."
        - "Use iam:GetUser or iam:ListUserPolicies to understand what permissions the target user has before investing in the attack."
        - "Once you know the target user has valuable permissions, create a login profile with a password you control using iam:CreateLoginProfile."
        - "Browse to https://pathfinding.cloud/paths/iam-004 for technique details."
      commands:
        - description: "Create a console login profile for the target user"
          command: "aws iam create-login-profile --user-name pl-prod-iam-004-bucket-hop1 --password 'Attacker1234!' --no-password-reset-required"

    - from: hop1-user
      to: target-bucket
      label: "s3:GetObject, s3:ListBucket"
      description: >
        Log into the AWS Management Console as the hop1 user and access the sensitive
        S3 bucket using the user's existing S3 read permissions.
      hints:
        - "After creating the login profile, the hop1 user can now authenticate to the AWS Management Console."
        - "Navigate to the account-specific sign-in URL: https://{account_id}.signin.aws.amazon.com/console"
        - "Sign in as pl-prod-iam-004-bucket-hop1 with the password you set, then browse to S3."
        - "If you prefer CLI access, look at whether you also have iam:CreateAccessKey to generate programmatic credentials for this user."
      commands:
        - description: "List objects in the sensitive bucket (using hop1 credentials)"
          command: "aws s3 ls s3://pl-sensitive-data-iam-004-{account_id}/"
        - description: "Download sensitive data from the bucket"
          command: "aws s3 cp s3://pl-sensitive-data-iam-004-{account_id}/sensitive-data.txt ."
