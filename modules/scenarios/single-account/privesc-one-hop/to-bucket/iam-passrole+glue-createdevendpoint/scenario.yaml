# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "iam-passrole+glue-createdevendpoint"
description: "User with iam:PassRole and glue:CreateDevEndpoint can create a Glue dev endpoint with an S3 role and access sensitive buckets via SSH"
cost_estimate: "$2.20/hour"
pathfinding-cloud-id: "glue-001"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "service-passrole"
path_type: "one-hop"
target: "to-bucket"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-gcd-to-bucket-starting-user"
    - "arn:aws:iam::{account_id}:role/pl-prod-gcd-to-bucket-target-role"
    - "arn:aws:s3:::pl-sensitive-data-gcd-{account_id}-{suffix}"

  summary: "starting_user → (iam:PassRole + glue:CreateDevEndpoint) → Glue dev endpoint with S3 role → SSH access → (aws s3 cp) → sensitive bucket access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - permission: "iam:PassRole"
      resource: "arn:aws:iam::*:role/pl-prod-gcd-to-bucket-target-role"

    - permission: "glue:CreateDevEndpoint"
      resource: "*"

  helpful:
    - permission: "glue:GetDevEndpoint"
      purpose: "Check endpoint status and retrieve SSH connection details"

    - permission: "iam:ListRoles"
      purpose: "Discover available privileged roles to pass to Glue"

    - permission: "s3:ListBuckets"
      purpose: "Discover target buckets after escalation"

    - permission: "glue:DeleteDevEndpoint"
      purpose: "Clean up created endpoints after demonstration"

# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
  techniques:
    - "T1098.001 - Account Manipulation: Additional Cloud Credentials"
    - "T1578 - Modify Cloud Compute Infrastructure"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_bucket_iam_passrole_glue_createdevendpoint"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-bucket/iam-passrole+glue-createdevendpoint"
