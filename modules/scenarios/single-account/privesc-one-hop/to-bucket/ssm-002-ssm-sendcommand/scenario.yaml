schema_version: "1.2.0"
name: "ssm-sendcommand"
title: "SSM Send Command to Bucket"
description: "User with ssm:SendCommand executes commands on EC2 with S3 access to extract credentials and access sensitive bucket"
cost_estimate: "$8/mo"
pathfinding-cloud-id: "ssm-002"

category: "Privilege Escalation"
sub_category: "existing-passrole"
path_type: "one-hop"
target: "to-bucket"
environments:
  - "prod"

attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-ssm-002-to-bucket-starting-user"
    - "arn:aws:ec2:{region}:{account_id}:instance/i-xxxxxxxxx"
    - "arn:aws:iam::{account_id}:role/pl-prod-ssm-002-to-bucket-ec2-bucket-role"
    - "arn:aws:s3:::pl-sensitive-data-ssm-002-{account_id}-{suffix}"

  summary: "starting_user → (ssm:SendCommand) → EC2 instance → (extract metadata credentials) → EC2 S3 role credentials → (s3:GetObject) → sensitive bucket access"

permissions:
  required:
    - principal: "pl-prod-ssm-002-to-bucket-starting-user"
      principal_type: "user"
      permissions:
        - permission: "ssm:SendCommand"
          resource: "*"

  helpful:
    - principal: "pl-prod-ssm-002-to-bucket-starting-user"
      principal_type: "user"
      permissions:
        - permission: "ssm:ListCommands"
          purpose: "View command execution status and results"
        - permission: "ssm:ListCommandInvocations"
          purpose: "List command invocations for the sent commands"
        - permission: "ssm:GetCommandInvocation"
          purpose: "Retrieve detailed command output containing extracted credentials"
        - permission: "ssm:DescribeInstanceInformation"
          purpose: "Verify SSM agent status on target instances"
        - permission: "ec2:DescribeInstances"
          purpose: "Discover EC2 instances with S3 access roles attached"
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0008 - Lateral Movement"
    - "TA0006 - Credential Access"

  techniques:
    - "T1651 - Cloud Administration Command"
    - "T1552.005 - Unsecured Credentials: Cloud Instance Metadata API"

terraform:
  variable_name: "enable_single_account_privesc_one_hop_to_bucket_ssm_002_ssm_sendcommand"
  module_path: "modules/scenarios/single-account/privesc-one-hop/to-bucket/ssm-002-ssm-sendcommand"
