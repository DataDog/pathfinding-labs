attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-sts001-ecs002-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has only sts:AssumeRole permission on the intermediate role. It cannot
        directly reach any privileged resource, but it can assume an intermediate role
        that has dangerous ECS and IAM PassRole permissions.

    - id: intermediate-role
      label: "Intermediate Role"
      type: principal
      subType: iam-role
      arn: "arn:aws:iam::{account_id}:role/pl-prod-sts001-ecs002-intermediate-role"
      description: >
        This intermediate IAM role has ECS management permissions (ecs:CreateCluster,
        ecs:RegisterTaskDefinition, ecs:RunTask) combined with iam:PassRole on the admin
        role. This combination allows you to spin up a Fargate task that executes with
        the admin role's credentials.

    - id: ecs-cluster
      label: "ECS Cluster"
      type: resource
      subType: ecs-task
      arn: "arn:aws:ecs:{region}:{account_id}:cluster/pl-prod-sts001-ecs002-attack-cluster"
      description: >
        A transient ECS cluster you create to host the malicious Fargate task. The
        cluster itself has no permissions -- it is simply a logical grouping for the
        task you will run. The privilege escalation happens through the task role
        attached to the task definition.

    - id: admin-role
      label: "Admin Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-sts001-ecs002-admin-role"
      description: >
        This IAM role has AdministratorAccess and trusts ecs-tasks.amazonaws.com. By
        attaching it as the task role in an ECS task definition and running that task
        on Fargate, the container receives temporary credentials for this role via the
        ECS credential provider endpoint. The container uses those credentials to attach
        AdministratorAccess to the starting user, granting persistent escalated access.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/sts-001-to-ecs-002-to-admin-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess). Your goal is to read this parameter
        using the admin access gained from the previous step.

  edges:
    - from: starting-user
      to: intermediate-role
      label: "sts:AssumeRole"
      description: >
        Assume the intermediate role to obtain temporary credentials with
        ECS management permissions and iam:PassRole on the admin role.
      hints:
        - "Call sts:AssumeRole with the intermediate role ARN and export the returned credentials as AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, and AWS_SESSION_TOKEN."
        - "Browse to https://pathfinding.cloud/paths/sts-001 for technique details on this hop."
      commands:
        - description: "Assume the intermediate role"
          command: "aws sts assume-role --role-arn arn:aws:iam::ACCOUNT_ID:role/pl-prod-sts001-ecs002-intermediate-role --role-session-name privesc-session"

    - from: intermediate-role
      to: ecs-cluster
      label: "ecs:CreateCluster + ecs:RegisterTaskDefinition + iam:PassRole"
      description: >
        Create an ECS cluster, then register a task definition that specifies the
        admin role as the task role. The iam:PassRole permission allows attaching
        the admin role to the task definition, which is the key escalation step.
      hints:
        - "Create an ECS cluster, then register a task definition setting taskRoleArn to the admin role ARN. The container command should call iam:AttachUserPolicy to grant AdministratorAccess to the starting user. You'll need a VPC subnet for Fargate — use the default VPC."
        - "Run the task with FARGATE launch type and ENABLED public IP. Monitor with ecs:DescribeTasks until STOPPED, then wait 15 seconds for IAM propagation before verifying your escalated permissions with your starting user credentials."
        - "Browse to https://pathfinding.cloud/paths/ecs-002 for technique details on this hop."
      commands:
        - description: "Create an ECS cluster"
          command: "aws ecs create-cluster --cluster-name pl-prod-sts001-ecs002-attack-cluster"
        - description: "Get default VPC ID"
          command: "aws ec2 describe-vpcs --filters Name=isDefault,Values=true --query 'Vpcs[0].VpcId' --output text"
        - description: "Get a subnet in the default VPC"
          command: "aws ec2 describe-subnets --filters Name=vpc-id,Values=$VPC_ID --query 'Subnets[0].SubnetId' --output text"
        - description: "Register task definition with admin role as task role"
          command: "aws ecs register-task-definition --cli-input-json file:///tmp/task-definition.json"

    - from: ecs-cluster
      to: admin-role
      label: "ecs:RunTask -> task role credentials"
      description: >
        Run the Fargate task. When the container starts, AWS injects temporary
        credentials for the admin role via the ECS metadata endpoint. The container
        uses those credentials to attach AdministratorAccess to the starting user,
        granting persistent escalated access.
      hints: []
      commands:
        - description: "Run the Fargate task"
          command: "aws ecs run-task --cluster pl-prod-sts001-ecs002-attack-cluster --task-definition pl-sts001-ecs002-admin-escalation --launch-type FARGATE --network-configuration \"awsvpcConfiguration={subnets=[$SUBNET_ID],assignPublicIp=ENABLED}\""
        - description: "Wait for the task to complete"
          command: "aws ecs describe-tasks --cluster pl-prod-sts001-ecs002-attack-cluster --tasks $TASK_ARN --query 'tasks[0].lastStatus' --output text"
        - description: "Verify administrative access"
          command: "aws iam list-users"

    - from: admin-role
      to: ctf-flag
      label: "Read CTF flag"
      description: >
        With administrator-equivalent permissions now attached to the starting user,
        retrieve the scenario flag from SSM Parameter Store. AdministratorAccess grants
        ssm:GetParameter on all parameters in the account, so no additional permissions
        are needed beyond the admin access you just gained.
      hints:
        - "Use your now-escalated starting user credentials to call ssm:GetParameter with the full parameter name to retrieve the flag."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/sts-001-to-ecs-002-to-admin-to-admin --query 'Parameter.Value' --output text"
