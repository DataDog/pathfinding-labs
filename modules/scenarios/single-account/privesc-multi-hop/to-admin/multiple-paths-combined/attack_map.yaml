attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-pathfinding-starting-user-prod"
      description: >
        You have gained access to this principal's AWS IAM credentials. These could have been
        obtained through many real-world vectors: phishing a developer and gaining access to
        their workstation, compromising a browser session, exploiting a vulnerable workload
        running in this AWS account, discovering credentials in a public S3 bucket, or finding
        them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has sts:AssumeRole permission to assume the escalation role
        pl-prod-role-with-multiple-privesc-paths.

    - id: escalation-role
      label: "Escalation Role"
      type: principal
      subType: iam-role
      arn: "arn:aws:iam::{account_id}:role/pl-prod-role-with-multiple-privesc-paths"
      description: >
        This IAM role holds iam:PassRole combined with ec2:RunInstances, lambda:CreateFunction,
        and cloudformation:CreateStack. Each pairing independently constitutes a privilege
        escalation path to full administrative access.

    - id: ec2-admin-role
      label: "EC2 Admin Role"
      type: resource
      subType: iam-role
      arn: "arn:aws:iam::{account_id}:role/pl-prod-ec2-admin-role"
      description: >
        This IAM role trusts ec2.amazonaws.com and carries AdministratorAccess. It can be
        passed to an EC2 instance via iam:PassRole + ec2:RunInstances, enabling the instance
        to perform any IAM action including creating a new role that trusts the attacker.

    - id: lambda-admin-role
      label: "Lambda Admin Role"
      type: resource
      subType: iam-role
      arn: "arn:aws:iam::{account_id}:role/pl-prod-lambda-admin-role"
      description: >
        This IAM role trusts lambda.amazonaws.com and carries AdministratorAccess. It can be
        passed to a Lambda function, allowing the function's code to perform any IAM action.

    - id: cfn-admin-role
      label: "CloudFormation Admin Role"
      type: resource
      subType: iam-role
      arn: "arn:aws:iam::{account_id}:role/pl-prod-cloudformation-admin-role"
      description: >
        This IAM role trusts cloudformation.amazonaws.com and carries AdministratorAccess.
        Passing it to a CloudFormation stack allows the stack to create any IAM resource,
        including a new admin role that trusts the attacker.

    - id: new-admin-role
      label: "New Admin Role"
      type: principal
      subType: iam-role
      isTarget: true
      arn: "arn:aws:iam::{account_id}:role/new-admin-role"
      description: >
        A new IAM role with AdministratorAccess created by one of the three compute service
        payloads (EC2, Lambda, or CloudFormation). Its trust policy allows the original starting
        user to assume it, completing the privilege escalation chain.

  edges:
    - from: starting-user
      to: escalation-role
      label: "sts:AssumeRole"
      description: >
        The starting user assumes the escalation role, gaining PassRole and compute service
        creation permissions.
      hints:
        - "Your starting user can assume a role -- start by discovering which roles are available to you."
        - "Use iam:ListRoles to enumerate roles in the account and look for one your identity can assume."
        - "Check the trust policies of discovered roles to see which ones trust your user ARN."
        - "Once you identify the assumable role, review its attached and inline policies to understand what it can do."
        - "Look for roles whose policies combine iam:PassRole with compute service creation permissions -- that combination is the escalation path."
      commands:
        - description: "Assume the escalation role"
          command: >
            aws sts assume-role
            --role-arn "arn:aws:iam::{account_id}:role/pl-prod-role-with-multiple-privesc-paths"
            --role-session-name "privesc-demo"

    - from: escalation-role
      to: ec2-admin-role
      label: "iam:PassRole + ec2:RunInstances"
      description: >
        Launch an EC2 instance with the admin role attached as the instance profile. The
        instance user-data script runs a payload under AdministratorAccess.
      hints:
        - "You have iam:PassRole -- identify which service admin roles you can pass by looking for roles whose trust policy allows ec2.amazonaws.com."
        - "Use iam:ListRoles to find roles trusted by EC2, Lambda, and CloudFormation service principals."
        - "With ec2:RunInstances and iam:PassRole, you can launch an EC2 instance that operates under an admin role."
        - "EC2 user-data runs as root on launch -- a user-data payload can perform IAM operations using the instance profile's credentials."
        - "The payload should create a new IAM role with AdministratorAccess and a trust policy that allows your starting user to assume it."
        - "After the instance completes its user-data, you can assume the newly created role from your local machine."
      commands:
        - description: "Launch EC2 instance with admin role and payload"
          command: >
            aws ec2 run-instances
            --image-id ami-0abcdef1234567890
            --instance-type t3.micro
            --iam-instance-profile Name=pl-prod-ec2-admin-role
            --user-data file://payload.sh
            --count 1

    - from: escalation-role
      to: lambda-admin-role
      label: "iam:PassRole + lambda:CreateFunction"
      description: >
        Create a Lambda function with the admin role as its execution role, then invoke it
        to run a payload under AdministratorAccess.
      hints:
        - "You have iam:PassRole -- identify which service admin roles you can pass by looking for roles whose trust policy allows lambda.amazonaws.com."
        - "With lambda:CreateFunction and iam:PassRole, you can create a Lambda function that executes under an admin role."
        - "Write a short Python function that calls iam:CreateRole and iam:AttachRolePolicy to provision a new admin role trusting your starting identity."
        - "After creating the function, invoke it explicitly -- Lambda functions do not run until invoked."
        - "Check the invocation response or CloudWatch Logs to confirm the payload succeeded before attempting to assume the new role."
      commands:
        - description: "Create Lambda function with admin role"
          command: >
            aws lambda create-function
            --function-name privesc-demo-fn
            --runtime python3.12
            --role "arn:aws:iam::{account_id}:role/pl-prod-lambda-admin-role"
            --handler index.handler
            --zip-file fileb://payload.zip
        - description: "Invoke the function to execute the payload"
          command: "aws lambda invoke --function-name privesc-demo-fn /tmp/out.json"

    - from: escalation-role
      to: cfn-admin-role
      label: "iam:PassRole + cloudformation:CreateStack"
      description: >
        Deploy a CloudFormation stack using the admin role. The stack template includes an
        IAM role resource, executed under AdministratorAccess via CAPABILITY_NAMED_IAM.
      hints:
        - "You have iam:PassRole -- identify which service admin roles you can pass by looking for roles whose trust policy allows cloudformation.amazonaws.com."
        - "With cloudformation:CreateStack and iam:PassRole, you can deploy a stack that executes IAM operations under an admin role."
        - "Write a CloudFormation template that defines an AWS::IAM::Role resource with AdministratorAccess and a trust policy for your starting user."
        - "Pass the admin role ARN to the stack using the --role-arn parameter and include CAPABILITY_NAMED_IAM in --capabilities."
        - "Wait for the stack to reach CREATE_COMPLETE status before attempting to assume the role the stack created."
      commands:
        - description: "Create CloudFormation stack with admin role"
          command: >
            aws cloudformation create-stack
            --stack-name privesc-demo-stack
            --template-body file://template.yaml
            --role-arn "arn:aws:iam::{account_id}:role/pl-prod-cloudformation-admin-role"
            --capabilities CAPABILITY_NAMED_IAM

    - from: ec2-admin-role
      to: new-admin-role
      label: "iam:CreateRole + iam:AttachRolePolicy"
      description: >
        The EC2 instance payload (running under AdministratorAccess) creates a new IAM role
        with AdministratorAccess and a trust policy allowing the starting user to assume it.
      hints:
        - "The EC2 instance runs its user-data script as root using the instance profile's admin credentials."
        - "Your payload should call iam:CreateRole to create a new role with a trust policy pointing to your starting user ARN."
        - "After creating the role, attach AdministratorAccess using iam:AttachRolePolicy."
        - "Once the instance finishes its user-data, switch back to your starting user credentials and assume the new role."
      commands: []

    - from: lambda-admin-role
      to: new-admin-role
      label: "iam:CreateRole + iam:AttachRolePolicy"
      description: >
        The Lambda function payload (running under AdministratorAccess) creates a new IAM role
        with AdministratorAccess and a trust policy allowing the starting user to assume it.
      hints:
        - "The Lambda function executes using the execution role's admin credentials."
        - "Your function code should call iam:CreateRole with a trust policy that includes your starting user ARN as a principal."
        - "After creating the role, call iam:AttachRolePolicy with the AdministratorAccess managed policy ARN."
        - "Check the function's response payload or CloudWatch Logs to confirm the role was created successfully."
      commands: []

    - from: cfn-admin-role
      to: new-admin-role
      label: "iam:CreateRole + iam:AttachRolePolicy"
      description: >
        The CloudFormation stack (executed under AdministratorAccess) provisions a new IAM role
        resource with AdministratorAccess and a trust policy allowing the starting user to assume it.
      hints:
        - "CloudFormation executes your template using the role you passed -- it has full admin permissions."
        - "Define an AWS::IAM::Role resource in your template with a trust policy principal set to your starting user ARN."
        - "Add AdministratorAccess to ManagedPolicyArns in the role definition."
        - "Use cloudformation:DescribeStacks or cloudformation:DescribeStackResources to confirm the role was created once the stack completes."
      commands: []
