# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.0.0"
name: "multiple-paths-combined"
description: "Multiple privilege escalation techniques combined - EC2, Lambda, and CloudFormation paths to admin"
cost_estimate: "$0/mo"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "privilege-chaining"
path_type: "multi-hop"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-pathfinding-starting-user-prod"
    - "arn:aws:iam::{account_id}:role/pl-prod-role-with-multiple-privesc-paths"
    - "arn:aws:iam::{account_id}:role/pl-EC2Admin"

  summary: "starting_user → (AssumeRole) → starting_role → (PassRole + EC2/Lambda/CloudFormation) → admin role → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - principal: "pl-pathfinding-starting-user-prod"
      principal_type: "user"
      permissions:
        - permission: "iam:PassRole"
          resource: "arn:aws:iam::*:role/*"
        - permission: "ec2:RunInstances"
          resource: "*"
        - permission: "lambda:CreateFunction"
          resource: "*"
        - permission: "cloudformation:CreateStack"
          resource: "*"

  helpful:
    - principal: "pl-pathfinding-starting-user-prod"
      principal_type: "user"
      permissions:
        - permission: "iam:ListRoles"
          purpose: "Discover available privileged roles"
        - permission: "ec2:DescribeInstances"
          purpose: "Verify EC2 escalation path"
        - permission: "lambda:ListFunctions"
          purpose: "Verify Lambda escalation path"
# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0002 - Execution"
  techniques:
    - "T1098.001 - Account Manipulation: Additional Cloud Credentials"
    - "T1578 - Modify Cloud Compute Infrastructure"
    - "T1648 - Serverless Execution"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_multi_hop_to_admin_multiple_paths_combined"
  module_path: "modules/scenarios/single-account/privesc-multi-hop/to-admin/multiple-paths-combined"
