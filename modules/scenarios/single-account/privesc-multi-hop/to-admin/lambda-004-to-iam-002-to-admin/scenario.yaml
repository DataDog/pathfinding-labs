# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.1"
name: "lambda-004-to-iam-002-to-admin"
title: "Lambda Code Update + Access Key Creation to Admin"
description: "Multi-hop privilege escalation: update Lambda function code to exfiltrate execution role credentials, then use those credentials to create access keys for an admin user"
cost_estimate: "$0/mo"
pathfinding-cloud-id: "lambda-004 + iam-002"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
path_type: "multi-hop"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-lambda-004-to-iam-002-starting-user"
    - "arn:aws:lambda:{region}:{account_id}:function:pl-prod-lambda-004-to-iam-002-target-function"
    - "arn:aws:iam::{account_id}:role/pl-prod-lambda-004-to-iam-002-lambda-role"
    - "arn:aws:iam::{account_id}:user/pl-prod-lambda-004-to-iam-002-admin-user"

  summary: "starting_user → (lambda:UpdateFunctionCode + lambda:InvokeFunction) → lambda_role credentials → (iam:CreateAccessKey) → admin_user → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - principal: "pl-prod-lambda-004-to-iam-002-starting-user"
      principal_type: "user"
      permissions:
        - permission: "lambda:UpdateFunctionCode"
          resource: "arn:aws:lambda:*:*:function:pl-prod-lambda-004-to-iam-002-target-function"
        - permission: "lambda:InvokeFunction"
          resource: "arn:aws:lambda:*:*:function:pl-prod-lambda-004-to-iam-002-target-function"
        - permission: "iam:CreateAccessKey"
          resource: "arn:aws:iam::*:user/pl-prod-lambda-004-to-iam-002-admin-user"

  helpful:
    - principal: "pl-prod-lambda-004-to-iam-002-starting-user"
      principal_type: "user"
      permissions:
        - permission: "lambda:ListFunctions"
          purpose: "Discover available Lambda functions to target"
        - permission: "lambda:GetFunction"
          purpose: "View function details including execution role ARN"
        - permission: "lambda:GetFunctionConfiguration"
          purpose: "View function configuration details"
# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0002 - Execution"
    - "TA0006 - Credential Access"
  techniques:
    - "T1098.001 - Account Manipulation: Additional Cloud Credentials"
    - "T1059 - Command and Scripting Interpreter"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_multi_hop_to_admin_lambda_004_to_iam_002"
  module_path: "modules/scenarios/single-account/privesc-multi-hop/to-admin/lambda-004-to-iam-002-to-admin"
