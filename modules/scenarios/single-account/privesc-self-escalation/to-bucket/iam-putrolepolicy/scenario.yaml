# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "iam-putrolepolicy"
description: "Role with iam:PutRolePolicy on itself can add inline policy granting S3 bucket access"
cost_estimate: "free"
pathfinding-cloud-id: "iam-005"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "self-escalation"
path_type: "self-escalation"
target: "to-bucket"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-pathfinding-starting-user-prod"
    - "arn:aws:iam::{account_id}:role/pl-prod-prp-role"
    - "arn:aws:s3:::pl-sensitive-data-{account_id}"

  summary: "starting_user → (AssumeRole) → privesc_role → (iam:PutRolePolicy on self) → inline S3 policy → bucket access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - permission: "iam:PutRolePolicy"
      resource: "arn:aws:iam::*:role/pl-prod-prp-role"

  helpful:
    - permission: "iam:GetRolePolicy"
      purpose: "View existing inline policies on the role"

    - permission: "iam:ListRolePolicies"
      purpose: "List all inline policies attached to the role"

    - permission: "s3:ListBucket"
      purpose: "Verify bucket access after escalation"

# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0009 - Collection"
  techniques:
    - "T1098 - Account Manipulation"
    - "T1530 - Data from Cloud Storage Object"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_self_escalation_to_bucket_iam_putrolepolicy"
  module_path: "modules/scenarios/single-account/privesc-self-escalation/to-bucket/iam-putrolepolicy"
