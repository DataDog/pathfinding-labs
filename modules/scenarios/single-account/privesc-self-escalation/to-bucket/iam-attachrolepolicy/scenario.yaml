# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.0.0"
name: "iam-attachrolepolicy"
description: "Role with iam:AttachRolePolicy on itself can attach policy granting S3 bucket access"
cost_estimate: "free"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "self-escalation"
path_type: "self-escalation"
target: "to-bucket"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-pathfinder-starting-user-prod"
    - "arn:aws:iam::{account_id}:role/pl-prod-arp-role"
    - "arn:aws:s3:::pl-sensitive-data-{account_id}"

  summary: "starting_user → (AssumeRole) → privesc_role → (iam:AttachRolePolicy on self) → attach S3 policy → bucket access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - permission: "iam:AttachRolePolicy"
      resource: "arn:aws:iam::*:role/pl-prod-arp-role"

  helpful:
    - permission: "iam:ListAttachedRolePolicies"
      purpose: "List managed policies attached to the role"

    - permission: "iam:ListPolicies"
      purpose: "Discover available managed policies"

    - permission: "s3:ListBucket"
      purpose: "Verify bucket access after escalation"

# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0009 - Collection"
  techniques:
    - "T1098 - Account Manipulation"
    - "T1530 - Data from Cloud Storage Object"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_self_escalation_to_bucket_iam_attachrolepolicy"
  module_path: "modules/scenarios/single-account/privesc-self-escalation/to-bucket/iam-attachrolepolicy"
