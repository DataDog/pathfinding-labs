# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "iam-putrolepolicy"
title: "IAM Inline Role Policy Modification to Bucket"
description: "Role with iam:PutRolePolicy on itself can add inline policy granting S3 bucket access"
cost_estimate: "$0/mo"
pathfinding-cloud-id: "iam-005"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "self-escalation"
path_type: "self-escalation"
target: "to-bucket"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-iam-005-to-bucket-starting-user"
    - "arn:aws:iam::{account_id}:role/pl-prod-iam-005-to-bucket-starting-role"
    - "arn:aws:iam::{account_id}:role/pl-prod-iam-005-to-bucket-target-role"
    - "arn:aws:s3:::pl-prod-iam-005-to-bucket-{account_id}"

  summary: "starting_user → (AssumeRole) → starting_role → (iam:PutRolePolicy on self) → inline S3 policy → (AssumeRole) → target_role → bucket access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - principal: "pl-prod-iam-005-to-bucket-starting-user"
      principal_type: "user"
      permissions:
        - permission: "iam:PutRolePolicy"
          resource: "arn:aws:iam::*:role/pl-prod-iam-005-to-bucket-starting-role"

  helpful:
    - principal: "pl-prod-iam-005-to-bucket-starting-user"
      principal_type: "user"
      permissions:
        - permission: "iam:GetRolePolicy"
          purpose: "View existing inline policies on the role"
        - permission: "iam:ListRolePolicies"
          purpose: "List all inline policies attached to the role"
        - permission: "s3:ListBucket"
          purpose: "Verify bucket access after escalation"
# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0009 - Collection"
  techniques:
    - "T1098 - Account Manipulation"
    - "T1530 - Data from Cloud Storage Object"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_self_escalation_to_bucket_iam_005_iam_putrolepolicy"
  module_path: "modules/scenarios/single-account/privesc-self-escalation/to-bucket/iam-005-iam-putrolepolicy"
