attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-005-to-bucket-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has sts:AssumeRole permission on the starting role, which in turn
        has iam:PutRolePolicy permission scoped to itself.

    - id: starting-role
      label: "Starting Role"
      type: principal
      subType: iam-role
      arn: "arn:aws:iam::{account_id}:role/pl-prod-iam-005-to-bucket-starting-role"
      description: >
        This IAM role has iam:PutRolePolicy permission scoped to itself, meaning it can
        add an inline policy to itself. This enables self-escalation: by writing an inline
        policy that grants sts:AssumeRole on the target role, the starting role can then
        assume the target role and access the sensitive S3 bucket.

    - id: target-role
      label: "Target Role"
      type: principal
      subType: iam-role
      arn: "arn:aws:iam::{account_id}:role/pl-prod-iam-005-to-bucket-target-role"
      description: >
        This IAM role has S3 read/write permissions on the sensitive target bucket.
        After the starting role modifies its own inline policy to grant sts:AssumeRole
        on this target role, the attacker can assume it and access the bucket data.

    - id: target-bucket
      label: "Sensitive Bucket"
      type: resource
      subType: s3-bucket
      isTarget: true
      arn: "arn:aws:s3:::pl-prod-iam-005-to-bucket-{account_id}"
      description: >
        This S3 bucket contains sensitive data. The target role has s3:GetObject and
        s3:PutObject permissions on this bucket. Reaching this bucket represents the
        end of the privilege escalation path.

  edges:
    - from: starting-user
      to: starting-role
      label: "sts:AssumeRole"
      description: >
        The starting user assumes the starting role to begin the attack path.
      hints:
        - "Use sts:AssumeRole to assume the starting role. Export the returned AccessKeyId, SecretAccessKey, and SessionToken as environment variables before proceeding."
        - "Browse to https://pathfinding.cloud/paths/iam-005 for technique details."
      commands:
        - description: "Assume the starting role"
          command: "aws sts assume-role --role-arn arn:aws:iam::{account_id}:role/pl-prod-iam-005-to-bucket-starting-role --role-session-name attack-session"

    - from: starting-role
      to: starting-role
      label: "iam:PutRolePolicy (self)"
      description: >
        The starting role uses its iam:PutRolePolicy permission to add an inline policy
        to itself, granting sts:AssumeRole permission on the target role. This self-escalation
        modifies the role's own permissions at runtime.
      hints:
        - "Write an inline policy onto your own role with iam:PutRolePolicy granting sts:AssumeRole on the target role, then re-assume the role to get fresh credentials."
        - "IAM policy changes take time to propagate -- wait at least 15 seconds after calling PutRolePolicy before attempting to assume the target role."
        - "Browse to https://pathfinding.cloud/paths/iam-005 for technique details."
      commands:
        - description: "Add inline policy to the starting role to allow assuming the target role"
          command: "aws iam put-role-policy --role-name pl-prod-iam-005-to-bucket-starting-role --policy-name escalation-policy --policy-document '{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Action\":\"sts:AssumeRole\",\"Resource\":\"arn:aws:iam::{account_id}:role/pl-prod-iam-005-to-bucket-target-role\"}]}'"

    - from: starting-role
      to: target-role
      label: "sts:AssumeRole"
      description: >
        After adding the inline policy, the starting role assumes the target role to
        gain S3 bucket permissions.
      hints:
        - "After the policy propagates, assume the target role using the starting role credentials and export the new session credentials before proceeding to the bucket."
      commands:
        - description: "Assume the target role using newly granted permission"
          command: "aws sts assume-role --role-arn arn:aws:iam::{account_id}:role/pl-prod-iam-005-to-bucket-target-role --role-session-name escalated-session"

    - from: target-role
      to: target-bucket
      label: "s3:GetObject"
      description: >
        The target role reads sensitive data from the S3 bucket, completing the attack path.
      hints:
        - "With the target role credentials active, use s3:ListBucket to enumerate bucket contents, then s3:GetObject to retrieve the flag."
      commands:
        - description: "List and download sensitive data from the target bucket"
          command: "aws s3 ls s3://pl-prod-iam-005-to-bucket-{account_id}/ && aws s3 cp s3://pl-prod-iam-005-to-bucket-{account_id}/sensitive-data.txt -"
        - description: "Read the CTF flag from the target bucket"
          command: "aws s3 cp s3://pl-prod-iam-005-to-bucket-{account_id}/flag.txt -"
