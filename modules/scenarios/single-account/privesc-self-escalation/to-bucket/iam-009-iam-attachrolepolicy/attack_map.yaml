attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-pathfinding-starting-user-prod"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user can assume the starting role, which has iam:AttachRolePolicy
        permission scoped to itself, enabling self-escalation to S3 bucket access.

    - id: starting-role
      label: "Starting Role"
      type: principal
      subType: iam-role
      arn: "arn:aws:iam::{account_id}:role/pl-prod-iam-009-to-bucket-starting-role"
      description: >
        This IAM role has iam:AttachRolePolicy permission scoped to its own ARN. This
        means the role can attach any managed policy to itself, including policies that
        grant access to sensitive S3 buckets. By attaching a bucket access policy, the
        role escalates its own privileges and gains access to the target bucket.

    - id: target-bucket
      label: "Sensitive S3 Bucket"
      type: resource
      subType: s3-bucket
      isTarget: true
      arn: "arn:aws:s3:::pl-prod-iam-009-to-bucket-{account_id}"
      description: >
        This S3 bucket contains sensitive data. After the starting role attaches a
        bucket access policy to itself, it can read and download all objects from
        this bucket, achieving the goal of unauthorized data access.

  edges:
    - from: starting-user
      to: starting-role
      label: "sts:AssumeRole"
      description: >
        The starting user assumes the starting role to obtain temporary credentials
        with the iam:AttachRolePolicy permission.
      hints:
        - "Start by confirming your identity and understanding what this user can do."
        - "This user's permissions include the ability to assume a role. Check the trust policies of roles in the account."
        - "Use iam:ListRoles or inspect the user's policy to identify which role can be assumed."
        - "The role you can assume has unusual permissions scoped to its own ARN — pay attention to the resource conditions."
        - "Browse to https://pathfinding.cloud/paths/iam-009 for technique details."
      commands:
        - description: "Assume the starting role"
          command: "aws sts assume-role --role-arn arn:aws:iam::{account_id}:role/pl-prod-iam-009-to-bucket-starting-role --role-session-name escalation-session"

    - from: starting-role
      to: starting-role
      label: "iam:AttachRolePolicy (self)"
      description: >
        The starting role uses its iam:AttachRolePolicy permission to attach a
        managed S3 access policy to itself, escalating its own privileges.
      hints:
        - "Now that you have assumed the role, review the policies attached to it — what IAM actions does this role have?"
        - "This role can call iam:AttachRolePolicy. The resource condition it is scoped to is significant — check what ARN it targets."
        - "Use iam:ListAttachedRolePolicies to see what is already attached, then use iam:ListPolicies to find candidate policies to add."
        - "Look for a customer-managed policy in the account whose name suggests it grants access to the target S3 bucket."
        - "Attach the bucket access policy to this role using its own role name as the target."
        - "IAM policy changes are not instant — wait at least 15 seconds after attaching before testing access."
      commands:
        - description: "Attach the bucket access policy to the current role"
          command: "aws iam attach-role-policy --role-name pl-prod-iam-009-to-bucket-starting-role --policy-arn arn:aws:iam::{account_id}:policy/pl-prod-iam-009-to-bucket-access-policy"

    - from: starting-role
      to: target-bucket
      label: "s3:GetObject, s3:ListBucket"
      description: >
        With the bucket access policy now attached, the role can list and read
        all objects in the target S3 bucket, accessing sensitive data.
      hints:
        - "After the policy change propagates, try the S3 operations that were denied before the escalation."
        - "Use s3:ListBucket to confirm you can now see objects in the target bucket."
        - "Once listing succeeds, download the sensitive file from the bucket."
      commands:
        - description: "List objects in the target bucket"
          command: "aws s3 ls s3://pl-prod-iam-009-to-bucket-{account_id}"
        - description: "Download sensitive data from the bucket"
          command: "aws s3 cp s3://pl-prod-iam-009-to-bucket-{account_id}/sensitive-data.txt ."
