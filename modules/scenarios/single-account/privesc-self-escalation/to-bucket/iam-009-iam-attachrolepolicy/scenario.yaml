# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "iam-attachrolepolicy"
title: "IAM Managed Role Policy Attachment to Bucket"
description: "Role with iam:AttachRolePolicy on itself can attach policy granting S3 bucket access"
cost_estimate: "$0/mo"
cost_estimate_when_demo_executed: "$0/mo"
pathfinding-cloud-id: "iam-009"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "self-escalation"
path_type: "self-escalation"
target: "to-bucket"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-pathfinding-starting-user-prod"
    - "arn:aws:iam::{account_id}:role/pl-prod-iam-009-to-bucket-starting-role"
    - "arn:aws:s3:::pl-prod-iam-009-to-bucket-{account_id}"

  summary: "starting_user → (AssumeRole) → privesc_role → (iam:AttachRolePolicy on self) → attach S3 policy → bucket access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - principal: "pl-pathfinding-starting-user-prod"
      principal_type: "user"
      permissions:
        - permission: "iam:AttachRolePolicy"
          resource: "arn:aws:iam::*:role/pl-prod-iam-009-to-bucket-starting-role"

  helpful:
    - principal: "pl-pathfinding-starting-user-prod"
      principal_type: "user"
      permissions:
        - permission: "iam:ListAttachedRolePolicies"
          purpose: "List managed policies attached to the role"
        - permission: "iam:ListPolicies"
          purpose: "Discover available managed policies"
        - permission: "s3:ListBucket"
          purpose: "Verify bucket access after escalation"
# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0009 - Collection"
  techniques:
    - "T1098 - Account Manipulation"
    - "T1530 - Data from Cloud Storage Object"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_self_escalation_to_bucket_iam_009_iam_attachrolepolicy"
  module_path: "modules/scenarios/single-account/privesc-self-escalation/to-bucket/iam-009-iam-attachrolepolicy"
