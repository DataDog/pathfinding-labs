attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      isTarget: true
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-010-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:AttachGroupPolicy permission and is a member of
        pl-prod-iam-010-to-admin-group. By attaching the AdministratorAccess managed
        policy to that group, the user elevates their own effective permissions to
        administrator through existing group membership.

    - id: target-group
      label: "Escalation Group"
      type: resource
      subType: iam-group
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:group/pl-prod-iam-010-to-admin-group"
      description: >
        This IAM group is the vehicle for privilege escalation. The starting user is
        already a member of this group. By attaching the AdministratorAccess managed
        policy to it, the user gains administrator access through their existing
        group membership — no direct user policy changes are required.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/iam-010-to-admin"

  edges:
    - from: starting-user
      to: target-group
      label: "iam:AttachGroupPolicy"
      description: >
        Attach the AdministratorAccess managed policy to the group that the starting
        user is already a member of. This immediately grants admin permissions to all
        members of the group, including the attacker.
      hints:
        - "You can modify the policies attached to groups you belong to."
        - "Look for groups your user is a member of and consider what policies could be attached."
        - "Attaching AdministratorAccess to your own group grants you admin access via group membership."
        - "Browse to https://pathfinding.cloud/paths/iam-010 for technique details."
      commands:
        - description: "Attach AdministratorAccess to the group"
          command: "aws iam attach-group-policy --group-name pl-prod-iam-010-to-admin-group --policy-arn arn:aws:iam::aws:policy/AdministratorAccess"
    - from: target-group
      to: starting-user
      label: "group membership"
      description: >
        The starting user is already a member of the group. Once AdministratorAccess
        is attached, all group members — including the attacker — inherit those
        permissions automatically.
      hints:
        - "Group policy attachments propagate immediately to all group members -- no further action needed."
        - "Wait a few seconds for IAM to propagate the policy, then test your new permissions."
        - "Try an action that requires admin access to confirm the escalation worked, such as listing IAM users."
      commands:
        - description: "Verify administrator access via group membership"
          command: "aws iam list-users"
    - from: target-group
      to: ctf-flag
      label: "Read CTF flag"
      description: >
        With administrator access now granted via group membership, use the starting
        user credentials to read the CTF flag from SSM Parameter Store. This proves
        end-to-end exploitation of the privilege escalation path.
      hints:
        - "The flag is stored in SSM Parameter Store under /pathfinding-labs/flags/."
        - "Your new admin permissions include ssm:GetParameter — use it."
        - "The parameter name follows the pattern /pathfinding-labs/flags/{scenario-id}-to-admin."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/iam-010-to-admin --query 'Parameter.Value' --output text"
