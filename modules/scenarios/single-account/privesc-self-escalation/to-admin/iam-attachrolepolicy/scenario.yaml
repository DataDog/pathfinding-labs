# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.0.0"
name: "iam-attachrolepolicy"
description: "Role with iam:AttachRolePolicy on itself can attach managed admin policy to escalate privileges"
cost_estimate: "free"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "self-escalation"
path_type: "self-escalation"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-arp-to-admin-starting-user"
    - "arn:aws:iam::{account_id}:role/pl-prod-arp-to-admin-starting-role"

  summary: "starting_user → (AssumeRole) → starting_role → (iam:AttachRolePolicy on self) → attach AdministratorAccess → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - permission: "iam:AttachRolePolicy"
      resource: "arn:aws:iam::*:role/pl-prod-arp-to-admin-starting-role"

  helpful:
    - permission: "iam:ListAttachedRolePolicies"
      purpose: "List managed policies attached to the role"

    - permission: "iam:ListPolicies"
      purpose: "Discover available managed policies to attach"

# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0003 - Persistence"
  techniques:
    - "T1098 - Account Manipulation"
    - "T1098.001 - Additional Cloud Credentials"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_self_escalation_to_admin_iam_attachrolepolicy"
  module_path: "modules/scenarios/single-account/privesc-self-escalation/to-admin/iam-attachrolepolicy"
