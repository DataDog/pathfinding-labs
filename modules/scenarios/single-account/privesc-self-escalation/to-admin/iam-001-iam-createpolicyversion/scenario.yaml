# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "iam-createpolicyversion"
description: "Role with iam:CreatePolicyVersion can create a new version of its attached managed policy with admin permissions"
cost_estimate: "$0/mo"
pathfinding-cloud-id: "iam-001"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "self-escalation"
path_type: "self-escalation"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-iam-001-to-admin-starting-user"
    - "arn:aws:iam::{account_id}:role/pl-prod-iam-001-to-admin-starting-role"

  summary: "starting_user → (AssumeRole) → starting_role → (iam:CreatePolicyVersion) → new policy version with admin → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - permission: "iam:CreatePolicyVersion"
      resource: "arn:aws:iam::*:policy/*"

  helpful:
    - permission: "iam:ListPolicyVersions"
      purpose: "List existing policy versions"

    - permission: "iam:GetPolicyVersion"
      purpose: "View content of policy versions"

# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0003 - Persistence"
  techniques:
    - "T1098 - Account Manipulation"
    - "T1098.001 - Additional Cloud Credentials"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_self_escalation_to_admin_iam_001_iam_createpolicyversion"
  module_path: "modules/scenarios/single-account/privesc-self-escalation/to-admin/iam-001-iam-createpolicyversion"
