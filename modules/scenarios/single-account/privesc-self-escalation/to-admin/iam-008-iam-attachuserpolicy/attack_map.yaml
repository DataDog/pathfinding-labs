attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-008-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:AttachUserPolicy permission on all resources, meaning it
        can attach any managed policy — including AdministratorAccess — to itself.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/iam-008-to-admin"

  edges:
    - from: starting-principal
      to: starting-principal
      label: "iam:AttachUserPolicy"
      grantsAdmin: true
      description: >
        Attach the AdministratorAccess managed policy to the starting user, immediately
        granting full administrative access to the AWS account.
      hints:
        - "Start by confirming your current identity and checking what permissions your user actually has. What policies are attached to you right now?"
        - "Use iam:ListAttachedUserPolicies on your own username to see which managed policies are currently attached."
        - "You have the ability to attach managed policies to an IAM user. Can you attach policies to yourself, or only to others?"
        - "AWS ships a managed policy called AdministratorAccess. Think about what attaching that policy to yourself would mean."
        - "Use iam:ListPolicies to enumerate available managed policies — look for ones that grant broad access."
        - "Browse to https://pathfinding.cloud/paths/iam-008 for full technique details and context."
        - "The single API call that completes this escalation targets your own username and the ARN of an AWS-managed policy."
      commands:
        - description: "Check which managed policies are currently attached to your user"
          command: "aws iam list-attached-user-policies --user-name pl-prod-iam-008-to-admin-starting-user"
        - description: "Attach AdministratorAccess managed policy to self"
          command: "aws iam attach-user-policy --user-name pl-prod-iam-008-to-admin-starting-user --policy-arn arn:aws:iam::aws:policy/AdministratorAccess"
        - description: "Verify administrator access by listing IAM users"
          command: "aws iam list-users"

    - from: starting-principal
      to: ctf-flag
      label: "Read CTF flag"
      description: >
        With AdministratorAccess now attached to the starting user, read the CTF flag from
        AWS Systems Manager Parameter Store to prove end-to-end account compromise.
      hints:
        - "You now have full administrator access. The flag lives in AWS Systems Manager Parameter Store under a predictable path."
        - "All to-admin scenarios store their flag at /pathfinding-labs/flags/{scenario-id}-to-admin. What is the scenario ID here?"
        - "Use aws ssm get-parameter with --query 'Parameter.Value' --output text to read the flag value directly."
      commands:
        - description: "Read the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/iam-008-to-admin --query 'Parameter.Value' --output text"
