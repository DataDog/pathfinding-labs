# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "iam-attachuserpolicy"
description: "User with iam:AttachUserPolicy on itself can attach managed admin policy to escalate privileges"
cost_estimate: "$0/mo"
pathfinding-cloud-id: "iam-008"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "self-escalation"
path_type: "self-escalation"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-iam-008-to-admin-starting-user"

  summary: "starting_user → (iam:AttachUserPolicy on self) → attach AdministratorAccess → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - permission: "iam:AttachUserPolicy"
      resource: "*"

  helpful:
    - permission: "iam:ListAttachedUserPolicies"
      purpose: "List managed policies attached to user"

    - permission: "iam:ListPolicies"
      purpose: "Discover available managed policies to attach"

# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0003 - Persistence"
  techniques:
    - "T1098 - Account Manipulation"
    - "T1098.001 - Additional Cloud Credentials"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_self_escalation_to_admin_iam_008_iam_attachuserpolicy"
  module_path: "modules/scenarios/single-account/privesc-self-escalation/to-admin/iam-008-iam-attachuserpolicy"
