attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-009-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has permission to assume the starting role, which in turn has
        iam:AttachRolePolicy scoped to itself — enabling self-escalation to administrator.

    - id: starting-role
      label: "Starting Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-iam-009-to-admin-starting-role"
      description: >
        This IAM role has iam:AttachRolePolicy permission scoped to itself. An attacker
        operating as this role can attach the AWS-managed AdministratorAccess policy
        directly to the role, immediately granting full administrative access. After
        self-escalation, admin-equivalent permissions are used to read the scenario's
        CTF flag from SSM Parameter Store.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/iam-009-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess). Your goal is to read this parameter
        using the admin access gained from the self-escalation step.

  edges:
    - from: starting-user
      to: starting-role
      label: "sts:AssumeRole"
      description: >
        The starting user assumes the starting role to obtain credentials with
        the iam:AttachRolePolicy permission needed for self-escalation.
      hints:
        - "Start by understanding what this user is allowed to do. Enumerate the policies attached to the starting user."
        - "Look for an sts:AssumeRole permission in the user's policies — it points to the next principal in the path."
        - "Use iam:ListAttachedUserPolicies and iam:ListUserPolicies to find what this user has access to."
        - "Once you identify the role ARN, inspect that role's policies before assuming it to understand what you'll be able to do."
        - "Use aws sts assume-role with a session name of your choosing to obtain temporary credentials for the target role."
      commands:
        - description: "Assume the starting role"
          command: "aws sts assume-role --role-arn arn:aws:iam::{account_id}:role/pl-prod-iam-009-to-admin-starting-role --role-session-name escalation-session"

    - from: starting-role
      to: starting-role
      label: "iam:AttachRolePolicy"
      description: >
        The role uses iam:AttachRolePolicy to attach the AWS-managed AdministratorAccess
        policy to itself, immediately granting full administrator privileges.
      hints:
        - "Now that you are operating as the role, enumerate its attached and inline policies to understand what permissions it holds."
        - "Look for iam:AttachRolePolicy in the role's policies and check which resource ARN it is scoped to."
        - "Use iam:ListPolicies to discover what AWS-managed policies are available — look for one that grants broad administrative access."
        - "A role with iam:AttachRolePolicy scoped to its own ARN can grant itself any managed policy, including AdministratorAccess."
        - "After attaching the policy, wait a few seconds for IAM propagation before verifying that your permissions have changed."
        - "Browse to https://pathfinding.cloud/paths/iam-009 for full technique details and detection guidance."
      commands:
        - description: "Attach AdministratorAccess to the starting role"
          command: "aws iam attach-role-policy --role-name pl-prod-iam-009-to-admin-starting-role --policy-arn arn:aws:iam::aws:policy/AdministratorAccess"
        - description: "Verify administrator access"
          command: "aws iam list-users"

    - from: starting-role
      to: ctf-flag
      label: "Read CTF flag"
      description: >
        With AdministratorAccess now attached to the starting role, retrieve the scenario
        flag from SSM Parameter Store. AdministratorAccess grants ssm:GetParameter on all
        parameters in the account, so no additional permissions are needed beyond the admin
        access just gained through self-escalation.
      hints:
        - "You now hold admin-equivalent credentials. The scenario flag is stored in an AWS service commonly used to hold configuration values and small secrets."
        - "Scenario flags live under a shared prefix in SSM Parameter Store — consider what a reasonable naming convention for this lab might look like."
        - "Use ssm:GetParameter with the full parameter name to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/iam-009-to-admin --query 'Parameter.Value' --output text"
