attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-013-to-admin-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:AddUserToGroup permission, allowing them to add themselves
        to any IAM group — including the admin group with AdministratorAccess.

    - id: admin-group
      label: "Admin Group"
      type: resource
      subType: iam-group
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:group/pl-prod-iam-013-to-admin-group"
      description: >
        This IAM group has the AdministratorAccess managed policy attached. Any user
        who is a member of this group inherits full administrative access to the AWS account.
        By adding yourself to this group, you inherit the AdministratorAccess managed
        policy, giving you full administrative access to the AWS account.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/iam-013-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess inherited through group membership).
        Your goal is to read this parameter using the admin access gained from the previous step.

  edges:
    - from: starting-principal
      to: admin-group
      label: "iam:AddUserToGroup"
      description: >
        Add the starting user to the admin group. Group membership is effective
        immediately, granting the user all permissions attached to the group.
      hints:
        - "Start by listing the IAM groups that exist in this account — your helpful permissions include iam:ListGroups."
        - "Once you have a list of groups, check which policies are attached to each one using iam:ListAttachedGroupPolicies."
        - "Look for groups with administrative policies like AdministratorAccess — group membership grants all policies attached to the group."
        - "Now that you know which group grants admin access, think about how you might get yourself added to it."
        - "Your required permission is iam:AddUserToGroup — it works on any group because the resource is scoped to '*'."
        - "Browse to https://pathfinding.cloud/paths/iam-013 for technique details."
      commands:
        - description: "Add the starting user to the admin group"
          command: "aws iam add-user-to-group --user-name pl-prod-iam-013-to-admin-user --group-name pl-prod-iam-013-to-admin-group"
        - description: "Verify group membership"
          command: "aws iam get-group --group-name pl-prod-iam-013-to-admin-group"
        - description: "Verify administrator access"
          command: "aws iam list-users"

    - from: admin-group
      to: ctf-flag
      label: "Read CTF flag"
      description: >
        With administrator-equivalent permissions inherited through group membership,
        retrieve the scenario flag from SSM Parameter Store. AdministratorAccess grants
        ssm:GetParameter on all parameters in the account, so no additional permissions
        are needed beyond the admin access gained in the previous step.
      hints:
        - "You now hold admin-equivalent credentials via group membership. The scenario flag is stored in an AWS service commonly used to hold configuration values and small secrets."
        - "Scenario flags live under a shared prefix in SSM Parameter Store — consider what a reasonable naming convention for this lab might look like."
        - "Use ssm:GetParameter with the full parameter name to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/iam-013-to-admin --query 'Parameter.Value' --output text"
