# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "iam-013-iam-addusertogroup"
description: "User with iam:AddUserToGroup can add themselves to a group with admin permissions"
cost_estimate: "free"
pathfinding-cloud-id: "iam-013"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "self-escalation"
path_type: "self-escalation"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-iam-013-to-admin-user"
    - "arn:aws:iam::{account_id}:group/pl-prod-iam-013-to-admin-group"

  summary: "starting_user → (iam:AddUserToGroup) → add self to admin group → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - permission: "iam:AddUserToGroup"
      resource: "*"

  helpful:
    - permission: "iam:ListGroups"
      purpose: "Discover groups to target"

    - permission: "iam:GetGroup"
      purpose: "View group members and attached policies"

    - permission: "iam:ListAttachedGroupPolicies"
      purpose: "Identify groups with admin permissions"

# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0003 - Persistence"
  techniques:
    - "T1098 - Account Manipulation"
    - "T1098.001 - Additional Cloud Credentials"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_self_escalation_to_admin_iam_013_iam_addusertogroup"
  module_path: "modules/scenarios/single-account/privesc-self-escalation/to-admin/iam-013-iam-addusertogroup"
