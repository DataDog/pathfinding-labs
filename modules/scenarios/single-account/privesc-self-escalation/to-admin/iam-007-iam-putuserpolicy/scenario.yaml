# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "iam-putuserpolicy"
description: "User with iam:PutUserPolicy on itself can add inline admin policy to escalate privileges"
cost_estimate: "free"
pathfinding-cloud-id: "iam-007"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "self-escalation"
path_type: "self-escalation"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-iam-007-to-admin-starting-user"

  summary: "starting_user → (iam:PutUserPolicy on self) → inline admin policy → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - permission: "iam:PutUserPolicy"
      resource: "*"

  helpful:
    - permission: "iam:GetUser"
      purpose: "View user details and verify policy attachment"

    - permission: "iam:ListUserPolicies"
      purpose: "List existing inline policies on users"

# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0003 - Persistence"
  techniques:
    - "T1098 - Account Manipulation"
    - "T1098.001 - Additional Cloud Credentials"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_self_escalation_to_admin_iam_007_iam_putuserpolicy"
  module_path: "modules/scenarios/single-account/privesc-self-escalation/to-admin/iam-007-iam-putuserpolicy"
