attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      isTarget: true
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-011-to-admin-paul"
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:PutGroupPolicy permission scoped to the group they are
        a member of, enabling them to add an inline admin policy to their own group
        and escalate themselves to administrator access.

    - id: escalation-group
      label: "Escalation Group"
      type: resource
      subType: iam-group
      arn: "arn:aws:iam::{account_id}:group/pl-prod-iam-011-to-admin-escalation-group"
      description: >
        This IAM group contains pl-prod-iam-011-to-admin-paul as a member. By adding
        an inline admin policy to this group, any attached permissions are immediately
        inherited by all group members, including the attacker.

  edges:
    - from: starting-principal
      to: escalation-group
      label: "iam:PutGroupPolicy"
      description: >
        Add an inline policy granting AdministratorAccess to the group. Because the
        attacker is a member of this group, they immediately inherit the new permissions.
      hints:
        - "Start by confirming your identity and understanding what permissions this user has."
        - "Use iam:ListGroupsForUser or iam:GetGroup to discover which groups this user belongs to."
        - "Check the policy attached to this user -- look for any permissions that allow modifying group policies."
        - "You have the ability to write inline policies onto a group. Think about what group membership means for your own permissions."
        - "An inline policy written to a group applies immediately to all members of that group -- including you."
        - "Browse to https://pathfinding.cloud/paths/iam-011 for technique details."
      commands:
        - description: "Add an inline admin policy to the escalation group"
          command: >
            aws iam put-group-policy
            --group-name pl-prod-iam-011-to-admin-escalation-group
            --policy-name EscalatedAdminAccess
            --policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":"*","Resource":"*"}]}'
        - description: "Verify admin access by listing IAM users"
          command: "aws iam list-users --max-items 3 --output table"

    - from: escalation-group
      to: starting-principal
      label: "Group membership"
      description: >
        Group membership causes the new inline policy to be applied to the user,
        granting them administrator access to the account.
      hints:
        - "IAM group policies apply to all members of the group as soon as they are written."
        - "Wait a few seconds for IAM policy propagation, then test whether you now have elevated access."
        - "Try a privileged API call -- if it succeeds, the escalation is complete."
      commands: []
