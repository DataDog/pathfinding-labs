# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "iam-011-iam-putgrouppolicy"
description: "User in a group with iam:PutGroupPolicy can add inline admin policy to their group"
cost_estimate: "$0/mo"
pathfinding-cloud-id: "iam-011"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "self-escalation"
path_type: "self-escalation"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-iam-011-to-admin-paul"
    - "arn:aws:iam::{account_id}:group/pl-prod-iam-011-to-admin-escalation-group"

  summary: "starting_user → (iam:PutGroupPolicy) → add inline admin policy to own group → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - permission: "iam:PutGroupPolicy"
      resource: "*"

  helpful:
    - permission: "iam:ListGroups"
      purpose: "List groups the user belongs to"

    - permission: "iam:GetGroupPolicy"
      purpose: "View existing inline group policies"

    - permission: "iam:ListGroupPolicies"
      purpose: "List all inline policies on group"

# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0003 - Persistence"
  techniques:
    - "T1098 - Account Manipulation"
    - "T1098.001 - Additional Cloud Credentials"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_self_escalation_to_admin_iam_011_iam_putgrouppolicy"
  module_path: "modules/scenarios/single-account/privesc-self-escalation/to-admin/iam-011-iam-putgrouppolicy"
