# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
name: "iam-putrolepolicy"
title: "IAM Inline Role Policy Modification to Admin"
description: "Role with iam:PutRolePolicy on itself can add inline admin policy to escalate privileges"
cost_estimate: "$0/mo"
pathfinding-cloud-id: "iam-005"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "self-escalation"
path_type: "self-escalation"
target: "to-admin"
environments:
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{account_id}:user/pl-prod-iam-005-to-admin-starting-user"
    - "arn:aws:iam::{account_id}:role/pl-prod-iam-005-to-admin-starting-role"

  summary: "starting_user → (AssumeRole) → starting_role → (iam:PutRolePolicy on self) → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - principal: "pl-prod-iam-005-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "iam:PutRolePolicy"
          resource: "arn:aws:iam::*:role/pl-prod-iam-005-to-admin-starting-role"

  helpful:
    - principal: "pl-prod-iam-005-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "iam:GetRolePolicy"
          purpose: "View existing inline policies on the role"
        - permission: "iam:ListRolePolicies"
          purpose: "List all inline policies attached to the role"
# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0003 - Persistence"
  techniques:
    - "T1098 - Account Manipulation"
    - "T1098.001 - Additional Cloud Credentials"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_single_account_privesc_self_escalation_to_admin_iam_005_iam_putrolepolicy"
  module_path: "modules/scenarios/single-account/privesc-self-escalation/to-admin/iam-005-iam-putrolepolicy"
