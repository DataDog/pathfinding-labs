attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-iam-005-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has permission to assume the starting role, which in turn has
        iam:PutRolePolicy on itself — enabling self-escalation to administrator.

    - id: starting-role
      label: "Starting Role"
      type: principal
      subType: iam-role
      arn: "arn:aws:iam::{account_id}:role/pl-prod-iam-005-to-admin-starting-role"
      description: >
        This IAM role has iam:PutRolePolicy on itself. By adding an inline policy
        granting Action:* on Resource:*, the role escalates its own privileges to
        full administrator access within the AWS account. After escalation the role
        can read the scenario's CTF flag from SSM Parameter Store.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/iam-005-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (the inline policy
        granting Action:* on Resource:* provides ssm:GetParameter implicitly). Your goal
        is to read this parameter using the admin access gained in the previous step.

  edges:
    - from: starting-user
      to: starting-role
      label: "sts:AssumeRole"
      description: >
        Assume the starting role using the starting user's credentials.
      hints:
        - "Start by figuring out what this user is allowed to do -- look at the policies attached to the starting user."
        - "This user is allowed to assume at least one IAM role. Use iam:ListAttachedUserPolicies and iam:GetPolicy to inspect what the user's policy permits."
        - "Look for an sts:AssumeRole permission in the user's policy -- it should point you to a specific role ARN."
        - "Once you know the target role ARN, use sts:AssumeRole to obtain temporary credentials for that role."
        - "Set AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, and AWS_SESSION_TOKEN from the AssumeRole response before proceeding."
      commands:
        - description: "Assume the starting role"
          command: "aws sts assume-role --role-arn arn:aws:iam::{account_id}:role/pl-prod-iam-005-to-admin-starting-role --role-session-name escalation-session"

    - from: starting-role
      to: starting-role
      label: "iam:PutRolePolicy"
      grantsAdmin: true
      description: >
        Add an inline policy to the starting role itself, granting AdministratorAccess.
        Because the role has iam:PutRolePolicy on itself, this self-modification
        immediately elevates its permissions to administrator.
      hints:
        - "Now that you are operating as the role, inspect what permissions it has -- look at both managed and inline policies."
        - "Use iam:ListRolePolicies and iam:GetRolePolicy to see what inline policies are already attached to this role."
        - "Notice that the role has iam:PutRolePolicy scoped to its own ARN -- it can write new inline policies to itself."
        - "Craft a policy document that grants Action: '*' on Resource: '*' and use iam:PutRolePolicy to apply it to this role."
        - "IAM policy changes take a few seconds to propagate -- wait briefly before verifying that your new permissions are active."
        - "Browse to https://pathfinding.cloud/paths/iam-005 for technique details."
      commands:
        - description: "Add an inline administrator policy to the role"
          command: "aws iam put-role-policy --role-name pl-prod-iam-005-to-admin-starting-role --policy-name escalation-policy --policy-document '{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Action\":\"*\",\"Resource\":\"*\"}]}'"
        - description: "Verify administrator access"
          command: "aws iam list-users"

    - from: starting-role
      to: ctf-flag
      label: "Read CTF flag"
      description: >
        With the inline administrator policy now applied to the starting role, use the
        role's session credentials to read the scenario flag from SSM Parameter Store.
        The Action:* inline policy grants ssm:GetParameter implicitly, so no additional
        permissions are needed.
      hints:
        - "You now hold admin-equivalent credentials via the starting role session. The scenario flag is stored in AWS Systems Manager Parameter Store."
        - "Scenario flags live under a shared prefix — consider what a reasonable naming convention for this lab might look like."
        - "Use ssm:GetParameter with the full parameter name to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/iam-005-to-admin --query 'Parameter.Value' --output text"
