attackMap:
  nodes:
    - id: starting-principal
      label: "Demo User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-cspm-ec2-001-demo-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has ssm:StartSession permission on the pl-cspm-ec2-001-instance
        EC2 instance. It has no other meaningful AWS permissions -- it cannot list IAM
        users, read S3 buckets, or call any other privileged API.

    - id: ec2-instance
      label: "EC2 Instance"
      type: resource
      subType: ec2-instance
      arn: "arn:aws:ec2:{region}:{account_id}:instance/pl-cspm-ec2-001-instance"
      description: >
        This EC2 instance has an administrative IAM role attached via an instance profile.
        Any process running on the instance can retrieve temporary admin credentials from
        the Instance Metadata Service (IMDS) at 169.254.169.254 without authentication.
        The SSM agent is running, making it reachable via SSM Session Manager.

    - id: admin-role
      label: "Admin Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:role/pl-cspm-ec2-001-admin-role"
      description: >
        This IAM role has the AdministratorAccess AWS managed policy attached, granting
        unrestricted access to all AWS services and resources. By extracting the temporary
        credentials vended by the instance profile via IMDS, an attacker gains full
        administrative control of the AWS account. AdministratorAccess implicitly grants
        ssm:GetParameter on all parameters in the account, allowing the attacker to read
        the scenario CTF flag from SSM Parameter Store.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/cspm-ec2-001-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the victim account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess). Once you have extracted the temporary
        credentials from IMDS and exported them, use ssm:GetParameter to read this
        parameter and prove full account access.

  edges:
    - from: starting-principal
      to: ec2-instance
      label: "ssm:StartSession"
      description: >
        The demo user has ssm:StartSession permission on this EC2 instance. Starting
        an SSM session drops you into an interactive shell inside the instance as
        ssm-user, from which the IMDS is reachable at 169.254.169.254.
      hints:
        - "Your user has ssm:StartSession -- think about what access that grants you on the target instance."
        - "Use ssm:DescribeInstanceInformation to confirm the SSM agent is online before attempting a session."
        - "The aws ssm start-session command opens an interactive shell on the instance without needing SSH or open ports."
        - "Once you have a shell on the instance, you are no longer limited by your IAM user's permissions -- you can access anything the instance itself can access."
        - "Browse to https://pathfinding.cloud/paths/cspm-ec2-001 for technique details."
      commands:
        - description: "Confirm the SSM agent is online on the target instance"
          command: "aws ssm describe-instance-information --filters 'Key=InstanceIds,Values=<INSTANCE_ID>' --query 'InstanceInformationList[0].PingStatus' --output text"
        - description: "Start an interactive SSM session on the EC2 instance"
          command: "aws ssm start-session --region <REGION> --target <INSTANCE_ID>"

    - from: ec2-instance
      to: admin-role
      label: "IMDS credential extraction"
      description: >
        Any process on the EC2 instance can retrieve temporary credentials for the
        attached administrative role by querying the Instance Metadata Service. No
        additional permissions or authentication are required -- the IMDS endpoint
        is reachable from within the instance at the link-local address 169.254.169.254.
      hints:
        - "EC2 instances can have IAM roles attached via instance profiles. Those credentials are available inside the instance."
        - "The Instance Metadata Service (IMDS) at 169.254.169.254 exposes the attached role's temporary credentials to any process on the instance."
        - "Start by discovering which IAM role is attached -- query the IMDS security-credentials endpoint."
        - "Use IMDSv2 by first obtaining a session token with a PUT request, then including it in subsequent GET requests."
        - "Once you have the AccessKeyId, SecretAccessKey, and Token from IMDS, export them as environment variables and verify your identity with sts:GetCallerIdentity."
        - "Browse to https://pathfinding.cloud/paths/cspm-ec2-001 for technique details."
      commands:
        - description: "Obtain an IMDSv2 session token"
          command: "TOKEN=$(curl -X PUT \"http://169.254.169.254/latest/api/token\" -H \"X-aws-ec2-metadata-token-ttl-seconds: 21600\" 2>/dev/null)"
        - description: "Retrieve the name of the attached IAM role from IMDS"
          command: "ROLE_NAME=$(curl -H \"X-aws-ec2-metadata-token: $TOKEN\" http://169.254.169.254/latest/meta-data/iam/security-credentials/ 2>/dev/null)"
        - description: "Extract temporary admin credentials from IMDS"
          command: "curl -H \"X-aws-ec2-metadata-token: $TOKEN\" http://169.254.169.254/latest/meta-data/iam/security-credentials/$ROLE_NAME 2>/dev/null | jq ."
        - description: "Verify administrative access using extracted credentials"
          command: "AWS_ACCESS_KEY_ID=<AccessKeyId> AWS_SECRET_ACCESS_KEY=<SecretAccessKey> AWS_SESSION_TOKEN=<Token> aws iam list-users"

    - from: admin-role
      to: ctf-flag
      label: "ssm:GetParameter"
      description: >
        With temporary credentials for the administrative role extracted from IMDS, call
        ssm:GetParameter to read the scenario CTF flag from SSM Parameter Store.
        AdministratorAccess grants unrestricted access to all AWS services, so no
        additional permissions are required beyond the credentials already obtained.
      hints:
        - "You now hold temporary credentials for the admin role extracted from IMDS. Export them as AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, and AWS_SESSION_TOKEN."
        - "Verify your identity first with sts:GetCallerIdentity to confirm you are operating as the admin role."
        - "Scenario flags live under a shared prefix in SSM Parameter Store — the naming convention follows the scenario unique ID."
        - "Use ssm:GetParameter with the full parameter name to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store using the extracted admin credentials"
          command: "aws ssm get-parameter --region <REGION> --name /pathfinding-labs/flags/cspm-ec2-001-to-admin --query 'Parameter.Value' --output text"
