attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{operations_account_id}:user/pl-pathfinding-starting-user-operations"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user in the operations account has permission to assume
        pl-x-account-ops-role-with-assume-role-star, which itself carries an
        unrestricted sts:AssumeRole on * permission.

    - id: ops-role
      label: "Ops AssumeRole-Star Role"
      type: principal
      subType: iam-role
      arn: "arn:aws:iam::{operations_account_id}:role/pl-x-account-ops-role-with-assume-role-star"
      description: >
        This IAM role in the operations account has sts:AssumeRole on * — it can attempt
        to assume any role in any account. Once you hold credentials for this role,
        you can pivot into the production account by assuming any prod role whose trust
        policy allows the operations account or this role's ARN.

    - id: prod-target-role
      label: "Prod Target Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{prod_account_id}:role/pl-x-account-prod-target-role"
      description: >
        This IAM role in the production account trusts the operations account, allowing
        the ops role to assume it via sts:AssumeRole. It carries admin-level permissions,
        giving you full control of the production account.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{prod_account_id}:parameter/pathfinding-labs/flags/ops-to-prod-simple-role-assumption-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the production account.
        Retrieving it requires admin-equivalent permissions on the prod account (ssm:GetParameter
        is granted implicitly by AdministratorAccess or the admin-level policy on the assumed
        prod target role). Your goal is to read this parameter using the admin access gained
        from the previous step.

  edges:
    - from: starting-user
      to: ops-role
      label: "sts:AssumeRole"
      description: >
        The starting user assumes the operations role using sts:AssumeRole.
        The operations role's trust policy allows the starting user to assume it.
      hints:
        - "Assume the ops role with sts:AssumeRole and export the returned credentials as environment variables — this role holds sts:AssumeRole on * enabling cross-account pivots."
      commands:
        - description: "Confirm your starting identity"
          command: "aws sts get-caller-identity --profile pl-pathfinding-starting-user-operations"
        - description: "Assume the operations role"
          command: "aws sts assume-role --role-arn arn:aws:iam::{operations_account_id}:role/pl-x-account-ops-role-with-assume-role-star --role-session-name ops-session --profile pl-pathfinding-starting-user-operations"

    - from: ops-role
      to: prod-target-role
      label: "sts:AssumeRole (cross-account)"
      description: >
        Using the unrestricted sts:AssumeRole on * permission, the ops role assumes the
        privileged prod target role in the production account, completing the cross-account
        lateral movement and privilege escalation.
      hints:
        - "Use sts:AssumeRole with the prod target role ARN — the ops role's wildcard sts:AssumeRole on * permits cross-account assumption of any prod role whose trust policy allows the operations account."
        - "Browse to https://pathfinding.cloud/paths/sts-001 for technique details on cross-account role assumption."
      commands:
        - description: "Enumerate roles in the prod account to identify targets"
          command: "aws iam list-roles --query 'Roles[*].[RoleName,Arn]' --output table"
        - description: "Inspect the trust policy of a candidate prod role"
          command: "aws iam get-role --role-name pl-x-account-prod-target-role --query 'Role.AssumeRolePolicyDocument'"
        - description: "Assume the prod target role from the operations role credentials"
          command: "aws sts assume-role --role-arn arn:aws:iam::{prod_account_id}:role/pl-x-account-prod-target-role --role-session-name prod-session"
        - description: "Verify you are now operating in the production account"
          command: "aws sts get-caller-identity"

    - from: prod-target-role
      to: ctf-flag
      label: "Read CTF flag"
      description: >
        With admin-level credentials from the assumed prod target role, retrieve the
        scenario flag from SSM Parameter Store. The admin policy on the prod target role
        grants ssm:GetParameter on all parameters, so no additional permissions are needed
        beyond the access you just gained.
      hints:
        - "Use ssm:GetParameter with the full parameter name /pathfinding-labs/flags/ops-to-prod-simple-role-assumption-to-admin to retrieve the flag."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/ops-to-prod-simple-role-assumption-to-admin --query 'Parameter.Value' --output text"
