attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{operations_account_id}:user/pl-pathfinding-starting-user-operations"
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user in the operations account has permission to assume
        pl-x-account-ops-role-with-assume-role-star.

    - id: ops-role
      label: "Ops AssumeRole-Star Role"
      type: principal
      subType: iam-role
      arn: "arn:aws:iam::{operations_account_id}:role/pl-x-account-ops-role-with-assume-role-star"
      description: >
        This IAM role in the operations account has sts:AssumeRole on * — it can assume
        any role in any account that trusts it. Once you hold credentials for this role,
        you can pivot into the production account by assuming any prod role whose trust
        policy allows the operations account.

    - id: prod-target-role
      label: "Prod Target Role"
      type: principal
      subType: iam-role
      isTarget: true
      arn: "arn:aws:iam::{prod_account_id}:role/pl-x-account-prod-target-role"
      description: >
        This IAM role in the production account trusts the operations account, allowing
        the ops role to assume it via sts:AssumeRole. It carries admin-level permissions,
        giving you full control of the production account.

  edges:
    - from: starting-user
      to: ops-role
      label: "sts:AssumeRole"
      description: >
        The starting user assumes the operations role using sts:AssumeRole.
        The operations role trust policy allows the starting user to assume it.
      hints:
        - "You are in the operations account. What roles can you assume from here?"
        - "Look for roles with sts:AssumeRole permissions on *."
        - "Assume the ops role and then look for cross-account trust relationships."
      commands:
        - description: "Assume the operations role"
          command: "aws sts assume-role --role-arn arn:aws:iam::{operations_account_id}:role/pl-x-account-ops-role-with-assume-role-star --role-session-name ops-session"

    - from: ops-role
      to: prod-target-role
      label: "sts:AssumeRole (cross-account)"
      description: >
        Using the unrestricted sts:AssumeRole on * permission, the ops role assumes the
        privileged prod target role in the production account, completing the cross-account
        lateral movement and privilege escalation.
      hints:
        - "This role can assume roles across account boundaries."
        - "Enumerate roles in the prod account and check their trust policies."
        - "Look for prod roles that trust the operations account or this role's ARN."
      commands:
        - description: "Enumerate roles in the prod account to identify targets"
          command: "aws iam list-roles --query 'Roles[*].[RoleName,Arn]' --output table"
        - description: "Assume the prod target role from the operations account"
          command: "aws sts assume-role --role-arn arn:aws:iam::{prod_account_id}:role/pl-x-account-prod-target-role --role-session-name prod-session"
        - description: "Verify admin access in the prod account"
          command: "aws sts get-caller-identity"
