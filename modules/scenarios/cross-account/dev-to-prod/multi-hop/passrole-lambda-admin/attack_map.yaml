attackMap:
  nodes:
    - id: starting-user
      label: "Dev Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{dev_account_id}:user/pl-pathfinding-starting-user-dev"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user in the dev account has permission to assume the dev role
        `pl-lambda-prod-updater`, which bridges access toward the prod account.

    - id: dev-role
      label: "Dev Lambda Updater"
      type: principal
      subType: iam-role
      arn: "arn:aws:iam::{dev_account_id}:role/pl-lambda-prod-updater"
      description: >
        This dev account role is trusted by the starting user and holds permission
        to assume the prod account role `pl-lambda-updater` cross-account. It acts
        as a bridge between the dev and prod accounts.

    - id: prod-role
      label: "Prod Lambda Updater"
      type: principal
      subType: iam-role
      arn: "arn:aws:iam::{prod_account_id}:role/pl-lambda-updater"
      description: >
        This prod account role is trusted by the dev role cross-account. It holds
        `iam:PassRole` permission scoped to the `pl-Lambda-admin` role and Lambda
        creation/invocation permissions. This combination enables PassRole abuse
        to gain administrative privileges via a Lambda function.

    - id: lambda-function
      label: "Admin Lambda Function"
      type: resource
      subType: lambda-function
      arn: "arn:aws:lambda:{region}:{prod_account_id}:function/pl-passrole-demo"
      description: >
        A Lambda function created by the attacker using the prod role's `iam:PassRole`
        and `lambda:CreateFunction` permissions. The function is assigned the
        `pl-Lambda-admin` execution role, causing it to run with full administrative
        privileges when invoked.

    - id: target-role
      label: "Lambda Admin Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{prod_account_id}:role/pl-Lambda-admin"
      description: >
        This IAM role has AdministratorAccess and a trust policy permitting the Lambda
        service to assume it. By passing this role to a Lambda function you control,
        you gain the ability to execute any AWS API call with full administrative
        privileges in the prod account.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{prod_account_id}:parameter/pathfinding-labs/flags/passrole-lambda-admin-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the prod account.
        Retrieving it requires administrator-equivalent permissions (ssm:GetParameter is
        granted implicitly by AdministratorAccess). Your goal is to read this parameter
        using the admin access gained by invoking the Lambda function as the pl-Lambda-admin
        role.

  edges:
    - from: starting-user
      to: dev-role
      label: "sts:AssumeRole"
      description: >
        The starting dev user assumes the dev role pl-lambda-prod-updater using
        sts:AssumeRole, gaining its permissions and cross-account access.
      hints:
        - "Start by confirming your identity and enumerating what you can do as this dev account user."
        - "Use iam:ListRoles to look for roles in the dev account whose trust policy references this user or the dev account."
        - "Inspect the trust policy of any candidate role with iam:GetRole to confirm it trusts your current principal."
        - "Once you identify a role you can assume, use sts:AssumeRole and export the returned session credentials."
        - "After assuming the role, call sts:GetCallerIdentity to confirm you are now operating as the dev role."
      commands:
        - description: "Assume the dev lambda-prod-updater role"
          command: >
            aws sts assume-role
              --role-arn arn:aws:iam::{DEV_ACCOUNT}:role/pl-lambda-prod-updater
              --role-session-name hop1

    - from: dev-role
      to: prod-role
      label: "sts:AssumeRole (cross-account)"
      description: >
        The dev role assumes the prod account role pl-lambda-updater cross-account.
        The prod role's trust policy explicitly allows assumption by the dev role.
      hints:
        - "You are now operating as a dev account role. Look at what this role's policies allow -- specifically any cross-account permissions."
        - "Use iam:ListRoles or iam:GetRole to inspect roles this principal is permitted to assume across account boundaries."
        - "Look for a prod account role in the trust relationship of sts:AssumeRole grants -- the account ID in the ARN will differ from the dev account."
        - "Assume the prod role using sts:AssumeRole and export the new session credentials, replacing the dev role credentials."
        - "Confirm the cross-account hop succeeded by running sts:GetCallerIdentity and verifying the account ID matches the prod account."
      commands:
        - description: "Cross-account assume the prod lambda-updater role"
          command: >
            aws sts assume-role
              --role-arn arn:aws:iam::{PROD_ACCOUNT}:role/pl-lambda-updater
              --role-session-name hop2

    - from: prod-role
      to: lambda-function
      label: "iam:PassRole + lambda:CreateFunction"
      description: >
        The prod role creates a new Lambda function and passes the pl-Lambda-admin
        role as its execution role, exploiting iam:PassRole to attach an admin
        identity to attacker-controlled code.
      hints:
        - "You are now in the prod account. Review the policies attached to this role -- look for iam:PassRole grants and Lambda permissions."
        - "Use iam:ListRoles to find roles whose trust policy allows the Lambda service to assume them, and that this principal can pass."
        - "The combination of iam:PassRole + lambda:CreateFunction lets you create a Lambda function that runs as any role you can pass -- including admin roles."
        - "Write a minimal Lambda payload (e.g., a Python function that calls iam:ListUsers) and package it as a zip file before creating the function."
        - "When calling lambda:CreateFunction, supply the admin role ARN as the --role parameter to attach it as the function's execution role."
        - "After creating the function, wait a few seconds for it to become active before proceeding to invoke it."
      commands:
        - description: "Create a Lambda function with the admin execution role"
          command: >
            aws lambda create-function
              --function-name pl-passrole-demo
              --runtime python3.12
              --role arn:aws:iam::{PROD_ACCOUNT}:role/pl-Lambda-admin
              --handler lambda_payload.handler
              --zip-file fileb:///tmp/lambda_payload.zip
              --region us-east-1

    - from: lambda-function
      to: target-role
      label: "lambda:InvokeFunction"
      description: >
        Invoking the Lambda function causes it to execute as the pl-Lambda-admin
        role, confirming full administrative access to the prod account.
      hints:
        - "The Lambda function is now configured to run as the admin role. Invoke it to execute code with those privileges."
        - "Use lambda:InvokeFunction and capture the response -- have the function call a privileged API (like iam:ListUsers) to confirm admin access."
        - "Check the function response for evidence that the privileged API call succeeded; a non-empty user list confirms administrative access in the prod account."
      commands:
        - description: "Invoke the Lambda function to confirm admin access"
          command: >
            aws lambda invoke
              --function-name pl-passrole-demo
              --region us-east-1
              /tmp/lambda_response.json

    - from: target-role
      to: ctf-flag
      label: "ssm:GetParameter"
      description: >
        With the Lambda function confirmed to execute as pl-Lambda-admin, use the
        same admin credentials to read the CTF flag from SSM Parameter Store.
        AdministratorAccess grants ssm:GetParameter on all parameters in the account.
      hints:
        - "You now have access to admin-level AWS credentials via the Lambda execution role. The scenario flag is stored in SSM Parameter Store."
        - "Scenario flags live under the /pathfinding-labs/flags/ prefix -- consider what the parameter name for this scenario would be."
        - "Use ssm:GetParameter with the full parameter name to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/passrole-lambda-admin-to-admin --query 'Parameter.Value' --output text --region us-east-1"
