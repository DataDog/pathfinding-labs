# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.0.0"
name: "passrole-lambda-admin"
description: "Multi-hop cross-account privilege escalation using PassRole to create Lambda with admin role"
cost_estimate: "$0.20/month"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "privilege-chaining"
path_type: "cross-account"
target: "to-admin"
environments:
  - "dev"
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{dev_account_id}:user/pl-pathfinder-starting-user-dev"
    - "arn:aws:iam::{dev_account_id}:role/pl-lambda-prod-updater"
    - "arn:aws:iam::{prod_account_id}:role/pl-lambda-updater"
    - "arn:aws:iam::{prod_account_id}:role/pl-Lambda-admin"

  summary: "starting_user_dev → (AssumeRole) → dev_lambda_updater → (sts:AssumeRole cross-account) → prod_lambda_updater → (iam:PassRole + lambda:CreateFunction) → lambda_admin_role → admin access"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - permission: "iam:PassRole"
      resource: "arn:aws:iam::{prod_account_id}:role/pl-Lambda-admin"

    - permission: "lambda:CreateFunction"
      resource: "*"

    - permission: "lambda:InvokeFunction"
      resource: "*"

  helpful:
    - permission: "iam:ListRoles"
      purpose: "Discover roles that can be passed to Lambda"

    - permission: "lambda:ListFunctions"
      purpose: "View existing Lambda functions"

    - permission: "iam:GetRole"
      purpose: "View role permissions and trust policies"

# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0008 - Lateral Movement"
  techniques:
    - "T1078.004 - Valid Accounts: Cloud Accounts"
    - "T1648 - Serverless Execution"
    - "T1098 - Account Manipulation"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_cross_account_dev_to_prod_multi_hop_passrole_lambda_admin"
  module_path: "modules/scenarios/cross-account/dev-to-prod/multi-hop/passrole-lambda-admin"
