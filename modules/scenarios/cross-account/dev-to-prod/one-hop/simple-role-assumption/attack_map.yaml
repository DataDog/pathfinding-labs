attackMap:
  nodes:
    - id: starting-principal
      label: "Dev Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{dev_account_id}:user/pl-dev-xsare-to-admin-starting-user"
      description: >
        You have gained access to this principal's AWS IAM credentials. These could have been
        obtained through many real-world vectors: phishing a developer and gaining access to
        their workstation, compromising a browser session, exploiting a vulnerable workload
        running in this AWS account, discovering credentials in a public S3 bucket, or finding
        them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user in the dev account has sts:AssumeRole permission on an administrative
        role in the production account, allowing direct cross-account privilege escalation.

    - id: target-role
      label: "Prod Admin Role"
      type: principal
      subType: iam-role
      isTarget: true
      arn: "arn:aws:iam::{prod_account_id}:role/pl-prod-xsare-to-admin-target-role"
      description: >
        This IAM role in the production account has AdministratorAccess. Its trust policy
        explicitly trusts the dev account starting user, allowing direct cross-account role
        assumption. By assuming this role you gain full administrative access to the
        production AWS account.

  edges:
    - from: starting-principal
      to: target-role
      label: "sts:AssumeRole"
      description: >
        Assume the production admin role from the dev account, crossing the account boundary
        and gaining full administrative access in the production environment.
      hints:
        - "You have credentials for a user in the dev account. Before attacking, understand what this user is allowed to do -- look at its attached policies."
        - "Use sts:GetCallerIdentity to confirm your current identity and which account you're operating in."
        - "Inspect the IAM policies attached to this user -- look for sts:AssumeRole permissions and note what resource ARNs they target."
        - "The resource ARN in the sts:AssumeRole policy will tell you the exact account and role name you can assume in the prod account."
        - "Try assuming the role directly with aws sts assume-role and export the returned temporary credentials to switch your identity."
        - "After assuming the role, use sts:GetCallerIdentity again to confirm you are now operating in the prod account as the target role."
      commands:
        - description: "Assume the prod admin role from the dev account"
          command: "aws sts assume-role --role-arn arn:aws:iam::{prod_account_id}:role/pl-prod-xsare-to-admin-target-role --role-session-name xsare-attack-session"
        - description: "Verify administrative access in the prod account"
          command: "aws iam list-users --max-items 1"
