attackMap:
  nodes:
  - id: starting-principal
    label: Dev Starting User
    type: principal
    subType: iam-user
    arn: arn:aws:iam::{dev_account_id}:user/pl-dev-xsare-to-admin-starting-user
    access:
      type: assumed-breach-credentials
    description: 'You have gained access to this principal''s AWS IAM credentials. These could have been obtained through
      many real-world vectors: phishing a developer and gaining access to their workstation, compromising a browser session,
      exploiting a vulnerable workload running in this AWS account, discovering credentials in a public S3 bucket, or finding
      them hardcoded in source code or a CI/CD pipeline.

      Regardless of how you obtained them, you are now operating as this principal. This IAM user in the dev account has sts:AssumeRole
      permission on an administrative role in the production account, allowing direct cross-account privilege escalation.

      '
  - id: target-role
    label: Prod Admin Role
    type: principal
    subType: iam-role
    isAdmin: true
    arn: arn:aws:iam::{prod_account_id}:role/pl-prod-xsare-to-admin-target-role
    description: 'This IAM role in the production account has AdministratorAccess. Its trust policy explicitly trusts the
      dev account starting user, allowing direct cross-account role assumption. By assuming this role you gain full administrative
      access to the production AWS account.

      '
  - id: ctf-flag
    label: CTF Flag
    type: resource
    subType: ssm-parameter
    isTarget: true
    arn: arn:aws:ssm:{prod_region}:{prod_account_id}:parameter/pathfinding-labs/flags/dev-to-prod-simple-role-assumption-to-admin
    description: 'The CTF flag is stored in AWS Systems Manager Parameter Store in the production account. Reading it requires
      the ssm:GetParameter permission, which is available to the prod admin role via AdministratorAccess. Successfully reading
      this parameter proves you have achieved administrative access in the production account.

      '
  edges:
  - from: starting-principal
    to: target-role
    label: sts:AssumeRole
    description: 'Assume the production admin role from the dev account, crossing the account boundary and gaining full administrative
      access in the production environment.

      '
    hints:
    - Assume the prod admin role directly with sts:AssumeRole using the prod account ID and target role name, then export
      all three returned credentials.
    commands:
    - description: Assume the prod admin role from the dev account
      command: aws sts assume-role --role-arn arn:aws:iam::{prod_account_id}:role/pl-prod-xsare-to-admin-target-role --role-session-name
        xsare-attack-session
    - description: Verify administrative access in the prod account
      command: aws iam list-users --max-items 1
  - from: target-role
    to: ctf-flag
    label: ssm:GetParameter
    description: 'Read the CTF flag from SSM Parameter Store using the prod admin role''s credentials. The AdministratorAccess
      policy attached to the target role grants ssm:GetParameter on all resources, making this the final step to capture the
      flag.

      '
    commands:
    - description: Read the CTF flag from SSM Parameter Store (run with prod admin role credentials active)
      command: aws ssm get-parameter --name /pathfinding-labs/flags/dev-to-prod-simple-role-assumption-to-admin --query 'Parameter.Value'
        --output text
    hints:
    - Use ssm:GetParameter with the flag parameter name shown in the target node ARN to retrieve the CTF flag value.
