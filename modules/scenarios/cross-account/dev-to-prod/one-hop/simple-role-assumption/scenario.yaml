# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.1.0"
name: "dev-to-prod-simple-role-assumption"
title: "Dev to Prod via Direct Role Assumption to Admin"
description: "User in dev account with sts:AssumeRole permission can assume an admin role in prod account that explicitly trusts the dev user"
cost_estimate: "$0/mo"
cost_estimate_when_demo_executed: "$0/mo"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "Privilege Escalation"
sub_category: "principal-access"
path_type: "cross-account"
target: "to-admin"
environments:
  - "dev"
  - "prod"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "arn:aws:iam::{dev_account_id}:user/pl-dev-xsare-to-admin-starting-user"
    - "arn:aws:iam::{prod_account_id}:role/pl-prod-xsare-to-admin-target-role"

  summary: "dev:starting_user → (AssumeRole) → prod:target_role → admin access in prod"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - principal: "pl-dev-xsare-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "sts:AssumeRole"
          resource: "arn:aws:iam::{prod_account_id}:role/pl-prod-xsare-to-admin-target-role"

  helpful:
    - principal: "pl-dev-xsare-to-admin-starting-user"
      principal_type: "user"
      permissions:
        - permission: "sts:GetCallerIdentity"
          purpose: "Verify current identity before and after role assumption"
        - permission: "iam:ListRoles"
          purpose: "Discover assumable roles in the target account"
# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0004 - Privilege Escalation"
    - "TA0008 - Lateral Movement"
  techniques:
    - "T1078.004 - Valid Accounts: Cloud Accounts"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_cross_account_dev_to_prod_one_hop_simple_role_assumption"
  module_path: "modules/scenarios/cross-account/dev-to-prod/one-hop/simple-role-assumption"
