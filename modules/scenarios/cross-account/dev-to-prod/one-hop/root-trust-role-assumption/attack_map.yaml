attackMap:
  nodes:
    - id: starting-principal
      label: "Dev Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{dev_account_id}:user/pl-dev-xsarrt-to-admin-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user exists in the dev account and has sts:AssumeRole permission. The
        target production admin role trusts the entire dev account via a :root principal
        in its trust policy, meaning any dev principal with sts:AssumeRole can assume it.

    - id: target-role
      label: "Prod Admin Role"
      type: principal
      subType: iam-role
      isAdmin: true
      arn: "arn:aws:iam::{prod_account_id}:role/pl-prod-xsarrt-to-admin-target-role"
      description: >
        This IAM role in the production account has AdministratorAccess. Its trust policy
        uses arn:aws:iam::{dev_account_id}:root, which grants any principal in the dev
        account the ability to assume this role — as long as that principal has
        sts:AssumeRole permission. By assuming this role, you gain full administrative
        access to the production AWS account — including the ability to read the scenario
        CTF flag from SSM Parameter Store.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{prod_account_id}:parameter/pathfinding-labs/flags/root-trust-role-assumption-to-admin"
      description: >
        The CTF flag for this scenario, stored as an SSM parameter in the prod account.
        Retrieving it requires ssm:GetParameter, which AdministratorAccess grants
        implicitly. Your goal is to read this parameter using the admin access gained
        from assuming the prod admin role.

  edges:
    - from: starting-principal
      to: target-role
      label: "sts:AssumeRole"
      description: >
        The starting user assumes the production admin role using sts:AssumeRole. The
        role's trust policy trusts arn:aws:iam::{dev_account_id}:root, so any dev
        account principal with AssumeRole permission can perform this action.
      hints:
        - "Call sts:AssumeRole with the prod admin role ARN — the target's trust policy uses arn:aws:iam::{dev_account_id}:root, which permits any dev principal with AssumeRole permission, not just the root user."
        - "Export all three returned credential values (AccessKeyId, SecretAccessKey, SessionToken) before making prod API calls."
        - "Browse to https://pathfinding.cloud/paths/sts-001 for technique background on cross-account role assumption."
      commands:
        - description: "Verify your current identity in the dev account"
          command: "aws sts get-caller-identity"
        - description: "Assume the production admin role from the dev account"
          command: "aws sts assume-role --role-arn arn:aws:iam::{prod_account_id}:role/pl-prod-xsarrt-to-admin-target-role --role-session-name cross-account-escalation --query 'Credentials' --output json"
        - description: "Verify you are now operating as the prod admin role"
          command: "aws sts get-caller-identity"
        - description: "Verify administrative access in the production account"
          command: "aws iam list-users --max-items 3"

    - from: target-role
      to: ctf-flag
      label: "Read CTF flag"
      description: >
        With the prod admin role's temporary credentials active, retrieve the scenario
        flag from SSM Parameter Store. AdministratorAccess grants ssm:GetParameter on
        all parameters in the account, so no additional permissions are needed beyond
        the admin session already obtained.
      hints:
        - "Use ssm:GetParameter with the full parameter name /pathfinding-labs/flags/root-trust-role-assumption-to-admin to retrieve the flag."
      commands:
        - description: "Retrieve the CTF flag from SSM Parameter Store using the assumed admin role credentials"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/root-trust-role-assumption-to-admin --query 'Parameter.Value' --output text"
