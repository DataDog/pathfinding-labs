attackMap:
  nodes:
    - id: starting-principal
      label: "Dev Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{dev_account_id}:user/pl-dev-xsarrt-to-admin-starting-user"
      description: >
        You have gained access to this principal's AWS IAM credentials. These could
        have been obtained through many real-world vectors: phishing a developer and
        gaining access to their workstation, compromising a browser session, exploiting
        a vulnerable workload running in this AWS account, discovering credentials in
        a public S3 bucket, or finding them hardcoded in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.
        This IAM user exists in the dev account and has sts:AssumeRole permission. The
        target production admin role trusts the entire dev account via an :root principal
        in its trust policy, meaning any dev principal with sts:AssumeRole can assume it.
    - id: target-role
      label: "Prod Admin Role"
      type: principal
      subType: iam-role
      isTarget: true
      arn: "arn:aws:iam::{prod_account_id}:role/pl-prod-xsarrt-to-admin-target-role"
      description: >
        This IAM role in the production account has AdministratorAccess. Its trust policy
        uses arn:aws:iam::{dev_account_id}:root, which grants any principal in the dev
        account the ability to assume this role — as long as that principal has
        sts:AssumeRole permission. By assuming this role, you gain full administrative
        access to the production AWS account.

  edges:
    - from: starting-principal
      to: target-role
      label: "sts:AssumeRole"
      description: >
        The starting user assumes the production admin role using sts:AssumeRole. The
        role's trust policy trusts arn:aws:iam::{dev_account_id}:root, so any dev
        account principal with AssumeRole permission can perform this action.
      hints:
        - "You have credentials in the dev account. What can you reach in other accounts?"
        - "Look for cross-account role trust relationships — especially ones that trust an entire account rather than a specific principal."
        - "Check if any production roles have a trust policy using arn:aws:iam::{prod_account_id}:root or arn:aws:iam::{dev_account_id}:root."
      commands:
        - description: "Assume the production admin role from the dev account"
          command: "aws sts assume-role --role-arn arn:aws:iam::{prod_account_id}:role/pl-prod-xsarrt-to-admin-target-role --role-session-name cross-account-escalation"
        - description: "Verify administrative access in the production account"
          command: "aws iam list-users"
