# =============================================================================
# CORE METADATA
# =============================================================================
schema_version: "1.2.0"
status: "beta"
name: "ai-chatbot-lambda-pivot"
pathfinding-cloud-id: "ctf-002"
title: "AcmeBot: The Backend"
description: "Acme Corp's AI assistant fronts a suite of internal Lambda services. Chain your way from the public chatbot to administrative access and retrieve the flag."
cost_estimate: "$1/mo"
cost_estimate_when_demo_executed: "$1/mo"

# =============================================================================
# CLASSIFICATION
# =============================================================================
category: "CTF"
path_type: "ctf"
target: "to-admin"
environments:
  - "prod"

# CTF-specific metadata
ctf:
  difficulty: "intermediate"
  flag_location: "SSM Parameter Store at /pathfinding-labs/flags/ctf-002-to-admin (requires admin credentials)"
  variant: "ctf-002"

# =============================================================================
# ATTACK PATH
# =============================================================================
attack_path:
  principals:
    - "https://{function_url_id}.lambda-url.{region}.on.aws/ (public chatbot)"
    - "arn:aws:lambda:{region}:{account_id}:function/pl-prod-ctf-002-acmebot"
    - "arn:aws:iam::{account_id}:role/pl-prod-ctf-002-chatbot-role"
    - "arn:aws:lambda:{region}:{account_id}:function/pl-prod-ctf-002-acme-data-processor"
    - "arn:aws:iam::{account_id}:role/pl-prod-ctf-002-target-role"

  summary: "Browser → AcmeBot chatbot (public URL) → prompt injection → shell exec → chatbot role creds (limited Lambda perms) → ListFunctions → discover admin-role Lambda → UpdateFunctionCode → InvokeFunction → target role creds (AdminAccess) → SSM GetParameter → flag"

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  required:
    - principal: "anonymous (public URL)"
      principal_type: "public"
      permissions:
        - permission: "lambda:InvokeFunctionUrl"
          resource: "arn:aws:lambda:*:*:function/pl-prod-ctf-002-acmebot"
    - principal: "pl-prod-ctf-002-chatbot-role"
      principal_type: "role"
      permissions:
        - permission: "lambda:ListFunctions"
          resource: "*"
        - permission: "lambda:UpdateFunctionCode"
          resource: "arn:aws:lambda:*:*:function/pl-prod-ctf-002-acme-data-processor"
        - permission: "lambda:InvokeFunction"
          resource: "arn:aws:lambda:*:*:function/pl-prod-ctf-002-acme-data-processor"

  helpful:
    - principal: "pl-prod-ctf-002-chatbot-role"
      principal_type: "role"
      permissions:
        - permission: "lambda:GetFunction"
          purpose: "View target Lambda details including execution role ARN"
        - permission: "iam:GetRole"
          purpose: "Inspect target role permissions before pivoting"

# =============================================================================
# MITRE ATT&CK
# =============================================================================
mitre_attack:
  tactics:
    - "TA0001 - Initial Access"
    - "TA0006 - Credential Access"
    - "TA0004 - Privilege Escalation"
  techniques:
    - "T1190 - Exploit Public-Facing Application"
    - "T1552.005 - Unsecured Credentials: Cloud Instance Metadata API"
    - "T1525 - Implant Internal Image"
    - "T1059 - Command and Scripting Interpreter"

# =============================================================================
# TERRAFORM
# =============================================================================
terraform:
  variable_name: "enable_ctf_ai_chatbot_lambda_pivot"
  module_path: "modules/scenarios/ctf/ai-chatbot-lambda-pivot"
