# GoReleaser configuration for plabs CLI
# Documentation: https://goreleaser.com

version: 2

project_name: plabs

before:
  hooks:
    - go mod tidy

builds:
  - id: plabs
    main: ./cmd/plabs
    binary: plabs
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/DataDog/pathfinding-labs/internal/cmd.version={{.Version}}
      - -X github.com/DataDog/pathfinding-labs/internal/cmd.commit={{.Commit}}
      - -X github.com/DataDog/pathfinding-labs/internal/cmd.installMethod=release

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-dev"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: DataDog
    name: pathfinding-labs
  draft: false
  prerelease: auto
  mode: replace
  name_template: "v{{.Version}}"

brews:
  - name: plabs
    repository:
      owner: DataDog
      name: pathfinding-labs
      branch: "homebrew-update-{{ .Version }}"
      pull_request:
        enabled: true
        base:
          owner: DataDog
          name: pathfinding-labs
          branch: main
    directory: Formula
    homepage: "https://github.com/DataDog/pathfinding-labs"
    description: "CLI for managing Pathfinding Labs AWS attack scenarios"
    license: "Apache-2.0"
    install: |
      bin.install "plabs"
      generate_completions_from_executable(bin/"plabs", "completion")
    test: |
      assert_match version.to_s, shell_output("#{bin}/plabs version")
