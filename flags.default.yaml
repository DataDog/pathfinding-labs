# Pathfinding Labs — Default CTF Flag Set
#
# Every non-tool-testing scenario ends with a CTF flag. This file holds the
# default flag values shipped in the public repo. `plabs init` loads these
# values into ~/.plabs/plabs.yaml automatically when no --flag-file override
# is supplied.
#
# Vendors hosting Pathfinding Labs should generate their own flag file with
# the same schema and import it via `plabs init --flag-file <path>` or
# `plabs flags import <path>`.
#
# Schema:
#   flags:
#     <scenario-unique-id>: "<flag-value>"
#
# Scenario unique IDs follow the plabs CLI convention: for scenarios with a
# pathfinding-cloud-id, the ID is "<pathfinding-cloud-id>-<target>" (e.g.,
# "glue-003-to-admin", "iam-002-to-admin"). Otherwise the
# ID is "<scenario-name-field>-<target>". Confirm an ID with
# `plabs scenarios list`.
#
# Tool-testing scenarios are exempt and do not appear in this file.
